<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v9.9.8 (ESTÁVEL)</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .alert-pulse { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 
            0% { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); } 
            70% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { border-color: rgba(239, 68, 68, 0.5); }
        }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const apiKey = ""; // Chave do ambiente
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authError, setAuthError] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('Mercado Pago');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toLocaleDateString('en-CA'));
            
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('25');
            const [newItemDueDay, setNewItemDueDay] = useState('10');
            const [editingAccountId, setEditingAccountId] = useState(null);

            const [aiReport, setAiReport] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Erro Auth", e); }
                    setLoading(false);
                };
                initAuth();
                const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => { const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data()); setDailyRecords(recs); });
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubSuppliers = db.collection(`${path}/suppliers`).onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { setAuthError("Credenciais inválidas."); } finally { setLoading(false); }
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const calculateCardClearance = (purchaseDateStr, closingDay, dueDay) => {
                const purchaseDate = new Date(purchaseDateStr + 'T12:00:00');
                const pDay = purchaseDate.getDate();
                const pMonth = purchaseDate.getMonth();
                const pYear = purchaseDate.getFullYear();

                let dueMonth = pMonth;
                let dueYear = pYear;

                // Se a compra foi após o fecho, cai na fatura do mês seguinte
                if (pDay > parseInt(closingDay)) {
                    dueMonth += 1;
                }
                
                // O vencimento é sempre no mês da fatura (ou mês seguinte ao fecho)
                // Nota: O vencimento do cartão costuma ser no mês seguinte à compra se for após o fecho
                // Ex: Compra 26/05, Fecho 25/05 -> Vence 10/07. Compra 20/05 -> Vence 10/06.
                // Ajustando para a lógica padrão de cartões:
                dueMonth += 1; 

                const dueDate = new Date(dueYear, dueMonth, parseInt(dueDay), 12, 0, 0);
                return dueDate.toISOString().split('T')[0];
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || (type !== 'transferencia' && !desc)) return;
                
                const totalAmount = parseFloat(val.replace(',', '.')) || 0;
                const cardInfo = accounts.find(acc => acc.name === account && acc.type === 'cartao');
                const numInstallments = cardInfo && type === 'saida' ? (parseInt(installments) || 1) : 1;
                const batch = db.batch();
                
                for(let i = 0; i < numInstallments; i++) {
                    const currentId = i === 0 && editingId ? editingId : Date.now().toString() + i;
                    const baseDate = new Date(date + 'T12:00:00');
                    baseDate.setMonth(baseDate.getMonth() + i);
                    const finalDateStr = baseDate.toISOString().split('T')[0];

                    let finalClearance = clearance;
                    if (cardInfo) {
                        finalClearance = calculateCardClearance(finalDateStr, cardInfo.closingDay, cardInfo.dueDay);
                    } else if (i > 0) {
                        // Para parcelas normais sem ser cartão, apenas incrementa o mês do vencimento manual
                        const bc = new Date(clearance + 'T12:00:00');
                        bc.setMonth(bc.getMonth() + i);
                        finalClearance = bc.toISOString().split('T')[0];
                    }

                    const payload = {
                        description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : (numInstallments > 1 ? `${desc} (${i+1}/${numInstallments})` : desc),
                        amount: totalAmount / numInstallments,
                        type, status: type === 'transferencia' ? 'pago' : status,
                        date: finalDateStr, 
                        clearanceDate: finalClearance, 
                        account, 
                        destinationAccount: type === 'transferencia' ? destAccount : '',
                        category: type === 'transferencia' ? 'Transferência Interna' : (cat || 'Outros'),
                        supplier: type === 'saida' ? supplier : '', 
                        timestamp: new Date().toISOString(),
                        installmentIndex: i,
                        totalInstallments: numInstallments
                    };
                    const ref = db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${currentId}`);
                    batch.set(ref, payload, { merge: true });
                }
                await batch.commit();
                resetForm();
            };

            const resetForm = () => { setEditingId(null); setDesc(''); setVal(''); setType('saida'); setAccount('Mercado Pago'); setDestAccount(''); setCat(''); setSupplier(''); setStatus('pago'); setInstallments(1); };

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; let pendingTotal = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'saida') {
                            if (t.status === 'pendente') pendingTotal += amount;
                            else costsByCategory[t.category] = (costsByCategory[t.category] || 0) + amount;
                        }
                    }
                });
                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);
                return { rb, custosVariaveis, costsByCategory, totalOperating, pendingTotal, lucro: rb - (custosVariaveis + totalOperating), cmv };
            }, [transactions, dailyRecords, filterMonth]);

            const pendingPaymentsConsolidated = useMemo(() => {
                // Filtra pagamentos que VENCEM no mês selecionado
                const items = transactions.filter(t => t.type === 'saida' && t.status === 'pendente' && t.clearanceDate.startsWith(filterMonth));
                
                // Separa o que NÃO é cartão
                const nonCard = items.filter(t => {
                    const acc = accounts.find(a => a.name === t.account);
                    return acc?.type !== 'cartao';
                });

                // Consolida faturas de cartão por Vencimento
                const cardInvoices = accounts.filter(a => a.type === 'cartao').map(card => {
                    const total = items.filter(t => t.account === card.name).reduce((acc, t) => acc + (t.amount || 0), 0);
                    if (total === 0) return null;
                    return {
                        id: `invoice-${card.name}-${filterMonth}`,
                        description: `Fatura: ${card.name}`,
                        amount: total,
                        type: 'saida', status: 'pendente',
                        clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`,
                        account: card.name, category: 'Cartão de Crédito', isInvoice: true
                    };
                }).filter(Boolean);

                return [...nonCard, ...cardInvoices].sort((a,b) => new Date(a.clearanceDate) - new Date(b.clearanceDate));
            }, [transactions, filterMonth, accounts]);

            const callAiConsultant = async () => {
                setAiLoading(true);
                const systemPrompt = "És um consultor financeiro especialista em Hamburguerias. Analisa os números fornecidos e dá 3 sugestões práticas para aumentar o lucro ou reduzir o CMV.";
                const userQuery = `Mês: ${filterMonth}. Faturamento: ${formatMoney(stats.rb)}. CMV: ${formatMoney(stats.cmv)}. Gastos Operacionais: ${formatMoney(stats.totalOperating)}. Lucro: ${formatMoney(stats.lucro)}. Sugestões?`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const result = await response.json();
                    setAiReport(result.candidates?.[0]?.content?.parts?.[0]?.text || "Não foi possível gerar o relatório.");
                } catch (e) {
                    setAiReport("Erro na conexão com a IA. Tente novamente.");
                } finally { setAiLoading(false); }
            };

            const markAsPaid = async (tId) => {
                if (!user) return;
                if (tId.startsWith('invoice-')) {
                    const [, cardName, month] = tId.split('-');
                    const batch = db.batch();
                    transactions.filter(t => t.account === cardName && t.clearanceDate.startsWith(month) && t.status === 'pendente')
                        .forEach(t => batch.update(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`), { status: 'pago' }));
                    await batch.commit();
                    return;
                }
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${tId}`).update({ status: 'pago' });
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-[#F8CC82]" size={32}/></div>;

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex items-center justify-between gap-4">
                            <div className="flex items-center gap-3"><img src="logo.png" className="h-8 w-8 bg-white p-0.5 rounded-full" /><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management v9.9.8</h1></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'a_pagar', 'cartoes', 'dre', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}>{tab.replace('_', ' ')}</button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full flex items-center gap-4">
                                <span className="text-[9px] font-black uppercase text-slate-400">Período de Gestão:</span>
                                <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" />
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500 text-center"><p className="text-[8px] font-black text-[#F8CC82] uppercase mb-1 tracking-widest">Lucro Real</p><h3 className={`text-xl font-black ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">Faturamento</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">A Pagar (Mês)</p><h3 className="text-xl font-black text-orange-500">{formatMoney(pendingPaymentsConsolidated.reduce((acc, t) => acc + t.amount, 0))}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">CMV</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.cmv)}</h3></div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl flex flex-col items-center justify-center text-center">
                                        <Icon name="brain-circuit" size={48} className="text-[#D97757] mb-4" />
                                        <h3 className="text-lg font-black uppercase tracking-tighter">Consultor Estratégico IA</h3>
                                        <p className="text-[10px] text-slate-400 uppercase font-bold mt-1 mb-6">Análise inteligente dos teus números</p>
                                        
                                        {aiReport ? (
                                            <div className="bg-slate-50 p-6 rounded-3xl text-left text-xs font-semibold leading-relaxed border animate-in zoom-in">
                                                {aiReport.split('\n').map((line, i) => <p key={i} className="mb-2">{line}</p>)}
                                                <button onClick={() => setAiReport('')} className="mt-4 text-[9px] font-bold text-red-400 uppercase">Limpar Relatório</button>
                                            </div>
                                        ) : (
                                            <button onClick={callAiConsultant} disabled={aiLoading} className="bg-[#1A202C] text-[#F8CC82] px-8 py-4 rounded-2xl font-black uppercase text-xs flex items-center gap-3 hover:scale-105 transition-all">
                                                {aiLoading ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />}
                                                Gerar Relatório Estratégico
                                            </button>
                                        )}
                                    </div>

                                    <form onSubmit={saveTx} className="glass-card p-8 rounded-[3rem] shadow-sm space-y-4">
                                        <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">Novo Lançamento Geral</h2>
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                            {['entrada', 'saida', 'transferencia'].map(t => (
                                                <button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t.slice(0, 5)}</button>
                                            ))}
                                        </div>
                                        <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black" value={val} onChange={e => setVal(e.target.value)} />
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={account} onChange={e => setAccount(e.target.value)}>
                                                {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </div>
                                        <button className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Gravar Registo</button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'a_pagar' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black uppercase text-center tracking-tighter">Contas a Pagar no Período</h2>
                                <div className="glass-card rounded-[2.5rem] shadow-sm overflow-hidden flex flex-col min-h-[400px]">
                                    <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400 tracking-widest flex justify-between">
                                        <span>Items por Vencimento</span>
                                        <span>Total: {formatMoney(pendingPaymentsConsolidated.reduce((acc, t) => acc + t.amount, 0))}</span>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {pendingPaymentsConsolidated.map(t => (
                                            <div key={t.id} className={`p-4 flex justify-between items-center hover:bg-slate-50 transition-colors ${t.isInvoice ? 'bg-orange-50/30' : ''}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.isInvoice ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'}`}>
                                                        <Icon name={t.isInvoice ? 'credit-card' : 'calendar'} size={18} />
                                                    </div>
                                                    <div>
                                                        <p className="font-black text-sm uppercase leading-tight">
                                                            <span className="text-red-500 mr-2">[VENC: {t.clearanceDate.split('-').reverse().join('/')}]</span>
                                                            {t.description}
                                                        </p>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.account} • {t.category}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className={`font-black text-sm ${t.isInvoice ? 'text-orange-600' : 'text-[#1A202C]'}`}>{formatMoney(t.amount)}</p>
                                                    <button onClick={() => markAsPaid(t.id)} className="w-8 h-8 bg-green-500 text-white rounded-lg flex items-center justify-center"><Icon name="check" size={14} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'cartoes' && (
                            <div className="space-y-8 animate-in zoom-in duration-300">
                                <h2 className="text-2xl font-black uppercase text-center tracking-tighter">Gestão de Cartões & Faturas</h2>
                                <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-orange-400 max-w-4xl mx-auto">
                                    <h3 className="text-xs font-black uppercase tracking-widest mb-6 flex items-center gap-2"><Icon name="plus-circle" className="text-orange-500" /> Novo Gasto no Cartão</h3>
                                    <form onSubmit={(e) => { setType('saida'); setStatus('pendente'); saveTx(e); }} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Cartão</label>
                                                <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}>
                                                    <option value="">Selecionar Cartão...</option>
                                                    {accounts.filter(a => a.type === 'cartao').map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Descrição</label>
                                                <input type="text" placeholder="Ex: Insumos" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Valor Total</label>
                                                <input type="text" placeholder="R$ 0,00" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Data Compra</label>
                                                <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-bold outline-none" value={date} onChange={e => setDate(e.target.value)} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Parcelas</label>
                                                <input type="number" min="1" max="60" className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm outline-none" value={installments} onChange={e=>setInstallments(e.target.value)} />
                                            </div>
                                        </div>
                                        <button className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg mt-2">Lançar no Cartão</button>
                                    </form>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {accounts.filter(a => a.type === 'cartao').map(card => {
                                        const sum = transactions.filter(t => t.account === card.name && t.type === 'saida' && t.clearanceDate.startsWith(filterMonth)).reduce((acc, t) => acc + t.amount, 0);
                                        return (
                                            <div key={card.id} className="glass-card p-8 rounded-[3rem] shadow-lg border-t-8 border-[#1A202C]">
                                                <h3 className="font-black uppercase text-lg">{card.name}</h3>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Soma Fatura ({filterMonth})</p>
                                                <h3 className="text-xl font-black text-[#1A202C] mt-2">{formatMoney(sum)}</h3>
                                                <div className="mt-4 pt-4 border-t grid grid-cols-2 text-center">
                                                    <div className="border-r"><p className="text-[8px] font-black text-slate-400 uppercase">Fecho</p><p className="font-black text-sm text-orange-500">Dia {card.closingDay}</p></div>
                                                    <div><p className="text-[8px] font-black text-slate-400 uppercase">Venc.</p><p className="font-black text-sm text-red-500">Dia {card.dueDay}</p></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg">
                                    <h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="landmark" className="text-[#D97757]"/> Contas & Cartões</h2>
                                    <div className="space-y-4">
                                        <div className="p-4 bg-slate-50 rounded-2xl border-2 border-dashed">
                                            <input type="text" className="w-full p-3 bg-white border rounded-xl text-xs font-bold outline-none mb-2" placeholder="Nome" value={newItemName} onChange={e => setNewItemName(e.target.value)} />
                                            <div className="flex gap-2 mb-2">
                                                <button onClick={() => setNewItemType('corrente')} className={`flex-1 p-2 rounded-lg text-[9px] font-black uppercase ${newItemType === 'corrente' ? 'bg-black text-white' : 'bg-white border'}`}>Corrente</button>
                                                <button onClick={() => setNewItemType('cartao')} className={`flex-1 p-2 rounded-lg text-[9px] font-black uppercase ${newItemType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-white border'}`}>Cartão</button>
                                            </div>
                                            {newItemType === 'cartao' && (
                                                <div className="grid grid-cols-2 gap-2 mb-2">
                                                    <input type="number" className="p-2 text-xs border rounded-lg font-bold" placeholder="Fecho (Ex: 25)" value={newItemClosingDay} onChange={e => setNewItemClosingDay(e.target.value)} />
                                                    <input type="number" className="p-2 text-xs border rounded-lg font-bold" placeholder="Venc. (Ex: 10)" value={newItemDueDay} onChange={e => setNewItemDueDay(e.target.value)} />
                                                </div>
                                            )}
                                            <button onClick={handleSaveAccount} className="w-full bg-[#1A202C] text-[#F8CC82] p-3 rounded-xl text-[10px] font-black uppercase">Gravar Conta</button>
                                        </div>
                                        <div className="space-y-2">{accounts.map(a => (
                                            <div key={a.id} className="flex justify-between items-center p-3 border rounded-xl bg-white group">
                                                <div className="flex items-center gap-2 text-[10px] font-black uppercase"><Icon name={a.type === 'cartao' ? 'credit-card' : 'landmark'} size={12}/><span>{a.name}</span></div>
                                                <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button>
                                            </div>
                                        ))}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v9.9.8 Base Estável</footer>
                </div>
            );

            async function handleSaveAccount() {
                if (!newItemName) return;
                const path = `artifacts/${appId}/users/${user.uid}/accounts`;
                const data = { name: newItemName, type: newItemType, closingDay: newItemClosingDay || '1', dueDay: newItemDueDay || '10' };
                if (editingAccountId) { await db.doc(`${path}/${editingAccountId}`).set(data, { merge: true }); }
                else { await db.collection(path).add(data); }
                setNewItemName(''); setNewItemType('corrente'); setEditingAccountId(null);
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
