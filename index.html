<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v11.7.5 (CONTROLO TOTAL DE GRUPOS)</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 3px; }
        
        .card-bank-mercado { border-top: 8px solid #009EE3; }
        .card-bank-c6 { border-top: 8px solid #000000; }
        .card-bank-ifood { border-top: 8px solid #EA1D2C; }
        .card-bank-caixa { border-top: 8px solid #10B981; }
        .card-bank-fundo { border-top: 8px solid #94A3B8; }

        .group-badge {
            font-size: 8px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }
        .bg-operacional { background-color: #E0F2FE; color: #0369A1; }
        .bg-reserva { background-color: #FEF3C7; color: #92400E; }
        .bg-outros { background-color: #F1F5F9; color: #475569; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [dashboardFilterAccount, setDashboardFilterAccount] = useState('');
            const [dashboardFilterCategory, setDashboardFilterCategory] = useState('');

            // Estados do formulário de transações
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            // Estados do formulário de Contas (AJUSTES)
            const [accName, setAccName] = useState('');
            const [accType, setAccType] = useState('corrente');
            const [accGroup, setAccGroup] = useState('operacional'); 
            const [accClosing, setAccClosing] = useState('25');
            const [accDue, setAccDue] = useState('10');
            const [editingAccId, setEditingAccId] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    const accList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAccounts(accList);
                    if (accList.length > 0 && !account) setAccount(accList[0].name);
                });
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubSuppliers = db.collection(`${path}/suppliers`).onSnapshot(snap => {
                    setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const filteredDashboardTxs = useMemo(() => {
                return transactions.filter(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    const isDateMatch = (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth));
                    const isAccountMatch = dashboardFilterAccount === '' || t.account === dashboardFilterAccount;
                    const isCategoryMatch = dashboardFilterCategory === '' || t.category === dashboardFilterCategory;
                    return isDateMatch && (!accInfo || accInfo.type !== 'cartao') && isAccountMatch && isCategoryMatch;
                }).sort((a,b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
            }, [transactions, accounts, filterMonth, dashboardFilterAccount, dashboardFilterCategory]);

            const accountBalances = useMemo(() => {
                const balances = {}; 
                accounts.forEach(acc => balances[acc.name] = 0);
                const p = (v) => parseFloat(v) || 0;
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + amt;
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { 
                            balances[t.account] -= amt; balances[t.destinationAccount] += amt; 
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const groups = useMemo(() => {
                const items = accounts.filter(acc => acc.type === 'corrente');
                // Agora filtramos estritamente pela escolha manual do utilizador
                return {
                    operacional: items.filter(acc => acc.group === 'operacional' || !acc.group),
                    reservas: items.filter(acc => acc.group === 'reserva'),
                    outras: items.filter(acc => acc.group === 'outros')
                };
            }, [accounts]);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; 
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if ((t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth)) && t.status === 'pago') {
                        if (t.type === 'saida') costsByCategory[t.category] = (costsByCategory[t.category] || 0) + p(t.amount);
                        else if (t.type === 'entrada') rb += p(t.amount);
                    }
                });
                return { rb, custosVariaveis, lucro: rb - (custosVariaveis + Object.values(costsByCategory).reduce((a,b)=>a+b,0)), costsByCategory };
            }, [transactions, dailyRecords, filterMonth]);

            // Handlers Autenticação
            const handleAuth = async (e) => {
                e.preventDefault();
                try {
                    if (isRegistering) await auth.createUserWithEmailAndPassword(email, password);
                    else await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { alert(err.message); }
            };

            // Handlers Transações
            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                const total = parseFloat(val.replace(',', '.'));
                const payload = { 
                    description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : desc,
                    amount: total, type, status, date, clearanceDate: clearance, account, destinationAccount: destAccount,
                    category: type === 'transferencia' ? 'Transferência' : (cat || 'Geral'), supplier, timestamp: new Date().toISOString()
                };
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                if (editingId) await db.doc(`${path}/${editingId}`).update(payload);
                else await db.collection(path).add(payload);
                setEditingId(null); setDesc(''); setVal('');
            };

            // Handlers Contas (Ajustes)
            const resetAccForm = () => {
                setEditingAccId(null); setAccName(''); setAccType('corrente'); setAccGroup('operacional'); setAccClosing('25'); setAccDue('10');
            };

            const startEditAccount = (a) => {
                setEditingAccId(a.id);
                setAccName(a.name);
                setAccType(a.type || 'corrente');
                setAccGroup(a.group || 'operacional');
                setAccClosing(a.closingDay || '25');
                setAccDue(a.dueDay || '10');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const saveAccount = async () => {
                if (!accName) return;
                const payload = { 
                    name: accName, type: accType, 
                    group: accType === 'corrente' ? accGroup : 'cartao',
                    closingDay: accClosing, dueDay: accDue 
                };
                const path = `artifacts/${appId}/users/${user.uid}/accounts`;
                if (editingAccId) await db.doc(`${path}/${editingAccId}`).update(payload);
                else await db.collection(path).add(payload);
                resetAccForm();
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-[#F8CC82]" size={48} /></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-10"><img src="logo.png" className="w-24 mx-auto mb-4" /><h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter text-center">Tribo Finanças</h2></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-semibold outline-none" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-semibold outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in relative pb-20">
                    <img src="logo.png" className="bg-watermark w-96" alt="watermark" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <img src="logo.png" className="h-10 w-10 bg-white p-1 rounded-full shadow-lg" alt="logo" />
                                <div><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter leading-none">Tribo Management</h1><button onClick={() => auth.signOut()} className="text-[8px] text-red-400 font-bold uppercase mt-1">Sair</button></div>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'planilha', 'a_pagar', 'a_receber', 'resultados', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {tab.replace('_', ' ')}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 border-2 border-slate-100"><span className="text-[9px] font-black uppercase text-slate-400">Período:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <form onSubmit={saveTx} className={`lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 h-fit transition-all ${editingId ? 'border-blue-500' : 'border-[#1A202C]'}`}>
                                    <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">{editingId ? 'Editar Lançamento' : 'Novo Lançamento'}</h2>
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">{['entrada', 'saida', 'transferencia'].map(t => (<button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === t ? 'bg-white text-black shadow-sm' : 'text-slate-400'}`}>{t.slice(0, 5)}</button>))}</div>
                                    <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={account} onChange={e => setAccount(e.target.value)}>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                    </div>
                                    <div className="flex gap-2"><button className="flex-1 bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">{editingId ? 'Guardar' : 'Gravar'}</button>{editingId && <button type="button" onClick={() => setEditingId(null)} className="bg-slate-200 p-4 rounded-2xl font-black uppercase text-[10px]">X</button>}</div>
                                </form>
                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[600px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400">Histórico de Movimentos</div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {filteredDashboardTxs.map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center group hover:bg-slate-50">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}><Icon name={t.type === 'entrada' ? 'trending-up' : 'trending-down'} size={14} /></div>
                                                    <div><p className="font-black text-sm uppercase leading-none">{t.description}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.account} • {t.category}</p></div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className="font-black text-sm">{formatMoney(t.amount)}</p>
                                                    <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all"><button onClick={() => { setEditingId(t.id); setDesc(t.description); setVal(t.amount.toString().replace('.', ',')); setAccount(t.account); }} className="text-blue-500"><Icon name="edit-2" size={14}/></button></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'saldos' && (
                            <div className="space-y-12 animate-in fade-in">
                                {[
                                    {title: 'Destaque Operacional', list: groups.operacional, color: 'border-[#D97757]'}, 
                                    {title: 'Reservas & Aplicações', list: groups.reservas, color: 'border-slate-300'}, 
                                    {title: 'Outras Contas', list: groups.outras, color: 'border-slate-100'}
                                ].map(g => (
                                    <div key={g.title} className="space-y-4">
                                        <h2 className="text-[10px] font-black uppercase text-slate-400 tracking-[0.4em] px-2 border-l-4 border-slate-400 ml-2">{g.title}</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 px-2">
                                            {g.list.map(acc => (
                                                <div key={acc.id} className={`bg-white p-8 rounded-[3.5rem] shadow-xl border-t-8 ${g.color} flex flex-col items-center transition-transform hover:scale-105`}>
                                                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">{acc.name}</p>
                                                    <h3 className={`text-3xl font-black ${accountBalances[acc.name] >= 0 ? 'text-slate-900' : 'text-red-500'}`}>{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in">
                                <div className="glass-card p-8 rounded-[3rem] border-t-4 border-orange-500 space-y-4">
                                    <h2 className="text-sm font-black uppercase mb-6">{editingAccId ? 'Editar Conta' : 'Nova Conta'}</h2>
                                    <div className="p-6 bg-slate-50 rounded-3xl border border-dashed space-y-4">
                                        <input type="text" className="w-full p-4 border rounded-2xl font-bold text-xs outline-none" placeholder="Nome da Conta" value={accName} onChange={e => setAccName(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => setAccType('corrente')} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accType === 'corrente' ? 'bg-black text-white' : 'bg-white border'}`}>CONTA CORRENTE</button>
                                            <button onClick={() => setAccType('cartao')} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-white border'}`}>CARTÃO CRÉDITO</button>
                                        </div>

                                        {/* SELETOR DE GRUPO - DISPONÍVEL PARA TODAS AS CONTAS QUE NÃO SÃO CARTÃO */}
                                        {accType === 'corrente' && (
                                            <div className="space-y-1 fade-in">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Grupo de Exibição (Aba Saldos)</label>
                                                <select className="w-full p-4 bg-white border rounded-2xl text-[10px] font-black uppercase outline-none" value={accGroup} onChange={e => setAccGroup(e.target.value)}>
                                                    <option value="operacional">Destaque Operacional</option>
                                                    <option value="reserva">Reservas & Aplicações</option>
                                                    <option value="outros">Outras Contas</option>
                                                </select>
                                            </div>
                                        )}

                                        {accType === 'cartao' && (
                                            <div className="grid grid-cols-2 gap-3 fade-in">
                                                <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Fecho</label><input type="number" className="w-full p-3 border rounded-xl text-xs font-bold" value={accClosing} onChange={e => setAccClosing(e.target.value)} /></div>
                                                <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Vence</label><input type="number" className="w-full p-3 border rounded-xl text-xs font-bold" value={accDue} onChange={e => setAccDue(e.target.value)} /></div>
                                            </div>
                                        )}

                                        <div className="flex gap-2 pt-2">
                                            <button onClick={saveAccount} className={`flex-1 ${editingAccId ? 'bg-blue-600' : 'bg-black'} text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg`}>
                                                {editingAccId ? 'Guardar Alterações' : 'Criar Conta'}
                                            </button>
                                            {editingAccId && <button onClick={resetAccForm} className="bg-slate-200 p-4 rounded-2xl font-black uppercase text-[10px]">Cancelar</button>}
                                        </div>
                                    </div>

                                    <div className="space-y-2 max-h-[350px] overflow-y-auto no-scrollbar pt-4">
                                        <h3 className="text-[9px] font-black uppercase text-slate-400 ml-2 mb-2">Contas Existentes</h3>
                                        {accounts.map(a => (
                                            <div key={a.id} className="flex justify-between items-center p-4 border rounded-2xl bg-white hover:bg-slate-50 group transition-all">
                                                <div className="flex flex-col">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[10px] font-black uppercase">{a.name}</span>
                                                        {a.type === 'corrente' && (
                                                            <span className={`group-badge bg-${a.group || 'operacional'}`}>
                                                                {a.group === 'operacional' ? 'Destaque' : a.group === 'reserva' ? 'Reserva' : 'Outros'}
                                                            </span>
                                                        )}
                                                    </div>
                                                    <span className="text-[8px] text-slate-400 font-bold uppercase">{a.type === 'cartao' ? 'Crédito' : 'Corrente'}</span>
                                                </div>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                                    <button onClick={() => startEditAccount(a)} className="text-blue-500 hover:scale-110"><Icon name="edit-2" size={14}/></button>
                                                    <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-200 hover:text-red-500 hover:scale-110"><Icon name="trash-2" size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] border-t-4 border-[#1A202C] h-fit">
                                    <h2 className="text-sm font-black uppercase mb-6">Categorias & Fornecedores</h2>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mb-4">Gestão de Listas Auxiliares</p>
                                    <div className="space-y-2">
                                        {categories.map(c => (<div key={c.id} className="p-3 bg-white border rounded-xl flex justify-between items-center"><span className="text-[9px] font-black uppercase">{c.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-200"><Icon name="trash-2" size={12}/></button></div>))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* OUTRAS ABAS (Planilha, Resultados, etc.) */}
                        {activeTab === 'planilha' && (
                            <div className="glass-card p-8 rounded-[3rem] border overflow-x-auto no-scrollbar">
                                <h2 className="text-xs font-black uppercase mb-4">Vendas Diárias ({filterMonth})</h2>
                                <table className="w-full text-center text-[11px] min-w-[800px]">
                                    <thead className="header-black"><tr><th className="p-3">Data</th><th className="p-3">Total</th><th className="p-3">Pix</th><th className="p-3">Dinheiro</th><th className="p-3">Ifood</th><th className="p-3">Motoboy</th></tr></thead>
                                    <tbody className="divide-y">
                                        {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b)=>b.localeCompare(a)).map(d => {
                                            const r = dailyRecords[d] || {};
                                            const total = ['pix','pixOnline','dinheiro','ifood','debito','credito'].reduce((acc,f)=>acc+(parseFloat(r[f])||0),0);
                                            return (<tr key={d} className="h-10 hover:bg-slate-50 transition-colors"><td>{d.split('-').reverse().join('/')}</td><td className="font-black">{formatMoney(total)}</td><td>{formatMoney(r.pix)}</td><td>{formatMoney(r.dinheiro)}</td><td>{formatMoney(r.ifood)}</td><td className="text-red-500 font-bold">{formatMoney(r.motoboy)}</td></tr>);
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v11.7.5</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
