<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v14.7.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .card-bank-mercado { border-top: 8px solid #009EE3; }
        .card-bank-c6 { border-top: 8px solid #000000; }
        .card-bank-ifood { border-top: 8px solid #EA1D2C; }
        .card-bank-fundo { border-top: 8px solid #94A3B8; }
        .section-label { font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: #94A3B8; margin-bottom: 1.5rem; display: flex; items-center gap: 1rem; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #E2E8F0; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [salesGoal, setSalesGoal] = useState(0);
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [typeFilter, setTypeFilter] = useState('todos');
            const [accFilter, setAccFilter] = useState('');
            const [catFilter, setCatFilter] = useState('');

            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [status, setStatus] = useState('pago'); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));

            const [accName, setAccName] = useState('');
            const [accType, setAccType] = useState('corrente');
            const [accHighlight, setAccHighlight] = useState(false);
            const [accPosition, setAccPosition] = useState(1);
            const [editingAccId, setEditingAccId] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    const accList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAccounts(accList);
                    if (accList.length > 0 && !account) setAccount(accList[0].name);
                });
                
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubGoal = db.doc(`${path}/settings/config`).onSnapshot(doc => {
                    if (doc.exists) setSalesGoal(doc.data().salesGoal || 0);
                });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubGoal(); };
            }, [user, account]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const accountBalances = useMemo(() => {
                const balances = {}; 
                const p = (v) => parseFloat(v) || 0;
                accounts.forEach(acc => balances[acc.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + amt;
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { 
                            balances[t.account] = (balances[t.account] || 0) - amt; 
                            balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + amt; 
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const totalBalance = useMemo(() => {
                return accounts
                    .filter(acc => acc.type === 'corrente')
                    .reduce((acc, curr) => acc + (accountBalances[curr.name] || 0), 0);
            }, [accounts, accountBalances]);

            const groupedAccounts = useMemo(() => {
                const currentAccs = accounts.filter(acc => acc.type === 'corrente');
                return {
                    highlighted: currentAccs.filter(acc => acc.highlight).sort((a,b) => (parseInt(a.position) || 0) - (parseInt(b.position) || 0)),
                    others: currentAccs.filter(acc => !acc.highlight).sort((a,b) => (parseInt(a.position) || 0) - (parseInt(b.position) || 0))
                };
            }, [accounts]);

            const pendingPaymentsConsolidated = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                const consolidated = [];
                const cardsProcessed = new Set();

                // 1. Processar contas correntes (Saídas pendentes normais)
                transactions.forEach(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    if (t.type === 'saida' && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth) && accInfo?.type !== 'cartao') {
                        consolidated.push({ ...t, isCard: false });
                    }
                });

                // 2. Processar cartões de crédito (Agrupar em uma fatura única por vencimento real)
                accounts.filter(a => a.type === 'cartao').forEach(card => {
                    const cardTxs = transactions.filter(t => t.account === card.name && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth));
                    if (cardTxs.length > 0) {
                        const totalCard = cardTxs.reduce((sum, tx) => sum + p(tx.amount), 0);
                        consolidated.push({
                            id: `fatura-${card.name}-${filterMonth}`,
                            description: `Fatura ${card.name}`,
                            amount: totalCard,
                            clearanceDate: `${filterMonth}-${String(card.dueDay || 1).padStart(2, '0')}`,
                            account: card.name,
                            category: 'Cartão de Crédito',
                            isCard: true,
                            txIds: cardTxs.map(t => t.id) // Para poder marcar como pago em massa depois
                        });
                    }
                });

                return consolidated.sort((a,b) => a.clearanceDate.localeCompare(b.clearanceDate));
            }, [transactions, accounts, filterMonth]);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; let diasComVenda = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const totalDia = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + p(r[f]), 0);
                        if (totalDia > 0) { rb += totalDia; diasComVenda++; }
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                return { rb, diasComVenda, mediaDiaria: diasComVenda > 0 ? rb / diasComVenda : 0 };
            }, [dailyRecords, filterMonth]);

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                const batch = db.batch();
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const totalValue = parseFloat(val.replace(',', '.'));
                const cardInfo = accounts.find(acc => acc.name === account && acc.type === 'cartao');
                const numParcelas = cardInfo ? installments : 1;
                const valorParcela = totalValue / numParcelas;

                for(let i = 0; i < numParcelas; i++) {
                    const dObj = new Date(date + 'T12:00:00');
                    dObj.setMonth(dObj.getMonth() + i);
                    let finalDate = dObj.toISOString().split('T')[0];
                    let finalClearance = clearance;

                    if (cardInfo) {
                        const closingDay = parseInt(cardInfo.closingDay) || 25;
                        const dueDay = parseInt(cardInfo.dueDay) || 10;
                        const purchaseDay = dObj.getDate();
                        let billingDate = new Date(dObj);
                        if (purchaseDay > closingDay) billingDate.setMonth(billingDate.getMonth() + 1);
                        let dueDate = new Date(billingDate);
                        dueDate.setMonth(dueDate.getMonth() + 1); // Vence no mês seguinte ao faturamento
                        dueDate.setDate(dueDay);
                        finalClearance = dueDate.toISOString().split('T')[0];
                    }

                    const payload = {
                        description: numParcelas > 1 ? `${desc} (${i+1}/${numParcelas})` : desc,
                        amount: valorParcela,
                        type, status: cardInfo ? 'pendente' : status, date: finalDate, clearanceDate: finalClearance, 
                        account, destinationAccount: destAccount,
                        category: type === 'transferencia' ? 'Transferência' : (cat || 'Geral'),
                        timestamp: new Date().toISOString()
                    };
                    const newDocRef = db.collection(path).doc();
                    batch.set(newDocRef, payload);
                }
                await batch.commit();
                setDesc(''); setVal(''); setInstallments(1); setCat('');
            };

            const markAsPaid = async (item) => {
                const batch = db.batch();
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                if (item.isCard) {
                    item.txIds.forEach(id => batch.update(db.doc(`${path}/${id}`), { status: 'pago' }));
                } else {
                    batch.update(db.doc(`${path}/${item.id}`), { status: 'pago' });
                }
                await batch.commit();
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-orange-500" size={48} /></div>;

            return (
                <div className="min-h-screen flex flex-col fade-in relative pb-20">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <img src="logo.png" className="h-10 w-10 bg-white p-1 rounded-full shadow-lg" alt="logo" />
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Business</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'planilha', 'a_pagar', 'resultados', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {tab.replace('_', ' ')}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black text-red-400 uppercase ml-4">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center"><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-white border-2 border-slate-100 p-3 rounded-full font-black text-[#D97757] text-sm shadow-sm outline-none" /></div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <form onSubmit={saveTx} className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-black h-fit">
                                    <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">Lançamento Rápido</h2>
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                        {['entrada', 'saida', 'transferencia'].map(t => (
                                            <button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t}</button>
                                        ))}
                                    </div>
                                    <input type="text" placeholder="O que foi?" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="Quanto?" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}>
                                            {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                        </select>
                                    </div>
                                    <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={cat} onChange={e => setCat(e.target.value)}>
                                        <option value="">Categoria...</option>
                                        {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                    </select>
                                    <button className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Gravar</button>
                                </form>
                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[500px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400">Últimas Movimentações</div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {transactions.filter(t => t.date?.startsWith(filterMonth)).sort((a,b) => b.timestamp.localeCompare(a.timestamp)).map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-[10px] font-black text-slate-400">{t.date?.split('-').reverse().slice(0, 2).join('/')}</span>
                                                    <div>
                                                        <p className="font-black text-xs uppercase">{t.description}</p>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase">{t.account}</p>
                                                    </div>
                                                </div>
                                                <p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(t.amount)}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'saldos' && (
                            <div className="space-y-12">
                                <div className="stat-banner !bg-[#D97757] !border-black">
                                    <p className="text-[11px] font-black uppercase tracking-widest opacity-80 mb-2">Património Líquido Total</p>
                                    <h3 className="text-5xl font-black text-white">{formatMoney(totalBalance)}</h3>
                                </div>
                                <div className="space-y-8">
                                    {groupedAccounts.highlighted.length > 0 && (
                                        <div className="space-y-4">
                                            <h2 className="section-label">Contas Principais</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                {groupedAccounts.highlighted.map(acc => (
                                                    <div key={acc.id} className="glass-card p-12 rounded-[4rem] border-t-[12px] border-orange-500 text-center shadow-xl">
                                                        <p className="text-[12px] font-black text-slate-400 uppercase mb-2">{acc.name}</p>
                                                        <h3 className="text-5xl font-black">{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    <h2 className="section-label">Outras Contas</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {groupedAccounts.others.map(acc => (
                                            <div key={acc.id} className="glass-card p-8 rounded-[3rem] border-t-8 border-black text-center shadow-md">
                                                <p className="text-[11px] font-black text-slate-400 uppercase mb-1">{acc.name}</p>
                                                <h3 className="text-2xl font-black">{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'a_pagar' && (
                            <div className="space-y-6">
                                <div className="stat-banner !border-red-500">
                                    <p className="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-2">Total a Pagar no Mês</p>
                                    <h3 className="text-4xl font-black text-white">{formatMoney(pendingPaymentsConsolidated.reduce((a,b) => a + b.amount, 0))}</h3>
                                </div>
                                <div className="glass-card rounded-[3rem] overflow-hidden border shadow-xl">
                                    <div className="bg-slate-50 p-6 border-b font-black text-[10px] uppercase text-slate-400">Contas e Faturas Agrupadas</div>
                                    <div className="divide-y">
                                        {pendingPaymentsConsolidated.length === 0 ? (
                                            <div className="p-20 text-center font-black text-slate-300 uppercase tracking-widest">Nenhum pagamento pendente</div>
                                        ) : (
                                            pendingPaymentsConsolidated.map(item => (
                                                <div key={item.id} className="p-6 flex justify-between items-center hover:bg-slate-50 transition-all">
                                                    <div className="flex items-center gap-6">
                                                        <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${item.isCard ? 'bg-orange-100 text-orange-600' : 'bg-red-100 text-red-600'}`}>
                                                            <Icon name={item.isCard ? 'credit-card' : 'file-text'} size={24} />
                                                        </div>
                                                        <div>
                                                            <p className="font-black text-lg uppercase leading-tight">{item.description}</p>
                                                            <div className="flex gap-3 mt-1">
                                                                <span className="text-[10px] font-black text-slate-400 uppercase">Vence em: {item.clearanceDate.split('-').reverse().join('/')}</span>
                                                                <span className="text-[10px] font-black text-orange-500 uppercase">{item.account}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-6">
                                                        <p className="text-xl font-black">{formatMoney(item.amount)}</p>
                                                        <button onClick={() => markAsPaid(item)} className="w-12 h-12 bg-green-500 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                                                            <Icon name="check" size={20} />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-yellow-500 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Meta de Vendas</p>
                                        <input type="number" className="w-full text-3xl font-black text-center bg-slate-50 p-4 rounded-3xl border-2 mb-4" value={salesGoal} onChange={async(e) => {
                                            const v = e.target.value; setSalesGoal(v);
                                            await db.doc(`artifacts/${appId}/users/${user.uid}/settings/config`).set({ salesGoal: parseFloat(v) || 0 }, { merge: true });
                                        }} />
                                        <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div className="bg-green-500 h-full" style={{ width: `${Math.min(100, (stats.rb / (salesGoal || 1)) * 100)}%` }}></div>
                                        </div>
                                    </div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-green-500 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Bruto do Mês</p>
                                        <h3 className="text-4xl font-black text-green-600">{formatMoney(stats.rb)}</h3>
                                        <p className="text-[9px] font-black text-slate-300 uppercase mt-4">{stats.diasComVenda} dias faturados</p>
                                    </div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-blue-500 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Ticket Médio Dia</p>
                                        <h3 className="text-4xl font-black text-blue-600">{formatMoney(stats.mediaDiaria)}</h3>
                                        <p className="text-[9px] font-black text-slate-300 uppercase mt-4">Produtividade Diária</p>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'ajustes' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="glass-card p-8 rounded-[3rem] border-t-8 border-black space-y-6">
                                    <h2 className="font-black uppercase text-sm border-b pb-4">Gestão de Bancos e Cartões</h2>
                                    <div className="p-6 bg-slate-50 rounded-3xl border-2 border-dashed space-y-4">
                                        <input type="text" className="w-full p-4 border rounded-2xl font-bold text-xs" placeholder="Nome da Conta" value={accName} onChange={e => setAccName(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => setAccType('corrente')} className={`flex-1 p-3 rounded-xl text-[9px] font-black uppercase ${accType === 'corrente' ? 'bg-black text-white' : 'bg-white border'}`}>CORRENTE</button>
                                            <button onClick={() => setAccType('cartao')} className={`flex-1 p-3 rounded-xl text-[9px] font-black uppercase ${accType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-white border'}`}>CARTÃO</button>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <input type="checkbox" checked={accHighlight} onChange={e => setAccHighlight(e.target.checked)} />
                                            <span className="text-[10px] font-black uppercase">Conta Principal (Destaque)</span>
                                        </div>
                                        <button onClick={async() => {
                                            await db.collection(`artifacts/${appId}/users/${user.uid}/accounts`).add({ name: accName, type: accType, highlight: accHighlight });
                                            setAccName('');
                                        }} className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px]">Cadastrar</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-20 font-black text-[8px] uppercase tracking-[0.5em]">Tribo Business Intelligence v14.7.0</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
