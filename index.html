<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v4.4</title>
    
    <!-- Configuração do Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos Customizados -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilos Excel para Vendas */
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 700; font-size: 11px; outline: none; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.3); }
        .header-green { background-color: #92D050; color: #000; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .header-red { background-color: #FF0000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .dre-row:nth-child(even) { background-color: rgba(0,0,0,0.02); }

        /* Estilo para a marca d'água */
        .bg-watermark {
            position: fixed;
            bottom: -50px;
            right: -50px;
            opacity: 0.03;
            z-index: -1;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .auth-bg {
            background-color: #1A202C;
            background-image: radial-gradient(circle at 2px 2px, rgba(217, 119, 87, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="antialiased selection:bg-[#D97757] selection:text-white">

    <div id="root"></div>

    <!-- Firebase SDKs via CDN - Versão Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const ACCOUNTS = ['Mercado Pago', 'C6', 'Aplicação', 'Fundo Aluguel', 'Fundo C6', 'Fundo MP', 'Fundo Rico', 'iFood'];
        const CATEGORIES = ['CMV (Insumos)', 'Pessoal (Salários)', 'Operacional (Aluguer/Luz)', 'Marketing', 'Impostos', 'Manutenção', 'Investimentos', 'Outros'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Estados de Autenticação
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            // Estados do Financeiro
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [suppliers, setSuppliers] = useState([]);
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida');
            const [selectedAccount, setSelectedAccount] = useState(ACCOUNTS[0]);
            const [selectedCategory, setSelectedCategory] = useState(CATEGORIES[0]);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearanceDate, setClearanceDate] = useState(new Date().toISOString().split('T')[0]);
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDayDate, setNewDayDate] = useState(new Date().toISOString().split('T')[0]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const userPath = `artifacts/${appId}/users/${user.uid}`;
                const unsubTx = db.collection(`${userPath}/transactions`).onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                const unsubDaily = db.collection(`${userPath}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                const unsubSup = db.collection(`${userPath}/suppliers`).onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                return () => { unsubTx(); unsubDaily(); unsubSup(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setAuthError(err.message);
                }
            };

            const handleLogout = () => auth.signOut();

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const handleSaveTransaction = async (e) => {
                e.preventDefault();
                if (!user || !desc || !val) return;
                const id = Date.now().toString();
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`).set({
                    description: desc, 
                    amount: parseFloat(val), 
                    type, 
                    date, 
                    clearanceDate,
                    account: selectedAccount,
                    category: selectedCategory
                });
                setDesc(''); setVal('');
                const today = new Date().toISOString().split('T')[0];
                setDate(today);
                setClearanceDate(today);
            };

            const calculateSales = (r) => {
                const p = (v) => parseFloat(v) || 0;
                const totalDia = p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                const totalEntregas = p(r.motoboy) + p(r.taxaEntrega);
                return { totalDia, totalEntregas };
            };

            const getMonthStats = (month) => {
                const p = (v) => parseFloat(v) || 0;
                let receitaBruta = 0; let custosOperacionais = 0; let ifoodRevenue = 0; let diretoRevenue = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(month)) {
                        const r = dailyRecords[day];
                        const { totalDia, totalEntregas } = calculateSales(r);
                        receitaBruta += totalDia; ifoodRevenue += p(r.ifood); diretoRevenue += (totalDia - p(r.ifood));
                        custosOperacionais += totalEntregas;
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(month)) {
                        if (t.type === 'saida') custosOperacionais += p(t.amount);
                        else receitaBruta += p(t.amount);
                    }
                });
                const lucroLiquido = receitaBruta - custosOperacionais;
                const margem = receitaBruta > 0 ? (lucroLiquido / receitaBruta) * 100 : 0;
                return { receitaBruta, custosOperacionais, lucroLiquido, margem, ifoodRevenue, diretoRevenue };
            };

            const results = useMemo(() => {
                const currentMonth = filterMonth;
                const prevDate = new Date(currentMonth + '-01'); prevDate.setMonth(prevDate.getMonth() - 1);
                const prevMonth = prevDate.toISOString().slice(0, 7);
                const current = getMonthStats(currentMonth);
                const prev = getMonthStats(prevMonth);
                const growth = prev.receitaBruta > 0 ? ((current.receitaBruta - prev.receitaBruta) / prev.receitaBruta) * 100 : 0;
                return { current, prev, growth };
            }, [transactions, dailyRecords, filterMonth]);

            const dreData = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let receitaBruta = 0; let taxasDeducoes = 0;
                let categoriasCusto = CATEGORIES.reduce((acc, cat) => ({ ...acc, [cat]: 0 }), {});
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const { totalDia, totalEntregas } = calculateSales(r);
                        receitaBruta += totalDia; taxasDeducoes += totalEntregas;
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'saida') categoriasCusto[t.category || 'Outros'] += amount;
                        else receitaBruta += amount;
                    }
                });
                const totalCustos = Object.values(categoriasCusto).reduce((a, b) => a + b, 0);
                const receitaLiquida = receitaBruta - taxasDeducoes;
                const lucroLiquido = receitaLiquida - totalCustos;
                return { receitaBruta, taxasDeducoes, receitaLiquida, categoriasCusto, totalCustos, lucroLiquido };
            }, [transactions, dailyRecords, filterMonth]);

            const finances = useMemo(() => {
                const initialBalances = ACCOUNTS.reduce((acc, name) => ({ ...acc, [name]: 0 }), {});
                return transactions.reduce((acc, t) => {
                    const amount = parseFloat(t.amount) || 0;
                    const accName = t.account || ACCOUNTS[0];
                    if (t.type === 'entrada') { acc.in += amount; acc.balances[accName] += amount; }
                    else { acc.out += amount; acc.balances[accName] -= amount; }
                    return acc;
                }, { in: 0, out: 0, balances: initialBalances });
            }, [transactions]);

            const activeSalesDays = useMemo(() => Object.keys(dailyRecords).filter(day => day.startsWith(filterMonth)).sort((a, b) => new Date(b) - new Date(a)), [dailyRecords, filterMonth]);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-[#1A202C]">
                    <div className="text-center">
                        <div className="w-16 h-16 border-4 border-[#F8CC82] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-[#F8CC82] font-black uppercase tracking-widest text-xs">Tribo Burger a carregar...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="h-screen flex items-center justify-center auth-bg px-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-t-[#D97757]">
                        <div className="text-center mb-8">
                            <img src="logo.png" className="w-24 mx-auto mb-4 drop-shadow-xl" alt="Tribo Burger" />
                            <h2 className="text-2xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Financeiro</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Acesso à Administração</p>
                        </div>
                        
                        <form onSubmit={handleAuth} className="space-y-4">
                            <div>
                                <label className="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1 block">Email</label>
                                <input type="email" required className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={email} onChange={e => setEmail(e.target.value)} placeholder="gerencia@triboburger.com" />
                            </div>
                            <div>
                                <label className="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1 block">Palavra-passe</label>
                                <input type="password" required className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" />
                            </div>
                            
                            {authError && <div className="p-3 bg-red-50 text-red-500 text-[10px] font-bold uppercase rounded-xl border border-red-100">{authError}</div>}
                            
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] font-black py-4 rounded-2xl shadow-xl uppercase text-xs tracking-widest transition-all active:scale-95">
                                {isRegistering ? 'Criar Conta' : 'Entrar no Sistema'}
                            </button>
                        </form>
                        
                        <div className="mt-8 text-center border-t pt-6">
                            <button onClick={() => setIsRegistering(!isRegistering)} className="text-[10px] font-black text-[#D97757] uppercase tracking-widest hover:underline">
                                {isRegistering ? 'Já tenho conta? Fazer Login' : 'Não tem conta? Registar agora'}
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <img src="logo.png" className="bg-watermark w-96" alt="" />

                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-2xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-6">
                                <div className="relative group">
                                    <div className="absolute -inset-1 bg-[#D97757] rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                                    <div className="relative bg-white p-0.5 rounded-full w-16 h-16 flex items-center justify-center border-2 border-[#F8CC82] shadow-xl">
                                        <img src="logo.png" alt="Tribo Burger" className="h-12 w-12 object-contain" />
                                    </div>
                                </div>
                                <div className="hidden sm:block">
                                    <h1 className="text-2xl font-black uppercase text-[#F8CC82] tracking-tighter leading-none">Tribo Burger</h1>
                                    <p className="text-[10px] font-extrabold opacity-50 uppercase tracking-[0.3em] mt-1">{user.email}</p>
                                </div>
                            </div>
                            
                            <nav className="flex bg-white/5 p-1 rounded-2xl border border-white/10 overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'resultados', 'dre', 'parceiros'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'tab-active' : ''}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab === 'resultados' ? 'BI' : tab}
                                    </button>
                                ))}
                                <button onClick={handleLogout} className="px-4 py-2 text-[10px] font-black uppercase tracking-widest text-red-400 hover:bg-red-500/10 rounded-2xl transition-all">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-full mx-auto px-4 py-8 w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                                <section className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-3">
                                    {ACCOUNTS.map(acc => (
                                        <div key={acc} className="glass-card p-3 rounded-2xl text-center hover:scale-105 transition-transform">
                                            <p className="text-[8px] font-black uppercase text-slate-400 truncate">{acc}</p>
                                            <p className={`text-[10px] font-black ${finances.balances[acc] >= 0 ? 'text-slate-700' : 'text-red-500'}`}>{formatMoney(finances.balances[acc])}</p>
                                        </div>
                                    ))}
                                </section>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-1 glass-card p-8 rounded-[2.5rem] shadow-sm h-fit">
                                        <h4 className="text-xs font-black uppercase tracking-widest mb-8 border-b pb-4 flex items-center gap-2 text-[#1A202C]"><Icon name="plus-circle" size={16} className="text-[#D97757]" /> Lançamento</h4>
                                        <form onSubmit={handleSaveTransaction} className="space-y-4">
                                            <input type="text" placeholder="Descrição" required className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={desc} onChange={e => setDesc(e.target.value)} />
                                            <input type="number" step="0.01" placeholder="Valor" required className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-sm outline-none focus:border-[#D97757]" value={val} onChange={e => setVal(e.target.value)} />
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Data do Gasto</label>
                                                    <input type="date" className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[10px] outline-none" value={date} onChange={e => setDate(e.target.value)} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2 tracking-widest">Compensação</label>
                                                    <input type="date" className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl text-[10px] outline-none" value={clearanceDate} onChange={e => setClearanceDate(e.target.value)} />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <select className="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl text-xs font-bold" value={selectedAccount} onChange={e => setSelectedAccount(e.target.value)}>{ACCOUNTS.map(a => <option key={a} value={a}>{a}</option>)}</select>
                                                <select className="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl text-xs font-bold" value={selectedCategory} onChange={e => setSelectedCategory(e.target.value)}>{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                            </div>
                                            <div className="flex gap-2">
                                                <button type="button" onClick={() => setType('entrada')} className={`flex-1 py-3 rounded-xl text-[10px] font-black ${type === 'entrada' ? 'bg-green-100 text-green-700 shadow-inner' : 'bg-slate-100 text-slate-400'}`}>ENTRADA</button>
                                                <button type="button" onClick={() => setType('saida')} className={`flex-1 py-3 rounded-xl text-[10px] font-black ${type === 'saida' ? 'bg-red-100 text-red-700 shadow-inner' : 'bg-slate-100 text-slate-400'}`}>SAÍDA</button>
                                            </div>
                                            <button className="w-full bg-[#1A202C] text-[#F8CC82] font-black py-4 rounded-2xl shadow-xl uppercase text-xs tracking-widest mt-2 transition-all active:scale-95">Guardar Registo</button>
                                        </form>
                                    </div>
                                    <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm overflow-hidden h-[600px] flex flex-col">
                                        <div className="p-6 bg-slate-50 font-black text-[10px] text-slate-400 uppercase flex justify-between tracking-widest border-b"><span>Histórico de Lançamentos</span><span>{transactions.length} itens</span></div>
                                        <div className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar">
                                            {transactions.map(t => (
                                                <div key={t.id} className="flex items-center justify-between p-4 bg-white border rounded-2xl group hover:shadow-md transition-all">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-xs ${t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-50 text-red-600'}`}>{t.type === 'entrada' ? '+' : '-'}</div>
                                                        <div>
                                                            <p className="font-bold text-sm text-[#1A202C] uppercase leading-tight">{t.description}</p>
                                                            <p className="text-[9px] font-bold text-slate-300 uppercase mt-1">Reg: {t.date.split('-').reverse().join('/')} • Comp: {t.clearanceDate ? t.clearanceDate.split('-').reverse().join('/') : t.date.split('-').reverse().join('/')}</p>
                                                            <p className="text-[8px] font-black text-[#D97757] uppercase">{t.account}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4"><p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-slate-800'}`}>{formatMoney(t.amount)}</p><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="opacity-0 group-hover:opacity-100 text-red-300 hover:text-red-600 transition-opacity"><Icon name="trash-2" size={14}/></button></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                            <div className="glass-card rounded-3xl shadow-sm overflow-hidden animate-in slide-in-from-bottom duration-500">
                                <div className="p-6 border-b bg-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-[#1A202C] p-2 rounded-xl"><Icon name="table" size={20} className="text-[#F8CC82]" /></div>
                                        <h2 className="font-black text-[#1A202C] uppercase text-sm tracking-widest">Vendas Diárias</h2>
                                    </div>
                                    <div className="flex items-center gap-2 bg-white p-2 rounded-2xl border shadow-sm">
                                        <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="font-black text-xs outline-none px-2" />
                                        <div className="h-6 w-px bg-slate-200 mx-1"></div>
                                        <input type="date" value={newDayDate} onChange={e => setNewDayDate(e.target.value)} className="text-xs font-bold border-0 outline-none" />
                                        <button onClick={async () => { if(!dailyRecords[newDayDate]) await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDayDate}`).set({ initialized: true }, { merge: true }); }} className="bg-[#1A202C] text-[#F8CC82] px-3 py-1 rounded-xl font-black text-[10px] uppercase tracking-tighter hover:bg-[#D97757] transition-colors">ABRIR DIA</button>
                                    </div>
                                </div>
                                <div className="overflow-x-auto no-scrollbar">
                                    <table className="w-full text-center text-[11px] border-collapse min-w-[1400px]">
                                        <thead>
                                            <tr>
                                                <th className="p-3 header-black sticky left-0 z-20">Data</th><th className="p-3 header-black">Total Bruto</th>
                                                {['Pix','Pix Online','Fiado','Dinheiro','Ifood','Débito','Crédito','VR','Ticket','Alelo'].map(h => <th key={h} className="p-3 header-green">{h}</th>)}
                                                <th className="p-3 header-red">Motoboy</th><th className="p-3 header-red">Taxa iFood</th><th className="p-3 header-red">Gestão</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {activeSalesDays.map(d => {
                                                const r = dailyRecords[d] || {}; const { totalDia } = calculateSales(r);
                                                const update = (f, v) => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: v.replace(/[^0-9.]/g, '') }, { merge: true });
                                                return (
                                                    <tr key={d} className="h-12 hover:bg-slate-50 transition-colors">
                                                        <td className="p-2 text-left sticky left-0 bg-white border-r font-black text-[10px] z-10 w-48 uppercase text-slate-500">{d.split('-').reverse().join('/')}</td>
                                                        <td className="p-2 bg-slate-50 font-black border-r text-[#1A202C]">{formatMoney(totalDia)}</td>
                                                        {['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].map(f => <td key={f} className="p-0 border-r min-w-[80px]"><input className="table-input" value={r[f]||''} onChange={e => update(f, e.target.value)} placeholder="0,00"/></td>)}
                                                        <td className="p-0 border-r bg-red-50/20 min-w-[100px]"><input className="table-input text-red-600" value={r.motoboy||''} onChange={e => update('motoboy', e.target.value)}/></td>
                                                        <td className="p-0 border-r bg-red-50/20 min-w-[100px]"><input className="table-input text-red-600" value={r.taxaEntrega||''} onChange={e => update('taxaEntrega', e.target.value)}/></td>
                                                        <td className="p-2"><button onClick={() => { if(confirm("Apagar registo?")) db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete(); }} className="text-red-300 hover:text-red-500 transition-colors"><Icon name="trash-2" size={14}/></button></td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="max-w-6xl mx-auto space-y-8 animate-in zoom-in duration-500">
                                <div className="flex justify-between items-center bg-white p-6 rounded-3xl border shadow-sm">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-[#D97757] p-2 rounded-xl"><Icon name="bar-chart-3" size={20} className="text-white" /></div>
                                        <div><h2 className="text-xl font-black text-[#1A202C] uppercase tracking-tight">Performance</h2><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">BI Mensal</p></div>
                                    </div>
                                    <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="border-2 border-[#D3E298] rounded-xl px-4 py-2 font-black text-sm outline-none" />
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="glass-card p-6 rounded-[2.5rem]"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Faturação</span><h3 className="text-2xl font-black">{formatMoney(results.current.receitaBruta)}</h3><p className={`text-[9px] font-bold mt-2 ${results.growth >= 0 ? 'text-green-600' : 'text-red-500'}`}>{results.growth.toFixed(1)}% vs ant.</p></div>
                                    <div className="glass-card p-6 rounded-[2.5rem]"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Custos</span><h3 className="text-2xl font-black text-red-600">{formatMoney(results.current.custosOperacionais)}</h3></div>
                                    <div className="bg-[#1A202C] p-6 rounded-[2.5rem] text-white shadow-xl"><span className="text-[10px] font-black text-[#F8CC82] uppercase tracking-widest">Saldo Líquido</span><h3 className="text-2xl font-black">{formatMoney(results.current.lucroLiquido)}</h3></div>
                                    <div className="glass-card p-6 rounded-[2.5rem]"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Margem</span><h3 className="text-2xl font-black text-[#D97757]">{results.current.margem.toFixed(1)}%</h3></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="glass-card p-8 rounded-[3rem] shadow-sm">
                                        <h4 className="text-xs font-black uppercase text-[#1A202C] mb-6 border-b pb-4 tracking-widest">Canais de Receita</h4>
                                        <div className="space-y-4">
                                            {[{l: 'Vendas Diretas', v: results.current.diretoRevenue, c: '#1A202C'}, {l: 'Canal iFood', v: results.current.ifoodRevenue, c: '#D97757'}].map(item => (
                                                <div key={item.l}>
                                                    <div className="flex justify-between text-[10px] font-black uppercase mb-1"><span>{item.l}</span><span>{((item.v / (results.current.receitaBruta || 1)) * 100).toFixed(0)}%</span></div>
                                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden"><div className="h-full transition-all duration-1000" style={{ width: `${(item.v / (results.current.receitaBruta || 1)) * 100}%`, backgroundColor: item.c }}></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass-card p-8 rounded-[3rem] flex flex-col justify-center text-center shadow-sm relative overflow-hidden">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado da Operação</p>
                                        <h4 className={`text-4xl font-black my-2 ${results.current.lucroLiquido >= 0 ? 'text-green-600' : 'text-red-600'}`}>{results.current.lucroLiquido >= 0 ? 'SAUDÁVEL' : 'ALERTA'}</h4>
                                        <p className="text-xs font-bold text-slate-500 uppercase">Lucro real: {formatMoney(results.current.lucroLiquido)}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dre' && (
                            <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                                <div className="flex justify-between items-center bg-white p-6 rounded-3xl border shadow-sm">
                                    <h2 className="text-xl font-black text-[#1A202C] uppercase tracking-tight">DRE Automatizado</h2>
                                    <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="border-2 border-[#D3E298] rounded-xl px-4 py-2 font-black text-sm outline-none" />
                                </div>
                                <div className="glass-card rounded-[3rem] shadow-xl overflow-hidden bg-white p-8 space-y-4">
                                    <div className="flex justify-between items-center p-4 bg-green-50 rounded-2xl border border-green-100"><span className="font-black uppercase text-sm">RECEITA BRUTA</span><span className="font-black text-green-700 text-lg">{formatMoney(dreData.receitaBruta)}</span></div>
                                    <div className="flex justify-between items-center px-6 py-3 dre-row"><span className="font-bold text-red-500 uppercase text-xs">(-) Custos e Taxas</span><span className="font-bold text-red-600">{formatMoney(dreData.taxasDeducoes)}</span></div>
                                    <div className="flex justify-between items-center p-4 bg-slate-100 rounded-2xl border"><span className="font-black text-slate-700 uppercase text-sm">LUCRO BRUTO</span><span className="font-black text-slate-800 text-lg">{formatMoney(dreData.receitaLiquida)}</span></div>
                                    <div className="py-4 space-y-2">
                                        {CATEGORIES.map(cat => (
                                            <div key={cat} className="flex justify-between items-center px-6 py-2 dre-row"><span className="text-xs font-medium text-slate-600">{cat}</span><span className="font-bold text-red-400">{formatMoney(dreData.categoriasCusto[cat])}</span></div>
                                        ))}
                                    </div>
                                    <div className={`flex justify-between items-center p-6 rounded-[2.5rem] shadow-inner ${dreData.lucroLiquido >= 0 ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-red-600 text-white'}`}><h3 className="text-lg font-black uppercase tracking-widest">RESULTADO LÍQUIDO</h3><span className="text-3xl font-black">{formatMoney(dreData.lucroLiquido)}</span></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'parceiros' && (
                            <div className="max-w-6xl mx-auto space-y-8 animate-in fade-in duration-500">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {suppliers.map(s => (
                                        <div key={s.id} className="glass-card p-8 rounded-[2.5rem] text-center relative group h-56 flex flex-col justify-center border-2 border-slate-50 hover:border-[#D97757]/40 transition-all shadow-sm">
                                            <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/suppliers/${s.id}`).delete()} className="absolute top-6 right-6 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={18} /></button>
                                            <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mb-5 mx-auto text-[#1A202C] shadow-inner"><Icon name="truck" size={24} /></div>
                                            <p className="font-black text-sm text-[#1A202C] uppercase truncate px-2">{s.name}</p>
                                            <p className="text-[10px] font-black text-[#D97757] mt-1 tracking-widest uppercase">{s.phone || 'S/ CONTACTO'}</p>
                                        </div>
                                    ))}
                                    <button onClick={() => { const n = prompt("Nome do Parceiro:"); if(n) db.doc(`artifacts/${appId}/users/${user.uid}/suppliers/${Date.now().toString()}`).set({ name: n, phone: prompt("Contacto:") }); }} className="border-4 border-dashed border-slate-200 rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-slate-300 hover:border-[#D97757] hover:text-[#D97757] h-56 group bg-white/50 transition-all">
                                        <Icon name="plus-square" size={40} className="group-hover:scale-110 transition-transform" /><span className="text-[10px] font-black uppercase mt-4 tracking-widest">Novo Parceiro</span>
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-16 text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.5em] flex flex-col items-center gap-4">
                        <img src="logo.png" alt="Tribo Burger" className="h-10 opacity-30 grayscale" />
                        <span>Tribo Burger • Business Intelligence v4.4</span>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
