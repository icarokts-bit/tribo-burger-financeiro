<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão v15.0.0 Baseline</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.1); border-radius: 4px; }
        
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .section-label { font-weight: 900; font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em; color: #94A3B8; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: #E2E8F0; }
        
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [salesGoal, setSalesGoal] = useState(0);
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [typeFilter, setTypeFilter] = useState('todos');
            const [accFilter, setAccFilter] = useState('');

            /* Formulário Lançamento */
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));

            /* Ajustes Contas */
            const [accName, setAccName] = useState('');
            const [accType, setAccType] = useState('corrente');
            const [accHighlight, setAccHighlight] = useState(false);
            const [accPosition, setAccPosition] = useState(1);
            const [editingAccId, setEditingAccId] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    const accList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAccounts(accList);
                    if (accList.length > 0 && !account) setAccount(accList[0].name);
                });
                
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubGoal = db.doc(`${path}/settings/config`).onSnapshot(doc => {
                    if (doc.exists) setSalesGoal(doc.data().salesGoal || 0);
                });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubGoal(); };
            }, [user, account]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
            const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;

            const uniqueDescriptions = useMemo(() => {
                const seen = new Set();
                return transactions.map(t => t.description).filter(d => {
                    if (!d || seen.has(d.trim().toLowerCase())) return false;
                    seen.add(d.trim().toLowerCase());
                    return true;
                }).sort();
            }, [transactions]);

            const accountBalances = useMemo(() => {
                const balances = {}; 
                accounts.forEach(acc => balances[acc.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + amt;
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { 
                            balances[t.account] = (balances[t.account] || 0) - amt; 
                            balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + amt; 
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const totalBalance = useMemo(() => {
                return accounts.filter(acc => acc.type === 'corrente')
                    .reduce((acc, curr) => acc + (accountBalances[curr.name] || 0), 0);
            }, [accounts, accountBalances]);

            const groupedAccounts = useMemo(() => {
                const currentAccs = accounts.filter(acc => acc.type === 'corrente');
                return {
                    highlighted: currentAccs.filter(acc => acc.highlight).sort((a,b) => p(a.position) - p(b.position)),
                    others: currentAccs.filter(acc => !acc.highlight).sort((a,b) => p(a.position) - p(b.position))
                };
            }, [accounts]);

            const pendingPaymentsConsolidated = useMemo(() => {
                const consolidated = [];
                // 1. Despesas normais do mês
                transactions.forEach(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    if (t.type === 'saida' && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth) && accInfo?.type !== 'cartao') {
                        consolidated.push({ ...t, isCard: false });
                    }
                });
                // 2. Faturas de Cartão (Consolidadas)
                accounts.filter(a => a.type === 'cartao').forEach(card => {
                    const cardTxs = transactions.filter(t => t.account === card.name && t.clearanceDate?.startsWith(filterMonth));
                    const totalCard = cardTxs.reduce((sum, tx) => sum + (tx.type === 'saida' ? p(tx.amount) : -p(tx.amount)), 0);
                    if (totalCard > 0) {
                        consolidated.push({
                            id: `fatura-${card.name}-${filterMonth}`,
                            description: `Fatura ${card.name}`,
                            amount: totalCard,
                            clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`,
                            account: card.name,
                            isCard: true,
                            txIds: cardTxs.map(t => t.id)
                        });
                    }
                });
                return consolidated.sort((a,b) => a.clearanceDate.localeCompare(b.clearanceDate));
            }, [transactions, accounts, filterMonth]);

            const stats = useMemo(() => {
                let rb = 0; let diasComVenda = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const totalDia = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + p(r[f]), 0);
                        if (totalDia > 0) { rb += totalDia; diasComVenda++; }
                    }
                });
                return { rb, diasComVenda, mediaDiaria: diasComVenda > 0 ? rb / diasComVenda : 0 };
            }, [dailyRecords, filterMonth]);

            const filteredHistory = useMemo(() => {
                return transactions.filter(t => {
                    const dateMatch = t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth);
                    const typeMatch = typeFilter === 'todos' || t.type === typeFilter;
                    const accMatch = accFilter === '' || t.account === accFilter;
                    return dateMatch && typeMatch && accMatch;
                }).sort((a,b) => b.timestamp.localeCompare(a.timestamp));
            }, [transactions, filterMonth, typeFilter, accFilter]);

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                const batch = db.batch();
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const totalValue = p(val);
                const cardInfo = accounts.find(acc => acc.name === account && acc.type === 'cartao');
                const numParcelas = cardInfo ? installments : 1;
                const valorParcela = totalValue / numParcelas;

                for(let i = 0; i < numParcelas; i++) {
                    const dObj = new Date(date + 'T12:00:00');
                    dObj.setMonth(dObj.getMonth() + i);
                    let finalDate = dObj.toISOString().split('T')[0];
                    let finalClearance = clearance;

                    if (cardInfo) {
                        const closingDay = parseInt(cardInfo.closingDay) || 25;
                        const dueDay = parseInt(cardInfo.dueDay) || 10;
                        const purchaseDay = dObj.getDate();
                        let billingDate = new Date(dObj);
                        if (purchaseDay > closingDay) billingDate.setMonth(billingDate.getMonth() + 1);
                        let dueDate = new Date(billingDate);
                        dueDate.setMonth(dueDate.getMonth() + 1);
                        dueDate.setDate(dueDay);
                        finalClearance = dueDate.toISOString().split('T')[0];
                    }

                    const payload = {
                        description: numParcelas > 1 ? `${desc} (${i+1}/${numParcelas})` : desc,
                        amount: valorParcela,
                        type, status: (cardInfo || type === 'saida' && status === 'pendente') ? 'pendente' : 'pago', 
                        date: finalDate, clearanceDate: finalClearance, 
                        account, category: cat || 'Geral', timestamp: new Date().toISOString()
                    };
                    batch.set(db.collection(path).doc(), payload);
                }
                await batch.commit();
                setDesc(''); setVal(''); setInstallments(1); setCat('');
            };

            const saveAccount = async () => {
                const path = `artifacts/${appId}/users/${user.uid}/accounts`;
                const payload = { 
                    name: accName, type: accType, highlight: accHighlight, 
                    position: parseInt(accPosition) || 0 
                };
                if (editingAccId) await db.doc(`${path}/${editingAccId}`).update(payload);
                else await db.collection(path).add(payload);
                setAccName(''); setEditingAccId(null);
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-orange-500" size={48} /></div>;

            return (
                <div className="min-h-screen flex flex-col fade-in relative pb-20">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <Icon name="utensils" size={24} className="text-[#F8CC82]" />
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Burger v15</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'vendas', 'a_pagar', 'a_receber', 'resultados', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {tab.replace('_', ' ')}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black text-red-400 uppercase ml-4">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        {}
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full border-2 border-slate-100 shadow-sm">
                                <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent font-black text-[#D97757] text-sm outline-none cursor-pointer" />
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {/* FORMULÁRIO */}
                                <form onSubmit={saveTx} className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-black h-fit">
                                    <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">Novo Lançamento</h2>
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                        {['entrada', 'saida', 'transferencia'].map(t => (
                                            <button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t}</button>
                                        ))}
                                    </div>
                                    <input list="desc-sug" type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                    <datalist id="desc-sug">{uniqueDescriptions.map(d => <option key={d} value={d}/>)}</datalist>
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}>
                                            {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                        </select>
                                    </div>
                                    <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={cat} onChange={e => setCat(e.target.value)}>
                                        <option value="">Categoria...</option>
                                        {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                    </select>
                                    {accounts.find(a => a.name === account)?.type === 'cartao' && (
                                        <input type="number" min="1" placeholder="Parcelas" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-bold outline-none" value={installments} onChange={e => setInstallments(parseInt(e.target.value) || 1)} />
                                    )}
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Data</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl text-[10px] font-bold" value={date} onChange={e => setDate(e.target.value)} /></div>
                                        <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Compensação</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl text-[10px] font-bold" value={clearance} onChange={e => setClearance(e.target.value)} /></div>
                                    </div>
                                    <button className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg transition-transform active:scale-95">Gravar Lançamento</button>
                                </form>

                                {/* HISTÓRICO */}
                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[600px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="font-black text-[10px] uppercase text-slate-400">Fluxo de Caixa</span>
                                        <div className="flex gap-2">
                                            <select className="text-[8px] p-2 border rounded-lg bg-white font-black" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
                                                <option value="todos">Todos Tipos</option>
                                                <option value="entrada">Entradas</option>
                                                <option value="saida">Saídas</option>
                                            </select>
                                            <select className="text-[8px] p-2 border rounded-lg bg-white font-black" value={accFilter} onChange={e => setAccFilter(e.target.value)}>
                                                <option value="">Todas Contas</option>
                                                {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {filteredHistory.map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 group">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-[10px] font-black text-slate-400 w-10 text-center">{t.date?.split('-').reverse().slice(0, 2).join('/')}</span>
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <p className="font-black text-sm uppercase leading-none">{t.description}</p>
                                                            <span className={`status-badge ${t.status === 'pago' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>{t.status}</span>
                                                        </div>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.account} • {t.category}</p>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(t.amount)}</p>
                                                    <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="text-red-200 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'saldos' && (
                            <div className="space-y-12 animate-in fade-in">
                                {}
                                <div className="stat-banner !bg-[#D97757] !border-black">
                                    <p className="text-[11px] font-black uppercase tracking-widest opacity-80 mb-2">Liquidez Total Disponível</p>
                                    <h3 className="text-5xl font-black text-white">{formatMoney(totalBalance)}</h3>
                                </div>
                                <div className="space-y-8">
                                    {groupedAccounts.highlighted.length > 0 && (
                                        <div className="space-y-4">
                                            <h2 className="section-label">Contas em Destaque</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                {groupedAccounts.highlighted.map(acc => (
                                                    <div key={acc.id} className="glass-card p-10 rounded-[3rem] border-t-[10px] border-black text-center shadow-xl">
                                                        <p className="text-[12px] font-black text-slate-400 uppercase mb-2">{acc.name}</p>
                                                        <h3 className="text-4xl font-black">{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    <h2 className="section-label">Outras Contas</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {groupedAccounts.others.map(acc => (
                                            <div key={acc.id} className="glass-card p-6 rounded-[2.5rem] border-t-8 border-slate-200 text-center shadow-md">
                                                <p className="text-[11px] font-black text-slate-400 uppercase mb-1">{acc.name}</p>
                                                <h3 className="text-2xl font-black">{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'vendas' && (
                            <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                {/* ... existing code ... */}
                                <table className="w-full text-center text-[11px] min-w-[1400px]">
                                    <thead>
                                        <tr className="bg-black text-white uppercase font-black">
                                            <th className="p-4 sticky left-0 z-20 bg-black">Data</th>
                                            <th className="p-4 bg-yellow-500 text-black">Total Dia</th>
                                            {/* ... existing code ... */}
                                        </tr>
                                    </thead>
                                    {/* ... existing code ... */}
                                </table>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8 animate-in fade-in">
                                {}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-yellow-500 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Meta Mensal</p>
                                        <input type="number" className="w-full text-3xl font-black text-center bg-slate-50 p-4 rounded-3xl border-2 mb-4" value={salesGoal} onChange={async(e) => {
                                            const v = e.target.value; setSalesGoal(v);
                                            await db.doc(`artifacts/${appId}/users/${user.uid}/settings/config`).set({ salesGoal: p(v) }, { merge: true });
                                        }} />
                                        <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                            <div className="bg-green-500 h-full transition-all" style={{ width: `${Math.min(100, (stats.rb / (salesGoal || 1)) * 100)}%` }}></div>
                                        </div>
                                    </div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-green-500 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Bruto Acumulado</p>
                                        <h3 className="text-4xl font-black text-green-600">{formatMoney(stats.rb)}</h3>
                                        <p className="text-[9px] font-black text-slate-300 uppercase mt-4">{stats.diasComVenda} dias faturados</p>
                                    </div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-blue-500 text-center">
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Ticket Médio Dia</p>
                                        <h3 className="text-4xl font-black text-blue-600">{formatMoney(stats.mediaDiaria)}</h3>
                                        <p className="text-[9px] font-black text-slate-300 uppercase mt-4">Eficiência Diária</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'a_pagar' && (
                            <div className="space-y-6">
                                {}
                                <div className="stat-banner !border-red-500">
                                    <p className="text-[9px] font-black uppercase text-slate-400 mb-2">Total Pendente ({filterMonth})</p>
                                    <h3 className="text-4xl font-black text-white">{formatMoney(pendingPaymentsConsolidated.reduce((a,b) => a + b.amount, 0))}</h3>
                                </div>
                                <div className="glass-card rounded-[3rem] overflow-hidden border shadow-xl divide-y">
                                    {pendingPaymentsConsolidated.map(item => (
                                        <div key={item.id} className="p-6 flex justify-between items-center hover:bg-slate-50">
                                            <div className="flex items-center gap-6">
                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${item.isCard ? 'bg-orange-100 text-orange-600' : 'bg-red-100 text-red-600'}`}>
                                                    <Icon name={item.isCard ? 'credit-card' : 'file-text'} size={24} />
                                                </div>
                                                <div>
                                                    <p className="font-black text-lg uppercase leading-tight">{item.description}</p>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase">Vence em: {item.clearanceDate.split('-').reverse().join('/')}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <p className="text-xl font-black">{formatMoney(item.amount)}</p>
                                                <button onClick={async () => {
                                                    if (item.isCard) {
                                                        const batch = db.batch();
                                                        item.txIds.forEach(id => batch.update(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`), { status: 'pago' }));
                                                        await batch.commit();
                                                    } else {
                                                        await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${item.id}`).update({ status: 'pago' });
                                                    }
                                                }} className="w-12 h-12 bg-green-500 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
                                                    <Icon name="check" size={20} />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {}
                                <div className="glass-card p-8 rounded-[3rem] border-t-8 border-black space-y-6 shadow-xl">
                                    <h2 className="font-black uppercase text-sm border-b pb-4">Contas Bancárias</h2>
                                    <div className="space-y-4">
                                        <input type="text" className="w-full p-4 border rounded-2xl font-bold text-xs" placeholder="Nome do Banco" value={accName} onChange={e => setAccName(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => setAccType('corrente')} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accType === 'corrente' ? 'bg-black text-white' : 'bg-white border'}`}>CONTA CORRENTE</button>
                                            <button onClick={() => setAccType('cartao')} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-white border'}`}>CARTÃO CRÉDITO</button>
                                        </div>
                                        <div className="flex items-center gap-3 pt-2">
                                            <input type="checkbox" checked={accHighlight} onChange={e => setAccHighlight(e.target.checked)} className="w-4 h-4" />
                                            <span className="text-[10px] font-black uppercase">Destaque no Saldo</span>
                                        </div>
                                        <button onClick={saveAccount} className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px]">Salvar Conta</button>
                                    </div>
                                    <div className="space-y-2 max-h-[300px] overflow-y-auto no-scrollbar">
                                        {accounts.map(a => (
                                            <div key={a.id} className="p-4 bg-white border rounded-2xl flex justify-between items-center group">
                                                <p className="font-black text-[10px] uppercase">{a.name}</p>
                                                <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-300 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={14}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Business Intelligence • v15.0.0 Baseline</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
