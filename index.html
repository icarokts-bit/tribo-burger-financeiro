<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v6.8</title>
    
    <!-- Ícone da Aba -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Bibliotecas Externas (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos Customizados -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilos Excel para Planilha de Vendas */
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(255, 255, 255, 0.8); }
        
        .header-green { background-color: #92D050; color: #000; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #7cb342; }
        .header-red { background-color: #FF0000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #cc0000; }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        
        .cell-green { background-color: #E2EFDA; border: 1px solid #c5e0b4; }
        .cell-red { background-color: #FFC7CE; color: #9C0006; border: 1px solid #ffb3b3; }
        .cell-white { background-color: #FFF; border: 1px solid #e2e8f0; }

        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo para Resposta da IA */
        .prose-ia h3 { font-weight: 800; text-transform: uppercase; font-size: 0.75rem; color: #D97757; margin-top: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        .prose-ia p { font-size: 0.875rem; line-height: 1.6; margin-bottom: 1rem; color: #4A5568; }
        .prose-ia ul { list-style-type: none; padding: 0; }
        .prose-ia li { padding-left: 1.5rem; position: relative; margin-bottom: 0.5rem; font-size: 0.875rem; }
        .prose-ia li::before { content: '→'; position: absolute; left: 0; color: #D97757; font-weight: bold; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';
        const apiKey = ""; 

        const DEFAULT_ACCOUNTS = [
            { name: 'Mercado Pago', type: 'corrente' },
            { name: 'C6 Bank', type: 'corrente' },
            { name: 'Caixa Loja', type: 'corrente' }
        ];
        const DEFAULT_CATEGORIES = ['CMV Insumos', 'CMV Bebidas', 'Salários', 'Aluguer/Luz', 'Marketing', 'Outros'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            // Estados do Formulário Principal
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [editingId, setEditingId] = useState(null);
            
            // Estados para Cadastro de Itens e Filtros
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toISOString().split('T')[0]);
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('');
            const [newItemDueDay, setNewItemDueDay] = useState('');
            const [newSupplierContact, setNewSupplierContact] = useState('');
            const [newSupplierCat, setNewSupplierCat] = useState('');

            // AI States
            const [aiResponse, setAiResponse] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; 
                        snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    });

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => {
                        if (snap.empty) {
                            DEFAULT_ACCOUNTS.forEach(acc => db.collection(`${path}/accounts`).add(acc));
                        } else {
                            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setAccounts(list);
                            if (list.length > 0 && !account && !editingId) {
                                const defaultAcc = list.find(a => a.name === 'Mercado Pago') || list[0];
                                setAccount(defaultAcc.name);
                            }
                        }
                    });

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => {
                        if (snap.empty) {
                            DEFAULT_CATEGORIES.forEach(name => db.collection(`${path}/categories`).add({ name }));
                        } else {
                            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setCategories(list);
                            if (list.length > 0 && !cat) setCat(list[0].name);
                        }
                    });

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setAuthError("Erro de Autenticação. Verifique os dados.");
                }
            };

            const parseMoney = (v) => {
                if (typeof v !== 'string') return v;
                return parseFloat(v.replace(',', '.')) || 0;
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || !desc) return;

                const id = editingId || Date.now().toString();
                const payload = {
                    description: type === 'transferencia' ? `Transf: ${account} para ${destAccount}` : desc,
                    amount: parseMoney(val),
                    type,
                    status: type === 'transferencia' ? 'pago' : status, 
                    date,
                    clearanceDate: clearance,
                    account,
                    destinationAccount: type === 'transferencia' ? destAccount : '',
                    category: type === 'transferencia' ? 'Transferência Interna' : cat,
                    supplier: supplier || '', 
                    timestamp: new Date().toISOString()
                };

                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`).set(payload, { merge: true });
                resetForm();
            };

            const resetForm = () => {
                setDesc(''); setVal(''); setEditingId(null);
                const defaultAcc = accounts.find(a => a.name === 'Mercado Pago') || accounts[0];
                setAccount(defaultAcc?.name || ''); 
                setDestAccount('');
                setCat(categories[0]?.name || '');
                setSupplier('');
                setStatus('pago');
                setDate(new Date().toISOString().split('T')[0]); setClearance(new Date().toISOString().split('T')[0]);
                setType('saida');
            };

            const startEdit = (t) => {
                setEditingId(t.id);
                setDesc(t.description);
                setVal(t.amount.toString().replace('.', ','));
                setType(t.type);
                setStatus(t.status || 'pago');
                setAccount(t.account);
                setDestAccount(t.destinationAccount || '');
                setCat(t.category);
                setSupplier(t.supplier || '');
                setDate(t.date);
                setClearance(t.clearanceDate);
                setActiveTab('dashboard');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const togglePaid = async (t) => {
                if (!user) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({
                    status: t.status === 'pago' ? 'pendente' : 'pago'
                });
            };

            const openDay = async () => {
                if (!user || !newDay) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true });
            };

            const addItem = async (collectionName) => {
                if (!newItemName) return;
                const path = `artifacts/${appId}/users/${user.uid}/${collectionName}`;
                let data = { name: newItemName };
                
                if (collectionName === 'accounts') {
                    data.type = newItemType;
                    if (newItemType === 'cartao') {
                        data.closingDay = newItemClosingDay;
                        data.dueDay = newItemDueDay;
                    }
                }
                if (collectionName === 'suppliers') {
                    data.contact = newSupplierContact;
                    data.category = newSupplierCat;
                }
                
                await db.collection(path).add(data);
                setNewItemName(''); setNewSupplierContact(''); setNewSupplierCat('');
                setNewItemClosingDay(''); setNewItemDueDay('');
            };

            const removeItem = async (collectionName, id) => {
                if (!confirm("Remover este item?")) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/${collectionName}/${id}`).delete();
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const uniqueDescriptions = useMemo(() => {
                const set = new Set(transactions.map(t => t.description));
                return Array.from(set).filter(d => d && d.length > 1);
            }, [transactions]);

            const accountBalances = useMemo(() => {
                const balances = {};
                accounts.forEach(acc => balances[acc.name] = 0);
                
                transactions.forEach(t => {
                    if (t.status !== 'pago' && t.type !== 'transferencia') return; 
                    const amt = parseFloat(t.amount) || 0;
                    if (t.type === 'entrada') {
                        balances[t.account] = (balances[t.account] || 0) + amt;
                    } else if (t.type === 'saida') {
                        balances[t.account] = (balances[t.account] || 0) - amt;
                    } else if (t.type === 'transferencia') {
                        balances[t.account] = (balances[t.account] || 0) - amt;
                        if (t.destinationAccount) {
                            balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + amt;
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            // Memo para faturas de cartões de crédito
            const creditCardStats = useMemo(() => {
                const stats = {};
                const currentMonth = parseInt(filterMonth.split('-')[1]);
                const currentYear = parseInt(filterMonth.split('-')[0]);

                accounts.filter(a => a.type === 'cartao').forEach(card => {
                    let openInvoice = 0;
                    let closedInvoice = 0;
                    let nextInvoice = 0;
                    const closingDay = parseInt(card.closingDay) || 1;

                    transactions.filter(t => t.account === card.name && t.type === 'saida').forEach(t => {
                        const tDate = new Date(t.date + 'T00:00:00');
                        const tDay = tDate.getDate();
                        const tMonth = tDate.getMonth() + 1;
                        const tYear = tDate.getFullYear();
                        const amount = parseFloat(t.amount) || 0;

                        // Lógica básica de faturas: se o dia é maior que o fechamento, cai no próximo mês
                        // Consideramos o mês selecionado no filtro como referência
                        if (tMonth === currentMonth && tYear === currentYear) {
                            if (tDay <= closingDay) {
                                openInvoice += amount;
                            } else {
                                nextInvoice += amount;
                            }
                        } else if (tMonth === currentMonth - 1 || (currentMonth === 1 && tMonth === 12)) {
                            // Gastos do mês passado após o fechamento também caem na fatura atual
                            if (tDay > closingDay) {
                                openInvoice += amount;
                            }
                        }
                    });

                    stats[card.name] = { openInvoice, nextInvoice, closingDay, dueDay: card.dueDay };
                });
                return stats;
            }, [transactions, accounts, filterMonth]);

            const reminders = useMemo(() => {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowStr = tomorrow.toISOString().split('T')[0];
                return transactions.filter(t => t.type === 'saida' && t.status === 'pendente' && t.date <= tomorrowStr);
            }, [transactions]);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; 
                let variableCostsPlanilha = 0; 
                let costsByCategory = {};
                let pendingTotal = 0;
                
                categories.forEach(c => costsByCategory[c.name] = 0);

                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        variableCostsPlanilha += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });

                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'entrada') {
                            if (t.status === 'pago') rb += amount;
                        } else if (t.type === 'saida') {
                            if (t.status === 'pendente') {
                                pendingTotal += amount;
                            } else {
                                const catName = t.category || 'Outros';
                                costsByCategory[catName] = (costsByCategory[catName] || 0) + amount;
                            }
                        }
                    }
                });

                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const despesaPagaTotal = variableCostsPlanilha + totalOperating;
                const lucro = rb - despesaPagaTotal;
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);

                return { rb, variableCostsPlanilha, costsByCategory, totalOperating, despesaPagaTotal, lucro, cmv, pendingTotal };
            }, [transactions, dailyRecords, filterMonth, categories]);

            const askAiConsultant = async () => {
                setAiLoading(true); setAiResponse('');
                const prompt = `Analise os dados financeiros do meu restaurante "Tribo Burger" no mês de ${filterMonth}:
                - Faturação Bruta Paga: ${formatMoney(stats.rb)}
                - Lucro Real (Caixa): ${formatMoney(stats.lucro)}
                - Contas Pendentes de Pagamento: ${formatMoney(stats.pendingTotal)}
                Ajude-me a organizar as contas pendentes e melhorar o fluxo de caixa.`;

                const systemPrompt = "És o Consultor de Gestão da Tribo Burger.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (error) { setAiResponse("Erro ao consultar a IA."); }
                finally { setAiLoading(false); }
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><div className="animate-spin w-10 h-10 border-4 border-[#F8CC82] border-t-transparent rounded-full"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-8"><img src="logo.png" className="w-24 mx-auto mb-4" /><h2 className="text-2xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Financeiro</h2></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Palavra-passe" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] font-black py-4 rounded-2xl uppercase text-xs tracking-widest">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4"><img src="logo.png" className="h-12 w-12 bg-white rounded-full p-1" /><div><h1 className="text-xl font-black text-[#F8CC82] uppercase leading-none tracking-tighter">Tribo Burger</h1><p className="text-[9px] opacity-50 uppercase tracking-widest">{user.email}</p></div></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl border border-white/10 overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'cartoes', 'resultados', 'dre', 'fornecedores', 'consultoria', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : ''}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab === 'consultoria' ? 'IA Consultor' : tab === 'cartoes' ? 'Faturas' : tab}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-4 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-center mb-4"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4"><span className="text-[9px] font-black uppercase text-slate-400">Mês:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>
                                
                                {reminders.length > 0 && (
                                    <div className="bg-red-50 border-2 border-red-200 p-6 rounded-[2.5rem] shadow-sm animate-in zoom-in duration-300">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Icon name="bell" className="text-red-600 animate-bounce" />
                                            <h3 className="text-xs font-black uppercase text-red-800 tracking-widest">Lembrete: Vencendo entre hoje e amanhã ({reminders.length})</h3>
                                        </div>
                                        <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2">
                                            {reminders.map(r => (
                                                <div key={r.id} className="min-w-[250px] bg-white p-4 rounded-2xl border border-red-100 shadow-sm">
                                                    <p className={`text-[10px] font-black uppercase mb-1 ${r.date === new Date().toISOString().split('T')[0] ? 'text-orange-500' : 'text-red-600'}`}>
                                                        {r.date === new Date().toISOString().split('T')[0] ? 'Vence Hoje' : `Vence em ${r.date.split('-').reverse().join('/')}`}
                                                    </p>
                                                    <p className="font-black text-sm uppercase text-slate-800 truncate">{r.description}</p>
                                                    <div className="flex justify-between items-center mt-3">
                                                        <span className="font-black text-slate-800">{formatMoney(r.amount)}</span>
                                                        <button onClick={() => togglePaid(r)} className="bg-green-100 text-green-700 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase hover:bg-green-600 hover:text-white transition-all">Pagar Agora</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl mb-4">

                                            <button type="button" onClick={() => { setType('transferencia'); setStatus('pago'); }} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === 'transferencia' ? 'bg-blue-100 text-blue-700 shadow-sm' : 'text-slate-400'}`}>Transf.</button>

                                            </div>
                                        ) : (
                                            <div className="p-4 bg-blue-50/50 border border-blue-100 rounded-2xl">

                                            ) : (

                                                    <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Categoria</label>

                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Status</label>

                                                </select>

                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Compensação</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" value={clearance} onChange={e => setClearance(e.target.value)} /></div>

                                        <button className="w-full p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg transition-all bg-[#1A202C] text-[#F8CC82] hover:bg-black">{editingId ? 'Confirmar Edição' : 'Gravar Movimento'}</button>

                                        <div className="p-5 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400 flex justify-between tracking-widest"><span>Movimentos Mensais</span><span>{transactions.filter(t => t.date.startsWith(filterMonth)).length} itens</span></div>

                                                        <div>
                                                            <p className={`font-black text-sm uppercase leading-tight ${t.status === 'pendente' ? 'text-orange-700' : ''}`}>{t.description}</p>

                                                                {t.date.split('-').reverse().join('/')} • {t.account} {t.destinationAccount && ` → ${t.destinationAccount}`} • {t.category} 
                                                                {t.status === 'pendente' && <span className="text-orange-500 font-black ml-1">• A VENCER</span>}
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">

                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                        {activeTab === 'cartoes' && (
                            <div className="space-y-8 animate-in fade-in duration-500 py-6">

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {Object.entries(creditCardStats).length === 0 ? (
                                        <div className="col-span-full py-20 text-center glass-card rounded-[3rem]">
                                            <Icon name="credit-card" size={48} className="text-slate-200 mb-4" />

                                        </div>

                                        Object.entries(creditCardStats).map(([name, data]) => (

                                                </div>
                                            </div>

                                    <div className="glass-card p-8 rounded-[3rem] shadow-lg">

                                        </div>
                                    </div>
                                </div>
                            </div>

                                                        ))}
                                                        <td className="p-0 cell-red"><input className="table-input" value={r.motoboy ? r.motoboy.toString().replace('.', ',') : ''} onChange={e => update('motoboy', e.target.value)} placeholder="R$ 0,00"/></td>

                                                        <td className="p-3 cell-white"><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()} className="text-slate-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td>
                                                    </tr>

                                        </tbody>
                                    </table>

                                    <div className="flex justify-between items-center px-6 py-3 border-b border-dashed"><span className="text-[10px] font-black text-slate-500 uppercase">(-) Logística / Taxas</span><span className="text-sm font-black text-red-500">{formatMoney(stats.variableCostsPlanilha)}</span></div>
                                    <div className="flex justify-between items-center p-5 bg-slate-50 rounded-2xl font-black border"><span className="uppercase text-[10px] tracking-widest">(=) MARGEM OPERACIONAL (PAGA)</span><span className="text-slate-800 text-lg">{formatMoney(stats.rb - stats.variableCostsPlanilha)}</span></div>
                                    <div className="py-4 space-y-1">
                                        {categories.map(c => {
                                            const val = stats.costsByCategory[c.name] || 0;
                                            if (val === 0) return null;
                                            return (<div key={c.id} className="flex justify-between items-center px-6 py-2 hover:bg-slate-50 rounded-xl transition-colors"><span className="text-[10px] font-bold text-slate-600 uppercase">{c.name}</span><span className="text-sm font-black text-red-400">{formatMoney(val)}</span></div>);
                                        })}
                                    </div>
                                    <div className={`flex justify-between items-center p-8 rounded-[2.5rem] shadow-2xl mt-8 ${stats.lucro >= 0 ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-red-600 text-white'}`}><h3 className="text-xl font-black uppercase tracking-widest">RESULTADO CAIXA (R$)</h3><span className="text-4xl font-black">{formatMoney(stats.lucro)}</span></div>
                                    {stats.pendingTotal > 0 && <p className="text-center text-[10px] font-black text-orange-500 uppercase tracking-widest mt-4">⚠️ Há {formatMoney(stats.pendingTotal)} em contas pendentes não incluídas neste DRE.</p>}

                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="truck" className="text-[#D97757]"/> Registar Fornecedor</h2>
                                    <div className="space-y-4">
                                        <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nome da Empresa / Pessoa" value={newItemName} onChange={e => setNewItemName(e.target.value)} />
                                        <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Contacto" value={newSupplierContact} onChange={e => setNewSupplierContact(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={newSupplierCat} onChange={e => setNewSupplierCat(e.target.value)}>
                                            <option value="">Tipo de Insumo</option>
                                            <option value="Proteínas">Proteínas</option>
                                            <option value="Pães">Pães</option>
                                            <option value="Bebidas">Bebidas</option>
                                            <option value="Outros">Outros</option>
                                        </select>
                                        <button onClick={() => addItem('suppliers')} className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2 shadow-lg">ADICIONAR FORNECEDOR <Icon name="plus" size={14}/></button>
                                    </div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg flex flex-col max-h-[600px]">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="users" className="text-[#D97757]"/> Lista de Fornecedores</h2>
                                    <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                                        {suppliers.length === 0 ? <p className="text-center text-slate-400 text-xs font-bold py-10">Nenhum fornecedor registado.</p> : suppliers.map(s => (
                                            <div key={s.id} className="p-4 bg-white border rounded-2xl flex justify-between items-center group">
                                                <div>
                                                    <p className="text-xs font-black uppercase text-[#1A202C] leading-tight">{s.name}</p>
                                                    <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{s.category || 'Geral'} • {s.contact || 'Sem contacto'}</p>
                                                </div>
                                                <button onClick={() => removeItem('suppliers', s.id)} className="text-red-300 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'consultoria' && (
                            <div className="max-w-3xl mx-auto py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card rounded-[3rem] shadow-2xl overflow-hidden bg-white p-10 border-t-8 border-[#F8CC82]">
                                    <div className="flex items-center justify-between gap-4 mb-8">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-[#1A202C] p-4 rounded-3xl"><Icon name="sparkles" className="text-[#F8CC82]" size={32}/></div>
                                            <div>
                                                <h2 className="text-2xl font-black uppercase tracking-tighter text-[#1A202C]">Consultor IA</h2>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Análise de Fluxo de Caixa</p>
                                            </div>
                                        </div>
                                    </div>
                                    {!aiResponse && !aiLoading && (
                                        <div className="text-center py-12 space-y-6">
                                            <div className="max-w-md mx-auto p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-center">
                                                <p className="text-sm font-bold text-slate-500 uppercase tracking-tight leading-relaxed">Vou analisar o que já foi <strong>Pago</strong> e o que está <strong>Pendente</strong> para otimizar seu caixa.</p>
                                            </div>
                                            <button onClick={askAiConsultant} className="bg-[#1A202C] text-[#F8CC82] px-10 py-5 rounded-[2rem] font-black uppercase tracking-widest text-xs shadow-xl flex items-center gap-3 mx-auto">Analisar Fluxo <Icon name="chevron-right" size={16}/></button>
                                        </div>
                                    )}
                                    {aiLoading && <div className="text-center py-20 animate-pulse text-[10px] font-black uppercase text-slate-400 tracking-widest">Processando Lembretes e Pendências...</div>}
                                    {aiResponse && (
                                        <div className="prose-ia fade-in bg-slate-50/50 p-8 rounded-[2rem] border">
                                            <div dangerouslySetInnerHTML={{ __html: aiResponse.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/### (.*?)\n/g, '<h3>$1</h3>').replace(/(\r\n|\n|\r)/gm, '<br>') }} />
                                            <button onClick={askAiConsultant} className="mt-8 text-[10px] font-black text-[#D97757] uppercase tracking-widest flex items-center gap-2 hover:underline"><Icon name="refresh-cw" size={12}/> Refazer Análise</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="landmark" className="text-[#D97757]"/> Contas e Cartões</h2>
                                    <div className="space-y-4 mb-6">
                                        <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nome da Conta ou Cartão" value={newItemName} onChange={e => setNewItemName(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => setNewItemType('corrente')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${newItemType === 'corrente' ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-slate-100 text-slate-400'}`}>Corrente</button>
                                            <button onClick={() => setNewItemType('cartao')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${newItemType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-slate-100 text-slate-400'}`}>Cartão</button>
                                        </div>
                                        
                                        {newItemType === 'cartao' && (
                                            <div className="grid grid-cols-2 gap-3 animate-in fade-in">
                                                <div className="space-y-1">
                                                    <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Dia Fechamento</label>
                                                    <input type="number" min="1" max="31" className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" placeholder="Ex: 5" value={newItemClosingDay} onChange={e => setNewItemClosingDay(e.target.value)} />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Dia Vencimento</label>
                                                    <input type="number" min="1" max="31" className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" placeholder="Ex: 15" value={newItemDueDay} onChange={e => setNewItemDueDay(e.target.value)} />
                                                </div>
                                            </div>
                                        )}

                                        <button onClick={() => addItem('accounts')} className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2">ADICIONAR <Icon name="plus" size={14}/></button>
                                    </div>
                                    <div className="space-y-2">{accounts.map(a => (<div key={a.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl"><div className="flex items-center gap-2"><Icon name={a.type === 'cartao' ? 'credit-card' : 'landmark'} size={14} className={a.type === 'cartao' ? 'text-orange-500' : 'text-slate-400'} /><span className="text-xs font-bold uppercase">{a.name}</span></div><button onClick={() => removeItem('accounts', a.id)} className="text-red-300 hover:text-red-500"><Icon name="trash-2" size={14} /></button></div>))}</div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="list" className="text-[#D97757]"/> Categorias</h2>
                                    <div className="flex gap-2 mb-6"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nova Categoria" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={() => addItem('categories')} className="bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl"><Icon name="plus" /></button></div>
                                    <div className="space-y-2">{categories.map(c => (<div key={c.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl"><span className="text-xs font-bold uppercase">{c.name}</span><button onClick={() => removeItem('categories', c.id)} className="text-red-300 hover:text-red-500"><Icon name="trash-2" size={14} /></button></div>))}</div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 text-center flex flex-col items-center gap-4 border-t border-slate-100 mt-10">
                        <img src="logo.png" className="h-10 opacity-30 grayscale" />
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Tribo Burger • Business Intelligence v6.8</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
