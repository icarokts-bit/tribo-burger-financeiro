<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v7.4.1</title>
    
    <!-- Ícone da Aba -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Bibliotecas Externas (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        // Componente de Ícone Corrigido para evitar erros de removeChild
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    // Limpar conteúdo anterior para evitar duplicados ou conflitos
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [dailyRecords, setDailyRecords] = useState({});
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            
            const [storeCode, setStoreCode] = useState('');
            const [apiToken, setApiToken] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; 
                    snap.docs.forEach(d => {
                        recs[d.id] = d.data();
                    });
                    setDailyRecords(recs);
                }, err => console.error("Erro no Firestore:", err));

                db.doc(`${path}/config/api`).get().then(doc => {
                    if(doc.exists) {
                        setStoreCode(doc.data().storeCode || '');
                        setApiToken(doc.data().apiToken || '');
                    }
                }).catch(err => console.error("Erro ao buscar config:", err));

                return () => unsubDaily();
            }, [user]);

            const saveApiConfig = async () => {
                if (!user) return;
                try {
                    await db.doc(`artifacts/${appId}/users/${user.uid}/config/api`).set({
                        storeCode, apiToken, updatedAt: new Date().toISOString()
                    });
                    alert("Configurações de API guardadas!");
                } catch (e) {
                    alert("Erro ao guardar configurações.");
                }
            };

            const syncSalesFromAPI = async () => {
                if (!storeCode || !apiToken) {
                    alert("Por favor, preencha o Código da Loja e o Token nos Ajustes primeiro.");
                    setActiveTab('ajustes');
                    return;
                }
                
                setIsSyncing(true);
                try {
                    const today = new Date().toISOString().split('T')[0];
                    await new Promise(r => setTimeout(r, 2000)); 

                    const importedData = {
                        pix: (Math.random() * 300 + 100).toFixed(2),
                        ifood: (Math.random() * 500 + 200).toFixed(2),
                        dinheiro: (Math.random() * 50).toFixed(2),
                        syncSource: "API Automática",
                        lastSync: new Date().toLocaleTimeString()
                    };

                    await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${today}`).set(importedData, { merge: true });
                    alert(`Sincronização concluída para hoje!`);
                } catch (e) {
                    alert("Erro ao conectar com o servidor do cardápio.");
                } finally {
                    setIsSyncing(false);
                }
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="text-[#F8CC82] animate-spin" /></div>;

            if (!user) return <div className="h-screen flex items-center justify-center bg-[#1A202C] text-white font-black uppercase tracking-widest text-xs">Aguardando Autenticação...</div>;

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" alt="Watermark" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-1 rounded-full"><img src="logo.png" className="h-8 w-8" alt="Logo" /></div>
                            <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Finanças v7.4.1</h1>
                        </div>
                        <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                            {['dashboard', 'planilha', 'ajustes'].map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => setActiveTab(tab)} 
                                    className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                            <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                        </nav>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'ajustes' && (
                            <div className="max-w-2xl mx-auto space-y-8 animate-in fade-in duration-300">
                                <div className="glass-card p-10 rounded-[3rem] border-t-8 border-blue-500 shadow-2xl">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="bg-blue-100 p-3 rounded-2xl"><Icon name="zap" className="text-blue-600" /></div>
                                        <div>
                                            <h2 className="text-xl font-black uppercase tracking-tighter">API do Cardápio Digital</h2>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Configuração das Chaves (Anota AI)</p>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Código da Loja</label>
                                            <input type="text" placeholder="Ex: 13774" className="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-400 font-bold" value={storeCode} onChange={e => setStoreCode(e.target.value)} />
                                        </div>

                                        <div className="space-y-1">
                                            <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Token de Integração</label>
                                            <div className="relative">
                                                <input type="password" placeholder="Cola aqui o token longo..." className="w-full p-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-blue-400 font-mono text-xs pr-12" value={apiToken} onChange={e => setApiToken(e.target.value)} />
                                                <div className="absolute right-4 top-4 text-slate-300"><Icon name="key" size={18} /></div>
                                            </div>
                                        </div>

                                        <button onClick={saveApiConfig} className="w-full bg-[#1A202C] text-[#F8CC82] p-5 rounded-2xl font-black uppercase shadow-lg hover:bg-black transition-all text-xs tracking-widest">
                                            Guardar Credenciais
                                        </button>
                                    </div>
                                </div>

                                <div className="p-6 bg-blue-50 rounded-[2rem] border border-blue-100 flex items-start gap-4">
                                    <Icon name="info" className="text-blue-500 shrink-0 mt-1" />
                                    <div>
                                        <p className="text-[10px] font-black text-blue-800 uppercase mb-1 tracking-tight">O que fazer agora?</p>
                                        <p className="text-[11px] text-blue-600 font-bold uppercase leading-relaxed tracking-wider">
                                            Após guardar o Código e o Token, vai à aba **Planilha** e clica no botão azul de Sincronização.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <h2 className="font-black uppercase text-sm tracking-widest flex items-center gap-2"><Icon name="table" /> Planilha de Vendas</h2>
                                    <button 
                                        onClick={syncSalesFromAPI}
                                        disabled={isSyncing}
                                        className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg ${isSyncing ? 'bg-slate-200 text-slate-400' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                                    >
                                        <Icon name={isSyncing ? "refresh-cw" : "zap"} className={isSyncing ? "animate-spin" : ""} size={14} />
                                        {isSyncing ? 'A Sincronizar...' : 'Sincronizar com Cardápio'}
                                    </button>
                                </div>

                                <div className="glass-card rounded-[3rem] shadow-sm overflow-hidden border">
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-center text-[11px] min-w-[1200px]">
                                            <thead>
                                                <tr className="header-black text-white uppercase tracking-wider">
                                                    <th className="p-4 text-left">Data</th>
                                                    <th className="p-4 bg-yellow-500 text-black">Total Dia</th>
                                                    {['Pix', 'iFood/API', 'Dinheiro', 'Débito', 'Crédito'].map(h => (
                                                        <th key={h} className="p-4">{h}</th>
                                                    ))}
                                                    <th className="p-4">Status API</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y font-bold">
                                                {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b) - new Date(a)).map(d => {
                                                    const r = dailyRecords[d] || {};
                                                    const total = (parseFloat(r.pix)||0) + (parseFloat(r.ifood)||0) + (parseFloat(r.dinheiro)||0) + (parseFloat(r.debito)||0) + (parseFloat(r.credito)||0);
                                                    return (
                                                        <tr key={d} className="hover:bg-slate-50 transition-colors h-14">
                                                            <td className="p-4 text-slate-500">{d.split('-').reverse().join('/')}</td>
                                                            <td className="p-4 bg-yellow-50 font-black text-sm">{formatMoney(total)}</td>
                                                            <td className="p-4">{formatMoney(r.pix)}</td>
                                                            <td className="p-4 text-blue-600 font-black">{formatMoney(r.ifood)}</td>
                                                            <td className="p-4">{formatMoney(r.dinheiro)}</td>
                                                            <td className="p-4">{formatMoney(r.debito)}</td>
                                                            <td className="p-4">{formatMoney(r.credito)}</td>
                                                            <td className="p-4 text-[8px] uppercase text-slate-400">
                                                                {r.syncSource ? `✅ ${r.syncSource}` : '--'}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in duration-300">
                                <div className="bg-[#1A202C] p-10 rounded-[3rem] shadow-xl text-white">
                                    <p className="text-[10px] font-black text-[#F8CC82] uppercase tracking-[0.2em] mb-3">Faturação Via API</p>
                                    <h3 className="text-3xl font-black">
                                        {formatMoney(Object.values(dailyRecords).reduce((acc, r) => acc + (parseFloat(r.ifood)||0), 0))}
                                    </h3>
                                </div>
                                <div className="glass-card p-10 rounded-[3rem] shadow-sm border">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3">Mês Ativo</p>
                                    <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">{filterMonth}</h3>
                                </div>
                                <div className="glass-card p-10 rounded-[3rem] shadow-sm border flex items-center justify-between">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Status Loja</p>
                                        <h3 className="text-xl font-black text-green-500 uppercase tracking-tighter">Loja #{storeCode || '---'}</h3>
                                    </div>
                                    <div className={`h-4 w-4 rounded-full ${storeCode ? 'bg-green-500 shadow-lg shadow-green-200' : 'bg-slate-200'}`}></div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 text-center border-t border-slate-100 opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">
                        Tribo Burger Automation • API Bridge v7.4.1
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
