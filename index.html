<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v6.2</title>
    
    <!-- Ícone da Aba -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Bibliotecas Externas (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos Customizados -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilos Excel para Planilha de Vendas */
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(255, 255, 255, 0.8); }
        
        .header-green { background-color: #92D050; color: #000; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #7cb342; }
        .header-red { background-color: #FF0000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #cc0000; }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        
        .cell-green { background-color: #E2EFDA; border: 1px solid #c5e0b4; }
        .cell-red { background-color: #FFC7CE; color: #9C0006; border: 1px solid #ffb3b3; }
        .cell-white { background-color: #FFF; border: 1px solid #e2e8f0; }

        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo para Resposta da IA */
        .prose-ia h3 { font-weight: 800; text-transform: uppercase; font-size: 0.75rem; color: #D97757; margin-top: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        .prose-ia p { font-size: 0.875rem; line-height: 1.6; margin-bottom: 1rem; color: #4A5568; }
        .prose-ia ul { list-style-type: none; padding: 0; }
        .prose-ia li { padding-left: 1.5rem; position: relative; margin-bottom: 0.5rem; font-size: 0.875rem; }
        .prose-ia li::before { content: '→'; position: absolute; left: 0; color: #D97757; font-weight: bold; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';
        const apiKey = ""; // Chave fornecida pelo ambiente

        const DEFAULT_ACCOUNTS = [
            { name: 'Mercado Pago', type: 'corrente' },
            { name: 'C6 Bank', type: 'corrente' },
            { name: 'Caixa Loja', type: 'corrente' }
        ];
        const DEFAULT_CATEGORIES = ['CMV Insumos', 'CMV Bebidas', 'Salários', 'Aluguer/Luz', 'Marketing', 'Outros'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            // Estados do Formulário Principal
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [targetAccount, setTargetAccount] = useState('');
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); // Novo estado para fornecedor no lançamento
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [editingId, setEditingId] = useState(null);
            
            // Estados para Cadastro de Itens e Filtros
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toISOString().split('T')[0]);
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newSupplierContact, setNewSupplierContact] = useState('');
            const [newSupplierCat, setNewSupplierCat] = useState('');

            // AI States
            const [aiResponse, setAiResponse] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; 
                        snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    });

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => {
                        if (snap.empty) {
                            DEFAULT_ACCOUNTS.forEach(acc => db.collection(`${path}/accounts`).add(acc));
                        } else {
                            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setAccounts(list);
                            if (list.length > 0 && !account) setAccount(list[0].name);
                        }
                    });

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => {
                        if (snap.empty) {
                            DEFAULT_CATEGORIES.forEach(name => db.collection(`${path}/categories`).add({ name }));
                        } else {
                            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setCategories(list);
                            if (list.length > 0 && !cat) setCat(list[0].name);
                        }
                    });

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setAuthError("Erro de Autenticação. Verifique os dados.");
                }
            };

            const parseMoney = (v) => {
                if (typeof v !== 'string') return v;
                return parseFloat(v.replace(',', '.')) || 0;
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                if (type !== 'transferencia' && !desc) return;

                const id = editingId || Date.now().toString();
                const payload = {
                    description: type === 'transferencia' ? `Transferência: ${account} → ${targetAccount}` : desc,
                    amount: parseMoney(val),
                    type,
                    date,
                    clearanceDate: clearance,
                    account,
                    category: type === 'transferencia' ? 'Transferência' : cat,
                    supplier: supplier || '', // Salva o fornecedor
                    timestamp: new Date().toISOString()
                };

                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`).set(payload, { merge: true });
                resetForm();
            };

            const resetForm = () => {
                setDesc(''); setVal(''); setEditingId(null);
                setAccount(accounts[0]?.name || ''); setCat(categories[0]?.name || '');
                setSupplier('');
                setDate(new Date().toISOString().split('T')[0]); setClearance(new Date().toISOString().split('T')[0]);
                setType('saida');
            };

            const startEdit = (t) => {
                setEditingId(t.id);
                setDesc(t.description);
                setVal(t.amount.toString().replace('.', ','));
                setType(t.type);
                setAccount(t.account);
                setCat(t.category);
                setSupplier(t.supplier || '');
                setDate(t.date);
                setClearance(t.clearanceDate);
                setActiveTab('dashboard');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const openDay = async () => {
                if (!user || !newDay) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true });
            };

            const addItem = async (collectionName) => {
                if (!newItemName) return;
                const path = `artifacts/${appId}/users/${user.uid}/${collectionName}`;
                let data = { name: newItemName };
                
                if (collectionName === 'accounts') data.type = newItemType;
                if (collectionName === 'suppliers') {
                    data.contact = newSupplierContact;
                    data.category = newSupplierCat;
                }
                
                await db.collection(path).add(data);
                setNewItemName(''); setNewSupplierContact(''); setNewSupplierCat('');
            };

            const removeItem = async (collectionName, id) => {
                if (!confirm("Remover este item?")) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/${collectionName}/${id}`).delete();
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; 
                let variableCostsPlanilha = 0; // Motoboys e taxas de entrega da planilha
                let costsByCategory = {};
                let channelRevenue = { Pix: 0, Dinheiro: 0, iFood: 0, Outros: 0 };
                let dailyCounts = 0;
                
                categories.forEach(c => costsByCategory[c.name] = 0);

                // Processa dados da Planilha (Diário)
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const dayTotal = p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        if (dayTotal > 0) dailyCounts++;
                        rb += dayTotal;
                        variableCostsPlanilha += p(r.motoboy) + p(r.taxaEntrega);
                        channelRevenue.Pix += p(r.pix) + p(r.pixOnline);
                        channelRevenue.Dinheiro += p(r.dinheiro);
                        channelRevenue.iFood += p(r.ifood);
                        channelRevenue.Outros += p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo) + p(r.fiado);
                    }
                });

                // Processa Transações (Movimentos Manuais)
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        if (t.type === 'transferencia') return;
                        const amount = p(t.amount);
                        if (t.type === 'entrada') rb += amount;
                        else {
                            const catName = t.category || 'Outros';
                            costsByCategory[catName] = (costsByCategory[catName] || 0) + amount;
                        }
                    }
                });

                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const despesaTotal = variableCostsPlanilha + totalOperating;
                const lucro = rb - despesaTotal;
                
                // Cálculo de CMV Estimado (CMV Insumos + CMV Bebidas)
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);

                return { 
                    rb, 
                    variableCostsPlanilha, 
                    costsByCategory, 
                    totalOperating, 
                    despesaTotal,
                    lucro, 
                    dailyCounts, 
                    channelRevenue,
                    cmv
                };
            }, [transactions, dailyRecords, filterMonth, categories]);

            const creditInvoices = useMemo(() => {
                const invoices = {};
                const creditAccountNames = accounts.filter(a => a.type === 'cartao').map(a => a.name);
                transactions.forEach(t => {
                    if (creditAccountNames.includes(t.account) && t.type === 'saida') {
                        const month = t.clearanceDate ? t.clearanceDate.slice(0, 7) : t.date.slice(0, 7);
                        if (!invoices[month]) invoices[month] = { total: 0, items: [] };
                        invoices[month].items.push(t);
                        invoices[month].total += parseFloat(t.amount) || 0;
                    }
                });
                return invoices;
            }, [transactions, accounts]);

            const askAiConsultant = async () => {
                setAiLoading(true); setAiResponse('');
                const prompt = `Analise os dados financeiros do meu restaurante "Tribo Burger" no mês de ${filterMonth}:
                - Faturação Bruta: ${formatMoney(stats.rb)}
                - Lucro/Prejuízo: ${formatMoney(stats.lucro)}
                - CMV (Custo Mercadoria): ${formatMoney(stats.cmv)} (${((stats.cmv / stats.rb) * 100).toFixed(1)}%)
                - Logística/Motoboy: ${formatMoney(stats.variableCostsPlanilha)}
                - Despesas Operacionais: ${formatMoney(stats.totalOperating)}
                - Gastos por Categoria: ${Object.entries(stats.costsByCategory).map(([k,v]) => `${k}: ${formatMoney(v)}`).join(', ')}
                
                Por favor, atue como um consultor financeiro. Identifique onde posso reduzir custos e melhorar a margem. Seja direto.`;

                const systemPrompt = "És o Consultor de Gestão da Tribo Burger. Analisas dados financeiros e dás soluções realistas para melhorar a rentabilidade.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (error) { setAiResponse("Erro ao consultar a IA."); }
                finally { setAiLoading(false); }
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><div className="animate-spin w-10 h-10 border-4 border-[#F8CC82] border-t-transparent rounded-full"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-8"><img src="logo.png" className="w-24 mx-auto mb-4" /><h2 className="text-2xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Financeiro</h2></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Palavra-passe" value={password} onChange={e => setPassword(e.target.value)} />
                            {authError && <p className="text-red-500 text-[10px] font-bold text-center">{authError}</p>}
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] font-black py-4 rounded-2xl uppercase text-xs tracking-widest">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4"><img src="logo.png" className="h-12 w-12 bg-white rounded-full p-1" /><div><h1 className="text-xl font-black text-[#F8CC82] uppercase leading-none tracking-tighter">Tribo Burger</h1><p className="text-[9px] opacity-50 uppercase tracking-widest">{user.email}</p></div></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl border border-white/10 overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'resultados', 'dre', 'faturas', 'fornecedores', 'consultoria', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : ''}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab === 'consultoria' ? 'IA Consultor' : tab}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-4 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-center mb-4"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 shadow-sm border border-[#F8CC82]/20"><span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Mês Visualizado:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>
                                
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-green-500 shadow-sm text-center"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Receita Bruta</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-red-500 shadow-sm text-center"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Despesas Totais</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.despesaTotal)}</h3></div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <form onSubmit={saveTx} className={`lg:col-span-1 glass-card p-8 rounded-[2.5rem] shadow-sm space-y-4 h-fit border-2 transition-all ${editingId ? 'border-orange-400 bg-orange-50/20' : 'border-transparent'}`}>
                                        <h2 className="text-xs font-black uppercase text-[#1A202C] tracking-widest border-b pb-3">{editingId ? 'Editar Movimento' : 'Novo Movimento'}</h2>
                                        <input type="text" placeholder="Descrição do Gasto (Ex: Carne, Limpeza)" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-400">R$</span><input type="text" placeholder="0,00" required className="w-full p-4 pl-10 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} /></div>
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}>{accounts.map(a => <option key={a.id} value={a.name}>{a.name} {a.type === 'cartao' ? '(💳)' : ''}</option>)}</select>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={cat} onChange={e => setCat(e.target.value)}>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={supplier} onChange={e => setSupplier(e.target.value)}>
                                                <option value="">Fornecedor (Opcional)</option>
                                                {suppliers.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                            </select>
                                        </div>

                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => setType('entrada')} className={`flex-1 py-3 rounded-xl font-black text-[10px] ${type === 'entrada' ? 'bg-green-100 text-green-700 shadow-inner' : 'bg-slate-100 text-slate-400'}`}>ENTRADA</button>
                                            <button type="button" onClick={() => setType('saida')} className={`flex-1 py-3 rounded-xl font-black text-[10px] ${type === 'saida' ? 'bg-red-100 text-red-700 shadow-inner' : 'bg-slate-100 text-slate-400'}`}>SAÍDA</button>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Data</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" value={date} onChange={e => setDate(e.target.value)} /></div>
