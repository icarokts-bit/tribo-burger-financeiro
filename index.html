<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Financeira v15.7.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [transactions, setTransactions] = useState([]);
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [dashboardFilterAccount, setDashboardFilterAccount] = useState('');
            const [dashboardFilterCategory, setDashboardFilterCategory] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');

            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [status, setStatus] = useState('pago'); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubTx(); unsubAccounts(); unsubCategories(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
            const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;

            const filteredHistory = useMemo(() => {
                return transactions.filter(t => {
                    const activeDate = (t.status === 'pago' && t.paymentDate) ? t.paymentDate : t.date;
                    const isDateMatch = activeDate?.startsWith(filterMonth);
                    const isAccountMatch = dashboardFilterAccount === '' || t.account === dashboardFilterAccount;
                    const isCategoryMatch = dashboardFilterCategory === '' || t.category === dashboardFilterCategory;
                    const isTypeMatch = typeFilter === 'todos' || t.type === typeFilter;
                    return isDateMatch && isAccountMatch && isCategoryMatch && isTypeMatch;
                }).sort((a,b) => {
                    const dateA = (a.status === 'pago' && a.paymentDate) ? a.paymentDate : (a.date || '0000-00-00');
                    const dateB = (b.status === 'pago' && b.paymentDate) ? b.paymentDate : (b.date || '0000-00-00');
                    return dateB.localeCompare(dateA);
                });
            }, [transactions, filterMonth, dashboardFilterAccount, dashboardFilterCategory, typeFilter]);

            const saveTransaction = async (e) => {
                e.preventDefault();
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const batch = db.batch();
                const totalAmount = p(val);
                const selectedAcc = accounts.find(a => a.name === account);
                const isCard = selectedAcc?.type === 'cartao';
                const count = isCard ? installments : 1;

                for (let i = 0; i < count; i++) {
                    const d = new Date(date + 'T00:00:00');
                    d.setMonth(d.getMonth() + i);
                    const finalDate = d.toISOString().split('T')[0];
                    
                    const payload = {
                        description: count > 1 ? `${desc} (${i+1}/${count})` : desc,
                        amount: totalAmount / count,
                        type,
                        status: isCard ? 'pendente' : status,
                        date: finalDate,
                        paymentDate: (!isCard && status === 'pago') ? finalDate : null,
                        account,
                        destinationAccount: type === 'transferencia' ? destAccount : null,
                        category: type === 'transferencia' ? 'Transferência' : (cat || 'Geral'),
                        timestamp: new Date().toISOString()
                    };
                    batch.set(db.collection(path).doc(), payload);
                }
                
                await batch.commit();
                setDesc(''); setVal(''); setInstallments(1);
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black">Tribo v15.7.0 Loading...</div>;

            return (
                <div className="min-h-screen flex flex-col fade-in pb-20">
                    {}
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <Icon name="utensils" size={24} className="text-[#F8CC82]" />
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Business</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'vendas', 'a_pagar', 'cartoes', 'resultados', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {tab.replace('_', ' ')}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black text-red-400 uppercase">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full border shadow-sm">
                                <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent font-black text-[#D97757] text-sm outline-none cursor-pointer" />
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {}
                                <div className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm border-t-4 border-black h-fit">
                                    <h2 className="text-xs font-black uppercase border-b pb-3 mb-4">Novo Registro</h2>
                                    <form onSubmit={saveTransaction} className="space-y-4">
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                            {['entrada', 'saida', 'transferencia'].map(t => (<button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t}</button>))}
                                        </div>
                                        
                                        {type !== 'transferencia' && (
                                            <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-semibold" value={desc} onChange={e => setDesc(e.target.value)} />
                                        )}

                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="text" placeholder="Valor" required className="p-4 bg-slate-50 border rounded-2xl font-black" value={val} onChange={e => setVal(e.target.value)} />
                                            <select className="p-4 bg-white border rounded-2xl text-[10px] font-black uppercase outline-none" value={account} onChange={e => setAccount(e.target.value)}>
                                                <option value="">Banco...</option>
                                                {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </div>

                                        {type === 'transferencia' && (
                                            <select className="w-full p-4 bg-white border rounded-2xl text-[10px] font-black uppercase outline-none" value={destAccount} onChange={e => setDestAccount(e.target.value)}>
                                                <option value="">Para Conta...</option>
                                                {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        )}

                                        {type !== 'transferencia' && (
                                            <select className="w-full p-4 bg-white border rounded-2xl text-[10px] font-black uppercase outline-none" value={cat} onChange={e => setCat(e.target.value)}>
                                                <option value="">Categoria...</option>
                                                {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                            </select>
                                        )}

                                        {accounts.find(a => a.name === account)?.type === 'cartao' && (
                                            <div className="flex flex-col gap-1 p-2 bg-orange-50 rounded-2xl border border-orange-100">
                                                <label className="text-[9px] font-black text-orange-400 uppercase ml-2">Parcelas</label>
                                                <input type="number" min="1" className="p-2 bg-transparent font-black text-sm outline-none" value={installments} onChange={e => setInstallments(parseInt(e.target.value) || 1)} />
                                            </div>
                                        )}

                                        <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold" value={date} onChange={e => setDate(e.target.value)} />
                                        
                                        <button className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition-transform">Gravar Movimento</button>
                                    </form>
                                </div>

                                {}
                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm flex flex-col border h-[650px] overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-black uppercase text-slate-400">Linha do Tempo</span>
                                            <span className="bg-black text-[#F8CC82] text-[8px] font-black px-2 py-0.5 rounded-full">{filteredHistory.length} lançamentos</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            <select className="text-[9px] font-bold p-2 border rounded-xl bg-white outline-none" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
                                                <option value="todos">TUDO</option>
                                                <option value="entrada">ENTRADAS</option>
                                                <option value="saida">SAÍDAS</option>
                                                <option value="transferencia">TRANSF.</option>
                                            </select>
                                            <select className="text-[9px] font-bold p-2 border rounded-xl bg-white outline-none" value={dashboardFilterAccount} onChange={e => setDashboardFilterAccount(e.target.value)}>
                                                <option value="">TODOS BANCOS</option>
                                                {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                            <select className="text-[9px] font-bold p-2 border rounded-xl bg-white outline-none" value={dashboardFilterCategory} onChange={e => setDashboardFilterCategory(e.target.value)}>
                                                <option value="">TODAS CATEG.</option>
                                                {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {filteredHistory.map(t => (
                                            <div key={t.id} className="p-5 flex justify-between items-center group hover:bg-slate-50 transition-colors">
                                                <div className="flex items-center gap-4">
                                                    <div className="text-center w-12 flex flex-col">
                                                        <span className="text-[10px] font-black text-slate-400 leading-none">
                                                            {((t.status === 'pago' && t.paymentDate) ? t.paymentDate : t.date)?.split('-').reverse().slice(0, 2).join('/')}
                                                        </span>
                                                        <span className={`text-[7px] font-bold uppercase mt-1 ${t.status === 'pago' ? 'text-green-500' : 'text-orange-400'}`}>
                                                            {t.status === 'pago' ? 'Liquidação' : 'Previsto'}
                                                        </span>
                                                    </div>
                                                    <div>
                                                        <p className="font-black text-sm uppercase tracking-tight text-slate-800">
                                                            {t.type === 'transferencia' ? (
                                                                <span className="text-blue-600">Transf: {t.account} → {t.destinationAccount}</span>
                                                            ) : t.description}
                                                        </p>
                                                        <div className="flex items-center gap-2 mt-1">
                                                            <span className="text-[8px] font-bold text-slate-400 uppercase bg-slate-100 px-2 py-0.5 rounded-md">{t.account}</span>
                                                            <span className="text-[8px] font-bold text-slate-300 uppercase italic">/ {t.category}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="text-right">
                                                        <p className={`font-black text-base ${t.type === 'entrada' ? 'text-green-600' : t.type === 'transferencia' ? 'text-blue-500' : 'text-red-600'}`}>
                                                            {t.type === 'entrada' ? '+' : t.type === 'transferencia' ? '⇄' : '-'} {formatMoney(t.amount)}
                                                        </p>
                                                        {t.status === 'pago' && t.paymentDate && (
                                                            <p className="text-[7px] font-black text-green-500/60 uppercase italic">Pago em {t.paymentDate.split('-').reverse().join('/')}</p>
                                                        )}
                                                    </div>
                                                    <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="text-red-100 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <Icon name="trash-2" size={14}/>
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        {}
                        {activeTab === 'saldos' && <p className="p-20 text-center font-black opacity-20">Aba Saldos Baseline v15 Carregada</p>}
                        {activeTab === 'vendas' && <p className="p-20 text-center font-black opacity-20">Aba Vendas Baseline v15 Carregada</p>}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.4em]">Tribo Business • Baseline v15.7.0 Estável</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
