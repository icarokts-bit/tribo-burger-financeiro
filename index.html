<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <!-- Favicon Inicial -->
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #133054; /* Azul do Logo */
            --accent: #bfa260;  /* Dourado do Logo */
            --bg: #f9f9f7;      /* Fundo do Logo */
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b; 
            margin: 0; 
            padding: 0; 
        }
        .rounded-premium { border-radius: 2rem; }
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(19, 48, 84, 0.05); 
        }
        .tabular { font-variant-numeric: tabular-nums; }
        .no-break { white-space: nowrap; }
        .text-huge { font-size: clamp(1rem, 3.5vw, 1.4rem); line-height: 1.1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #0d223d; }
        .text-brand { color: var(--primary); }
        .text-gold { color: var(--accent); }
        .cursor-pointer { cursor: pointer; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-[#133054] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">Sincronizando IcaroInvest Elite v10.6...</p>
            </div>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.firebaseAPI = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged };
        } catch (e) { console.error("Firebase Fail:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#133054', '#bfa260', '#10b981', '#64748b', '#f43f5e', '#f59e0b'];
        
        // Ativos ignorados globalmente
        const EXCLUDED_TICKERS = ['CHAINLINK', 'PENDLE', 'ETH', 'BTC'];

        const parseValue = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let clean = val.toString().trim();
            clean = clean.replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const StatCard = ({ title, value, icon, colorClass, isMobile, subValue = null }) => (
            <div className={`glass p-5 rounded-premium flex ${isMobile ? 'flex-col items-start gap-2' : 'items-center gap-4'} min-w-0 shadow-sm hover:shadow-md transition-all flex-1`}>
                <div className={`${colorClass} p-3 rounded-2xl text-white shadow-lg flex-shrink-0`}>
                    <LucideIcon name={icon} size={24} />
                </div>
                <div className="min-w-0 flex-1 w-full">
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 truncate">{title}</p>
                    <h3 className={`text-huge font-black tabular no-break ${title.includes('Var.') || title.includes('Lucro') ? (parseValue(value.toString().replace(/[^0-9,-]/g, '').replace(',', '.')) >= 0 ? 'text-emerald-600' : 'text-rose-600') : 'text-slate-900'}`}>{value}</h3>
                    {subValue && <p className={`text-[9px] font-bold mt-1 uppercase ${subValue.toString().startsWith('-') ? 'text-rose-500' : 'text-emerald-500'}`}>{subValue}</p>}
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ 
                acoes: [], realEstate: [], caixa: [], alternativos: [],
                caixaTicker: [], altFunds: [], altStocks: [], altCrypto: [], dividendos: [],
                historico: [], movimentacoes: [],
                saldoDisponivel: 0
            });
            const [syncStatus, setSyncStatus] = useState("");
            const [globalSyncing, setGlobalSyncing] = useState(false);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            const [marketTopGainers, setMarketTopGainers] = useState([]);
            const [marketTopLosers, setMarketTopLosers] = useState([]);
            const [marketSort, setMarketSort] = useState({ key: 'patrimonio', dir: 'desc' });

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!window.firebaseAPI) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, doc, onSnapshot } = window.firebaseAPI;
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(doc(db, 'investments', 'portfolio_principal'), (snap) => {
                            if (snap.exists()) setInvestments(prevState => ({...prevState, ...snap.data()}));
                        });
                    }
                });
            }, []);

            useEffect(() => {
                if (activeTab === 'mercado') fetchMarketMovers();
            }, [activeTab]);

            const fetchMarketMovers = async () => {
                try {
                    setSyncStatus("Atualizando mercado...");
                    const filterMainStocks = (stocks) => stocks.filter(s => s.volume > 50000 && !EXCLUDED_TICKERS.some(ex => s.stock.toUpperCase().includes(ex)));
                    const res = await fetch(`https://brapi.dev/api/quote/list?sortBy=change&sortOrder=desc&limit=50&token=${BRAPI_TOKEN}`);
                    const data = await res.json();
                    if (data.stocks) setMarketTopGainers(filterMainStocks(data.stocks).slice(0, 10));
                    const resL = await fetch(`https://brapi.dev/api/quote/list?sortBy=change&sortOrder=asc&limit=50&token=${BRAPI_TOKEN}`);
                    const dataL = await resL.json();
                    if (dataL.stocks) setMarketTopLosers(filterMainStocks(dataL.stocks).slice(0, 10));
                    setSyncStatus("");
                } catch (e) { console.error(e); setSyncStatus("Erro de conexão B3."); }
            };

            const save = async (newData) => {
                if (!window.firebaseAPI) return;
                const { db, doc, setDoc } = window.firebaseAPI;
                await setDoc(doc(db, 'investments', 'portfolio_principal'), newData);
            };

            const registrarMovimentacao = (data, ativo, tipo, qtd, valorUnit) => ({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                data: data || new Date().toLocaleDateString('pt-BR'),
                ativo: ativo.toUpperCase(), tipo,
                quantidade: parseValue(qtd), valorUnitario: parseValue(valorUnit),
                valorTotal: parseValue(qtd) * parseValue(valorUnit)
            });

            const getSectionStats = (list, type = 'ticker') => {
                let investido = 0; let atual = 0; let variacaoDiaR$ = 0;
                const filteredList = (list || []).filter(item => !EXCLUDED_TICKERS.includes((item.ticker || "").toUpperCase()));
                if (type === 'ticker') {
                    investido = filteredList.reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoMedio)), 0);
                    atual = filteredList.reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoAtual)), 0);
                    filteredList.forEach(i => {
                        const qty = parseValue(i.quantidade); const cur = parseValue(i.precoAtual); const varPct = parseValue(i.variacaoDia);
                        if (varPct !== 0) {
                            const prevPrice = cur / (1 + (varPct / 100));
                            variacaoDiaR$ += (cur - prevPrice) * qty;
                        }
                    });
                } else {
                    investido = filteredList.reduce((acc, i) => acc + parseValue(i.valorAplicado), 0);
                    atual = filteredList.reduce((acc, i) => acc + parseValue(i.valorAtual), 0);
                }
                const lucro = atual - investido;
                const lucroPct = investido > 0 ? (lucro / investido) * 100 : 0;
                const varDiaPct = atual > 0 ? (variacaoDiaR$ / (atual - variacaoDiaR$)) * 100 : 0;
                return { investido, atual, lucro, lucroPct, variacaoDiaR$, varDiaPct };
            };

            const totals = useMemo(() => {
                const sAcoes = getSectionStats(investments.acoes, 'ticker');
                const sRE = getSectionStats(investments.realEstate, 'ticker');
                const sCaixaM = getSectionStats(investments.caixa, 'manual');
                const sCaixaT = getSectionStats(investments.caixaTicker, 'ticker');
                const sAltF = getSectionStats(investments.altFunds, 'manual');
                const sAltS = getSectionStats(investments.altStocks, 'ticker');
                const sAltC = getSectionStats(investments.altCrypto, 'ticker');
                const divsPagos = (investments.dividendos || []).filter(d => (d.status === 'pago' || !d.status) && !EXCLUDED_TICKERS.includes(d.ativo.toUpperCase())).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);
                const divsPendentes = (investments.dividendos || []).filter(d => d.status === 'pendente' && !EXCLUDED_TICKERS.includes(d.ativo.toUpperCase())).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);
                const saldo = parseValue(investments.saldoDisponivel);
                const acoes = sAcoes; const re = sRE;
                const caixa = { investido: sCaixaM.investido + sCaixaT.investido, atual: sCaixaM.atual + sCaixaT.atual + saldo, lucro: sCaixaM.lucro + sCaixaT.lucro, variacaoDiaR$: sCaixaT.variacaoDiaR$ };
                caixa.lucroPct = caixa.investido > 0 ? (caixa.lucro / caixa.investido) * 100 : 0;
                caixa.varDiaPct = caixa.atual > 0 ? (caixa.variacaoDiaR$ / (caixa.atual - caixa.variacaoDiaR$)) * 100 : 0;
                const alt = { investido: sAltF.investido + sAltS.investido + sAltC.investido, atual: sAltF.atual + sAltS.atual + sAltC.atual, lucro: sAltF.lucro + sAltS.lucro + sAltC.lucro, variacaoDiaR$: sAltS.variacaoDiaR$ + sAltC.variacaoDiaR$ };
                alt.lucroPct = alt.investido > 0 ? (alt.lucro / alt.investido) * 100 : 0;
                alt.varDiaPct = alt.atual > 0 ? (alt.variacaoDiaR$ / (alt.atual - alt.variacaoDiaR$)) * 100 : 0;
                const totalAtu = acoes.atual + re.atual + caixa.atual + alt.atual;
                const varDiaTotal = acoes.variacaoDiaR$ + re.variacaoDiaR$ + caixa.variacaoDiaR$ + alt.variacaoDiaR$ ;
                const varDiaTotalPct = totalAtu > 0 ? (varDiaTotal / (totalAtu - varDiaTotal)) * 100 : 0;
                return { acoes, re, caixa, alt, divsPagos, divsPendentes, total: totalAtu, varDiaTotal, varDiaTotalPct, saldo };
            }, [investments]);

            const marketPortfolioList = useMemo(() => {
                const combined = [
                    ...(investments.acoes || []),
                    ...(investments.realEstate || []),
                    ...(investments.caixaTicker || []),
                    ...(investments.altStocks || []),
                    ...(investments.altCrypto || [])
                ].filter(item => !EXCLUDED_TICKERS.includes((item.ticker || "").toUpperCase()));
                const list = combined.map(item => {
                    const pat = parseValue(item.quantidade) * parseValue(item.precoAtual);
                    const custo = parseValue(item.quantidade) * parseValue(item.precoMedio);
                    return { ativo: item.ticker, qtd: parseValue(item.quantidade), custo, atual: parseValue(item.precoAtual), varDia: parseValue(item.variacaoDia), patrimonio: pat, lucro: pat - custo };
                });
                return list.sort((a, b) => {
                    const valA = a[marketSort.key]; const valB = b[marketSort.key];
                    return marketSort.dir === 'desc' ? valB - valA : valA - valB;
                });
            }, [investments, marketSort]);

            const handleMarketSort = (key) => setMarketSort(prev => ({ key, dir: prev.key === key && prev.dir === 'desc' ? 'asc' : 'desc' }));

            const syncGlobalPortfolio = async () => {
                const categories = ['acoes', 'realEstate', 'caixaTicker', 'altStocks', 'altCrypto'];
                setGlobalSyncing(true); setSyncStatus("Sincronização Total B3...");
                let updatedInvestments = { ...investments };
                for (const cat of categories) {
                    const list = [...(updatedInvestments[cat] || [])];
                    if (list.length === 0) continue;
                    for (let i = 0; i < list.length; i++) {
                        const t = list[i].ticker;
                        setSyncStatus(`A atualizar ${t}...`);
                        try {
                            const url = `https://brapi.dev/api/quote/${t}?token=${BRAPI_TOKEN}`;
                            const res = await fetch(url); const d = await res.json();
                            if (d.results?.[0]) { list[i].precoAtual = d.results[0].regularMarketPrice; list[i].variacaoDia = d.results[0].regularMarketChangePercent; }
                            await new Promise(r => setTimeout(r, 400));
                        } catch (e) { console.error(e); }
                    }
                    updatedInvestments[cat] = list;
                }
                setInvestments(updatedInvestments); await save(updatedInvestments);
                setGlobalSyncing(false); setSyncStatus("Carteira Sincronizada!"); setTimeout(() => setSyncStatus(""), 3000);
            };

            const renderTableSection = (cat, title, type = 'ticker') => {
                const data = (investments[cat] || []);
                return (
                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 animate-in mb-10">
                        <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center flex-wrap gap-4">
                            <h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">{title}</h2>
                            <button onClick={() => {
                                if(type === 'ticker') {
                                    const t = prompt("Ticker:"); const q = prompt("Qtd:"); const p = prompt("P. Médio:");
                                    if(t && q) { 
                                        const tickerUpper = t.toUpperCase();
                                        if (EXCLUDED_TICKERS.includes(tickerUpper)) { alert("Ativo excluído."); return; }
                                        const next = { ...investments, [cat]: [...(investments[cat]||[]), {id: Date.now().toString(), ticker: tickerUpper, quantidade: parseValue(q), precoMedio: parseValue(p), precoAtual: parseValue(p)}], movimentacoes: [registrarMovimentacao(null, tickerUpper, 'Compra', q, p), ...(investments.movimentacoes || [])], saldoDisponivel: parseValue(investments.saldoDisponivel) - (parseValue(q) * parseValue(p)) };
                                        setInvestments(next); save(next);
                                    }
                                } else {
                                    const n = prompt("Nome:"); const va = prompt("Vlr Aplicado:"); const vt = prompt("Vlr Atual:");
                                    if(n && va) { 
                                        const next = { ...investments, [cat]: [...(investments[cat]||[]), {id: Date.now().toString(), nome: n, valorAplicado: parseValue(va), valorAtual: parseValue(vt || va)}], movimentacoes: [registrarMovimentacao(null, n, 'Compra', 1, va), ...(investments.movimentacoes || [])], saldoDisponivel: parseValue(investments.saldoDisponivel) - parseValue(va) };
                                        setInvestments(next); save(next);
                                    }
                                }
                            }} className="bg-[#133054] text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg">+ Comprar Ativo</button>
                        </div>
                        <div className="overflow-x-auto custom-scroll">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <tr><th className="px-10 py-6">Ativo</th>{type === 'ticker' && <th className="px-10 py-6 text-center">Qtd</th>}<th className="px-10 py-6 text-right">Custo</th><th className="px-10 py-6 text-right">Atual</th>{type === 'ticker' && <th className="px-10 py-6 text-right">Var. Dia %</th>}<th className="px-10 py-6 text-right">Património</th><th className="px-10 py-6 text-right">Ação</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 tabular text-sm">
                                    {data.map(item => {
                                        const q = type === 'ticker' ? parseValue(item.quantidade) : 1;
                                        const pA = type === 'ticker' ? parseValue(item.precoAtual) : parseValue(item.valorAtual);
                                        const pC = type === 'ticker' ? parseValue(item.precoMedio) : parseValue(item.valorAplicado);
                                        const pat = q * pA;
                                        return (
                                            <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                                <td className="px-10 py-6 font-black text-slate-900 uppercase">{type === 'ticker' ? item.ticker : item.nome}</td>
                                                {type === 'ticker' && <td className="px-10 py-6 text-center font-bold">{q.toLocaleString()}</td>}
                                                <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(pC)}</td>
                                                <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(pA)}</td>
                                                {type === 'ticker' && <td className={`px-10 py-6 text-right font-bold ${parseValue(item.variacaoDia) >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{item.variacaoDia !== undefined ? `${parseValue(item.variacaoDia).toFixed(2)}%` : '-'}</td>}
                                                <td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(pat)}</td>
                                                <td className="px-10 py-6 text-right">
                                                    <button onClick={() => { if(confirm(`Eliminar ${type === 'ticker' ? item.ticker : item.nome}?`)) { const next = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(next); save(next); } }} className="bg-rose-50 text-rose-500 hover:bg-rose-600 hover:text-white p-3 rounded-xl transition-all shadow-sm">
                                                        <LucideIcon name="Trash2" size={16}/>
                                                    </button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {data.length === 0 && <tr><td colSpan="7" className="p-10 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">Nenhum registo nesta categoria.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setActiveTab('dashboard')}>
                            <img src="logo.png" alt="Logo" className="h-20 w-auto" />
                        </div>
                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-sm border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Resumo' },
                                { id: 'mercado', icon: 'Globe', label: 'Resumo Mercado' },
                                { id: 'acoes', icon: 'TrendingUp', label: 'Ações / ETF' },
                                { id: 'realEstate', icon: 'Home', label: 'RE' },
                                { id: 'caixa', icon: 'Landmark', label: 'Caixa' },
                                { id: 'alternativos', icon: 'Layers', label: 'Alt' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-black transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-[#133054] text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <LucideIcon name={t.icon} size={14} /> {t.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-[#133054] text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in">{syncStatus}</div>}

                    <main className="space-y-10 animate-in">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                                    <StatCard isMobile={isMobile} title="Saldo Livre" value={formatBRL(totals.saldo)} icon="Wallet" colorClass="bg-emerald-600" />
                                    <StatCard isMobile={isMobile} title="Património" value={formatBRL(totals.total)} icon="PieChart" colorClass="bg-[#133054]" />
                                    <StatCard isMobile={isMobile} title="Ações" value={formatBRL(totals.acoes.atual)} icon="BarChart3" colorClass="bg-[#bfa260]" />
                                    <StatCard isMobile={isMobile} title="RE" value={formatBRL(totals.re.atual)} icon="Building2" colorClass="bg-emerald-500" />
                                    <StatCard isMobile={isMobile} title="Caixa" value={formatBRL(totals.caixa.atual - totals.saldo)} icon="PiggyBank" colorClass="bg-slate-500" />
                                    <StatCard isMobile={isMobile} title="Alt" value={formatBRL(totals.alt.atual)} icon="Layers" colorClass="bg-rose-500" />
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação Total</h2>
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={[{ name: 'Ações', value: totals.acoes.atual }, { name: 'RE', value: totals.re.atual }, { name: 'Caixa', value: totals.caixa.atual }, { name: 'Alt', value: totals.alt.atual }].filter(d => d.value > 0)} innerRadius={80} outerRadius={140} paddingAngle={8} dataKey="value" stroke="none" cornerRadius={12}>
                                                    {COLORS.map((c, i) => <Cell key={i} fill={c} />)}
                                                </Pie>
                                                <Tooltip contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 10px 20px rgba(0,0,0,0.05)', fontBold: '900' }} formatter={(v) => formatBRL(v)} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Composição</h2>
                                        <div className="space-y-4">
                                            {[ { label: 'Ações', v: totals.acoes, color: COLORS[0] }, { label: 'RE', v: totals.re, color: COLORS[1] }, { label: 'Caixa', v: totals.caixa, color: COLORS[2] }, { label: 'Alt', v: totals.alt, color: COLORS[4] } ].map(item => (
                                                <div key={item.label} className="p-5 bg-slate-50/50 rounded-3xl border border-slate-100 flex justify-between items-center">
                                                    <div className="flex items-center gap-3"><div className="w-3 h-3 rounded-full" style={{ background: item.color }}></div><span className="font-bold text-slate-700 text-xs uppercase">{item.label}</span></div>
                                                    <span className="font-black text-slate-900">{formatBRL(item.v.atual)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'mercado' && (
                            <div className="space-y-10 animate-in">
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                    <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center flex-wrap gap-4">
                                        <div><h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">Carteira Consolidada</h2><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Visão geral dos ativos cotados</p></div>
                                        <button onClick={syncGlobalPortfolio} disabled={globalSyncing} className={`bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2 transition-all ${globalSyncing ? 'opacity-50' : ''}`}>
                                            <LucideIcon name="RefreshCw" size={14} className={globalSyncing ? 'spin' : ''} /> {globalSyncing ? 'Sincronizando...' : 'Sincronizar B3'}
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer select-none">
                                                <tr>
                                                    <th className="px-10 py-6" onClick={() => handleMarketSort('ativo')}>Ativos <LucideIcon name="ChevronDown" size={10} className="inline"/></th>
                                                    <th className="px-10 py-6 text-center" onClick={() => handleMarketSort('qtd')}>QTY <LucideIcon name="ChevronDown" size={10} className="inline"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('custo')}>CUSTO <LucideIcon name="ChevronDown" size={10} className="inline"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('atual')}>ATUAL <LucideIcon name="ChevronDown" size={10} className="inline"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('varDia')}>VAR DIA % <LucideIcon name="ChevronDown" size={10} className="inline"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('patrimonio')}>PATRIMONIO <LucideIcon name="ChevronDown" size={10} className="inline"/></th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 tabular text-sm">
                                                {marketPortfolioList.map(item => (
                                                    <tr key={item.ativo + Math.random()} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-10 py-6 font-black text-[#133054] uppercase">{item.ativo}</td>
                                                        <td className="px-10 py-6 text-center font-bold">{item.qtd.toLocaleString()}</td>
                                                        <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(item.custo)}</td>
                                                        <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(item.atual)}</td>
                                                        <td className={`px-10 py-6 text-right font-bold ${item.varDia >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{item.varDia.toFixed(2)}%</td>
                                                        <td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(item.patrimonio)}</td>
                                                    </tr>
                                                ))}
                                                {marketPortfolioList.length === 0 && <tr><td colSpan="6" className="p-10 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">Aguardando ativos cotados...</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                        <div className="p-8 bg-emerald-50/50 border-b flex items-center gap-3"><div className="p-2 bg-emerald-600 rounded-lg text-white"><LucideIcon name="TrendingUp" size={20}/></div><h2 className="font-black text-emerald-800 uppercase tracking-tighter text-xl">Top 10 Maiores Altas</h2></div>
                                        <div className="p-4 space-y-2">
                                            {marketTopGainers.map((s, idx) => (
                                                <div key={s.stock} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl"><span className="font-black text-[#133054] uppercase">{s.stock}</span><div className="text-right"><p className="font-black text-slate-900 text-xs">{formatBRL(s.close)}</p><p className="font-black text-emerald-600 text-[10px]">+{s.change.toFixed(2)}%</p></div></div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                        <div className="p-8 bg-rose-50/50 border-b flex items-center gap-3"><div className="p-2 bg-rose-600 rounded-lg text-white"><LucideIcon name="TrendingDown" size={20}/></div><h2 className="font-black text-rose-800 uppercase tracking-tighter text-xl">Top 10 Maiores Baixas</h2></div>
                                        <div className="p-4 space-y-2">
                                            {marketTopLosers.map((s, idx) => (
                                                <div key={s.stock} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl"><span className="font-black text-[#133054] uppercase">{s.stock}</span><div className="text-right"><p className="font-black text-slate-900 text-xs">{formatBRL(s.close)}</p><p className="font-black text-rose-600 text-[10px]">{s.change.toFixed(2)}%</p></div></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'acoes' && renderTableSection('acoes', 'Ações / ETF')}
                        {activeTab === 'realEstate' && renderTableSection('realEstate', 'Real Estate (FIIs)')}
                        {activeTab === 'caixa' && ( <> {renderTableSection('caixa', 'Reserva e Caixa (Manual)', 'manual')} {renderTableSection('caixaTicker', 'Reserva Cotada (Tickers)', 'ticker')} </> )}
                        {activeTab === 'alternativos' && ( <> {renderTableSection('altFunds', 'Fundos Alternativos', 'manual')} {renderTableSection('altStocks', 'Stocks Alternativos', 'ticker')} {renderTableSection('altCrypto', 'Crypto Assets', 'ticker')} </> )}
                    </main>
                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">IcaroInvest Elite Management v10.6</footer>
                </div>
            );
        };
        const start = () => { if (window.ReactDOM && window.React && window.Recharts) { ReactDOM.createRoot(document.getElementById('root')).render(<App />); } else { setTimeout(start, 50); } };
        start();
    </script>
</body>
</html>
