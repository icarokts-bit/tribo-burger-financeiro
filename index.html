<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | v2.4.8 STABLE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .delete-confirm { background-color: #EF4444 !important; color: white !important; animation: pulse 1s infinite; font-size: 9px !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); pointer-events: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .scale-up-center { animation: scale-up-center 0.2s cubic-bezier(0.390, 0.575, 0.565, 1.000) both; }
        @keyframes scale-up-center { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isActionLoading, setIsActionLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [metaVendas, setMetaVendas] = useState(0);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchQuery, setSearchQuery] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [accFilter, setAccFilter] = useState('');
            const [catFilter, setCatFilter] = useState('');
            const [hideCards, setHideCards] = useState(false);
            const [hideForecasts, setHideForecasts] = useState(false);

            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida');
            const [account, setAccount] = useState('');
            const [destAcc, setDestAcc] = useState('');
            const [cat, setCat] = useState('');
            const [sup, setSup] = useState('');
            const [status, setStatus] = useState('pago');
            const [inst, setInst] = useState(1);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [editingId, setEditingId] = useState(null);

            const [newDayDate, setNewDayDate] = useState(new Date().toISOString().split('T')[0]);
            const [accForm, setAccForm] = useState({ id: null, name: '', type: 'corrente', group: 'operacional', closing: '25', due: '10', pos: '1', highlight: false });
            const [accFormError, setAccFormError] = useState('');
            const [supplierInput, setSupplierInput] = useState('');

            const [liqModal, setLiqModal] = useState(null);
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(s => setTransactions(s.docs.map(d => ({ ...d.data(), id: d.id }))), e => console.error(e));
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(s => { const r = {}; s.docs.forEach(d => r[d.id] = d.data()); setDailyRecords(r); }, e => console.error(e));
                const unsubAcc = db.collection(`${path}/accounts`).onSnapshot(s => setAccounts(s.docs.map(d => ({ ...d.data(), id: d.id }))), e => console.error(e));
                const unsubCat = db.collection(`${path}/categories`).onSnapshot(s => setCategories(s.docs.map(d => ({ ...d.data(), id: d.id }))), e => console.error(e));
                const unsubSup = db.collection(`${path}/suppliers`).onSnapshot(s => setSuppliers(s.docs.map(d => ({ ...d.data(), id: d.id }))), e => console.error(e));
                const unsubMeta = db.doc(`${path}/settings/config`).onSnapshot(s => { if(s.exists) setMetaVendas(s.data().meta || 0); }, e => console.error(e));

                return () => { unsubTx(); unsubDaily(); unsubAcc(); unsubCat(); unsubSup(); unsubMeta(); };
            }, [user]);

            const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const uniqueDescriptions = useMemo(() => {
                const descs = transactions.map(t => t.description).filter(Boolean);
                return [...new Set(descs)].sort();
            }, [transactions]);

            const filteredDashboard = useMemo(() => {
                return transactions.filter(t => {
                    if (!t) return false;
                    const accInfo = accounts.find(a => a.name === t.account);
                    const isMonth = (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth) || t.billingMonth === filterMonth);
                    const matchSearch = (t.description || "").toLowerCase().includes(searchQuery.toLowerCase()) || (t.category || "").toLowerCase().includes(searchQuery.toLowerCase());
                    const matchType = typeFilter === 'todos' || t.type === typeFilter;
                    const matchAcc = accFilter === '' || t.account === accFilter;
                    const matchCat = catFilter === '' || t.category === catFilter;
                    const filterCard = hideCards ? accInfo?.type !== 'cartao' : true;
                    const filterForecast = hideForecasts ? t.status === 'pago' : true;
                    return isMonth && matchSearch && matchType && matchAcc && matchCat && filterCard && filterForecast;
                }).sort((a,b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
            }, [transactions, filterMonth, searchQuery, typeFilter, accFilter, catFilter, hideCards, hideForecasts, accounts]);

            const accountBalances = useMemo(() => {
                const bal = {}; 
                if (accounts) accounts.forEach(a => { if(a.name) bal[a.name] = 0; });
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') bal[t.account] = (bal[t.account] || 0) + amt;
                        else if (t.type === 'saida') bal[t.account] = (bal[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { bal[t.account] = (bal[t.account] || 0) - amt; bal[t.destinationAccount] = (bal[t.destinationAccount] || 0) + amt; }
                    }
                });
                return bal;
            }, [transactions, accounts]);

            const totalPatrimony = useMemo(() => {
                return accounts.filter(a => a.type === 'corrente').reduce((acc, a) => acc + (accountBalances[a.name] || 0), 0);
            }, [accounts, accountBalances]);

            const stats = useMemo(() => {
                let rb = 0; let custos = 0; let catCosts = {}; let diasAtivos = 0; let totalPedidos = 0;
                Object.keys(dailyRecords).forEach(d => {
                    if (d.startsWith(filterMonth)) {
                        const r = dailyRecords[d];
                        const totalDia = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((s,f)=>s+p(r[f]), 0);
                        if (totalDia > 0) diasAtivos++;
                        rb += totalDia;
                        custos += p(r.motoboy) + p(r.taxaEntrega);
                        totalPedidos += p(r.qtdPedidos);
                    }
                });
                transactions.forEach(t => {
                    if (t.status === 'pago' && (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth))) {
                        if (t.type === 'saida') catCosts[t.category] = (catCosts[t.category] || 0) + p(t.amount);
                    }
                });
                const operCosts = Object.values(catCosts).reduce((a,b)=>a+b, 0);
                return { 
                    rb, 
                    totalCosts: operCosts + custos, 
                    lucro: rb - (operCosts + custos), 
                    catCosts, 
                    diasAtivos, 
                    totalPedidos,
                    ticketDiario: diasAtivos > 0 ? rb / diasAtivos : 0,
                    ticketPedido: totalPedidos > 0 ? rb / totalPedidos : 0
                };
            }, [dailyRecords, transactions, filterMonth]);

            const consolidatedAPagar = useMemo(() => {
                const pendings = transactions.filter(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    return t.type === 'saida' && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth) && accInfo?.type !== 'cartao';
                });
                const invoices = accounts.filter(a => a.type === 'cartao').map(card => {
                    const txs = transactions.filter(t => t.account === card.name && t.clearanceDate?.startsWith(filterMonth));
                    const sum = txs.reduce((acc, t) => t.type === 'saida' ? acc + p(t.amount) : acc - p(t.amount), 0);
                    if (sum <= 0.01) return null;
                    return { id: `card-${card.name}`, description: `Fatura ${card.name}`, amount: sum, account: card.name, clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`, isInvoice: true };
                }).filter(Boolean);
                
                return [...pendings, ...invoices].sort((a,b) => (a.clearanceDate || "").localeCompare(b.clearanceDate || ""));
            }, [transactions, accounts, filterMonth]);

            const handleSaveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                setIsActionLoading(true);
                try {
                    const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                    const cardInfo = accounts.find(a => a.name === account && a.type === 'cartao');
                    const batch = db.batch();
                    const numInst = (type === 'transferencia') ? 1 : inst;
                    const baseDateString = date || new Date().toISOString().split('T')[0];

                    for (let i = 0; i < numInst; i++) {
                        const d = new Date(baseDateString + 'T00:00:00'); d.setMonth(d.getMonth() + i);
                        let finalClearance = clearance || baseDateString;
                        let billingM = d.toISOString().slice(0, 7);
                        
                        if (cardInfo) {
                            const closing = parseInt(cardInfo.closingDay || 25);
                            const due = parseInt(cardInfo.dueDay || 10);
                            let billingDate = new Date(d);
                            if (d.getDate() > closing) billingDate.setMonth(billingDate.getMonth() + 1);
                            billingM = billingDate.toISOString().slice(0, 7);
                            let dueDate = new Date(billingDate); dueDate.setMonth(dueDate.getMonth() + 1); dueDate.setDate(due);
                            finalClearance = dueDate.toISOString().split('T')[0];
                        } else {
                            const cDate = new Date((clearance || baseDateString) + 'T00:00:00');
                            cDate.setMonth(cDate.getMonth() + i);
                            finalClearance = cDate.toISOString().split('T')[0];
                        }

                        const payload = {
                            description: numInst > 1 ? `${desc} (${i+1}/${numInst})` : desc,
                            amount: p(val) / numInst, type, status: (cardInfo || type === 'entrada' || status === 'pendente') ? 'pendente' : status,
                            date: d.toISOString().split('T')[0], clearanceDate: finalClearance, billingMonth: billingM,
                            account, destinationAccount: destAcc, category: cat || 'Geral', supplier: sup, timestamp: new Date().toISOString()
                        };

                        if (editingId && i === 0) batch.update(db.doc(`${path}/${editingId}`), payload);
                        else batch.set(db.collection(path).doc(), payload);
                    }
                    await batch.commit(); 
                    setEditingId(null); setDesc(''); setVal(''); setType('saida'); setAccount(''); setCat(''); setSup(''); setInst(1);
                } catch (err) { console.error(err); } finally { setIsActionLoading(false); }
            };

            const startEdit = (t) => {
                setEditingId(t.id);
                setDesc(t.description || '');
                setVal(t.amount ? t.amount.toString() : '');
                setType(t.type || 'saida');
                setAccount(t.account || '');
                setCat(t.category || '');
                setSup(t.supplier || '');
                setDate(t.date || new Date().toISOString().split('T')[0]);
                setClearance(t.clearanceDate || new Date().toISOString().split('T')[0]);
                setStatus(t.status || 'pago');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleOpenNewDay = async () => {
                if (!user) return;
                setIsActionLoading(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('dailyRecords').doc(newDayDate).set({ initialized: true }, { merge: true });
                } finally { setIsActionLoading(false); }
            };

            const openLiquidation = (t) => {
                if (t.isInvoice) { setActiveTab('cartoes'); return; }
                setLiqModal({
                    id: t.id,
                    description: t.description || 'Sem Descrição',
                    amount: String(t.amount || 0).replace('.', ','),
                    date: new Date().toISOString().split('T')[0]
                });
            };

            const executeLiquidation = async () => {
                if (!user || !liqModal) return;
                setIsActionLoading(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('transactions').doc(liqModal.id).update({ 
                        status: 'pago', 
                        clearanceDate: liqModal.date,
                        amount: p(liqModal.amount)
                    });
                    setLiqModal(null);
                } catch (e) { console.error(e); } finally { setIsActionLoading(false); }
            };

            const saveMeta = async (v) => {
                const path = `artifacts/${appId}/users/${user.uid}/settings/config`;
                await db.doc(path).set({ meta: p(v) }, { merge: true });
            };

            const handleSaveAccount = async () => {
                if (!accForm.name) { setAccFormError('Defina um nome.'); return; }
                const exists = accounts.find(a => a.name.toLowerCase() === accForm.name.toLowerCase() && a.id !== accForm.id);
                if (exists) { setAccFormError('Já existe este nome.'); return; }
                setAccFormError('');
                setIsActionLoading(true);
                try {
                    const pth = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('accounts');
                    if (accForm.id) await pth.doc(accForm.id).update(accForm);
                    else await pth.add(accForm);
                    setAccForm({id:null, name:'', type:'corrente', group:'operacional', closing:'25', due:'10', pos:'1', highlight:false});
                } finally { setIsActionLoading(false); }
            };

            const executeDelete = async (collection, id) => {
                if (!user || !id) return;
                if (deleteConfirmId === id) {
                    setIsActionLoading(true);
                    try {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection(collection).doc(id).delete();
                        setDeleteConfirmId(null);
                    } catch (e) { console.error(e); } finally { setIsActionLoading(false); }
                } else {
                    setDeleteConfirmId(id);
                    setTimeout(() => setDeleteConfirmId(prev => prev === id ? null : prev), 5000);
                }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black uppercase tracking-widest">A carregar Tribo...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <h2 className="text-3xl font-black text-[#1A202C] uppercase text-center mb-10">Tribo Burger</h2>
                        <form onSubmit={e => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).catch(a => alert(a.message)); }} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" value={email} onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Entrar no Sistema</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    {isActionLoading && <div className="loading-overlay text-white font-black uppercase text-xs">Processando...</div>}
                    
                    {liqModal && (
                        <div className="modal-overlay">
                            <div className="glass-card w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl border-t-8 border-green-500 flex flex-col gap-6 scale-up-center">
                                <div className="text-center">
                                    <h3 className="text-sm font-black uppercase text-slate-400 mb-1 tracking-widest">Confirmar Liquidação</h3>
                                    <p className="font-black text-lg text-slate-800 uppercase leading-tight">{liqModal.description}</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Data da Liquidação</label>
                                        <input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm outline-none" value={liqModal.date} onChange={e=>setLiqModal({...liqModal, date: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[9px] font-black uppercase text-slate-400 ml-2">Valor Final (R$)</label>
                                        <input type="text" className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-black text-xl text-center text-green-600 outline-none" value={liqModal.amount} onChange={e=>setLiqModal({...liqModal, amount: e.target.value})} />
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <button onClick={executeLiquidation} className="w-full bg-black text-[#F8CC82] p-5 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Confirmar e Liquidar</button>
                                    <button onClick={()=>setLiqModal(null)} className="w-full text-slate-400 p-2 text-[9px] font-black uppercase hover:text-red-500">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-1 rounded-full"><img src="logo.png" className="h-8 w-8 object-contain" alt="Logo" /></div>
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Burger v2.4.8</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'vendas', 'a_pagar', 'a_receber', 'cartoes', 'resultados', 'dre', 'fornecedores', 'ajustes'].map(t => (
                                    <button key={t} onClick={()=>setActiveTab(t)} className={`px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all ${activeTab === t ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {t.replace('_', ' ')}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-4 max-w-7xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 border shadow-sm">
                                <span className="text-[9px] font-black uppercase text-slate-400">Mês Base:</span>
                                <input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" />
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <form onSubmit={handleSaveTx} className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-black h-fit relative">
                                    {editingId && <div className="absolute -top-4 right-8 bg-blue-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">Editando Lançamento</div>}

                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {filteredDashboard.map(t => (

                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-[8px] ${t.type==='entrada'?'bg-green-100 text-green-700':'bg-red-50 text-red-600'}`}>{t.type==='entrada'?'IN':'OUT'}</div>

                                                        <div className="flex items-center gap-2">
                                                            <p className="font-black text-sm uppercase leading-none">{t.description}</p>

                                                                {t.status==='pago' ? `Pago ${t.clearanceDate?.split('-').reverse().slice(0,2).join('/')}` : 'Pendente'}

                                            </div>
                                            <div className="flex items-center gap-6">
                                                <p className="font-black text-xl text-red-700">{formatMoney(t.amount)}</p>

                                                    <Icon name="check" size={20}/><span className="text-[9px] font-black uppercase pr-1">Pagar</span>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                            </div>

                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-purple-500 text-center flex flex-col justify-center">

                                     <div className={`glass-card p-10 rounded-[3rem] shadow-sm text-center border-t-8 ${stats.lucro>=0?'border-blue-600':'border-red-600'}`}><p className="text-[9px] font-black text-slate-400 uppercase">Lucro Líquido</p><h3 className={`text-2xl font-black ${stats.lucro>=0?'text-blue-600':'text-red-600'}`}>{formatMoney(stats.lucro)}</h3></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto glass-card rounded-[3rem] p-10 shadow-2xl border-t-8 border-[#D97757] animate-in fade-in">

                                        <h3 className="text-[10px] font-black uppercase text-slate-400 mb-2 px-4">Despesas por Categoria</h3>

                                        <span className="text-4xl font-black">{formatMoney(stats.lucro)}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* RESTAURO DA ABA: FORNECEDORES (Registo de parceiros) */}
                        {activeTab === 'fornecedores' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 animate-in fade-in">
                                <div className="glass-card p-8 rounded-[3rem] h-fit space-y-6 shadow-sm border-t-4 border-black">
                                    <h2 className="text-sm font-black uppercase border-b pb-4">Novo Fornecedor</h2>
                                    <div className="space-y-4">
                                        <input type="text" className="w-full p-4 border rounded-2xl font-bold text-xs bg-slate-50 outline-none focus:border-[#D97757]" placeholder="Nome do Parceiro/Fornecedor" value={supplierInput} onChange={e => setSupplierInput(e.target.value)} />
                                        <button type="button" onClick={async() => { if(!supplierInput) return; setIsActionLoading(true); try { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('suppliers').add({ name: supplierInput, timestamp: new Date().toISOString() }); setSupplierInput(''); } finally { setIsActionLoading(false); } }} className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg active:scale-95 transition-all">Cadastrar Fornecedor</button>
                                    </div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-sm max-h-[550px] flex flex-col border border-t-4 border-slate-400">
                                    <div className="flex justify-between items-center border-b pb-4 mb-4">
                                        <h2 className="text-sm font-black uppercase">Lista de Parceiros</h2>
                                        <span className="bg-slate-100 px-2 py-1 rounded-lg text-[9px] font-black">{(suppliers || []).length}</span>
                                    </div>
                                    <div className="space-y-2 overflow-y-auto no-scrollbar flex-1">
                                        {(!suppliers || suppliers.length === 0) ? (
                                            <p className="text-center py-10 text-[10px] font-black uppercase text-slate-300">Nenhum fornecedor cadastrado</p>
                                        ) : (
                                            suppliers.sort((a,b) => (a.name || "").localeCompare(b.name || "")).map(s => (
                                                <div key={s.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl group hover:border-black transition-all">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-black text-[10px] text-slate-400">
                                                            {(s.name || "F").charAt(0).toUpperCase()}
                                                        </div>
                                                        <span className="text-xs font-black uppercase">{s.name}</span>
                                                    </div>
                                                    <button type="button" onClick={() => executeDelete('suppliers', s.id)} className={`flex items-center gap-2 transition-all p-2 rounded-xl px-4 ${deleteConfirmId === s.id ? 'delete-confirm' : 'text-red-400 bg-red-50 hover:bg-red-100'}`}>
                                                        {deleteConfirmId === s.id ? <span className="text-[10px] font-black uppercase">Confirmar?</span> : <><Icon name="trash-2" size={16}/><span className="text-[10px] font-black uppercase">Excluir</span></>}
                                                    </button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in">
                                <div className="glass-card p-8 rounded-[3rem] border-t-8 border-orange-500 space-y-6 shadow-xl h-fit">
                                    <h2 className="text-sm font-black uppercase">{accForm.id ? 'Editar Conta' : 'Nova Conta'}</h2>
                                    <div className="space-y-4 bg-slate-50 p-6 rounded-[2rem] border-2 border-dashed">
                                        {accFormError && <div className="p-3 bg-red-100 text-red-700 rounded-xl text-[10px] font-black uppercase">{accFormError}</div>}
                                        <input type="text" className="w-full p-4 border rounded-2xl font-bold text-xs outline-none focus:border-black" placeholder="Nome da Conta ou Cartão" value={accForm.name} onChange={e=>setAccForm({...accForm, name:e.target.value})} />
                                        <div className="flex gap-2">
                                            <button type="button" onClick={()=>setAccForm({...accForm, type:'corrente'})} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accForm.type==='corrente'?'bg-black text-white':'bg-white border'}`}>CORRENTE</button>
                                            <button type="button" onClick={()=>setAccForm({...accForm, type:'cartao'})} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accForm.type==='cartao'?'bg-orange-500 text-white':'bg-white border'}`}>CARTÃO</button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button type="button" onClick={handleSaveAccount} className="flex-1 bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Salvar</button>
                                            {accForm.id && <button type="button" onClick={()=>setAccForm({id:null, name:'', type:'corrente', group:'operacional', closing:'25', due:'10', pos:'1', highlight:false})} className="bg-slate-200 text-slate-600 px-4 rounded-2xl font-black uppercase text-[10px]">Cancelar</button>}
                                        </div>
                                    </div>
                                    <div className="space-y-2 overflow-y-auto max-h-[400px] divide-y border rounded-[2rem] p-4">
                                        {accounts.sort((a,b)=>parseInt(a.pos||0)-parseInt(b.pos||0)).map(a => (
                                            <div key={a.id} className="p-4 flex flex-col md:flex-row justify-between md:items-center gap-4 bg-white/50 hover:bg-white rounded-2xl">
                                                <div><p className="font-black text-xs uppercase leading-none">{a.name}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{a.type}</p></div>
                                                <div className="flex gap-2 items-center">
                                                    <button type="button" onClick={()=>setAccForm(a)} className="bg-blue-50 text-blue-500 p-2 px-3 rounded-xl"><Icon name="edit-2" size={14}/></button>
                                                    <button type="button" onClick={() => executeDelete('accounts', a.id)} className={`transition-all p-2 px-3 rounded-xl ${deleteConfirmId === a.id ? 'delete-confirm' : 'text-red-400'}`}>
                                                        {deleteConfirmId === a.id ? <span className="text-[10px] font-black uppercase">Sim</span> : <Icon name="trash-2" size={14}/>}
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] border-t-8 border-[#1A202C] space-y-6 h-fit">
                                     <h2 className="text-sm font-black uppercase border-b pb-4">Categorias</h2>
                                     <div className="flex gap-2"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none focus:border-black" id="new-cat" placeholder="Nova Categoria..." /><button type="button" onClick={async()=>{const v=document.getElementById('new-cat').value; if(!v) return; setIsActionLoading(true); try { await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('categories').add({name:v}); document.getElementById('new-cat').value=''; } finally { setIsActionLoading(false); } }} className="bg-black text-white p-4 rounded-2xl"><Icon name="plus" size={18}/></button></div>
                                     <div className="grid grid-cols-2 gap-2 max-h-96 overflow-y-auto no-scrollbar">
                                        {categories.sort((a,b)=>(a.name||"").localeCompare(b.name||"")).map(c => (
                                            <div key={c.id} className="p-3 bg-white border rounded-xl flex justify-between items-center hover:border-black">
                                                <span className="text-[10px] font-black uppercase text-slate-500">{c.name}</span>
                                                <button type="button" onClick={() => executeDelete('categories', c.id)} className={`transition-all p-2 rounded-lg ${deleteConfirmId === c.id ? 'delete-confirm' : 'text-red-500'}`}>
                                                    {deleteConfirmId === c.id ? <span className="text-[8px] font-black uppercase">Sim</span> : <Icon name="trash-2" size={12}/>}
                                                </button>
                                            </div>
                                        ))}
                                     </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Burger Financeiro • v2.4.8 GOLDEN STABLE</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
