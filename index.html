<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v7.0</title>
    
    <!-- Ícone da Aba -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Bibliotecas Externas (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos Customizados -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilos Excel para Planilha de Vendas */
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(255, 255, 255, 0.8); }
        
        .header-green { background-color: #92D050; color: #000; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #7cb342; }
        .header-red { background-color: #FF0000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #cc0000; }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        
        .cell-green { background-color: #E2EFDA; border: 1px solid #c5e0b4; }
        .cell-red { background-color: #FFC7CE; color: #9C0006; border: 1px solid #ffb3b3; }
        .cell-white { background-color: #FFF; border: 1px solid #e2e8f0; }

        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo para Resposta da IA */
        .prose-ia h3 { font-weight: 800; text-transform: uppercase; font-size: 0.75rem; color: #D97757; margin-top: 1.5rem; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
        .prose-ia p { font-size: 0.875rem; line-height: 1.6; margin-bottom: 1rem; color: #4A5568; }
        .prose-ia ul { list-style-type: none; padding: 0; }
        .prose-ia li { padding-left: 1.5rem; position: relative; margin-bottom: 0.5rem; font-size: 0.875rem; }
        .prose-ia li::before { content: '→'; position: absolute; left: 0; color: #D97757; font-weight: bold; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';
        const apiKey = ""; 

        const DEFAULT_ACCOUNTS = [
            { name: 'Mercado Pago', type: 'corrente' },
            { name: 'C6 Bank', type: 'corrente' },
            { name: 'Caixa Loja', type: 'corrente' }
        ];
        const DEFAULT_CATEGORIES = ['CMV Insumos', 'CMV Bebidas', 'Salários', 'Aluguer/Luz', 'Marketing', 'Outros'];

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            // Estados do Formulário Principal
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [editingId, setEditingId] = useState(null);

            // Estados de Parcelamento
            const [isInstallment, setIsInstallment] = useState(false);
            const [installments, setInstallments] = useState(2);
            
            // Estados para Cadastro de Itens e Filtros
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toISOString().split('T')[0]);
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('');
            const [newItemDueDay, setNewItemDueDay] = useState('');
            const [editingAccount, setEditingAccount] = useState(null);
            
            const [newSupplierContact, setNewSupplierContact] = useState('');
            const [newSupplierCat, setNewSupplierCat] = useState('');

            // AI States
            const [aiResponse, setAiResponse] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; 
                        snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    });

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => {
                        if (snap.empty) {
                            DEFAULT_ACCOUNTS.forEach(acc => db.collection(`${path}/accounts`).add(acc));
                        } else {
                            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setAccounts(list);
                            if (list.length > 0 && !account && !editingId) {
                                const defaultAcc = list.find(a => a.name === 'Mercado Pago') || list[0];
                                setAccount(defaultAcc.name);
                            }
                        }
                    });

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => {
                        if (snap.empty) {
                            DEFAULT_CATEGORIES.forEach(name => db.collection(`${path}/categories`).add({ name }));
                        } else {
                            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setCategories(list);
                            if (list.length > 0 && !cat) setCat(list[0].name);
                        }
                    });

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setAuthError("Erro de Autenticação. Verifique os dados.");
                }
            };

            const parseMoney = (v) => {
                if (typeof v !== 'string') return v;
                return parseFloat(v.replace(',', '.')) || 0;
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || !desc) return;

                const baseAmount = parseMoney(val);
                const currentAccount = accounts.find(a => a.name === account);
                const isCard = currentAccount?.type === 'cartao';

                if (isInstallment && isCard && installments > 1 && !editingId) {
                    const installmentValue = baseAmount / installments;
                    const promises = [];
                    for (let i = 1; i <= installments; i++) {
                        const d = new Date(date + 'T00:00:00');
                        d.setMonth(d.getMonth() + i - 1);
                        const installmentDate = d.toISOString().split('T')[0];
                        
                        const id = `${Date.now()}-${i}`;
                        const payload = {
                            description: `${desc} (${i}/${installments})`,
                            amount: installmentValue,
                            type: 'saida',
                            status: i === 1 ? 'pago' : 'pendente', 
                            date: installmentDate,
                            clearanceDate: installmentDate,
                            account,
                            category: cat,
                            supplier: supplier || '', 
                            timestamp: new Date().toISOString(),
                            installmentInfo: { current: i, total: installments }
                        };
                        promises.push(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`).set(payload));
                    }
                    await Promise.all(promises);
                } else {
                    const id = editingId || Date.now().toString();
                    const payload = {
                        description: type === 'transferencia' ? `Transf: ${account} para ${destAccount}` : desc,
                        amount: baseAmount,
                        type,
                        status: type === 'transferencia' ? 'pago' : status, 
                        date,
                        clearanceDate: clearance,
                        account,
                        destinationAccount: type === 'transferencia' ? destAccount : '',
                        category: type === 'transferencia' ? 'Transferência Interna' : cat,
                        supplier: supplier || '', 
                        timestamp: new Date().toISOString()
                    };
                    await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`).set(payload, { merge: true });
                }
                resetForm();
            };

            const resetForm = () => {
                setDesc(''); setVal(''); setEditingId(null);
                const defaultAcc = accounts.find(a => a.name === 'Mercado Pago') || accounts[0];
                setAccount(defaultAcc?.name || ''); 
                setDestAccount('');
                setCat(categories[0]?.name || '');
                setSupplier('');
                setStatus('pago');
                setIsInstallment(false);
                setInstallments(2);
                setDate(new Date().toISOString().split('T')[0]); setClearance(new Date().toISOString().split('T')[0]);
                setType('saida');
            };

            const startEdit = (t) => {
                setEditingId(t.id);
                setDesc(t.description);
                setVal(t.amount.toString().replace('.', ','));
                setType(t.type);
                setStatus(t.status || 'pago');
                setAccount(t.account);
                setDestAccount(t.destinationAccount || '');
                setCat(t.category);
                setSupplier(t.supplier || '');
                setDate(t.date);
                setClearance(t.clearanceDate);
                setActiveTab('dashboard');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const togglePaid = async (t) => {
                if (!user) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({
                    status: t.status === 'pago' ? 'pendente' : 'pago'
                });
            };

            const openDay = async () => {
                if (!user || !newDay) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true });
            };

            const addItem = async (collectionName) => {
                if (!newItemName) return;
                const path = `artifacts/${appId}/users/${user.uid}/${collectionName}`;
                let data = { name: newItemName };
                
                if (collectionName === 'accounts') {
                    data.type = newItemType;
                    if (newItemType === 'cartao') {
                        data.closingDay = newItemClosingDay;
                        data.dueDay = newItemDueDay;
                    }
                }
                if (collectionName === 'suppliers') {
                    data.contact = newSupplierContact;
                    data.category = newSupplierCat;
                }
                
                await db.collection(path).add(data);
                setNewItemName(''); setNewSupplierContact(''); setNewSupplierCat('');
                setNewItemClosingDay(''); setNewItemDueDay('');
            };

            const updateAccountData = async () => {
                if (!editingAccount) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${editingAccount.id}`).update({
                    closingDay: newItemClosingDay,
                    dueDay: newItemDueDay
                });
                setEditingAccount(null);
                setNewItemClosingDay('');
                setNewItemDueDay('');
            };

            const startEditAccount = (acc) => {
                setEditingAccount(acc);
                setNewItemClosingDay(acc.closingDay || '');
                setNewItemDueDay(acc.dueDay || '');
                setNewItemType(acc.type || 'corrente');
            };

            const removeItem = async (collectionName, id) => {
                if (!confirm("Remover este item?")) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/${collectionName}/${id}`).delete();
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const uniqueDescriptions = useMemo(() => {
                const set = new Set(transactions.map(t => t.description));
                return Array.from(set).filter(d => d && d.length > 1);
            }, [transactions]);

            const accountBalances = useMemo(() => {
                const balances = {};
                accounts.forEach(acc => balances[acc.name] = 0);
                
                transactions.forEach(t => {
                    if (t.status !== 'pago' && t.type !== 'transferencia') return; 
                    const amt = parseFloat(t.amount) || 0;
                    if (t.type === 'entrada') {
                        balances[t.account] = (balances[t.account] || 0) + amt;
                    } else if (t.type === 'saida') {
                        balances[t.account] = (balances[t.account] || 0) - amt;
                    } else if (t.type === 'transferencia') {
                        balances[t.account] = (balances[t.account] || 0) - amt;
                        if (t.destinationAccount) {
                            balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + amt;
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const creditCardStats = useMemo(() => {
                const stats = {};
                const currentMonth = parseInt(filterMonth.split('-')[1]);
                const currentYear = parseInt(filterMonth.split('-')[0]);

                accounts.filter(a => a.type === 'cartao').forEach(card => {
                    let openInvoice = 0;
                    let nextInvoice = 0;
                    const closingDay = parseInt(card.closingDay) || 1;

                    transactions.filter(t => t.account === card.name && t.type === 'saida').forEach(t => {
                        const tDate = new Date(t.date + 'T00:00:00');
                        const tDay = tDate.getDate();
                        const tMonth = tDate.getMonth() + 1;
                        const tYear = tDate.getFullYear();
                        const amount = parseFloat(t.amount) || 0;

                        if (tMonth === currentMonth && tYear === currentYear) {
                            if (tDay <= closingDay) openInvoice += amount;
                            else nextInvoice += amount;
                        } else if (tMonth === (currentMonth === 1 ? 12 : currentMonth - 1)) {
                            if (tDay > closingDay) openInvoice += amount;
                        }
                    });

                    stats[card.name] = { openInvoice, nextInvoice, closingDay, dueDay: card.dueDay };
                });
                return stats;
            }, [transactions, accounts, filterMonth]);

            const reminders = useMemo(() => {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const tomorrowStr = tomorrow.toISOString().split('T')[0];
                return transactions.filter(t => t.type === 'saida' && t.status === 'pendente' && t.date <= tomorrowStr);
            }, [transactions]);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let variableCostsPlanilha = 0; let costsByCategory = {}; let pendingTotal = 0;
                categories.forEach(c => costsByCategory[c.name] = 0);
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        variableCostsPlanilha += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'entrada') {
                            if (t.status === 'pago') rb += amount;
                        } else if (t.type === 'saida') {
                            if (t.status === 'pendente') pendingTotal += amount;
                            else {
                                const catName = t.category || 'Outros';
                                costsByCategory[catName] = (costsByCategory[catName] || 0) + amount;
                            }
                        }
                    }
                });
                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const despesaPagaTotal = variableCostsPlanilha + totalOperating;
                return { rb, variableCostsPlanilha, costsByCategory, totalOperating, despesaPagaTotal, lucro: rb - despesaPagaTotal, cmv: (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0), pendingTotal };
            }, [transactions, dailyRecords, filterMonth, categories]);

            const askAiConsultant = async () => {
                setAiLoading(true); setAiResponse('');
                const prompt = `Analise os dados financeiros da Tribo Burger em ${filterMonth}: Faturação: ${formatMoney(stats.rb)}, Caixa: ${formatMoney(stats.lucro)}, Pendentes: ${formatMoney(stats.pendingTotal)}.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Consultor Tribo Burger." }] } })
                    });
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (e) { setAiResponse("Erro."); } finally { setAiLoading(false); }
            };

            const isCreditCardSelected = useMemo(() => {
                return accounts.find(a => a.name === account)?.type === 'cartao';
            }, [account, accounts]);

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><div className="animate-spin w-10 h-10 border-4 border-[#F8CC82] border-t-transparent rounded-full"></div></div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-8"><img src="logo.png" className="w-24 mx-auto mb-4" /><h2 className="text-2xl font-black text-[#1A202C] uppercase tracking-tighter text-center">Tribo Financeiro</h2></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required className="w-full px-5 py-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Senha" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] font-black py-4 rounded-2xl uppercase text-xs tracking-widest">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4"><img src="logo.png" className="h-12 w-12 bg-white rounded-full p-1" /><div><h1 className="text-xl font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Burger</h1><p className="text-[9px] opacity-50 uppercase tracking-widest">{user.email}</p></div></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl border border-white/10 overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'cartoes', 'resultados', 'dre', 'fornecedores', 'consultoria', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : ''}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab === 'consultoria' ? 'IA Consultor' : tab === 'cartoes' ? 'Faturas' : tab}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-4 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-center mb-4"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4"><span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Mês Selecionado:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>
                                
                                {reminders.length > 0 && (
                                    <div className="bg-red-50 border-2 border-red-200 p-6 rounded-[2.5rem] shadow-sm animate-in zoom-in duration-300">
                                        <div className="flex items-center gap-3 mb-4"><Icon name="bell" className="text-red-600 animate-bounce" /><h3 className="text-xs font-black uppercase text-red-800 tracking-widest">Lembrete de Vencimento ({reminders.length})</h3></div>

                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500"><p className="text-[8px] font-black text-[#F8CC82] uppercase tracking-[0.2em] mb-1">Resultado (Mês)</p><h3 className={`text-xl font-black ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3><p className="text-[8px] text-slate-400 uppercase mt-2">Pendente: {formatMoney(stats.pendingTotal)}</p></div>
                                    {accounts.map(acc => (<div key={acc.id} className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 flex items-center gap-2"><Icon name={acc.type === 'cartao' ? 'credit-card' : 'landmark'} size={12} />{acc.name}</p><h3 className="text-xl font-black text-slate-800">{formatMoney(accountBalances[acc.name])}</h3></div>))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <form onSubmit={saveTx} className={`lg:col-span-1 glass-card p-8 rounded-[2.5rem] shadow-sm space-y-4 h-fit border-2 transition-all ${editingId ? 'border-orange-400 bg-orange-50/20' : 'border-transparent'}`}>
                                        <h2 className="text-xs font-black uppercase text-[#1A202C] tracking-widest border-b pb-3">{editingId ? 'Editar Movimento' : 'Novo Lançamento'}</h2>
                                        
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl mb-4">
                                            <button type="button" onClick={() => { setType('entrada'); setIsInstallment(false); }} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === 'entrada' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-slate-400'}`}>Entrada</button>
                                            <button type="button" onClick={() => setType('saida')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === 'saida' ? 'bg-red-100 text-red-700 shadow-sm' : 'text-slate-400'}`}>Saída</button>
                                            <button type="button" onClick={() => { setType('transferencia'); setStatus('pago'); setIsInstallment(false); }} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === 'transferencia' ? 'bg-blue-100 text-blue-700 shadow-sm' : 'text-slate-400'}`}>Transf.</button>

                                        {type !== 'transferencia' && (
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Descrição</label>

                                                <datalist id="desc-history">{uniqueDescriptions.map((d, i) => <option key={i} value={d} />)}</datalist>
                                            </div>
                                        )}
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-[10px] font-black text-slate-400">R$</span><input type="text" placeholder="0,00" required className="w-full p-4 pl-10 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} /></div>

                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">{type === 'transferencia' ? 'Origem' : 'Conta'}</label>

                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            {type === 'transferencia' ? (
                                                <div className="space-y-1">

                                                </div>
                                            ) : (
                                                <div className="space-y-1">
                                                    <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Categoria</label>

                                            )}
                                            <div className="space-y-1">
                                                <label className="text-[8px] font-black uppercase text-slate-400 ml-2">Status</label>

                                            </div>
                                        </div>

                                        {type === 'saida' && isCreditCardSelected && !editingId && (
                                            <div className="p-4 bg-orange-50 border border-orange-200 rounded-2xl flex items-center justify-between animate-in slide-in-from-top">
                                                <div className="flex items-center gap-3">
                                                    <input type="checkbox" className="w-5 h-5 rounded accent-orange-600" checked={isInstallment} onChange={e => setIsInstallment(e.target.checked)} />
                                                    <span className="text-[10px] font-black uppercase text-orange-800">Parcelar Compra?</span>
                                                </div>
                                                {isInstallment && (
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[10px] font-bold text-orange-400">Em:</span>
                                                        <input type="number" min="2" max="48" className="w-16 p-2 rounded-xl border-0 font-black text-center text-xs" value={installments} onChange={e => setInstallments(parseInt(e.target.value))} />
                                                        <span className="text-[10px] font-bold text-orange-400">x</span>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">{type === 'transferencia' ? 'Data Transf.' : 'Data / Venc.'}</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" value={date} onChange={e => setDate(e.target.value)} /></div>
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Compensação</label><input type="date" className="w-full p-3 bg-slate-50 border rounded-xl text-xs font-bold" value={clearance} onChange={e => setClearance(e.target.value)} /></div>
                                        </div>
                                        <button className="w-full p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg transition-all bg-[#1A202C] text-[#F8CC82] hover:bg-black">{editingId ? 'Salvar Edição' : 'Lançar Movimento'}</button>

                                                            {t.type === 'transferencia' ? <Icon name="repeat" size={16}/> : (t.status === 'pago' ? <Icon name="check" size={16}/> : <Icon name="clock" size={16}/>)}

                                                        <div><p className={`font-black text-sm uppercase leading-tight ${t.status === 'pendente' ? 'text-orange-700' : ''}`}>{t.description}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.date.split('-').reverse().join('/')} • {t.account} {t.destinationAccount && ` → ${t.destinationAccount}`} • {t.category}</p></div>
                                                    </div>
                                                    <div className="flex items-center gap-4"><p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : (t.type === 'transferencia' ? 'text-blue-600' : 'text-slate-800')}`}>{formatMoney(t.amount)}</p><div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => startEdit(t)} className="text-slate-300 hover:text-orange-400"><Icon name="edit-3" size={16}/></button><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="text-slate-300 hover:text-red-500"><Icon name="trash-2" size={16}/></button></div></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                                            <tr>
                                                <th className="p-3 header-black sticky left-0 z-20">Data</th>

                                                <th className="p-3 header-red">Motoboy</th>
                                                <th className="p-3 header-black">Ações</th>
                                            </tr>
                                        </thead>
                                        <tbody className="font-bold divide-y divide-slate-200">
                                            {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b) - new Date(a)).map(d => {
                                                const r = dailyRecords[d] || {};
                                                const totalIn = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f) => acc + (parseFloat(r[f]) || 0), 0);
                                                const update = (f, v) => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: v.replace(',', '.').replace(/[^0-9.]/g, '') }, { merge: true });
                                                return (<tr key={d} className="h-12 hover:bg-slate-50 transition-colors"><td className="p-3 text-left sticky left-0 bg-white font-black text-slate-500 border-r uppercase text-[10px] z-10 w-48 border-l-4 border-l-[#1A202C]">{d.split('-').reverse().join('/')}</td><td className="p-3 bg-yellow-50 border-r text-[#1A202C] font-black text-sm">{formatMoney(totalIn)}</td>{['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].map(f => (<td key={f} className="p-0 cell-green"><input className="table-input" value={r[f] ? r[f].toString().replace('.', ',') : ''} onChange={e => update(f, e.target.value)} placeholder="0,00"/></td>))}<td className="p-0 cell-red"><input className="table-input" value={r.motoboy ? r.motoboy.toString().replace('.', ',') : ''} onChange={e => update('motoboy', e.target.value)} placeholder="0,00"/></td><td className="p-3 cell-white"><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()} className="text-slate-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td></tr>);
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        {activeTab === 'cartoes' && (
                            <div className="space-y-8 animate-in fade-in duration-500 py-6">
                                <h2 className="text-xl font-black uppercase tracking-tighter text-[#1A202C] text-center">Faturas dos Cartões</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {Object.entries(creditCardStats).length === 0 ? (<div className="col-span-full py-20 text-center glass-card rounded-[3rem]"><Icon name="credit-card" size={48} className="text-slate-200 mb-4" /><p className="text-slate-400 font-bold uppercase text-xs tracking-widest">Nenhum cartão cadastrado.</p></div>) : Object.entries(creditCardStats).map(([name, data]) => (
                                        <div key={name} className="glass-card p-8 rounded-[3rem] shadow-lg border-t-8 border-[#1A202C]">
                                            <div className="flex justify-between items-start mb-6"><div><h3 className="font-black uppercase text-lg leading-tight">{name}</h3><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Status: Aberta</p></div><Icon name="credit-card" className="text-slate-300" /></div>
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-end"><span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Fatura Atual (Até {data.closingDay})</span><span className="text-xl font-black text-[#1A202C]">{formatMoney(data.openInvoice)}</span></div>
                                                <div className="flex justify-between items-end"><span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Lançamentos Futuros</span><span className="text-sm font-black text-slate-400">{formatMoney(data.nextInvoice)}</span></div>
                                            </div>
                                            <div className="mt-8 grid grid-cols-2 gap-4 border-t pt-6">
                                                <div className="bg-slate-50 p-3 rounded-2xl text-center"><p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Fechamento</p><p className="font-black text-sm text-[#D97757]">Dia {data.closingDay}</p></div>
                                                <div className="bg-slate-50 p-3 rounded-2xl text-center"><p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Vencimento</p><p className="font-black text-sm text-red-500">Dia {data.dueDay}</p></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-10 animate-in zoom-in duration-500 py-10">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                    <div className="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-green-500"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Lucro Líquido</p><h3 className={`text-3xl font-black ${stats.lucro >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-orange-500"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Pendentes Total</p><h3 className="text-3xl font-black text-orange-600">{formatMoney(stats.pendingTotal)}</h3></div>
                                    <div className="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-[#1A202C]"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">CMV Total</p><h3 className="text-3xl font-black text-[#1A202C]">{formatMoney(stats.cmv)}</h3></div>
                                    <div className="glass-card p-8 rounded-[2.5rem] shadow-xl border-b-8 border-purple-500"><p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Receita Bruta</p><h3 className="text-3xl font-black text-[#1A202C]">{formatMoney(stats.rb)}</h3></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto py-10 animate-in fade-in duration-500">
                                <div className="glass-card rounded-[3rem] shadow-2xl bg-white p-10 border-t-8 border-[#D97757]">
                                    <h2 className="text-xl font-black uppercase tracking-tighter mb-8 border-b pb-4">Demonstração de Resultados (Mês Selecionado)</h2>
                                    <div className="space-y-4">
                                        <div className="flex justify-between p-4 bg-green-50 rounded-2xl"><span className="text-[10px] font-black uppercase text-green-800">(+) RECEITA BRUTA</span><span className="font-black text-green-700">{formatMoney(stats.rb)}</span></div>
                                        <div className="flex justify-between p-4 bg-red-50 rounded-2xl"><span className="text-[10px] font-black uppercase text-red-800">(-) CUSTOS LOGÍSTICOS (ENTREGA)</span><span className="font-black text-red-700">{formatMoney(stats.variableCostsPlanilha)}</span></div>
                                        <div className="py-4 border-b">
                                            {categories.map(c => {
                                                const val = stats.costsByCategory[c.name] || 0;
                                                return val > 0 ? (<div key={c.id} className="flex justify-between px-4 py-2 hover:bg-slate-50"><span className="text-[10px] font-bold text-slate-600 uppercase">(-) {c.name}</span><span className="text-sm font-black text-red-400">{formatMoney(val)}</span></div>) : null;
                                            })}
                                        </div>
                                        <div className={`flex justify-between p-8 rounded-[2.5rem] mt-6 shadow-xl ${stats.lucro >= 0 ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-red-600 text-white'}`}><h3 className="text-xl font-black uppercase tracking-widest">LUCRO/PREJUÍZO (CAIXA)</h3><span className="text-4xl font-black">{formatMoney(stats.lucro)}</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'fornecedores' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="truck" className="text-[#D97757]"/> Registar Fornecedor</h2>
                                    <div className="space-y-4">
                                        <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nome da Empresa" value={newItemName} onChange={e => setNewItemName(e.target.value)} />
                                        <input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Contacto" value={newSupplierContact} onChange={e => setNewSupplierContact(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={newSupplierCat} onChange={e => setNewSupplierCat(e.target.value)}>
                                            <option value="">Tipo de Insumo</option>
                                            <option value="Proteínas">Proteínas</option>
                                            <option value="Hortifruti">Hortifruti</option>
                                            <option value="Bebidas">Bebidas</option>
                                            <option value="Embalagens">Embalagens</option>
                                            <option value="Outros">Outros</option>
                                        </select>
                                        <button onClick={() => addItem('suppliers')} className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Adicionar Fornecedor</button>
                                    </div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg flex flex-col max-h-[600px]">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6"><Icon name="users" className="text-[#D97757] inline mr-2"/> Meus Fornecedores</h2>
                                    <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                                        {suppliers.map(s => (
                                            <div key={s.id} className="p-4 bg-white border rounded-2xl flex justify-between items-center group">
                                                <div><p className="text-xs font-black uppercase text-[#1A202C]">{s.name}</p><p className="text-[9px] font-bold text-slate-400 uppercase">{s.category || 'Geral'} • {s.contact || 'Sem contacto'}</p></div>
                                                <button onClick={() => removeItem('suppliers', s.id)} className="text-red-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'consultoria' && (
                            <div className="max-w-3xl mx-auto py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card rounded-[3rem] shadow-2xl bg-white p-10 border-t-8 border-[#F8CC82]">
                                    <div className="flex items-center gap-4 mb-8"><div className="bg-[#1A202C] p-4 rounded-3xl"><Icon name="sparkles" className="text-[#F8CC82]" size={32}/></div><div><h2 className="text-2xl font-black uppercase tracking-tighter text-[#1A202C]">Consultor IA</h2><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Análise do mês de {filterMonth}</p></div></div>
                                    {!aiResponse && !aiLoading && (<div className="text-center py-12"><button onClick={askAiConsultant} className="bg-[#1A202C] text-[#F8CC82] px-10 py-5 rounded-[2rem] font-black uppercase tracking-widest text-xs shadow-xl">Analisar Meu Fluxo Agora</button></div>)}
                                    {aiLoading && <div className="text-center py-20 animate-pulse text-[10px] font-black uppercase text-slate-400 tracking-widest">Estou a calcular o teu lucro e a verificar as pendências...</div>}
                                    {aiResponse && (<div className="prose-ia bg-slate-50 p-8 rounded-[2rem] border" dangerouslySetInnerHTML={{ __html: aiResponse.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/### (.*?)\n/g, '<h3>$1</h3>').replace(/(\r\n|\n|\r)/gm, '<br>') }} />)}
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 py-10 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg h-fit">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="landmark" className="text-[#D97757]"/> Gestão de Contas</h2>
                                    
                                    <div className="space-y-4 mb-8 p-6 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 mb-2">{editingAccount ? `A editar: ${editingAccount.name}` : 'Nova Conta'}</h3>
                                        {!editingAccount && (
                                            <>
                                                <input type="text" className="w-full p-4 bg-white border rounded-2xl text-xs font-bold outline-none" placeholder="Nome da Conta ou Cartão" value={newItemName} onChange={e => setNewItemName(e.target.value)} />
                                                <div className="flex gap-2">
                                                    <button onClick={() => setNewItemType('corrente')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${newItemType === 'corrente' ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-white border text-slate-400'}`}>Corrente</button>
                                                    <button onClick={() => setNewItemType('cartao')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${newItemType === 'cartao' ? 'bg-orange-500 text-white shadow-lg' : 'bg-white border text-slate-400'}`}>Cartão</button>
                                                </div>
                                            </>
                                        )}
                                        
                                        {(newItemType === 'cartao' || editingAccount?.type === 'cartao') && (
                                            <div className="grid grid-cols-2 gap-3 animate-in zoom-in">
                                                <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Dia Fechamento</label><input type="number" min="1" max="31" className="w-full p-3 bg-white border rounded-xl text-xs font-bold" value={newItemClosingDay} onChange={e => setNewItemClosingDay(e.target.value)} /></div>
                                                <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Dia Vencimento</label><input type="number" min="1" max="31" className="w-full p-3 bg-white border rounded-xl text-xs font-bold" value={newItemDueDay} onChange={e => setNewItemDueDay(e.target.value)} /></div>
                                            </div>
                                        )}

                                        <div className="flex gap-2 pt-2">
                                            {editingAccount ? (
                                                <>
                                                    <button onClick={updateAccountData} className="flex-1 bg-green-600 text-white p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Salvar</button>
                                                    <button onClick={() => { setEditingAccount(null); setNewItemClosingDay(''); setNewItemDueDay(''); }} className="bg-slate-200 text-slate-600 p-4 rounded-2xl font-black uppercase text-[10px]">X</button>
                                                </>
                                            ) : (
                                                <button onClick={() => addItem('accounts')} className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] flex items-center justify-center gap-2">Adicionar</button>
                                            )}
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        {accounts.map(a => (
                                            <div key={a.id} className={`flex justify-between items-center p-4 bg-white border rounded-2xl group ${editingAccount?.id === a.id ? 'ring-2 ring-orange-400' : ''}`}>
                                                <div className="flex items-center gap-3">
                                                    <Icon name={a.type === 'cartao' ? 'credit-card' : 'landmark'} size={14} className={a.type === 'cartao' ? 'text-orange-500' : 'text-slate-400'} />
                                                    <div><span className="text-xs font-black uppercase">{a.name}</span>{a.type === 'cartao' && <p className="text-[8px] font-bold text-slate-400 uppercase">F: {a.closingDay} | V: {a.dueDay}</p>}</div>
                                                </div>
                                                <div className="flex gap-3">
                                                    {a.type === 'cartao' && <button onClick={() => startEditAccount(a)} className="text-slate-300 hover:text-orange-500"><Icon name="edit-3" size={14} /></button>}
                                                    <button onClick={() => removeItem('accounts', a.id)} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={14} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-card p-8 rounded-[3rem] shadow-lg h-fit">
                                    <h2 className="text-sm font-black uppercase text-[#1A202C] mb-6 flex items-center gap-2"><Icon name="list" className="text-[#D97757]"/> Categorias</h2>
                                    <div className="flex gap-2 mb-6"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nova Categoria" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={() => addItem('categories')} className="bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl"><Icon name="plus" /></button></div>
                                    <div className="space-y-2">{categories.map(c => (<div key={c.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl"><span className="text-xs font-bold uppercase">{c.name}</span><button onClick={() => removeItem('categories', c.id)} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={14} /></button></div>))}</div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-12 text-center flex flex-col items-center gap-4 border-t border-slate-100 mt-10">
                        <img src="logo.png" className="h-10 opacity-30 grayscale" />
                        <p className="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Tribo Burger • Gestão Estratégica v7.0</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
