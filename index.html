<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão v13.3.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs (Versão Compat para máxima estabilidade no preview) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; }
    </style>
</head>
<body class="antialiased">
    <div id="root">
        <div class="min-h-screen flex items-center justify-center bg-[#1A202C] text-white">
            <div class="text-center">
                <div class="w-16 h-16 border-4 border-[#F8CC82] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-black uppercase tracking-widest text-sm">A carregar Tribo Management...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        // Componente de Ícone Lucide Reutilizável
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Dados Firestore
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [settings, setSettings] = useState({ salesTarget: 0 });
            
            // Filtros
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [typeFilter, setTypeFilter] = useState('todos'); // Filtro Entradas/Saídas

            // Form States
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });

                const unsubAcc = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubSet = db.doc(`${path}/settings`).onSnapshot(docSnap => {
                    if (docSnap.exists()) setSettings(docSnap.data());
                });

                return () => { unsubTx(); unsubDaily(); unsubAcc(); unsubSet(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
                let rb = 0; 
                let activeDays = 0;

                // Cálculo de Vendas (Planilha)
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const dayTotal = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + p(r[f]), 0);
                        if (dayTotal > 0) activeDays++;
                        rb += dayTotal;
                    }
                });

                return { 
                    rb, 
                    activeDays, 
                    average: activeDays > 0 ? rb / activeDays : 0 
                };
            }, [dailyRecords, filterMonth]);

            const totalSaldos = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                const balances = {};
                accounts.forEach(a => balances[a.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + p(t.amount);
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - p(t.amount);
                    }
                });
                return Object.values(balances).reduce((a, b) => a + b, 0);
            }, [transactions, accounts]);

            if (loading) return null; // Já temos o loader inicial no HTML

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4 fade-in">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Finanças</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase mt-2">Acesso Restrito v13.3.0</p>
                        </div>
                        <form onSubmit={e => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message)); }} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-20 fade-in">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-1 rounded-full"><h1 className="text-lg font-black text-[#1A202C] px-2">T</h1></div>
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'planilha', 'resultados', 'cartoes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black text-red-400 uppercase">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full space-y-6">
                        {/* Filtro Global de Mês */}
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full border shadow-sm flex items-center gap-2">
                                <Icon name="calendar" size={14} className="text-slate-400" />
                                <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm" />
                            </div>
                        </div>

                        {/* ABA: LANÇAMENTOS (DASHBOARD) */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="glass-card rounded-[2.5rem] shadow-sm flex flex-col border overflow-hidden h-[600px]">
                                    <div className="p-5 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="font-black text-[10px] uppercase text-slate-400">Histórico de Lançamentos</span>
                                        {/* NOVO FILTRO ENTRADA/SAÍDA */}
                                        <div className="flex gap-2">
                                            {['todos', 'entrada', 'saida'].map(f => (
                                                <button key={f} onClick={() => setTypeFilter(f)} className={`px-3 py-1 rounded-lg text-[9px] font-black uppercase transition-all ${typeFilter === f ? 'bg-black text-[#F8CC82]' : 'bg-white border text-slate-400'}`}>
                                                    {f}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {transactions
                                            .filter(t => (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth)) && (typeFilter === 'todos' || t.type === typeFilter))
                                            .sort((a,b) => (b.timestamp || "").localeCompare(a.timestamp || ""))
                                            .map(t => (
                                                <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-[10px] font-black text-slate-400 w-10 text-center">{t.date?.split('-').reverse().slice(0,2).join('/')}</span>
                                                        <div>
                                                            <p className="font-black text-sm uppercase leading-none">{t.description}</p>
                                                            <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.account}</p>
                                                        </div>
                                                    </div>
                                                    <p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(t.amount)}</p>
                                                </div>
                                            ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ABA: SALDOS (SOMA TOTAL) */}
                        {activeTab === 'saldos' && (
                            <div className="space-y-8 animate-in fade-in">
                                <div className="bg-[#D97757] p-12 rounded-[3rem] border-b-8 border-black text-center text-white shadow-xl">
                                    <p className="text-[11px] font-black uppercase tracking-[0.4em] opacity-80 mb-2">Património Líquido Total</p>
                                    <h3 className="text-5xl font-black">{formatMoney(totalSaldos)}</h3>
                                    <p className="text-[9px] font-bold uppercase mt-4 opacity-60 tracking-widest">Soma de todas as contas e fundos</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {accounts.map(acc => {
                                        const p = (v) => parseFloat(v) || 0;
                                        const bal = transactions.filter(t => t.account === acc.name && t.status === 'pago').reduce((a, t) => t.type === 'entrada' ? a + p(t.amount) : a - p(t.amount), 0);
                                        return (
                                            <div key={acc.id} className="glass-card p-8 rounded-[3rem] border-t-8 border-[#1A202C] text-center transition-transform hover:scale-105">
                                                <p className="text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">{acc.name}</p>
                                                <h4 className={`text-2xl font-black ${bal >= 0 ? 'text-slate-800' : 'text-red-500'}`}>{formatMoney(bal)}</h4>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* ABA: RESULTADOS (META E INDICADORES) */}
                        {activeTab === 'resultados' && (
                            <div className="space-y-8 fade-in">
                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                    {/* CARD META */}
                                    <div className="lg:col-span-2 glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-[#D97757] flex flex-col justify-between h-[300px]">
                                        <div className="flex justify-between items-center mb-6">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Definir Meta do Mês</p>
                                            <div className="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-xl border">
                                                <span className="text-[10px] font-black text-slate-400">R$</span>
                                                <input type="number" className="bg-transparent border-0 outline-none font-black text-sm w-24" placeholder="0" 
                                                    value={settings.salesTarget || ''} 
                                                    onChange={e => {
                                                        const val = parseFloat(e.target.value) || 0;
                                                        db.doc(`artifacts/${appId}/users/${user.uid}/settings`).set({ salesTarget: val }, { merge: true });
                                                    }} />
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-end">
                                                <h3 className="text-4xl font-black text-[#1A202C] leading-none">{formatMoney(stats.rb)}</h3>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Faturado Atual</p>
                                            </div>
                                            <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden border">
                                                <div className="h-full bg-[#D97757] transition-all duration-500" style={{ width: `${Math.min(100, (stats.rb / (settings.salesTarget || 1)) * 100)}%` }}></div>
                                            </div>
                                            <p className="text-[9px] font-black uppercase text-center text-[#D97757] tracking-widest">
                                                {((stats.rb / (settings.salesTarget || 1)) * 100).toFixed(1)}% da Meta Alcançada
                                            </p>
                                        </div>
                                    </div>

                                    {/* CARD DIAS ATIVOS */}
                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-blue-500 text-center flex flex-col justify-center items-center gap-2 h-[300px]">
                                        <div className="bg-blue-50 p-3 rounded-full text-blue-500 mb-2"><Icon name="calendar-check" size={24} /></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase">Dias Ativos</p>
                                        <h3 className="text-4xl font-black text-blue-600 leading-none">{stats.activeDays}</h3>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-2">(Dias faturados na planilha)</p>
                                    </div>

                                    {/* CARD MÉDIA DIÁRIA */}
                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-green-500 text-center flex flex-col justify-center items-center gap-2 h-[300px]">
                                        <div className="bg-green-50 p-3 rounded-full text-green-500 mb-2"><Icon name="trending-up" size={24} /></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase">Média Diária</p>
                                        <h3 className="text-3xl font-black text-green-600 leading-none">{formatMoney(stats.average)}</h3>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-2">(Faturado / Dias Ativos)</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ABA: CARTÕES (CORES DINÂMICAS) */}
                        {activeTab === 'cartoes' && (
                            <div className="space-y-6">
                                {accounts.filter(a => a.type === 'cartao').map(card => {
                                    const cardTxs = transactions.filter(t => t.account === card.name && (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth)));
                                    const cardTotal = cardTxs.reduce((acc, t) => t.type === 'saida' ? acc + parseFloat(t.amount || 0) : acc - parseFloat(t.amount || 0), 0);
                                    
                                    return (
                                        <div key={card.id} className="glass-card p-8 rounded-[3rem] border-t-8 border-black">
                                            <div className="flex justify-between items-center border-b pb-6 mb-6">
                                                <div><h3 className="text-xl font-black uppercase">{card.name}</h3><p className="text-[9px] font-bold text-slate-400 uppercase">Fatura de {filterMonth}</p></div>
                                                <div className="text-right">
                                                    <p className="text-[9px] font-black text-slate-400 uppercase">Total na Fatura</p>
                                                    <h4 className="text-2xl font-black text-orange-600">{formatMoney(cardTotal)}</h4>
                                                </div>
                                            </div>
                                            <div className="space-y-2">
                                                {cardTxs.map(t => (
                                                    <div key={t.id} className="flex justify-between items-center p-3 bg-white/50 rounded-2xl border">
                                                        <div className="flex items-center gap-3">
                                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                                <Icon name={t.type === 'entrada' ? 'check-circle' : 'shopping-cart'} size={14} />
                                                            </div>
                                                            <div>
                                                                <p className="font-black text-xs uppercase">{t.description}</p>
                                                                <p className="text-[8px] text-slate-400 font-bold uppercase">{t.date?.split('-').reverse().join('/')}</p>
                                                            </div>
                                                        </div>
                                                        <p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>
                                                            {formatMoney(t.amount)}
                                                        </p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ABA: PLANILHA (VENDAS) */}
                        {activeTab === 'planilha' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-white p-4 rounded-3xl border shadow-sm">
                                    <div className="flex items-center gap-2 font-black uppercase text-[10px] text-slate-500"><Icon name="table" /><span>Vendas Diárias</span></div>
                                    <button onClick={() => {
                                        const d = new Date().toISOString().split('T')[0];
                                        db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ initialized: true }, { merge: true });
                                    }} className="bg-black text-[#F8CC82] px-6 py-2 rounded-xl text-[9px] font-black uppercase">Abrir Hoje</button>
                                </div>
                                <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                    <table className="w-full text-center text-[11px] min-w-[1000px]">
                                        <thead>
                                            <tr className="bg-black text-white uppercase font-black text-[9px]">
                                                <th className="p-4">Data</th>
                                                <th className="p-4 bg-yellow-500 text-black">Total Dia</th>
                                                {['Pix', 'Dinheiro', 'Ifood', 'Débito', 'Crédito'].map(h => <th key={h} className="p-4">{h}</th>)}
                                                <th className="p-4 text-red-400">Motoboy</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y font-bold">
                                            {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b)-new Date(a)).map(d => {
                                                const r = dailyRecords[d];
                                                const p = (v) => parseFloat(v) || 0;
                                                const dayTotal = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + p(r[f]), 0);
                                                return (
                                                    <tr key={d} className="hover:bg-slate-50 h-12">
                                                        <td className="p-4 font-black">{d.split('-').reverse().join('/')}</td>
                                                        <td className="p-4 bg-yellow-50 font-black">{formatMoney(dayTotal)}</td>
                                                        {['pix', 'dinheiro', 'ifood', 'debito', 'credito', 'motoboy'].map(f => (
                                                            <td key={f} className="p-0 border-r">
                                                                <input className="table-input" value={r[f] || ''} onChange={async(e) => {
                                                                    await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: e.target.value.replace(',', '.') }, { merge: true });
                                                                }} placeholder="0,00" />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v13.3.0</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
