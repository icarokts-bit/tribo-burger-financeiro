<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Baseline v15.2.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [salesGoal, setSalesGoal] = useState(0);
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [dashboardFilterAccount, setDashboardFilterAccount] = useState('');
            const [dashboardFilterCategory, setDashboardFilterCategory] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');

            /* Estados de Formulários */
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            const [accName, setAccName] = useState('');
            const [accType, setAccType] = useState('corrente');
            const [accGroup, setAccGroup] = useState('operacional'); 
            const [accHighlight, setAccHighlight] = useState(false);
            const [accPosition, setAccPosition] = useState(1);
            const [accClosing, setAccClosing] = useState('25');
            const [accDue, setAccDue] = useState('10');
            const [editingAccId, setEditingAccId] = useState(null);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubGoal = db.doc(`${path}/settings/config`).onSnapshot(doc => {
                    if (doc.exists) setSalesGoal(doc.data().salesGoal || 0);
                });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubGoal(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
            const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;

            const uniqueDescriptions = useMemo(() => {
                const seen = new Set();
                return transactions.map(t => t.description).filter(d => {
                    if (!d || seen.has(d.trim().toLowerCase())) return false;
                    seen.add(d.trim().toLowerCase());
                    return true;
                }).sort();
            }, [transactions]);

            const accountBalances = useMemo(() => {
                const balances = {}; 
                accounts.forEach(acc => balances[acc.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + amt;
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { 
                            balances[t.account] -= amt; balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + amt; 
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const totalGeneralBalance = useMemo(() => {
                return accounts.filter(acc => acc.type === 'corrente')
                    .reduce((acc, curr) => acc + (accountBalances[curr.name] || 0), 0);
            }, [accounts, accountBalances]);

            const groupedAccounts = useMemo(() => {
                const items = accounts.filter(acc => acc.type === 'corrente');
                return {
                    highlighted: items.filter(acc => acc.highlight).sort((a,b) => p(a.position) - p(b.position)),
                    others: items.filter(acc => !acc.highlight).sort((a,b) => p(a.position) - p(b.position))
                };
            }, [accounts]);

            const stats = useMemo(() => {
                let rb = 0; let diasComVenda = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const totalDia = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + p(r[f]), 0);
                        if (totalDia > 0) { rb += totalDia; diasComVenda++; }
                    }
                });
                return { rb, diasComVenda, mediaDiaria: diasComVenda > 0 ? rb / diasComVenda : 0 };
            }, [dailyRecords, filterMonth]);

            const pendingPaymentsConsolidated = useMemo(() => {
                const normalPendings = transactions.filter(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    return t.type === 'saida' && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth) && accInfo?.type !== 'cartao';
                });
                
                const cardInvoices = accounts.filter(a => a.type === 'cartao').map(card => {
                    const cardTxs = transactions.filter(t => t.account === card.name && t.clearanceDate?.startsWith(filterMonth));
                    const total = cardTxs.reduce((acc, t) => t.type === 'saida' ? acc + p(t.amount) : acc - p(t.amount), 0);
                    if (total <= 0.01) return null;
                    return { id: `inv-${card.name}`, description: `Fatura: ${card.name}`, amount: total, clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`, account: card.name, isInvoice: true };
                }).filter(Boolean);
                
                return [...normalPendings, ...cardInvoices].sort((a,b) => a.clearanceDate.localeCompare(b.clearanceDate));
            }, [transactions, filterMonth, accounts]);

            const filteredHistory = useMemo(() => {
                return transactions.filter(t => {
                    const isDateMatch = (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth));
                    const isAccountMatch = dashboardFilterAccount === '' || t.account === dashboardFilterAccount;
                    const isCategoryMatch = dashboardFilterCategory === '' || t.category === dashboardFilterCategory;
                    const isTypeMatch = typeFilter === 'todos' || t.type === typeFilter;
                    return isDateMatch && isAccountMatch && isCategoryMatch && isTypeMatch;
                }).sort((a,b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
            }, [transactions, filterMonth, dashboardFilterAccount, dashboardFilterCategory, typeFilter]);

            const saveTransaction = async (e) => {
                e.preventDefault();
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const totalVal = p(val);
                const cardInfo = accounts.find(a => a.name === account && a.type === 'cartao');
                const numP = cardInfo ? installments : 1;
                
                for(let i=0; i<numP; i++) {
                    const dObj = new Date(date + 'T12:00:00'); dObj.setMonth(dObj.getMonth() + i);
                    let finalDate = dObj.toISOString().split('T')[0];
                    let finalClearance = clearance;
                    let billingMonth = finalDate.slice(0, 7);

                    if(cardInfo) {
                        const closingDay = parseInt(cardInfo.closingDay) || 25;
                        const dueDay = parseInt(cardInfo.dueDay) || 10;
                        if (dObj.getDate() > closingDay) { dObj.setMonth(dObj.getMonth() + 1); }
                        billingMonth = dObj.toISOString().slice(0, 7);
                        dObj.setDate(dueDay);
                        finalClearance = dObj.toISOString().split('T')[0];
                    }

                    const payload = {
                        description: numP > 1 ? `${desc} (${i+1}/${numP})` : desc,
                        amount: totalVal / numP, type, status, 
                        date: finalDate, clearanceDate: finalClearance, billingMonth,
                        account, category: cat || 'Geral', destinationAccount: destAccount,
                        timestamp: new Date().toISOString()
                    };
                    await db.collection(path).add(payload);
                }
                setDesc(''); setVal('');
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82]">Tribo v15...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter text-center mb-10">Tribo Login</h2>
                        <form onSubmit={e => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message)); }} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in relative pb-20">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <Icon name="utensils" size={24} className="text-[#F8CC82]" />
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Business</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'vendas', 'a_pagar', 'a_receber', 'cartoes', 'resultados', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {tab === 'vendas' ? 'Vendas' : tab.replace('_', ' ')}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black text-red-400 uppercase">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full border shadow-sm">
                                <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent font-black text-[#D97757] text-sm outline-none" />
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm border-t-4 border-black h-fit">
                                    <h2 className="text-xs font-black uppercase border-b pb-3 mb-4">Novo Registro</h2>
                                    <form onSubmit={saveTransaction} className="space-y-4">
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                            {['entrada', 'saida', 'transferencia'].map(t => (<button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t}</button>))}
                                        </div>
                                        <input list="desc-suggest" type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm" value={desc} onChange={e => setDesc(e.target.value)} />
                                        <datalist id="desc-suggest">{uniqueDescriptions.map(d => <option key={d} value={d} />)}</datalist>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="text" placeholder="Valor" required className="p-4 bg-slate-50 border rounded-2xl font-black" value={val} onChange={e => setVal(e.target.value)} />
                                            <select className="p-4 bg-white border rounded-2xl text-[10px] font-black uppercase" value={account} onChange={e => setAccount(e.target.value)}>
                                                {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                            </select>
                                        </div>
                                        {accounts.find(a => a.name === account)?.type === 'cartao' && (
                                            <input type="number" placeholder="Parcelas" className="w-full p-4 border rounded-2xl text-xs" value={installments} onChange={e => setInstallments(e.target.value)} />
                                        )}
                                        <select className="w-full p-4 bg-white border rounded-2xl text-[10px] font-black uppercase" value={cat} onChange={e => setCat(e.target.value)}>
                                            <option value="">Categoria...</option>
                                            {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                        </select>
                                        {type === 'transferencia' && <select className="w-full p-4 bg-white border rounded-2xl text-[10px] font-black uppercase" value={destAccount} onChange={e => setDestAccount(e.target.value)}><option value="">Destino...</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>}
                                        <button className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px]">Gravar Lançamento</button>
                                    </form>
                                </div>

                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm flex flex-col border h-[600px] overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="text-[10px] font-black uppercase text-slate-400">Histórico de Fluxo</span>
                                        <div className="flex gap-2">
                                            <select className="text-[8px] p-2 border rounded-lg" value={typeFilter} onChange={e => setTypeFilter(e.target.value)}><option value="todos">Todos</option><option value="entrada">Entradas</option><option value="saida">Saídas</option></select>
                                            <select className="text-[8px] p-2 border rounded-lg" value={dashboardFilterAccount} onChange={e => setDashboardFilterAccount(e.target.value)}><option value="">Banco...</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                            <select className="text-[8px] p-2 border rounded-lg" value={dashboardFilterCategory} onChange={e => setDashboardFilterCategory(e.target.value)}><option value="">Categoria...</option>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {filteredHistory.map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center group hover:bg-slate-50">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-[9px] font-black text-slate-400">{t.date?.split('-').reverse().slice(0, 2).join('/')}</span>
                                                    <div><p className="font-black text-sm uppercase">{t.description}</p><p className="text-[9px] font-bold text-slate-300 uppercase">{t.account} • {t.category}</p></div>
                                                </div>
                                                <div className="flex items-center gap-4"><p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(t.amount)}</p><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="text-red-200 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={14}/></button></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'saldos' && (
                            <div className="space-y-8">
                                <div className="stat-banner !bg-[#D97757]">
                                    <p className="text-[11px] font-black uppercase mb-2">Liquidez Total Consolidada</p>
                                    <h3 className="text-5xl font-black text-white">{formatMoney(totalGeneralBalance)}</h3>
                                </div>
                                <div className="space-y-4">
                                    <h2 className="text-xs font-black uppercase border-l-4 border-black pl-3 ml-2">Contas em Destaque</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {groupedAccounts.highlighted.map(acc => (
                                            <div key={acc.id} className="glass-card p-8 rounded-[3rem] border-t-8 border-black text-center shadow-xl">
                                                <p className="text-xs font-black text-slate-400 uppercase mb-1">{acc.name}</p>
                                                <h3 className="text-2xl font-black">{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                            </div>
                                        ))}
                                    </div>
                                    <h2 className="text-xs font-black uppercase border-l-4 border-slate-300 pl-3 ml-2">Outras Contas</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {groupedAccounts.others.map(acc => (
                                            <div key={acc.id} className="glass-card p-6 rounded-[2.5rem] border border-slate-100 text-center shadow-sm">
                                                <p className="text-[10px] font-black text-slate-400 uppercase mb-1">{acc.name}</p>
                                                <h3 className="text-xl font-black">{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'vendas' && (
                            <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                <table className="w-full text-center text-[11px] min-w-[1200px]">
                                    <thead>
                                        <tr className="bg-black text-white font-black uppercase">
                                            <th className="p-4 sticky left-0 z-20 bg-black">Data</th>
                                            <th className="p-4 bg-yellow-500 text-black">Total Dia</th>
                                            {['Pix','Dinheiro','Ifood','Débito','Crédito'].map(h => <th key={h} className="p-4">{h}</th>)}
                                            <th className="p-4 text-orange-400">Taxa Entrega</th>
                                            <th className="p-4 text-red-400">Motoboy</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y font-bold">
                                        {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b)-new Date(a)).map(d => {
                                            const r = dailyRecords[d];
                                            const total = ['pix','dinheiro','ifood','debito','credito'].reduce((acc,f) => acc + p(r[f]), 0);
                                            return (
                                                <tr key={d} className="h-12 hover:bg-slate-50">
                                                    <td className="p-0 border-r sticky left-0 bg-white font-black">{d.split('-').reverse().join('/')}</td>
                                                    <td className="p-4 bg-yellow-50">{formatMoney(total)}</td>
                                                    {['pix','dinheiro','ifood','debito','credito','taxaEntrega','motoboy'].map(f => (
                                                        <td key={f} className="p-0 border-r">
                                                            <input className="table-input" value={r[f] || ''} onChange={async(e) => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: e.target.value.replace(',', '.') }, { merge: true }); }} placeholder="0,00" />
                                                        </td>
                                                    ))}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'a_pagar' && (
                             <div className="glass-card rounded-[2.5rem] divide-y overflow-hidden border">
                                {pendingPaymentsConsolidated.length === 0 ? <p className="p-20 text-center font-black text-slate-300 uppercase">Sem contas para este período</p> : 
                                    pendingPaymentsConsolidated.map(t => (
                                    <div key={t.id} className="p-6 flex justify-between items-center hover:bg-slate-50">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-2xl bg-red-100 text-red-700 flex items-center justify-center"><Icon name={t.isInvoice ? "credit-card" : "calendar"} size={24} /></div>
                                            <div><p className="font-black uppercase">[{t.clearanceDate.split('-').reverse().join('/')}] {t.description}</p><p className="text-[10px] font-bold text-slate-400 uppercase">{t.account}</p></div>
                                        </div>
                                        <div className="flex items-center gap-6"><p className="font-black text-lg text-red-700">{formatMoney(t.amount)}</p><button onClick={() => !t.isInvoice && db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({status:'pago'})} className="p-2 text-green-500"><Icon name="check-circle" size={20}/></button></div>
                                    </div>
                                ))}
                             </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="glass-card p-10 rounded-[3rem] shadow-xl text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Meta de Vendas</p>
                                    <input type="number" className="text-3xl font-black text-center bg-transparent border-b-2 mb-4 w-full" value={salesGoal} onChange={async(e) => { setSalesGoal(e.target.value); await db.doc(`artifacts/${appId}/users/${user.uid}/settings/config`).set({ salesGoal: p(e.target.value) }, { merge: true }); }} />
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div className="bg-green-500 h-full" style={{ width: `${Math.min(100, (stats.rb / (salesGoal || 1)) * 100)}%` }}></div>
                                    </div>
                                </div>
                                <div className="glass-card p-10 rounded-[3rem] shadow-xl text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Total Faturado</p>
                                    <h3 className="text-4xl font-black text-green-600">{formatMoney(stats.rb)}</h3>
                                    <p className="text-[9px] font-black text-slate-300 mt-2">{stats.diasComVenda} dias com venda</p>
                                </div>
                                <div className="glass-card p-10 rounded-[3rem] shadow-xl text-center">
                                    <p className="text-[10px] font-black text-slate-400 uppercase mb-4">Média Diária</p>
                                    <h3 className="text-4xl font-black text-blue-600">{formatMoney(stats.mediaDiaria)}</h3>
                                    <p className="text-[9px] font-black text-slate-300 mt-2">Ticket Médio por Dia</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'cartoes' && (
                            <div className="space-y-8">
                                {accounts.filter(a => a.type === 'cartao').map(card => {
                                    const cardTxs = transactions.filter(t => t.account === card.name && t.billingMonth === filterMonth).sort((a,b) => a.date.localeCompare(b.date));
                                    const cardTotal = cardTxs.reduce((acc, t) => t.type === 'saida' ? acc + p(t.amount) : acc - p(t.amount), 0);
                                    return (
                                        <div key={card.id} className="glass-card p-8 rounded-[3rem] shadow-lg border-t-8 border-black">
                                            <div className="flex justify-between items-center border-b pb-6 mb-6">
                                                <div><h2 className="text-xl font-black uppercase">{card.name}</h2><p className="text-[10px] text-slate-400 uppercase">Fecha dia {card.closingDay} • Vence dia {card.dueDay}</p></div>
                                                <div className="text-right"><p className="text-[10px] font-black text-slate-400 uppercase">Fatura Atual</p><h3 className="text-3xl font-black text-orange-500">{formatMoney(cardTotal)}</h3></div>
                                            </div>
                                            <div className="divide-y">
                                                {cardTxs.map(t => (
                                                    <div key={t.id} className="py-3 flex justify-between items-center group">
                                                        <div className="flex items-center gap-4">
                                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${t.type==='entrada'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}>
                                                                <Icon name={t.type==='entrada'?'check-circle':'shopping-cart'} size={14}/>
                                                            </div>
                                                            <div><p className="font-black text-xs uppercase leading-none">{t.description}</p><p className="text-[9px] text-slate-400 uppercase font-bold mt-1">{t.date?.split('-').reverse().join('/')}</p></div>
                                                        </div>
                                                        <p className={`font-black text-sm ${t.type==='entrada'?'text-green-600':'text-red-600'}`}>{formatMoney(t.amount)}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="glass-card p-8 rounded-[3rem] border shadow-sm h-fit">
                                    <h2 className="text-sm font-black uppercase mb-6">Gerir Contas</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Nome" className="w-full p-4 border rounded-2xl text-xs" value={accName} onChange={e => setAccName(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={() => setAccType('corrente')} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accType==='corrente'?'bg-black text-white':'bg-slate-100'}`}>CORRENTE</button>
                                            <button onClick={() => setAccType('cartao')} className={`flex-1 p-3 rounded-xl text-[9px] font-black ${accType==='cartao'?'bg-orange-500 text-white':'bg-slate-100'}`}>CARTÃO</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <input type="number" placeholder="Posição" className="p-4 border rounded-2xl text-xs" value={accPosition} onChange={e => setAccPosition(e.target.value)} />
                                            <button onClick={() => setAccHighlight(!accHighlight)} className={`p-4 border rounded-2xl text-[9px] font-black uppercase ${accHighlight?'bg-yellow-400':'bg-white'}`}>Destaque</button>
                                        </div>
                                        {accType === 'cartao' && (
                                            <div className="grid grid-cols-2 gap-2">
                                                <input type="number" placeholder="Fecha" className="p-4 border rounded-2xl text-xs" value={accClosing} onChange={e => setAccClosing(e.target.value)} />
                                                <input type="number" placeholder="Vence" className="p-4 border rounded-2xl text-xs" value={accDue} onChange={e => setAccDue(e.target.value)} />
                                            </div>
                                        )}
                                        <button onClick={async() => {
                                            const payload = { name:accName, type:accType, highlight:accHighlight, position:accPosition, closingDay:accClosing, dueDay:accDue };
                                            if(editingAccId) await db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${editingAccId}`).update(payload);
                                            else await db.collection(`artifacts/${appId}/users/${user.uid}/accounts`).add(payload);
                                            setAccName(''); setEditingAccId(null);
                                        }} className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px]">{editingAccId?'Salvar Alteração':'Criar Conta'}</button>
                                    </div>
                                    <div className="mt-8 space-y-2">
                                        {accounts.sort((a,b)=>p(a.position)-p(b.position)).map(a => (
                                            <div key={a.id} className="p-4 bg-white border rounded-2xl flex justify-between items-center group">
                                                <div><p className="font-black text-xs uppercase">{a.name}</p><p className="text-[8px] text-slate-400 font-bold uppercase">{a.type}</p></div>
                                                <div className="flex gap-2 opacity-0 group-hover:opacity-100">
                                                    <button onClick={() => {setEditingAccId(a.id); setAccName(a.name); setAccType(a.type); setAccHighlight(a.highlight); setAccPosition(a.position);}} className="text-blue-400"><Icon name="edit-2" size={14}/></button>
                                                    <button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-200"><Icon name="trash-2" size={14}/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] border shadow-sm h-fit">
                                    <h2 className="text-sm font-black uppercase mb-6">Categorias</h2>
                                    <div className="flex gap-2 mb-6">
                                        <input type="text" className="flex-1 p-4 border rounded-2xl text-xs" value={accName} onChange={e=>setAccName(e.target.value)} />
                                        <button onClick={async() => { await db.collection(`artifacts/${appId}/users/${user.uid}/categories`).add({name:accName}); setAccName(''); }} className="bg-black text-white p-4 rounded-2xl"><Icon name="plus" size={18}/></button>
                                    </div>
                                    <div className="space-y-2">
                                        {categories.map(c => (
                                            <div key={c.id} className="p-3 bg-white border rounded-xl flex justify-between items-center"><span className="text-[10px] font-black uppercase">{c.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-200"><Icon name="trash-2" size={14}/></button></div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.4em]">Tribo Business • Baseline v15.2.0</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
