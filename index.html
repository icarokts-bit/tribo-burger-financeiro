<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v9.5</title>
    
    <!-- Ícone da Aba -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- Bibliotecas Externas (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Estilos Customizados -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .alert-pulse { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 
            0% { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); } 
            70% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { border-color: rgba(239, 68, 68, 0.5); }
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 800; color: #1A202C; margin-top: 1.5rem; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .markdown-content p { margin-bottom: 1rem; line-height: 1.6; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-content li { margin-bottom: 0.5rem; }
        .markdown-content strong { color: #1A202C; font-weight: 800; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tribo-burger-financeiro';
        const apiKey = ""; // Chave injetada em runtime

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [settings, setSettings] = useState({ storeId: '', apiToken: '' });
            
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('Mercado Pago');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toLocaleDateString('en-CA'));
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('');
            const [newItemDueDay, setNewItemDueDay] = useState('');
            const [editingAccount, setEditingAccount] = useState(null);

            // Estados da IA
            const [aiResponse, setAiResponse] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        // Tentar login com token customizado se existir
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await auth.signInWithCustomToken(__initial_auth_token);
                            } catch (tokenErr) {
                                console.warn("Token falhou, usando login anónimo:", tokenErr.message);
                                await auth.signInAnonymously();
                            }
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { 
                        console.error("Erro crítico de autenticação:", e); 
                    }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged((u) => { 
                    setUser(u); 
                    setLoading(false); 
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                // Listeners de dados (Firebase Firestore)
                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))), err => console.error("Tx error", err));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    }, err => console.error("Daily error", err));

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => console.error("Acc error", err));

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => console.error("Cat error", err));

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => console.error("Supp error", err));

                const unsubSettings = db.doc(`${path}/settings/general`)
                    .onSnapshot(doc => { if(doc.exists) setSettings(doc.data()); }, err => console.error("Settings error", err));

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); unsubSettings(); };
            }, [user]);

            const parseMoney = (v) => typeof v === 'string' ? parseFloat(v.replace(',', '.')) || 0 : v;

            const resetForm = () => {
                setEditingId(null); setDesc(''); setVal(''); setType('saida');
                setAccount('Mercado Pago'); setDestAccount(''); setCat('');
                setSupplier(''); setStatus('pago');
                setDate(new Date().toLocaleDateString('en-CA'));
                setClearance(new Date().toLocaleDateString('en-CA'));
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || (type !== 'transferencia' && !desc)) return;
                const payload = {
                    description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : desc,
                    amount: parseMoney(val),
                    type, status: type === 'transferencia' ? 'pago' : status,
                    date, clearanceDate: clearance, account, 
                    destinationAccount: type === 'transferencia' ? destAccount : '',
                    category: type === 'transferencia' ? 'Transferência Interna' : (cat || 'Outros'),
                    supplier: type === 'saida' ? supplier : '', 
                    timestamp: new Date().toISOString()
                };
                const txId = editingId || Date.now().toString();
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${txId}`).set(payload, { merge: true });
                resetForm();
            };

            const togglePaid = async (t) => {
                if (!user) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({ status: t.status === 'pago' ? 'pendente' : 'pago' });
            };

            const markAsPaid = async (t) => {
                if (!user) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({ status: 'pago' });
            };

            const startEdit = (t) => {
                setEditingId(t.id); setDesc(t.description || ''); setVal(t.amount ? t.amount.toString().replace('.', ',') : '');
                setType(t.type || 'saida'); setAccount(t.account || 'Mercado Pago'); setDestAccount(t.destinationAccount || '');
                setCat(t.category || ''); setSupplier(t.supplier || ''); setStatus(t.status || 'pago');
                setDate(t.date || new Date().toLocaleDateString('en-CA')); setClearance(t.clearanceDate || new Date().toLocaleDateString('en-CA'));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const descriptionHistory = useMemo(() => {
                const descs = transactions.map(t => t.description);
                return [...new Set(descs)].filter(Boolean).sort();
            }, [transactions]);

            const upcomingAlerts = useMemo(() => {
                const today = new Date(); const todayStr = today.toLocaleDateString('en-CA');
                const limit = new Date(); limit.setDate(limit.getDate() + 2); const limitStr = limit.toLocaleDateString('en-CA');
                return transactions.filter(t => t.type === 'saida' && t.status === 'pendente' && t.clearanceDate >= todayStr && t.clearanceDate <= limitStr);
            }, [transactions]);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; let pendingTotal = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'entrada' && t.status === 'pago') rb += amount;
                        if (t.type === 'saida') {
                            if (t.status === 'pendente') pendingTotal += amount;
                            else costsByCategory[t.category] = (costsByCategory[t.category] || 0) + amount;
                        }
                    }
                });
                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);
                return { rb, custosVariaveis, costsByCategory, totalOperating, pendingTotal, lucro: rb - (custosVariaveis + totalOperating), cmv };
            }, [transactions, dailyRecords, filterMonth]);

            const creditCardStats = useMemo(() => {
                const results = {};
                accounts.filter(a => a.type === 'cartao').forEach(card => {
                    let total = 0;
                    transactions.filter(t => t.account === card.name && t.type === 'saida' && t.date.startsWith(filterMonth)).forEach(t => total += parseFloat(t.amount) || 0);
                    results[card.name] = { total, closing: card.closingDay || 1, due: card.dueDay || 10 };
                });
                return results;
            }, [transactions, accounts, filterMonth]);

            // CONSULTORIA IA COM RETRY E EXPONENTIAL BACKOFF
            const askConsultant = async () => {
                if (aiLoading) return;
                setAiLoading(true); setAiResponse('');
                
                const statsTxt = `Mês: ${filterMonth}. Faturamento: ${formatMoney(stats.rb)}. Gastos Operacionais: ${formatMoney(stats.totalOperating)}. Custos Entrega: ${formatMoney(stats.custosVariaveis)}. CMV: ${formatMoney(stats.cmv)}. Lucro: ${formatMoney(stats.lucro)}.`;
                const systemPrompt = "És um consultor financeiro especialista em Hamburguerias. Analisa os dados financeiros e fornece um plano estratégico em Português de Portugal. Sê direto e prático.";
                const userQuery = `Dá-me sugestões baseadas nestes números: ${statsTxt}`;

                const fetchGemini = async (retries = 0) => {
                    const delays = [1000, 2000, 4000, 8000, 16000];
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        });
                        if (!response.ok) throw new Error("Erro na API");
                        const result = await response.json();
                        return result.candidates?.[0]?.content?.parts?.[0]?.text;
                    } catch (e) {
                        if (retries < 5) {
                            await new Promise(r => setTimeout(r, delays[retries]));
                            return fetchGemini(retries + 1);
                        }
                        throw e;
                    }
                };

                try {
                    const text = await fetchGemini();
                    setAiResponse(text || "Não foi possível gerar os resultados agora.");
                } catch (e) {
                    setAiResponse("Lamento, o consultor está indisponível. Tenta novamente em instantes.");
                } finally { setAiLoading(false); }
            };

            const editAccount = (acc) => {
                setEditingAccount(acc); setNewItemName(acc.name); setNewItemType(acc.type);
                setNewItemClosingDay(acc.closingDay || ''); setNewItemDueDay(acc.dueDay || '');
                setActiveTab('ajustes');
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="text-[#F8CC82] animate-spin" /></div>;

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-1 rounded-full"><img src="logo.png" className="h-8 w-8" /></div>
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management v9.5</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'cartoes', 'resultados', 'dre', 'fornecedores', 'consultoria', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab === 'consultoria' ? 'Consultor' : tab}
                                    </button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                {upcomingAlerts.length > 0 && (
                                    <div className="bg-white border-2 border-red-500 p-6 rounded-[2.5rem] alert-pulse shadow-xl flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div className="flex items-center gap-4"><div className="bg-red-500 p-3 rounded-2xl"><Icon name="bell-ring" className="text-white" size={24} /></div><div><h4 className="text-sm font-black text-red-600 uppercase tracking-widest">Contas Próximas</h4><p className="text-[10px] font-bold text-slate-400 uppercase">Tens {upcomingAlerts.length} pagamentos pendentes.</p></div></div>
                                        <div className="flex flex-wrap gap-2 justify-center">{upcomingAlerts.map(a => (<div key={a.id} className="bg-red-50 pl-4 pr-1 py-1 rounded-xl text-[10px] font-black border border-red-100 flex items-center gap-3 group"><span className="text-red-700 uppercase">{a.description}</span><button onClick={() => markAsPaid(a)} className="w-8 h-8 bg-green-500 text-white rounded-lg flex items-center justify-center"><Icon name="check" size={12} /></button></div>))}</div>
                                    </div>
                                )}
                                <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4"><span className="text-[9px] font-black uppercase text-slate-400 tracking-widest">Mês Selecionado:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500"><p className="text-[8px] font-black text-[#F8CC82] uppercase mb-1 text-center">Lucro Estimado</p><h3 className={`text-xl font-black text-center ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">Receita Bruta</p><h3 className="text-xl font-black text-slate-800 text-center">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">A Pagar</p><h3 className="text-xl font-black text-orange-500 text-center">{formatMoney(stats.pendingTotal)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 text-center">CMV Mês</p><h3 className="text-xl font-black text-slate-800 text-center">{formatMoney(stats.cmv)}</h3></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <form onSubmit={saveTx} className="lg:col-span-1 glass-card p-8 rounded-[2.5rem] shadow-sm space-y-4 h-fit">
                                        <h2 className="text-xs font-black text-[#1A202C] uppercase tracking-widest border-b pb-3">{editingId ? 'Editar Lançamento' : 'Novo Lançamento'}</h2>
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                            <button type="button" onClick={() => setType('entrada')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'entrada' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-slate-400'}`}>Entrada</button>
                                            <button type="button" onClick={() => setType('saida')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'saida' ? 'bg-red-100 text-red-700 shadow-sm' : 'text-slate-400'}`}>Saída</button>
                                            <button type="button" onClick={() => setType('transferencia')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'transferencia' ? 'bg-blue-100 text-blue-700 shadow-sm' : 'text-slate-400'}`}>Transf.</button>
                                        </div>
                                        {type !== 'transferencia' && (
                                            <div className="relative w-full">
                                                <input type="text" placeholder="Descrição" required list="desc-suggestions" className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none focus:border-[#D97757]" value={desc} onChange={e => setDesc(e.target.value)} />
                                                <datalist id="desc-suggestions">{descriptionHistory.map((d, i) => <option key={i} value={d} />)}</datalist>
                                            </div>
                                        )}
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Valor</label><input type="text" placeholder="R$ 0,00" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} /></div>
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Conta</label><select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}><option value="">Selecionar...</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select></div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button className={`w-full p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg transition-all ${editingId ? 'bg-blue-600 text-white' : 'bg-[#1A202C] text-[#F8CC82]'}`}>{editingId ? 'Salvar Edição' : 'Gravar Movimento'}</button>
                                            {editingId && <button type="button" onClick={resetForm} className="bg-red-50 text-red-500 p-4 rounded-2xl font-black uppercase text-[10px]">X</button>}
                                        </div>
                                    </form>
                                    <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm overflow-hidden h-[600px] flex flex-col">
                                        <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400 tracking-widest flex justify-between"><span>Histórico Recente</span><span>{filterMonth}</span></div>
                                        <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                            {transactions.filter(t => t.date.startsWith(filterMonth)).map(t => (
                                                <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 group transition-all">
                                                    <div className="flex items-center gap-4">
                                                        <button disabled={t.type === 'transferencia'} onClick={() => togglePaid(t)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${t.type === 'transferencia' ? 'bg-blue-100 text-blue-500' : (t.status === 'pago' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-600')}`}><Icon name={t.type === 'transferencia' ? 'repeat' : (t.status === 'pago' ? 'check' : 'clock')} size={14} /></button>
                                                        <div><div className="flex items-center gap-2"><p className="font-black text-sm uppercase leading-tight">{t.description}</p>{t.supplier && <span className="bg-slate-100 px-2 py-0.5 rounded text-[8px] font-black text-slate-500 uppercase">{t.supplier}</span>}</div><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.date.split('-').reverse().join('/')} • {t.account} {t.category && `• ${t.category}`}</p></div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <p className={`font-black text-sm mr-2 ${t.type === 'entrada' ? 'text-green-600' : 'text-slate-800'}`}>{formatMoney(t.amount)}</p>
                                                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => startEdit(t)} className="p-2 text-slate-300 hover:text-blue-500"><Icon name="edit-3" size={14}/></button><button onClick={async () => { if(window.confirm('Excluir?')) await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()}} className="p-2 text-red-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></div>
                                                    </div>
                                                </div>
                                            ))}
                                            {transactions.filter(t => t.date.startsWith(filterMonth)).length === 0 && (
                                                <div className="p-20 text-center opacity-20 font-black text-[10px] uppercase">Nenhum dado este mês.</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                             <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-2"><Icon name="table" className="text-[#D97757]" /><h2 className="text-sm font-black uppercase text-slate-800">Vendas Diárias</h2></div>
                                    <div className="flex items-center gap-3 bg-white p-2 rounded-2xl border shadow-sm"><div className="flex items-center gap-2 px-2 border-r"><span className="text-[8px] font-black text-slate-400 uppercase">Mês:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="text-xs font-black border-0 outline-none text-[#D97757]" /></div><button onClick={async() => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true }); }} className="bg-[#1A202C] text-[#F8CC82] px-4 py-2 rounded-xl text-[9px] font-black uppercase">Abrir Novo Dia</button></div>
                                </div>
                                <div className="glass-card rounded-[2.5rem] shadow-sm overflow-hidden border">
                                    <div className="overflow-x-auto no-scrollbar"><table className="w-full text-center text-[11px] min-w-[1400px]"><thead><tr className="header-black text-white"><th className="p-4 sticky left-0 z-20 bg-black">Data</th><th className="p-4 bg-yellow-500 text-black">Total</th>{['Pix','Pix Online','Fiado','Dinheiro','Ifood','Débito','Crédito','VR','Ticket','Alelo'].map(h => <th key={h} className="p-4">{h}</th>)}<th className="p-4 text-red-400">Motoboy</th><th className="p-4 text-orange-400">Entrega</th><th className="p-4">X</th></tr></thead><tbody className="divide-y font-bold">
                                        {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b) - new Date(a)).map(d => {
                                            const r = dailyRecords[d] || {}; const total = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+(parseFloat(r[f])||0), 0);
                                            return (<tr key={d} className="hover:bg-slate-50 h-12"><td className="p-4 sticky left-0 bg-white font-black text-slate-500 border-r">{d.split('-').reverse().join('/')}</td><td className="p-4 bg-yellow-50 font-black">{formatMoney(total)}</td>{['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo','motoboy','taxaEntrega'].map(f => (<td key={f} className="p-0 border-r"><input className="table-input" value={r[f] || ''} onChange={async(e) => { const v = e.target.value.replace(',', '.').replace(/[^0-9.]/g, ''); await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: v }, { merge: true }); }} placeholder="0" /></td>))}<td className="p-4"><button onClick={async() => { if(window.confirm("Apagar?")) await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()}} className="text-slate-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td></tr>);
                                        })}
                                    </tbody></table></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8 animate-in fade-in zoom-in duration-500">
                                <h2 className="text-xl font-black uppercase tracking-tighter text-center">Análise de Resultados: {filterMonth}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-green-500 text-center"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Receita Líquida</p><h3 className="text-3xl font-black text-green-600">{formatMoney(stats.rb)}</h3></div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-red-500 text-center"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Custos Entrega</p><h3 className="text-3xl font-black text-red-600">{formatMoney(stats.custosVariaveis)}</h3></div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-orange-500 text-center"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Custos Fixos</p><h3 className="text-3xl font-black text-orange-600">{formatMoney(stats.totalOperating)}</h3></div>
                                    <div className={`glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 text-center ${stats.lucro >= 0 ? 'border-blue-600' : 'border-red-600'}`}><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Resultado Final</p><h3 className={`text-3xl font-black ${stats.lucro >= 0 ? 'text-blue-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</h3></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto glass-card rounded-[3rem] p-10 shadow-2xl border-t-8 border-[#D97757]">
                                <h2 className="text-xl font-black uppercase mb-8 border-b pb-4 text-center">DRE Estruturado</h2>
                                <div className="space-y-4">
                                    <div className="flex justify-between p-4 bg-green-50 rounded-2xl font-black uppercase text-[10px] text-green-800"><span>(+) Receita Bruta</span><span>{formatMoney(stats.rb)}</span></div>
                                    <div className="flex justify-between p-4 bg-red-50 rounded-2xl font-black uppercase text-[10px] text-red-800"><span>(-) Custos Variáveis</span><span>{formatMoney(stats.custosVariaveis)}</span></div>
                                    <div className="py-4 border-b">{Object.entries(stats.costsByCategory).map(([cat, val]) => (<div key={cat} className="flex justify-between px-4 py-2 text-[10px] font-bold text-slate-600 uppercase"><span>(-) {cat}</span><span className="text-red-400 font-black">{formatMoney(val)}</span></div>))}</div>
                                    <div className={`flex justify-between p-8 rounded-[2.5rem] mt-6 shadow-xl ${stats.lucro >= 0 ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-red-600 text-white'}`}><h3 className="text-xl font-black uppercase tracking-widest">Lucro Líquido</h3><span className="text-4xl font-black">{formatMoney(stats.lucro)}</span></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'cartoes' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in zoom-in duration-300">
                                {Object.entries(creditCardStats).length === 0 ? (<div className="col-span-full py-20 text-center glass-card rounded-[3rem] opacity-30"><p className="text-slate-400 font-black uppercase text-[10px]">Nenhum cartão cadastrado em Ajustes.</p></div>) : Object.entries(creditCardStats).map(([name, data]) => (<div key={name} className="glass-card p-8 rounded-[3rem] shadow-lg border-t-8 border-[#1A202C]"><div className="flex justify-between items-start mb-6"><div><h3 className="font-black uppercase text-lg">{name}</h3><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Fatura do Mês</p></div><button onClick={() => editAccount(accounts.find(a => a.name === name))} className="text-slate-300 hover:text-blue-500 transition-all"><Icon name="edit-3" size={16}/></button></div><h3 className="text-xl font-black text-[#1A202C]">{formatMoney(data.total)}</h3><div className="mt-4 pt-4 border-t grid grid-cols-2"><div className="text-center border-r"><p className="text-[8px] font-black text-slate-400 uppercase">Fecho</p><p className="font-black text-sm text-[#D97757]">Dia {data.closing}</p></div><div className="text-center"><p className="text-[8px] font-black text-slate-400 uppercase">Pagar</p><p className="font-black text-sm text-red-500">Dia {data.due}</p></div></div></div>))}
                            </div>
                        )}

                        {activeTab === 'consultoria' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom duration-500">
                                <div className="text-center"><div className="inline-block p-4 bg-[#1A202C] rounded-[2.5rem] shadow-xl mb-4"><Icon name="brain-circuit" size={48} className="text-[#F8CC82]" /></div><h2 className="text-2xl font-black uppercase tracking-tighter">Consultor Estratégico IA</h2><p className="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest">Inteligência Artificial para a Tribo Burger</p></div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                                    <div className="glass-card p-10 rounded-[3.5rem] shadow-lg space-y-6"><h3 className="text-sm font-black uppercase border-b pb-4">Sumário para Análise</h3><div className="space-y-4">
                                        <div className="flex justify-between items-center text-[11px] font-bold"><span className="text-slate-400 uppercase">Faturamento:</span><span>{formatMoney(stats.rb)}</span></div>
                                        <div className="flex justify-between items-center text-[11px] font-bold"><span className="text-slate-400 uppercase">CMV:</span><span className="text-red-500 font-black">{formatMoney(stats.cmv)}</span></div>
                                        <div className="flex justify-between items-center pt-4 border-t font-black"><span className="text-xs uppercase">Lucro:</span><span className={`text-lg ${stats.lucro >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</span></div>
                                    </div><button onClick={askConsultant} disabled={aiLoading} className="w-full bg-[#1A202C] text-[#F8CC82] p-5 rounded-3xl font-black uppercase text-xs shadow-xl flex items-center justify-center gap-3 active:scale-95 disabled:opacity-50 transition-all">{aiLoading ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />}{aiLoading ? 'A Consultar...' : 'Gerar Relatório Estratégico'}</button></div>
                                    <div className="glass-card p-10 rounded-[3.5rem] shadow-sm min-h-[400px] flex flex-col bg-white"><h3 className="text-sm font-black uppercase border-b pb-4 mb-6">Relatório de Insights</h3><div className="flex-1 overflow-y-auto no-scrollbar text-sm leading-relaxed text-slate-600 markdown-content">
                                        {aiResponse ? aiResponse.split('\n').map((line, i) => {
                                            let processed = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                                            if (line.startsWith('#')) return <h3 key={i} dangerouslySetInnerHTML={{ __html: processed.replace(/#/g, '') }} />;
                                            if (line.startsWith('- ')) return <ul key={i}><li dangerouslySetInnerHTML={{ __html: processed.substring(2) }} /></ul>;
                                            return <p key={i} dangerouslySetInnerHTML={{ __html: processed }} />;
                                        }) : (<div className="h-full flex flex-col items-center justify-center opacity-20 py-20 text-center"><Icon name="message-square-dashed" size={48} /><p className="text-[10px] font-black uppercase mt-4">Analisa os teus números agora.</p></div>)}
                                    </div></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="max-w-4xl mx-auto space-y-8 animate-in slide-in-from-bottom duration-500">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="landmark" className="text-[#D97757]"/> {editingAccount ? 'Editar Conta' : 'Bancos & Cartões'}</h2><div className="space-y-4"><div className="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200"><input type="text" className="w-full p-3 bg-white border rounded-xl text-xs font-bold outline-none mb-2" placeholder="Ex: Mercado Pago" value={newItemName} onChange={e => setNewItemName(e.target.value)} />{!editingAccount && (<div className="flex gap-2 mb-2"><button onClick={() => setNewItemType('corrente')} className={`flex-1 p-2 rounded-lg text-[9px] font-black uppercase transition-all ${newItemType === 'corrente' ? 'bg-black text-white' : 'bg-white border text-slate-400'}`}>Corrente</button><button onClick={() => setNewItemType('cartao')} className={`flex-1 p-2 rounded-lg text-[9px] font-black uppercase transition-all ${newItemType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-white border text-slate-400'}`}>Cartão</button></div>)}{(newItemType === 'cartao' || (editingAccount && editingAccount.type === 'cartao')) && (<div className="grid grid-cols-2 gap-2 mb-2"><div className="space-y-1"><label className="text-[7px] font-black text-slate-400 uppercase ml-1">Fecho</label><input type="number" className="w-full p-2 text-xs border rounded-lg font-bold" value={newItemClosingDay} onChange={e => setNewItemClosingDay(e.target.value)} /></div><div className="space-y-1"><label className="text-[7px] font-black text-slate-400 uppercase ml-1">Venc.</label><input type="number" className="w-full p-2 text-xs border rounded-lg font-bold" value={newItemDueDay} onChange={e => setNewItemDueDay(e.target.value)} /></div></div>)}<div className="flex gap-2"><button onClick={async() => { if(!newItemName) return; if(editingAccount) { await db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${editingAccount.id}`).update({ name: newItemName, closingDay: newItemClosingDay || '1', dueDay: newItemDueDay || '10' }); setEditingAccount(null); } else { await db.collection(`artifacts/${appId}/users/${user.uid}/accounts`).add({ name: newItemName, type: newItemType, closingDay: newItemClosingDay || '1', dueDay: newItemDueDay || '10' }); } setNewItemName(''); setNewItemClosingDay(''); setNewItemDueDay(''); }} className="flex-1 bg-[#1A202C] text-[#F8CC82] p-3 rounded-xl text-[10px] font-black uppercase shadow-sm">{editingAccount ? 'Salvar' : 'Adicionar'}</button>{editingAccount && <button onClick={cancelEditAccount} className="bg-red-50 text-red-500 px-4 py-3 rounded-xl"><Icon name="x" size={14}/></button>}</div></div><div className="space-y-2 max-h-40 overflow-y-auto no-scrollbar">{accounts.map(a => (<div key={a.id} className="flex justify-between items-center p-3 border rounded-xl bg-white"><div className="flex items-center gap-2 text-[10px] font-black uppercase"><Icon name={a.type === 'cartao' ? 'credit-card' : 'landmark'} size={12}/><span className="text-[10px] font-black uppercase">{a.name}</span></div><div className="flex gap-3"><button onClick={() => editAccount(a)} className="text-slate-300 hover:text-blue-500"><Icon name="edit-2" size={12}/></button><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button></div></div>))}</div></div></div>
                                    <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="list" className="text-[#D97757]"/> Categorias DRE</h2><div className="flex gap-2 mb-6"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Ex: CMV Insumos" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={async() => { if(!newItemName) return; await db.collection(`artifacts/${appId}/users/${user.uid}/categories`).add({ name: newItemName }); setNewItemName(''); }} className="bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl"><Icon name="plus" /></button></div><div className="space-y-2 max-h-60 overflow-y-auto no-scrollbar">{categories.map(c => (<div key={c.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl hover:bg-slate-50"><span className="text-xs font-bold uppercase">{c.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button></div>))}</div></div>
                                </div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="key" className="text-blue-500"/> Integração Loja (Hubster/Delivra)</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><div className="space-y-1"><label className="text-[8px] font-black text-slate-400 uppercase ml-2">Código da Loja</label><input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="13774" value={settings.storeId} onChange={async(e) => { const v = e.target.value; setSettings(s => ({...s, storeId: v})); await db.doc(`artifacts/${appId}/users/${user.uid}/settings/general`).set({ storeId: v }, { merge: true }); }} /></div><div className="space-y-1"><label className="text-[8px] font-black text-slate-400 uppercase ml-2">Token de Integração</label><input type="password" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="ammmQ1..." value={settings.apiToken} onChange={async(e) => { const v = e.target.value; setSettings(s => ({...s, apiToken: v})); await db.doc(`artifacts/${appId}/users/${user.uid}/settings/general`).set({ apiToken: v }, { merge: true }); }} /></div></div></div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v9.5</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
