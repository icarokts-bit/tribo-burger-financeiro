<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v9.7</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .markdown-content h3 { font-weight: 800; color: #1A202C; margin-top: 1rem; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #eee; }
        .markdown-content p { margin-bottom: 0.8rem; font-size: 13px; line-height: 1.5; }
        .markdown-content ul { list-style-type: disc; margin-left: 1.2rem; margin-bottom: 1rem; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuração Dinâmica do Ambiente
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tribo-burger-financeiro';
        const apiKey = ""; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Login
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            // Dados
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [settings, setSettings] = useState({ storeId: '', apiToken: '' });
            
            // Form Lançamento
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('Mercado Pago');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toLocaleDateString('en-CA'));
            
            // IA
            const [aiResponse, setAiResponse] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        }
                    } catch (e) { console.error("Erro token customizado:", e); }
                    setLoading(false);
                };
                initAuth();
                const unsub = auth.onAuthStateChanged((u) => { 
                    setUser(u); 
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    });

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubSettings = db.doc(`${path}/settings/general`)
                    .onSnapshot(doc => { if(doc.exists) setSettings(doc.data()); });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); unsubSettings(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) {
                    setAuthError("Email ou palavra-passe incorretos.");
                } finally { setLoading(false); }
            };

            const parseMoney = (v) => typeof v === 'string' ? parseFloat(v.replace(',', '.')) || 0 : v;
            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || (type !== 'transferencia' && !desc)) return;
                const payload = {
                    description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : desc,
                    amount: parseMoney(val),
                    type, status: type === 'transferencia' ? 'pago' : status,
                    date, clearanceDate: clearance, account, 
                    destinationAccount: type === 'transferencia' ? destAccount : '',
                    category: type === 'transferencia' ? 'Transferência Interna' : (cat || 'Outros'),
                    supplier: type === 'saida' ? supplier : '', 
                    timestamp: new Date().toISOString()
                };
                const txId = editingId || Date.now().toString();
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${txId}`).set(payload, { merge: true });
                setEditingId(null); setDesc(''); setVal('');
            };

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; let pendingTotal = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'entrada' && t.status === 'pago') rb += amount;
                        if (t.type === 'saida') {
                            if (t.status === 'pendente') pendingTotal += amount;
                            else costsByCategory[t.category] = (costsByCategory[t.category] || 0) + amount;
                        }
                    }
                });
                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);
                return { rb, custosVariaveis, costsByCategory, totalOperating, pendingTotal, lucro: rb - (custosVariaveis + totalOperating), cmv };
            }, [transactions, dailyRecords, filterMonth]);

            const askConsultant = async () => {
                if (aiLoading) return;
                setAiLoading(true); setAiResponse('');
                const prompt = `Analisa estes dados da Tribo Burger (${filterMonth}): Faturamento ${formatMoney(stats.rb)}, Custos ${formatMoney(stats.totalOperating)}, CMV ${formatMoney(stats.cmv)}, Lucro ${formatMoney(stats.lucro)}. Dá 3 dicas práticas em Português de Portugal.`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "És um consultor financeiro experiente." }] } })
                    });
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text || "Lamento, não consegui gerar a análise.");
                } catch (e) { setAiResponse("Erro ao contactar o consultor."); } finally { setAiLoading(false); }
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center bg-[#1A202C] gap-4"><Icon name="loader" className="text-[#F8CC82] animate-spin" size={40} /><p className="text-[#F8CC82] font-black uppercase text-[10px] tracking-widest">A carregar Tribo Burger...</p></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757] animate-in fade-in duration-500">
                        <div className="text-center mb-8"><img src="logo.png" className="w-20 mx-auto mb-4" /><h2 className="text-2xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Finanças</h2><p className="text-[10px] font-bold text-slate-400 uppercase mt-2">Versão 9.7 Pro</p></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required placeholder="Email de Acesso" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Palavra-passe" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={password} onChange={e => setPassword(e.target.value)} />
                            {authError && <p className="text-red-500 text-[10px] font-bold text-center bg-red-50 p-2 rounded-lg">{authError}</p>}
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs shadow-xl transition-all"> {isRegistering ? 'Criar Conta' : 'Entrar no Painel'}</button>
                        </form>
                        <button onClick={() => setIsRegistering(!isRegistering)} className="w-full mt-6 text-[10px] font-black text-[#D97757] uppercase tracking-widest hover:underline">{isRegistering ? 'Já tens conta? Entra aqui' : 'Novo por aqui? Regista o teu acesso'}</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3"><div className="bg-white p-1 rounded-full"><img src="logo.png" className="h-8 w-8" /></div><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management v9.7</h1></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'cartoes', 'resultados', 'dre', 'fornecedores', 'consultoria', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}>{tab === 'planilha' ? 'Vendas' : tab === 'consultoria' ? 'Consultor' : tab}</button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4"><span className="text-[9px] font-black uppercase text-slate-400">Mês Selecionado:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500 text-center"><p className="text-[8px] font-black text-[#F8CC82] uppercase mb-1">Lucro Estimado</p><h3 className={`text-xl font-black ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Receita Bruta</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">A Pagar</p><h3 className="text-xl font-black text-orange-500">{formatMoney(stats.pendingTotal)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">CMV Mês</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.cmv)}</h3></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <form onSubmit={saveTx} className="lg:col-span-1 glass-card p-8 rounded-[2.5rem] shadow-sm space-y-4 h-fit">
                                        <h2 className="text-xs font-black text-[#1A202C] uppercase tracking-widest border-b pb-3">{editingId ? 'Editar Movimento' : 'Novo Lançamento'}</h2>
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                            <button type="button" onClick={() => setType('entrada')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'entrada' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-slate-400'}`}>Entrada</button>
                                            <button type="button" onClick={() => setType('saida')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'saida' ? 'bg-red-100 text-red-700 shadow-sm' : 'text-slate-400'}`}>Saída</button>
                                        </div>
                                        <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                        </div>
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={cat} onChange={e => setCat(e.target.value)}><option value="">Categoria...</option>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                        <button className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Gravar Registo</button>
                                    </form>
                                    <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm overflow-hidden h-[600px] flex flex-col">
                                        <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400 tracking-widest flex justify-between"><span>Histórico</span><span>Mês {filterMonth}</span></div>
                                        <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                            {transactions.filter(t => t.date.startsWith(filterMonth)).map(t => (
                                                <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 group">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}><Icon name={t.type === 'entrada' ? 'trending-up' : 'trending-down'} size={14} /></div>
                                                        <div><p className="font-black text-sm uppercase leading-tight">{t.description}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.date.split('-').reverse().join('/')} • {t.account}</p></div>
                                                    </div>
                                                    <div className="flex items-center gap-2"><p className="font-black text-sm mr-2">{formatMoney(t.amount)}</p><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="p-2 text-red-200 hover:text-red-500 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={14}/></button></div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                             <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-2"><Icon name="table" className="text-[#D97757]" /><h2 className="text-sm font-black uppercase text-slate-800">Vendas Diárias</h2></div>
                                    <button onClick={async() => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true }); }} className="bg-[#1A202C] text-[#F8CC82] px-6 py-3 rounded-2xl text-[9px] font-black uppercase">Abrir Novo Dia</button>
                                </div>
                                <div className="glass-card rounded-[2.5rem] shadow-sm overflow-hidden border overflow-x-auto no-scrollbar"><table className="w-full text-center text-[11px] min-w-[1400px]"><thead><tr className="header-black text-white"><th className="p-4 sticky left-0 z-20 bg-black">Data</th><th className="p-4 bg-yellow-500 text-black">Total</th>{['Pix','Pix Online','Fiado','Dinheiro','Ifood','Débito','Crédito','VR','Ticket','Alelo'].map(h => <th key={h} className="p-4">{h}</th>)}<th className="p-4">X</th></tr></thead><tbody className="divide-y font-bold">
                                    {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b) - new Date(a)).map(d => {
                                        const r = dailyRecords[d] || {}; const total = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+(parseFloat(r[f])||0), 0);
                                        return (<tr key={d} className="hover:bg-slate-50 h-12"><td className="p-4 sticky left-0 bg-white font-black text-slate-500 border-r">{d.split('-').reverse().join('/')}</td><td className="p-4 bg-yellow-50 font-black">{formatMoney(total)}</td>{['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].map(f => (<td key={f} className="p-0 border-r"><input className="table-input" value={r[f] || ''} onChange={async(e) => { const v = e.target.value.replace(',', '.').replace(/[^0-9.]/g, ''); await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: v }, { merge: true }); }} placeholder="0" /></td>))}<td className="p-4"><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td></tr>);
                                    })}
                                </tbody></table></div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8 animate-in fade-in zoom-in duration-500">
                                <h2 className="text-xl font-black uppercase text-center">Resultados de {filterMonth}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-green-500"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Faturamento</p><h3 className="text-3xl font-black text-green-600">{formatMoney(stats.rb)}</h3></div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-red-500"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Gastos Entrega</p><h3 className="text-3xl font-black text-red-600">{formatMoney(stats.custosVariaveis)}</h3></div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-orange-500"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Gastos Operacionais</p><h3 className="text-3xl font-black text-orange-600">{formatMoney(stats.totalOperating)}</h3></div>
                                    <div className={`glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 ${stats.lucro >= 0 ? 'border-blue-600' : 'border-red-600'}`}><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Lucro Real</p><h3 className={`text-3xl font-black ${stats.lucro >= 0 ? 'text-blue-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</h3></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto glass-card rounded-[3rem] p-10 shadow-2xl border-t-8 border-[#D97757]">
                                <h2 className="text-xl font-black uppercase mb-8 border-b pb-4 text-center">DRE Detalhado</h2>
                                <div className="space-y-4">
                                    <div className="flex justify-between p-4 bg-green-50 rounded-2xl font-black uppercase text-[10px] text-green-800"><span>(+) Receita Bruta</span><span>{formatMoney(stats.rb)}</span></div>
                                    <div className="flex justify-between p-4 bg-red-50 rounded-2xl font-black uppercase text-[10px] text-red-800"><span>(-) Custos Variáveis</span><span>{formatMoney(stats.custosVariaveis)}</span></div>
                                    <div className="py-4 border-b">{Object.entries(stats.costsByCategory).map(([cat, val]) => (<div key={cat} className="flex justify-between px-4 py-2 text-[10px] font-bold text-slate-600 uppercase"><span>(-) {cat}</span><span className="text-red-400 font-black">{formatMoney(val)}</span></div>))}</div>
                                    <div className={`flex justify-between p-8 rounded-[2.5rem] mt-6 shadow-xl ${stats.lucro >= 0 ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-red-600 text-white'}`}><h3 className="text-xl font-black uppercase tracking-widest">Lucro Líquido</h3><span className="text-4xl font-black">{formatMoney(stats.lucro)}</span></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'consultoria' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom duration-500">
                                <div className="text-center"><div className="inline-block p-4 bg-[#1A202C] rounded-[2.5rem] shadow-xl mb-4"><Icon name="brain-circuit" size={48} className="text-[#F8CC82]" /></div><h2 className="text-2xl font-black uppercase tracking-tighter">Consultor IA</h2></div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                                    <div className="glass-card p-10 rounded-[3.5rem] shadow-lg space-y-6">
                                        <h3 className="text-sm font-black uppercase border-b pb-4">Análise Automática</h3>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center text-[11px] font-bold"><span className="text-slate-400 uppercase">Vendas:</span><span>{formatMoney(stats.rb)}</span></div>
                                            <div className="flex justify-between items-center text-[11px] font-bold"><span className="text-slate-400 uppercase">Resultado:</span><span className={`font-black ${stats.lucro >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</span></div>
                                        </div>
                                        <button onClick={askConsultant} disabled={aiLoading} className="w-full bg-[#1A202C] text-[#F8CC82] p-5 rounded-3xl font-black uppercase text-xs shadow-xl flex items-center justify-center gap-3 active:scale-95 disabled:opacity-50 transition-all">{aiLoading ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />}{aiLoading ? 'A Pensar...' : 'Gerar Análise Estratégica'}</button>
                                    </div>
                                    <div className="glass-card p-10 rounded-[3.5rem] shadow-sm min-h-[400px] flex flex-col bg-white">
                                        <h3 className="text-sm font-black uppercase border-b pb-4 mb-4">Plano de Ação</h3>
                                        <div className="flex-1 overflow-y-auto no-scrollbar text-sm leading-relaxed text-slate-600 markdown-content">
                                            {aiResponse ? aiResponse.split('\n').map((line, i) => {
                                                let processed = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                                                if (line.startsWith('- ')) return <ul key={i}><li dangerouslySetInnerHTML={{ __html: processed.substring(2) }} /></ul>;
                                                return <p key={i} dangerouslySetInnerHTML={{ __html: processed }} />;
                                            }) : (<div className="h-full flex flex-col items-center justify-center opacity-20 py-20 text-center"><Icon name="message-square-dashed" size={48} /><p className="text-[10px] font-black uppercase mt-4">Clica para analisares os teus números.</p></div>)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="landmark" className="text-[#D97757]"/> Bancos & Cartões</h2><div className="space-y-4"><input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nome" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={async() => { if(!newItemName) return; await db.collection(`artifacts/${appId}/users/${user.uid}/accounts`).add({ name: newItemName, type: 'corrente' }); setNewItemName(''); }} className="w-full bg-[#1A202C] text-[#F8CC82] p-3 rounded-xl text-[10px] font-black uppercase">Adicionar</button><div className="space-y-2">{accounts.map(a => (<div key={a.id} className="flex justify-between items-center p-3 border rounded-xl bg-white"><span className="text-[10px] font-black uppercase">{a.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button></div>))}</div></div></div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="list" className="text-[#D97757]"/> Categorias DRE</h2><div className="flex gap-2 mb-6"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Ex: CMV Insumos" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={async() => { if(!newItemName) return; await db.collection(`artifacts/${appId}/users/${user.uid}/categories`).add({ name: newItemName }); setNewItemName(''); }} className="bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl"><Icon name="plus" /></button></div><div className="space-y-2 max-h-60 overflow-y-auto no-scrollbar">{categories.map(c => (<div key={c.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl"><span className="text-xs font-bold uppercase">{c.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button></div>))}</div></div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v9.7</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
