<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v9.8.1</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .alert-pulse { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 
            0% { border-color: rgba(239, 68, 68, 0.5); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); } 
            70% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { border-color: rgba(239, 68, 68, 0.5); }
        }

        .markdown-content h3 { font-weight: 800; color: #1A202C; margin-top: 1rem; margin-bottom: 0.5rem; text-transform: uppercase; font-size: 12px; border-bottom: 1px solid #eee; }
        .markdown-content p { margin-bottom: 0.8rem; font-size: 13px; line-height: 1.5; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tribo-burger-financeiro';
        const apiKey = ""; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // Auth States
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            // Data States
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [settings, setSettings] = useState({ storeId: '', apiToken: '' });
            
            // Form States
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('Mercado Pago');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            // Settings Helpers
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('');
            const [newItemDueDay, setNewItemDueDay] = useState('');
            const [editingAccount, setEditingAccount] = useState(null);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toLocaleDateString('en-CA'));
            const [aiResponse, setAiResponse] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        }
                    } catch (e) { console.error("Auth error", e); }
                    setLoading(false);
                };
                initAuth();
                const unsub = auth.onAuthStateChanged((u) => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date))));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    });

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => setAccounts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubSettings = db.doc(`${path}/settings/general`)
                    .onSnapshot(doc => { if(doc.exists) setSettings(doc.data()); });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); unsubSettings(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) { setAuthError("Credenciais inválidas."); } finally { setLoading(false); }
            };

            const parseMoney = (v) => typeof v === 'string' ? parseFloat(v.replace(',', '.')) || 0 : v;
            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            // Gerar histórico único de descrições para o autocompletar
            const descriptionHistory = useMemo(() => {
                const descs = transactions.map(t => t.description);
                return [...new Set(descs)].filter(Boolean).sort();
            }, [transactions]);

            const resetForm = () => {
                setEditingId(null); setDesc(''); setVal(''); setType('saida');
                setAccount('Mercado Pago'); setDestAccount(''); setCat('');
                setSupplier(''); setStatus('pago');
                // Nota: Não resetamos a 'date' nem a 'clearance' para manter o último dia como padrão conforme solicitado
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || (type !== 'transferencia' && !desc)) return;
                const payload = {
                    description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : desc,
                    amount: parseMoney(val),
                    type, status: type === 'transferencia' ? 'pago' : status,
                    date, clearanceDate: clearance, account, 
                    destinationAccount: type === 'transferencia' ? destAccount : '',
                    category: type === 'transferencia' ? 'Transferência Interna' : (cat || 'Outros'),
                    supplier: type === 'saida' ? supplier : '', 
                    timestamp: new Date().toISOString()
                };
                const txId = editingId || Date.now().toString();
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${txId}`).set(payload, { merge: true });
                resetForm();
            };

            const startEdit = (t) => {
                setEditingId(t.id); setDesc(t.description || ''); setVal(t.amount ? t.amount.toString().replace('.', ',') : '');
                setType(t.type || 'saida'); setAccount(t.account || 'Mercado Pago'); setDestAccount(t.destinationAccount || '');
                setCat(t.category || ''); setSupplier(t.supplier || ''); setStatus(t.status || 'pago');
                setDate(t.date || new Date().toLocaleDateString('en-CA')); setClearance(t.clearanceDate || new Date().toLocaleDateString('en-CA'));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const togglePaid = async (t) => {
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({ status: t.status === 'pago' ? 'pendente' : 'pago' });
            };

            const markAsPaid = async (t) => {
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({ status: 'pago' });
            };

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; let pendingTotal = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'entrada' && t.status === 'pago') rb += amount;
                        if (t.type === 'saida') {
                            if (t.status === 'pendente') pendingTotal += amount;
                            else costsByCategory[t.category] = (costsByCategory[t.category] || 0) + amount;
                        }
                    }
                });
                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);
                return { rb, custosVariaveis, costsByCategory, totalOperating, pendingTotal, lucro: rb - (custosVariaveis + totalOperating), cmv };
            }, [transactions, dailyRecords, filterMonth]);

            const upcomingAlerts = useMemo(() => {
                const today = new Date(); const todayStr = today.toLocaleDateString('en-CA');
                const limit = new Date(); limit.setDate(limit.getDate() + 2); const limitStr = limit.toLocaleDateString('en-CA');
                return transactions.filter(t => t.type === 'saida' && t.status === 'pendente' && t.clearanceDate >= todayStr && t.clearanceDate <= limitStr);
            }, [transactions]);

            const creditCardStats = useMemo(() => {
                const results = {};
                accounts.filter(a => a.type === 'cartao').forEach(card => {
                    let total = 0;
                    transactions.filter(t => t.account === card.name && t.type === 'saida' && t.date.startsWith(filterMonth)).forEach(t => total += parseFloat(t.amount) || 0);
                    results[card.name] = { total, closing: card.closingDay || 1, due: card.dueDay || 10 };
                });
                return results;
            }, [transactions, accounts, filterMonth]);

            const askConsultant = async () => {
                if (aiLoading) return;
                setAiLoading(true); setAiResponse('');
                const prompt = `Analisa Tribo Burger (${filterMonth}): Faturamento ${formatMoney(stats.rb)}, Lucro ${formatMoney(stats.lucro)}. Sugestões?`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "És um consultor de elite." }] } })
                    });
                    const result = await response.json();
                    setAiResponse(result.candidates?.[0]?.content?.parts?.[0]?.text || "Erro.");
                } catch (e) { setAiResponse("Erro de ligação."); } finally { setAiLoading(false); }
            };

            const editAccount = (acc) => {
                setEditingAccount(acc); setNewItemName(acc.name); setNewItemType(acc.type);
                setNewItemClosingDay(acc.closingDay || ''); setNewItemDueDay(acc.dueDay || '');
                setActiveTab('ajustes');
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-[#F8CC82]" size={32}/></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757] animate-in fade-in duration-500">
                        <div className="text-center mb-8"><img src="logo.png" className="w-20 mx-auto mb-4" /><h2 className="text-2xl font-black uppercase tracking-tighter">Tribo Finanças</h2><p className="text-[10px] font-bold text-slate-400 uppercase mt-2">v9.8 Business</p></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required placeholder="Email" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Senha" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={password} onChange={e => setPassword(e.target.value)} />
                            {authError && <p className="text-red-500 text-[10px] font-bold text-center bg-red-50 p-2 rounded-lg">{authError}</p>}
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs"> {isRegistering ? 'Criar Conta' : 'Entrar'}</button>
                        </form>
                        <button onClick={() => setIsRegistering(!isRegistering)} className="w-full mt-6 text-[10px] font-black text-[#D97757] uppercase tracking-widest">{isRegistering ? 'Voltar para Login' : 'Criar Novo Acesso'}</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <img src="logo.png" className="bg-watermark w-96" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3"><img src="logo.png" className="h-8 w-8 bg-white p-0.5 rounded-full" /><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management v9.8.1</h1></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'planilha', 'cartoes', 'resultados', 'dre', 'fornecedores', 'consultoria', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}>{tab === 'planilha' ? 'Vendas' : tab === 'consultoria' ? 'Consultor' : tab}</button>
                                ))}
                                <button onClick={() => auth.signOut()} className="px-4 py-2 text-[10px] font-black uppercase text-red-400">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                {upcomingAlerts.length > 0 && (
                                    <div className="bg-white border-2 border-red-500 p-6 rounded-[2.5rem] alert-pulse shadow-xl flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div className="flex items-center gap-4"><div className="bg-red-500 p-3 rounded-2xl"><Icon name="bell-ring" className="text-white" size={24} /></div><div><h4 className="text-sm font-black text-red-600 uppercase">Atenção Vencimentos</h4><p className="text-[10px] font-bold text-slate-400 uppercase">Tens {upcomingAlerts.length} pagamentos próximos.</p></div></div>
                                        <div className="flex flex-wrap gap-2 justify-center">{upcomingAlerts.map(a => (<div key={a.id} className="bg-red-50 pl-4 pr-1 py-1 rounded-xl text-[10px] font-black border border-red-100 flex items-center gap-3"><span className="text-red-700 uppercase">{a.description}</span><button onClick={() => markAsPaid(a)} className="w-8 h-8 bg-green-500 text-white rounded-lg flex items-center justify-center"><Icon name="check" size={12} /></button></div>))}</div>
                                    </div>
                                )}

                                <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4"><span className="text-[9px] font-black uppercase text-slate-400">Mês:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500 text-center"><p className="text-[8px] font-black text-[#F8CC82] uppercase mb-1 tracking-widest">Lucro Estimado</p><h3 className={`text-xl font-black ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">Receita Bruta</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">A Pagar</p><h3 className="text-xl font-black text-orange-500">{formatMoney(stats.pendingTotal)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">CMV Mês</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.cmv)}</h3></div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <form onSubmit={saveTx} className="lg:col-span-1 glass-card p-8 rounded-[2.5rem] shadow-sm space-y-4 h-fit">
                                        <div className="flex justify-between border-b pb-3 items-center"><h2 className="text-xs font-black text-[#1A202C] uppercase tracking-widest">{editingId ? 'Editar Lançamento' : 'Novo Lançamento'}</h2>{editingId && <button onClick={resetForm} className="text-red-400"><Icon name="x-circle" size={18}/></button>}</div>
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                            <button type="button" onClick={() => setType('entrada')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'entrada' ? 'bg-green-100 text-green-700 shadow-sm' : 'text-slate-400'}`}>Entrada</button>
                                            <button type="button" onClick={() => setType('saida')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'saida' ? 'bg-red-100 text-red-700 shadow-sm' : 'text-slate-400'}`}>Saída</button>
                                            <button type="button" onClick={() => setType('transferencia')} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase ${type === 'transferencia' ? 'bg-blue-100 text-blue-700 shadow-sm' : 'text-slate-400'}`}>Transf.</button>
                                        </div>
                                        {type !== 'transferencia' && (
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    placeholder="Descrição" 
                                                    required 
                                                    list="desc-suggestions" 
                                                    className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" 
                                                    value={desc} 
                                                    onChange={e => setDesc(e.target.value)} 
                                                />
                                                <datalist id="desc-suggestions">
                                                    {descriptionHistory.map((d, i) => <option key={i} value={d} />)}
                                                </datalist>
                                            </div>
                                        )}
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={account} onChange={e => setAccount(e.target.value)}><option value="">Conta Origem</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                        </div>
                                        {type === 'transferencia' && (
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Conta Destino</label><select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={destAccount} onChange={e => setDestAccount(e.target.value)}><option value="">Selecione...</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select></div>
                                        )}
                                        {type !== 'transferencia' && (
                                            <div className="grid grid-cols-2 gap-3">
                                                <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={cat} onChange={e => setCat(e.target.value)}><option value="">Categoria...</option>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                                <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] outline-none uppercase" value={status} onChange={e => setStatus(e.target.value)}><option value="pago">Pago</option><option value="pendente">Pendente</option></select>
                                            </div>
                                        )}
                                        {type === 'saida' && (
                                            <select className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-[10px] outline-none uppercase" value={supplier} onChange={e => setSupplier(e.target.value)}><option value="">Fornecedor...</option>{suppliers.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}</select>
                                        )}
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Data</label><input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-bold outline-none" value={date} onChange={e => setDate(e.target.value)} /></div>
                                            <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Venc.</label><input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-bold outline-none" value={clearance} onChange={e => setClearance(e.target.value)} /></div>
                                        </div>
                                        <button className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">{editingId ? 'Salvar Edição' : 'Gravar Registo'}</button>
                                    </form>

                                    <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm overflow-hidden h-[600px] flex flex-col">
                                        <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400 tracking-widest flex justify-between"><span>Histórico Mensal</span><span>{filterMonth}</span></div>
                                        <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                            {transactions.filter(t => t.date.startsWith(filterMonth)).map(t => (
                                                <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 group">
                                                    <div className="flex items-center gap-4">
                                                        <button disabled={t.type === 'transferencia'} onClick={() => togglePaid(t)} className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${t.type === 'transferencia' ? 'bg-blue-100 text-blue-500' : (t.status === 'pago' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-600')}`}><Icon name={t.type === 'transferencia' ? 'repeat' : (t.status === 'pago' ? 'check' : 'clock')} size={14} /></button>
                                                        <div><div className="flex items-center gap-2"><p className="font-black text-sm uppercase leading-tight">{t.description}</p>{t.supplier && <span className="bg-slate-100 px-2 py-0.5 rounded text-[8px] font-black text-slate-500 uppercase">{t.supplier}</span>}</div><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.date.split('-').reverse().join('/')} • {t.account}</p></div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <p className={`font-black text-sm mr-2 ${t.type === 'entrada' ? 'text-green-600' : 'text-slate-800'}`}>{formatMoney(t.amount)}</p>
                                                        <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity"><button onClick={() => startEdit(t)} className="p-2 text-slate-300 hover:text-blue-500"><Icon name="edit-3" size={14}/></button><button onClick={async () => { if(window.confirm('Excluir permanentemente?')) await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()}} className="p-2 text-red-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                             <div className="space-y-4 animate-in fade-in duration-300">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-2"><Icon name="table" className="text-[#D97757]" /><h2 className="text-sm font-black uppercase text-slate-800">Planilha Diária</h2></div>
                                    <button onClick={async() => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true }); }} className="bg-[#1A202C] text-[#F8CC82] px-6 py-3 rounded-2xl text-[9px] font-black uppercase">Abrir Novo Dia</button>
                                </div>
                                <div className="glass-card rounded-[2.5rem] shadow-sm overflow-hidden border overflow-x-auto no-scrollbar"><table className="w-full text-center text-[11px] min-w-[1400px]"><thead><tr className="header-black text-white"><th className="p-4 sticky left-0 z-20 bg-black">Data</th><th className="p-4 bg-yellow-500 text-black">Total</th>{['Pix','Pix Online','Fiado','Dinheiro','Ifood','Débito','Crédito','VR','Ticket','Alelo'].map(h => <th key={h} className="p-4">{h}</th>)}<th className="p-4 text-red-400">Motoboy</th><th className="p-4">X</th></tr></thead><tbody className="divide-y font-bold">
                                    {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b) - new Date(a)).map(d => {
                                        const r = dailyRecords[d] || {}; const total = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+(parseFloat(r[f])||0), 0);
                                        return (<tr key={d} className="hover:bg-slate-50 h-12"><td className="p-4 sticky left-0 bg-white font-black text-slate-500 border-r">{d.split('-').reverse().join('/')}</td><td className="p-4 bg-yellow-50 font-black">{formatMoney(total)}</td>{['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo','motoboy'].map(f => (<td key={f} className="p-0 border-r"><input className="table-input" value={r[f] || ''} onChange={async(e) => { const v = e.target.value.replace(',', '.').replace(/[^0-9.]/g, ''); await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: v }, { merge: true }); }} placeholder="0" /></td>))}<td className="p-4"><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td></tr>);
                                    })}
                                </tbody></table></div>
                            </div>
                        )}

                        {activeTab === 'cartoes' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in zoom-in duration-300">
                                {Object.entries(creditCardStats).length === 0 ? (<div className="col-span-full py-20 text-center glass-card rounded-[3rem] opacity-30"><p className="text-slate-400 font-black uppercase text-[10px]">Nenhum cartão cadastrado em Ajustes.</p></div>) : Object.entries(creditCardStats).map(([name, data]) => (<div key={name} className="glass-card p-8 rounded-[3rem] shadow-lg border-t-8 border-[#1A202C]"><div className="flex justify-between items-start mb-6"><div><h3 className="font-black uppercase text-lg">{name}</h3><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Fatura Atual</p></div><button onClick={() => editAccount(accounts.find(a => a.name === name))} className="text-slate-300 hover:text-blue-500 transition-all"><Icon name="edit-3" size={16}/></button></div><h3 className="text-xl font-black text-[#1A202C]">{formatMoney(data.total)}</h3><div className="mt-4 pt-4 border-t grid grid-cols-2"><div className="text-center border-r"><p className="text-[8px] font-black text-slate-400 uppercase">Fecho</p><p className="font-black text-sm text-[#D97757]">Dia {data.closing}</p></div><div className="text-center"><p className="text-[8px] font-black text-slate-400 uppercase">Venc.</p><p className="font-black text-sm text-red-500">Dia {data.due}</p></div></div></div>))}
                            </div>
                        )}

                        {activeTab === 'fornecedores' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="glass-card p-8 rounded-[3rem] h-fit shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="truck" className="text-[#D97757]"/> Novo Fornecedor</h2><div className="space-y-4"><input type="text" className="w-full p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Nome do Fornecedor" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={async() => { if(!newItemName) return; await db.collection(`artifacts/${appId}/users/${user.uid}/suppliers`).add({ name: newItemName, createdAt: new Date().toISOString() }); setNewItemName(''); }} className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Adicionar à Lista</button></div></div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg max-h-[500px] overflow-y-auto no-scrollbar"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="users" /> Lista Registada</h2><div className="space-y-2">{suppliers.map(s => (<div key={s.id} className="p-4 bg-white border rounded-2xl flex justify-between items-center group"><span className="text-xs font-black uppercase">{s.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/suppliers/${s.id}`).delete()} className="text-red-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={14} /></button></div>))}</div></div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8 animate-in fade-in zoom-in duration-500">
                                <h2 className="text-xl font-black uppercase text-center tracking-tighter">Resultados de {filterMonth}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-center">
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-green-500"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Faturamento Bruto</p><h3 className="text-3xl font-black text-green-600">{formatMoney(stats.rb)}</h3></div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-red-500"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Gastos Variáveis</p><h3 className="text-3xl font-black text-red-600">{formatMoney(stats.custosVariaveis)}</h3></div>
                                    <div className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-orange-500"><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Gastos Fixos</p><h3 className="text-3xl font-black text-orange-600">{formatMoney(stats.totalOperating)}</h3></div>
                                    <div className={`glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 ${stats.lucro >= 0 ? 'border-blue-600' : 'border-red-600'}`}><p className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Resultado Final</p><h3 className={`text-3xl font-black ${stats.lucro >= 0 ? 'text-blue-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</h3></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto glass-card rounded-[3rem] p-10 shadow-2xl border-t-8 border-[#D97757]">
                                <h2 className="text-xl font-black uppercase mb-8 border-b pb-4 text-center">DRE Estruturado</h2>
                                <div className="space-y-4">
                                    <div className="flex justify-between p-4 bg-green-50 rounded-2xl font-black uppercase text-[10px] text-green-800"><span>(+) Receita Bruta</span><span>{formatMoney(stats.rb)}</span></div>
                                    <div className="flex justify-between p-4 bg-red-50 rounded-2xl font-black uppercase text-[10px] text-red-800"><span>(-) Custos Variáveis</span><span>{formatMoney(stats.custosVariaveis)}</span></div>
                                    <div className="py-4 border-b">{Object.entries(stats.costsByCategory).map(([cat, val]) => (<div key={cat} className="flex justify-between px-4 py-2 text-[10px] font-bold text-slate-600 uppercase"><span>(-) {cat}</span><span className="text-red-400 font-black">{formatMoney(val)}</span></div>))}</div>
                                    <div className={`flex justify-between p-8 rounded-[2.5rem] mt-6 shadow-xl ${stats.lucro >= 0 ? 'bg-[#1A202C] text-[#F8CC82]' : 'bg-red-600 text-white'}`}><h3 className="text-xl font-black uppercase tracking-widest">Lucro Líquido</h3><span className="text-4xl font-black">{formatMoney(stats.lucro)}</span></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'consultoria' && (
                            <div className="space-y-8 animate-in fade-in slide-in-from-bottom duration-500">
                                <div className="text-center"><div className="inline-block p-4 bg-[#1A202C] rounded-[2.5rem] shadow-xl mb-4"><Icon name="brain-circuit" size={48} className="text-[#F8CC82]" /></div><h2 className="text-2xl font-black uppercase tracking-tighter">Consultor Estratégico IA</h2></div>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                                    <div className="glass-card p-10 rounded-[3.5rem] shadow-lg space-y-6">
                                        <h3 className="text-sm font-black uppercase border-b pb-4">Análise Automática</h3>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-center text-[11px] font-bold"><span className="text-slate-400 uppercase">Vendas:</span><span>{formatMoney(stats.rb)}</span></div>
                                            <div className="flex justify-between items-center text-[11px] font-bold"><span className="text-slate-400 uppercase">CMV Acumulado:</span><span>{formatMoney(stats.cmv)}</span></div>
                                            <div className="flex justify-between items-center pt-4 border-t font-black"><span className="text-xs uppercase">Lucro:</span><span className={`${stats.lucro >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(stats.lucro)}</span></div>
                                        </div>
                                        <button onClick={askConsultant} disabled={aiLoading} className="w-full bg-[#1A202C] text-[#F8CC82] p-5 rounded-3xl font-black uppercase text-xs shadow-xl flex items-center justify-center gap-3 active:scale-95 disabled:opacity-50 transition-all">{aiLoading ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />}{aiLoading ? 'A Analisar...' : 'Gerar Análise Estratégica'}</button>
                                    </div>
                                    <div className="glass-card p-10 rounded-[3.5rem] shadow-sm min-h-[400px] flex flex-col bg-white">
                                        <h3 className="text-sm font-black uppercase border-b pb-4 mb-4 flex items-center gap-2"><Icon name="file-text" className="text-orange-500" /> Plano de Ação</h3>
                                        <div className="flex-1 overflow-y-auto no-scrollbar text-sm leading-relaxed text-slate-600 markdown-content">
                                            {aiResponse ? aiResponse.split('\n').map((line, i) => {
                                                let processed = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                                                if (line.startsWith('#')) return <h3 key={i} dangerouslySetInnerHTML={{ __html: processed.replace(/#/g, '') }} />;
                                                if (line.startsWith('- ')) return <ul key={i}><li dangerouslySetInnerHTML={{ __html: processed.substring(2) }} /></ul>;
                                                return <p key={i} dangerouslySetInnerHTML={{ __html: processed }} />;
                                            }) : (<div className="h-full flex flex-col items-center justify-center opacity-20 py-20 text-center"><Icon name="message-square-dashed" size={48} /><p className="text-[10px] font-black uppercase mt-4">Analisa os teus números agora.</p></div>)}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ajustes' && (
                            <div className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 animate-in slide-in-from-bottom duration-500">
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="landmark" className="text-[#D97757]"/> {editingAccount ? 'Editar Conta' : 'Bancos & Cartões'}</h2><div className="space-y-4">
                                    <div className="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                                        <input type="text" className="w-full p-3 bg-white border rounded-xl text-xs font-bold outline-none mb-2" placeholder="Nome" value={newItemName} onChange={e => setNewItemName(e.target.value)} />
                                        {!editingAccount && (<div className="flex gap-2 mb-2"><button onClick={() => setNewItemType('corrente')} className={`flex-1 p-2 rounded-lg text-[9px] font-black uppercase transition-all ${newItemType === 'corrente' ? 'bg-black text-white' : 'bg-white border text-slate-400'}`}>Corrente</button><button onClick={() => setNewItemType('cartao')} className={`flex-1 p-2 rounded-lg text-[9px] font-black uppercase transition-all ${newItemType === 'cartao' ? 'bg-orange-500 text-white' : 'bg-white border text-slate-400'}`}>Cartão</button></div>)}
                                        {(newItemType === 'cartao' || (editingAccount && editingAccount.type === 'cartao')) && (
                                            <div className="grid grid-cols-2 gap-2 mb-2 animate-in slide-in-from-top-1">
                                                <div className="space-y-1"><label className="text-[7px] font-black text-slate-400 uppercase ml-1">Fecho (Dia)</label><input type="number" className="w-full p-2 text-xs border rounded-lg font-bold" value={newItemClosingDay} onChange={e => setNewItemClosingDay(e.target.value)} /></div>
                                                <div className="space-y-1"><label className="text-[7px] font-black text-slate-400 uppercase ml-1">Venc. (Dia)</label><input type="number" className="w-full p-2 text-xs border rounded-lg font-bold" value={newItemDueDay} onChange={e => setNewItemDueDay(e.target.value)} /></div>
                                            </div>
                                        )}
                                        <div className="flex gap-2"><button onClick={async() => { if(!newItemName) return; if(editingAccount) { await db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${editingAccount.id}`).update({ name: newItemName, closingDay: newItemClosingDay || '1', dueDay: newItemDueDay || '10' }); setEditingAccount(null); } else { await db.collection(`artifacts/${appId}/users/${user.uid}/accounts`).add({ name: newItemName, type: newItemType, closingDay: newItemClosingDay || '1', dueDay: newItemDueDay || '10' }); } setNewItemName(''); setNewItemClosingDay(''); setNewItemDueDay(''); }} className="flex-1 bg-[#1A202C] text-[#F8CC82] p-3 rounded-xl text-[10px] font-black uppercase shadow-sm">{editingAccount ? 'Salvar' : 'Adicionar'}</button>{editingAccount && <button onClick={() => { setEditingAccount(null); setNewItemName(''); }} className="bg-red-50 text-red-500 px-4 py-3 rounded-xl"><Icon name="x" size={14}/></button>}</div>
                                    </div>
                                    <div className="space-y-2 max-h-40 overflow-y-auto no-scrollbar">{accounts.map(a => (<div key={a.id} className="flex justify-between items-center p-3 border rounded-xl bg-white"><div className="flex items-center gap-2 text-[10px] font-black uppercase"><Icon name={a.type === 'cartao' ? 'credit-card' : 'landmark'} size={12}/><span>{a.name}</span></div><div className="flex gap-3"><button onClick={() => editAccount(a)} className="text-slate-300 hover:text-blue-500"><Icon name="edit-2" size={12}/></button><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/accounts/${a.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button></div></div>))}</div>
                                </div></div>
                                <div className="glass-card p-8 rounded-[3rem] shadow-lg"><h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="list" className="text-[#D97757]"/> Categorias DRE</h2><div className="flex gap-2 mb-6"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Ex: Insumos" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={async() => { if(!newItemName) return; await db.collection(`artifacts/${appId}/users/${user.uid}/categories`).add({ name: newItemName }); setNewItemName(''); }} className="bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl"><Icon name="plus" /></button></div><div className="space-y-2 max-h-60 overflow-y-auto no-scrollbar">{categories.map(c => (<div key={c.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl hover:bg-slate-50"><span className="text-xs font-bold uppercase">{c.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={12}/></button></div>))}</div></div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v9.8.1</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
