<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v10.20.0 (FINANCEIRO CORRIGIDO)</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 3px; }
        
        .card-bank-mercado { border-top: 8px solid #009EE3; }
        .card-bank-c6 { border-top: 8px solid #000000; }
        .card-bank-ifood { border-top: 8px solid #EA1D2C; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [filterAcc, setFilterAcc] = useState('');
            const [filterCat, setFilterCat] = useState('');
            
            const [localPayments, setLocalPayments] = useState({});

            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('25');
            const [newItemDueDay, setNewItemDueDay] = useState('10');
            const [editingAccountId, setEditingAccountId] = useState(null);
            const [newDay, setNewDay] = useState(new Date().toLocaleDateString('en-CA'));

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    const accList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAccounts(accList);
                    if (accList.length > 0 && !account) setAccount(accList[0].name);
                });
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubSuppliers = db.collection(`${path}/suppliers`).onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user, filterMonth]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; 
                
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });

                transactions.forEach(t => {
                    if ((t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth)) && t.status === 'pago') {
                        if (t.type === 'saida') {
                            costsByCategory[t.category] = (costsByCategory[t.category] || 0) + p(t.amount);
                        } else if (t.type === 'entrada') {
                            rb += p(t.amount);
                        }
                    }
                });

                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                return { rb, custosVariaveis, totalOperating, lucro: rb - (custosVariaveis + totalOperating), costsByCategory };
            }, [transactions, dailyRecords, filterMonth]);

            const pendingPaymentsConsolidated = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                // Despesas normais pendentes
                const normalPendings = transactions.filter(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    return t.type === 'saida' && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth) && accInfo?.type !== 'cartao';
                });

                // Faturas de Cartão
                const cardInvoices = accounts.filter(a => a.type === 'cartao').map(card => {
                    const cardTxs = transactions.filter(t => t.account === card.name && t.clearanceDate?.startsWith(filterMonth));
                    const total = cardTxs.reduce((acc, t) => {
                        if (t.type === 'saida') return acc + p(t.amount);
                        if (t.type === 'entrada' || t.category === 'Pagamento de Fatura') return acc - p(t.amount);
                        return acc;
                    }, 0);

                    if (total <= 0.01) return null;

                    return {
                        id: `invoice-${card.name}-${filterMonth}`,
                        description: `Fatura: ${card.name}`,
                        amount: total,
                        type: 'saida',
                        status: 'pendente',
                        clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`,
                        account: card.name,
                        category: 'Cartão de Crédito',
                        isInvoice: true
                    };
                }).filter(Boolean);

                return [...normalPendings, ...cardInvoices].sort((a,b) => new Date(a.clearanceDate) - new Date(b.clearanceDate));
            }, [transactions, filterMonth, accounts]);

            const accountBalances = useMemo(() => {
                const balances = {}; accounts.forEach(acc => balances[acc.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = parseFloat(t.amount) || 0;
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + amt;
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { 
                            balances[t.account] = (balances[t.account] || 0) - amt; 
                            balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + amt; 
                        }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || (type !== 'transferencia' && !desc)) return;
                const totalAmount = Math.round(parseFloat(val.replace(',', '.')) * 100) / 100;
                if (isNaN(totalAmount)) return;
                
                const cardInfo = accounts.find(acc => acc.name === account && acc.type === 'cartao');
                const numInstallments = cardInfo && type === 'saida' ? (parseInt(installments) || 1) : 1;
                const batch = db.batch();
                const installmentBase = Math.floor((totalAmount / numInstallments) * 100) / 100;

                for(let i = 0; i < numInstallments; i++) {
                    const currentId = i === 0 && editingId ? editingId : Date.now().toString() + i;
                    const baseDate = new Date(date + 'T12:00:00');
                    baseDate.setMonth(baseDate.getMonth() + i);
                    const finalDateStr = baseDate.toISOString().split('T')[0];
                    let finalClearance = clearance; let finalStatus = status;

                    if (cardInfo) {
                        finalStatus = 'pendente';
                        const purchaseDate = new Date(finalDateStr + 'T12:00:00');
                        if (purchaseDate.getDate() > parseInt(cardInfo.closingDay)) purchaseDate.setMonth(purchaseDate.getMonth() + 1);
                        purchaseDate.setMonth(purchaseDate.getMonth() + 1); purchaseDate.setDate(parseInt(cardInfo.dueDay));
                        finalClearance = purchaseDate.toISOString().split('T')[0];
                    }
                    
                    const currentAmount = (i === numInstallments - 1) ? Math.round((totalAmount - (installmentBase * (numInstallments - 1))) * 100) / 100 : installmentBase;
                    const payload = { 
                        description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : (numInstallments > 1 ? `${desc} (${i+1}/${numInstallments})` : desc), 
                        amount: currentAmount, 
                        type, 
                        status: type === 'transferencia' ? 'pago' : finalStatus, 
                        date: finalDateStr, 
                        clearanceDate: finalClearance, 
                        account, 
                        destinationAccount: type === 'transferencia' ? destAccount : '', 
                        category: type === 'transferencia' ? 'Transferência Interna' : (cat || 'Outros'), 
                        supplier: type === 'saida' ? supplier : '', 
                        timestamp: new Date().toISOString() 
                    };
                    batch.set(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${currentId}`), payload, { merge: true });
                }
                await batch.commit(); resetForm();
            };

            const handleIndividualCardPayment = async (cardName, totalValue) => {
                const payInfo = localPayments[cardName];
                if (!payInfo || !payInfo.sourceAccount || !payInfo.amountToPay || parseFloat(payInfo.amountToPay) <= 0) {
                    alert("Selecione a conta de origem e um valor válido.");
                    return;
                }
                
                const batch = db.batch();
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const payAmt = parseFloat(payInfo.amountToPay);
                
                // 1. Criar transação de SAÍDA na conta corrente (Para aparecer no dashboard)
                const outId = "PAY-OUT-" + Date.now();
                batch.set(db.doc(`${path}/${outId}`), {
                    description: `PAGAMENTO FATURA: ${cardName}`,
                    amount: payAmt,
                    type: 'saida',
                    status: 'pago',
                    date: new Date().toISOString().split('T')[0],
                    clearanceDate: new Date().toISOString().split('T')[0],
                    account: payInfo.sourceAccount,
                    category: 'Pagamento de Fatura',
                    timestamp: new Date().toISOString()
                });

                // 2. Criar transação de CRÉDITO no cartão (Para abater o Valor Aberto)
                const inId = "PAY-IN-" + Date.now();
                batch.set(db.doc(`${path}/${inId}`), {
                    description: `ADIANTAMENTO / PAGAMENTO`,
                    amount: payAmt,
                    type: 'entrada',
                    status: 'pago',
                    date: new Date().toISOString().split('T')[0],
                    clearanceDate: filterMonth + "-01", // Força cair no mês do filtro
                    account: cardName,
                    category: 'Pagamento de Fatura',
                    timestamp: new Date().toISOString()
                });

                // 3. Se for pagamento total, podemos marcar as despesas do mês como pagas (opcional, mas ajuda na organização)
                if (payAmt >= totalValue * 0.99) {
                    const cycleTxs = transactions.filter(t => t.account === cardName && t.clearanceDate?.startsWith(filterMonth) && t.status === 'pendente');
                    cycleTxs.forEach(t => batch.update(db.doc(`${path}/${t.id}`), { status: 'pago' }));
                }
                
                await batch.commit();
                setLocalPayments({...localPayments, [cardName]: { ...payInfo, amountToPay: 0 }});
            };

            const deleteTx = async (id) => { if (confirm('Eliminar lançamento?')) await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${id}`).delete(); };
            const resetForm = () => { setEditingId(null); setDesc(''); setVal(''); setType('saida'); setAccount(accounts[0]?.name || ''); setDestAccount(''); setCat(''); setSupplier(''); setStatus('pago'); setInstallments(1); };
            
            const markAsPaid = async (tId) => {
                if (tId.startsWith('invoice-')) {
                    alert("Para pagar a fatura, utilize a aba de Cartões para selecionar a conta de origem.");
                    setActiveTab('cartoes');
                    return;
                }
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${tId}`).update({ status: 'pago' });
            };

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                try {
                    if (isRegistering) await auth.createUserWithEmailAndPassword(email, password);
                    else await auth.signInWithEmailAndPassword(email, password);
                } catch (err) { setAuthError(err.message); } finally { setLoading(false); }
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-[#F8CC82]" size={48} /></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-10"><img src="logo.png" className="w-24 mx-auto mb-4" alt="logo"/><h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Finanças</h2></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required placeholder="Email" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Senha" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={password} onChange={e => setPassword(e.target.value)} />
                            {authError && <p className="text-red-500 text-xs text-center">{authError}</p>}
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in relative pb-20">
                    <img src="logo.png" className="bg-watermark w-96" alt="watermark" />
                    
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3"><img src="logo.png" className="h-10 w-10 bg-white p-1 rounded-full shadow-lg" alt="logo" /><div><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management</h1></div></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'saldos', 'planilha', 'a_pagar', 'a_receber', 'cartoes', 'resultados', 'dre', 'fornecedores', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>{tab === 'planilha' ? 'Vendas' : tab.replace('_', ' ')}</button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 shadow-sm border-2 border-slate-100"><span className="text-[9px] font-black uppercase text-slate-400">Filtro Período:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500 text-center"><p className="text-[8px] font-black text-[#F8CC82] uppercase mb-1 tracking-widest">Lucro Operacional</p><h3 className={`text-xl font-black ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">Faturamento</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">A Pagar (Pendente)</p><h3 className="text-xl font-black text-orange-500">{formatMoney(pendingPaymentsConsolidated.reduce((acc,p)=>acc+p.amount,0))}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">Gasto Mensal</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.totalOperating + stats.custosVariaveis)}</h3></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <form onSubmit={saveTx} className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-[#1A202C] h-fit">
                                        <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">{editingId ? 'Editar Registo' : 'Novo Lançamento'}</h2>
                                        <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">{['entrada', 'saida', 'transferencia'].map(t => (<button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t.slice(0, 5)}</button>))}</div>
                                        {type !== 'transferencia' && (<input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />)}
                                        <div className="grid grid-cols-2 gap-3">
                                            <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                            <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={account} onChange={e => setAccount(e.target.value)}><option value="">Conta...</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                        </div>
                                        {type !== 'transferencia' ? (
                                            <><div className="grid grid-cols-2 gap-3"><select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={cat} onChange={e => setCat(e.target.value)}><option value="">Categoria...</option>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select><select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={status} onChange={e => setStatus(e.target.value)}><option value="pago">Pago</option><option value="pendente">Pendente</option></select></div></>
                                        ) : (<select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={destAccount} onChange={e => setDestAccount(e.target.value)}><option value="">Para...</option>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>)}
                                        <div className="grid grid-cols-2 gap-3"><input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-bold outline-none" value={date} onChange={e => setDate(e.target.value)} /><input type="date" className="w-full p-4 bg-slate-50 border rounded-2xl text-[10px] font-bold outline-none" value={clearance} onChange={e => setClearance(e.target.value)} /></div>
                                        <button className="w-full bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Gravar Registo</button>
                                    </form>
                                    <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm overflow-hidden h-[600px] flex flex-col border">
                                        <div className="p-4 bg-slate-50 border-b flex items-center justify-between gap-4">
                                            <div className="font-black text-[10px] uppercase text-slate-400 flex items-center gap-2"><Icon name="wallet" size={14} /> Fluxo de Caixa Recente</div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                            {transactions.filter(t => (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth))).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(t => (
                                                <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 transition-colors group">
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${t.type === 'entrada' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}><Icon name={t.type === 'entrada' ? 'trending-up' : 'trending-down'} size={14} /></div>
                                                        <div>
                                                            <div className="flex items-center gap-2">
                                                                <p className="font-black text-sm uppercase">{t.description}</p>
                                                                <span className={`status-badge ${t.status === 'pago' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>{t.status}</span>
                                                            </div>
                                                            <p className="text-[9px] font-bold text-slate-400 uppercase">{t.account} • {t.category}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <p className="font-black text-sm">{formatMoney(t.amount)}</p>
                                                        <button onClick={() => deleteTx(t.id)} className="text-red-200 hover:text-red-500 transition-opacity opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={14} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'saldos' && (
                            <div className="space-y-12 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 px-2">
                                    {['Mercado Pago', 'C6 Bank', 'iFood'].map(name => {
                                        const acc = accounts.find(a => a.name === name);
                                        if (!acc) return null;
                                        return (
                                            <div key={acc.id} className={`bg-white p-8 rounded-[3.5rem] shadow-xl card-bank-${name.toLowerCase().split(' ')[0]} flex flex-col items-center group transition-all hover:scale-105`}>
                                                <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">{acc.name}</p>
                                                <h3 className={`text-4xl font-black ${accountBalances[acc.name] >= 0 ? 'text-slate-900' : 'text-red-500'}`}>{formatMoney(accountBalances[acc.name] || 0)}</h3>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'cartoes' && (
                            <div className="space-y-12 animate-in zoom-in duration-300">
                                <h2 className="text-2xl font-black uppercase text-center tracking-tighter">Gestão Individual de Faturas</h2>
                                
                                {accounts.filter(a => a.type === 'cartao').map(card => {
                                    // Pega todas as transações do cartão que vencem no mês do filtro
                                    const cardTxs = transactions.filter(t => t.account === card.name && t.clearanceDate?.startsWith(filterMonth));
                                    
                                    // Soma faturas (Saídas - Entradas/Pagamentos)
                                    const cardTotalPendente = cardTxs.reduce((acc, t) => {
                                        const amt = parseFloat(t.amount) || 0;
                                        if (t.type === 'saida') return acc + amt;
                                        if (t.type === 'entrada') return acc - amt;
                                        return acc;
                                    }, 0);

                                    const payInfo = localPayments[card.name] || { amountToPay: Math.max(0, cardTotalPendente), sourceAccount: '' };

                                    return (
                                        <div key={card.id} className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-[#1A202C] space-y-8">
                                            <div className="flex flex-col md:flex-row justify-between items-center gap-6 border-b pb-8">
                                                <div className="text-center md:text-left">
                                                    <h3 className="text-2xl font-black uppercase tracking-tighter text-[#1A202C]">{card.name}</h3>
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Fecho dia {card.closingDay} • Vencimento dia {card.dueDay}</p>
                                                </div>
                                                <div className="bg-slate-50 px-10 py-6 rounded-[2.5rem] border text-center">
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1 tracking-widest">Valor em Aberto ({filterMonth})</p>
                                                    <h3 className="text-4xl font-black text-orange-500">{formatMoney(cardTotalPendente)}</h3>
                                                </div>
                                            </div>

                                            <div className="bg-white p-6 rounded-[2rem] border-2 border-dashed border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Pagar através de:</label>
                                                    <select className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-xs outline-none" value={payInfo.sourceAccount} onChange={e => setLocalPayments({...localPayments, [card.name]: { ...payInfo, sourceAccount: e.target.value }})}>
                                                        <option value="">Selecionar Conta Corrente...</option>
                                                        {accounts.filter(acc => acc.type !== 'cartao').map(acc => <option key={acc.id} value={acc.name}>{acc.name}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[9px] font-black text-slate-400 uppercase ml-2">Valor Pagamento:</label>
                                                    <input type="number" className="w-full p-4 bg-slate-50 border rounded-2xl font-black text-sm outline-none" value={payInfo.amountToPay} onChange={e => setLocalPayments({...localPayments, [card.name]: { ...payInfo, amountToPay: e.target.value }})}/>
                                                </div>
                                                <button onClick={() => handleIndividualCardPayment(card.name, cardTotalPendente)} className={`w-full p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg transition-all ${cardTotalPendente > 0 ? 'bg-[#1A202C] text-[#F8CC82] active:scale-95' : 'bg-slate-100 text-slate-300 cursor-not-allowed'}`}>Confirmar Pagamento</button>
                                            </div>

                                            <div className="overflow-hidden rounded-[2rem] border shadow-inner">
                                                <div className="p-4 bg-slate-50 border-b font-black text-[9px] uppercase text-slate-400">Detalhamento de Compras / Pagamentos</div>
                                                <div className="max-h-[300px] overflow-y-auto no-scrollbar">
                                                    <table className="w-full text-left text-[11px]">
                                                        <thead>
                                                            <tr className="bg-white border-b text-[9px] font-black uppercase text-slate-400">
                                                                <th className="p-4">Data Compra</th>
                                                                <th className="p-4">Descrição</th>
                                                                <th className="p-4 text-center">Status</th>
                                                                <th className="p-4 text-right">Valor</th>
                                                                <th className="p-4 text-center">Ações</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y font-semibold">
                                                            {cardTxs.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t => (
                                                                <tr key={t.id} className="hover:bg-slate-50 transition-colors">
                                                                    <td className="p-4 text-slate-400">{t.date?.split('-').reverse().join('/')}</td>
                                                                    <td className="p-4 font-black uppercase">{t.description}</td>
                                                                    <td className="p-4 text-center"><span className={`status-badge ${t.type === 'entrada' ? 'bg-blue-100 text-blue-700' : (t.status === 'pago' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700')}`}>{t.type === 'entrada' ? 'CRÉDITO' : t.status}</span></td>
                                                                    <td className={`p-4 text-right font-black ${t.type === 'entrada' ? 'text-blue-600' : 'text-slate-800'}`}>{t.type === 'entrada' ? "-" : ""}{formatMoney(t.amount)}</td>
                                                                    <td className="p-4 text-center"><button onClick={() => deleteTx(t.id)} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {activeTab === 'a_pagar' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="stat-banner !border-red-500">
                                    <p className="text-[9px] font-black uppercase tracking-[0.4em] text-red-400 mb-2">Compromissos Pendentes (Vencimento {filterMonth})</p>
                                    <h3 className="text-4xl font-black text-white">{formatMoney(pendingPaymentsConsolidated.reduce((acc, t) => acc + t.amount, 0))}</h3>
                                </div>
                                <div className="glass-card rounded-[2.5rem] shadow-sm overflow-hidden flex flex-col min-h-[400px]">
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {pendingPaymentsConsolidated.map(t => (
                                            <div key={t.id} className={`p-6 flex justify-between items-center hover:bg-slate-50 transition-colors ${t.isInvoice ? 'bg-orange-50/40' : ''}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${t.isInvoice ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'}`}><Icon name={t.isInvoice ? 'credit-card' : 'calendar'} size={24} /></div>
                                                    <div><p className="font-black text-base uppercase leading-tight"><span className="text-red-500 mr-2">[{t.clearanceDate?.split('-').reverse().join('/')}]</span>{t.description}</p><p className="text-[10px] font-bold text-slate-400 uppercase mt-1">{t.account} • {t.category}</p></div>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <p className={`font-black text-lg ${t.isInvoice ? 'text-orange-600' : 'text-[#1A202C]'}`}>{formatMoney(t.amount)}</p>
                                                    <button onClick={() => markAsPaid(t.id)} className="w-10 h-10 bg-green-500 text-white rounded-xl flex items-center justify-center shadow-lg hover:bg-green-600 transition-all"><Icon name="check" size={18} /></button>
                                                </div>
                                            </div>
                                        ))}
                                        {pendingPaymentsConsolidated.length === 0 && <div className="p-20 text-center opacity-30 font-black uppercase text-sm tracking-widest">Tudo em dia para este período!</div>}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="stat-banner">
                                    <p className="text-[9px] font-black uppercase tracking-[0.4em] text-[#F8CC82] mb-2">Vendas Totais ({filterMonth})</p>
                                    <h3 className="text-4xl font-black">{formatMoney(Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).reduce((acc, d) => {
                                            const r = dailyRecords[d] || {};
                                            return acc + ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((t,f)=>t+(parseFloat(r[f])||0), 0);
                                        }, 0))}</h3>
                                </div>
                                <div className="flex justify-between items-center bg-white p-4 rounded-3xl border shadow-sm">
                                    <div className="flex items-center gap-2 font-black uppercase text-[10px] text-[#1A202C]"><Icon name="table" /><span>Planilha Diária</span></div>
                                    <div className="flex gap-2"><input type="date" className="p-2 border rounded-xl text-xs font-bold" value={newDay} onChange={e => setNewDay(e.target.value)} /><button onClick={async() => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true }); }} className="bg-[#1A202C] text-[#F8CC82] px-4 py-2 rounded-xl text-[9px] font-black uppercase">Novo Dia</button></div>
                                </div>
                                <div className="glass-card rounded-[2.5rem] shadow-sm overflow-hidden border overflow-x-auto no-scrollbar">
                                    <table className="w-full text-center text-[11px] min-w-[1400px]">
                                        <thead><tr className="header-black text-white"><th className="p-4 sticky left-0 z-20 bg-black">Data</th><th className="p-4 bg-yellow-500 text-black">Total Dia</th>{['Pix','Pix Online','Fiado','Dinheiro','Ifood','Débito','Crédito','VR','Ticket','Alelo'].map(h => <th key={h} className="p-4">{h}</th>)}<th className="p-4 text-red-400">Motoboy</th><th className="p-4">Ações</th></tr></thead>
                                        <tbody className="divide-y font-bold">
                                            {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b) - new Date(a)).map(d => {
                                                const r = dailyRecords[d] || {}; const total = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+(parseFloat(r[f])||0), 0);
                                                return (<tr key={d} className="hover:bg-slate-50 h-12"><td className="p-0 sticky left-0 bg-white border-r min-w-[140px] font-black">{d.split('-').reverse().join('/')}</td><td className="p-4 bg-yellow-50 font-black">{formatMoney(total)}</td>{['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo','motoboy'].map(f => (<td key={f} className="p-0 border-r"><input className="table-input" value={r[f] || ''} onChange={async(e) => { const v = e.target.value.replace(',', '.'); await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: v }, { merge: true }); }} placeholder="0,00" /></td>))}<td className="p-4"><button onClick={() => { if(confirm('Eliminar dia?')) db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()}} className="text-red-200 hover:text-red-500"><Icon name="trash-2" size={14}/></button></td></tr>);
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                        
                        {/* Outras abas (DRE, Fornecedores, Ajustes, etc.) permanecem funcionais conforme v10.19.1 */}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v10.20.0</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
