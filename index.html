<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Financeira v16.9.4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            /* Estados de Login */
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            /* Estados de Dados */
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [metaVendas, setMetaVendas] = useState(0);

            /* Filtros Dashboard */
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [searchQuery, setSearchQuery] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [accFilter, setAccFilter] = useState('');
            const [catFilter, setCatFilter] = useState('');
            const [hideCards, setHideCards] = useState(false);
            const [hideForecasts, setHideForecasts] = useState(false);

            /* Formulários */
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida');
            const [account, setAccount] = useState('');
            const [destAcc, setDestAcc] = useState('');
            const [cat, setCat] = useState('');
            const [sup, setSup] = useState('');
            const [status, setStatus] = useState('pago');
            const [inst, setInst] = useState(1);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [editingId, setEditingId] = useState(null);

            /* Ajustes e Vendas */
            const [newDayDate, setNewDayDate] = useState(new Date().toISOString().split('T')[0]);
            const [accForm, setAccForm] = useState({ id: null, name: '', type: 'corrente', group: 'operacional', closing: '25', due: '10', pos: '1', highlight: false });
            const [supplierInput, setSupplierInput] = useState('');
            const [payDates, setPayDates] = useState({});

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(s => setTransactions(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(s => { const r = {}; s.docs.forEach(d => r[d.id] = d.data()); setDailyRecords(r); });
                const unsubAcc = db.collection(`${path}/accounts`).onSnapshot(s => setAccounts(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubCat = db.collection(`${path}/categories`).onSnapshot(s => setCategories(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubSup = db.collection(`${path}/suppliers`).onSnapshot(s => setSuppliers(s.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubMeta = db.doc(`${path}/settings/config`).onSnapshot(s => { if(s.exists) setMetaVendas(s.data().meta || 0); });

                return () => { unsubTx(); unsubDaily(); unsubAcc(); unsubCat(); unsubSup(); unsubMeta(); };
            }, [user]);

            const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const filteredDashboard = useMemo(() => {
                return transactions.filter(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    const isMonth = (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth) || t.billingMonth === filterMonth);
                    const matchSearch = t.description?.toLowerCase().includes(searchQuery.toLowerCase()) || t.category?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchType = typeFilter === 'todos' || t.type === typeFilter;
                    const matchAcc = accFilter === '' || t.account === accFilter;
                    const matchCat = catFilter === '' || t.category === catFilter;
                    const filterCard = hideCards ? accInfo?.type !== 'cartao' : true;
                    const filterForecast = hideForecasts ? t.status === 'pago' : true;
                    return isMonth && matchSearch && matchType && matchAcc && matchCat && filterCard && filterForecast;
                }).sort((a,b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
            }, [transactions, filterMonth, searchQuery, typeFilter, accFilter, catFilter, hideCards, hideForecasts, accounts]);

            const accountBalances = useMemo(() => {
                const bal = {}; accounts.forEach(a => bal[a.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        const amt = p(t.amount);
                        if (t.type === 'entrada') bal[t.account] = (bal[t.account] || 0) + amt;
                        else if (t.type === 'saida') bal[t.account] = (bal[t.account] || 0) - amt;
                        else if (t.type === 'transferencia') { bal[t.account] -= amt; bal[t.destinationAccount] = (bal[t.destinationAccount] || 0) + amt; }
                    }
                });
                return bal;
            }, [transactions, accounts]);

            const totalPatrimony = useMemo(() => {
                return accounts.filter(a => a.type === 'corrente').reduce((acc, a) => acc + (accountBalances[a.name] || 0), 0);
            }, [accounts, accountBalances]);

            const stats = useMemo(() => {
                let rb = 0; let custos = 0; let catCosts = {}; let diasAtivos = 0; let totalPedidos = 0;
                Object.keys(dailyRecords).forEach(d => {
                    if (d.startsWith(filterMonth)) {
                        const r = dailyRecords[d];
                        const totalDia = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((s,f)=>s+p(r[f]), 0);
                        if (totalDia > 0) diasAtivos++;
                        rb += totalDia;
                        custos += p(r.motoboy) + p(r.taxaEntrega);
                        totalPedidos += p(r.qtdPedidos);
                    }
                });
                transactions.forEach(t => {
                    if (t.status === 'pago' && (t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth))) {
                        if (t.type === 'saida') catCosts[t.category] = (catCosts[t.category] || 0) + p(t.amount);
                    }
                });
                const operCosts = Object.values(catCosts).reduce((a,b)=>a+b, 0);
                return { 
                    rb, 
                    totalCosts: operCosts + custos, 
                    lucro: rb - (operCosts + custos), 
                    catCosts, 
                    diasAtivos, 
                    totalPedidos,
                    ticketDiario: diasAtivos > 0 ? rb / diasAtivos : 0,
                    ticketPedido: totalPedidos > 0 ? rb / totalPedidos : 0
                };
            }, [dailyRecords, transactions, filterMonth]);

            const consolidatedAPagar = useMemo(() => {
                const pendings = transactions.filter(t => {
                    const accInfo = accounts.find(a => a.name === t.account);
                    return t.type === 'saida' && t.status === 'pendente' && t.clearanceDate?.startsWith(filterMonth) && accInfo?.type !== 'cartao';
                });
                const invoices = accounts.filter(a => a.type === 'cartao').map(card => {
                    const txs = transactions.filter(t => t.account === card.name && t.clearanceDate?.startsWith(filterMonth));
                    const sum = txs.reduce((acc, t) => t.type === 'saida' ? acc + p(t.amount) : acc - p(t.amount), 0);
                    if (sum <= 0.01) return null;
                    return { id: `card-${card.name}`, description: `Fatura ${card.name}`, amount: sum, account: card.name, clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`, isInvoice: true };
                }).filter(Boolean);
                return [...pendings, ...invoices].sort((a,b) => a.clearanceDate.localeCompare(b.clearanceDate));
            }, [transactions, accounts, filterMonth]);

            const handleSaveTx = async (e) => {
                e.preventDefault();
                if (!user || !val) return;
                const path = `artifacts/${appId}/users/${user.uid}/transactions`;
                const cardInfo = accounts.find(a => a.name === account && a.type === 'cartao');
                const batch = db.batch();
                const numInst = cardInfo ? inst : 1;

                for (let i = 0; i < numInst; i++) {
                    const d = new Date(date + 'T00:00:00'); d.setMonth(d.getMonth() + i);
                    let finalClearance = clearance;
                    let billingM = d.toISOString().slice(0, 7);
                    
                    if (cardInfo) {
                        const closing = parseInt(cardInfo.closingDay);
                        const due = parseInt(cardInfo.dueDay);
                        let billingDate = new Date(d);
                        if (d.getDate() > closing) billingDate.setMonth(billingDate.getMonth() + 1);
                        billingM = billingDate.toISOString().slice(0, 7);
                        let dueDate = new Date(billingDate); dueDate.setMonth(dueDate.getMonth() + 1); dueDate.setDate(due);
                        finalClearance = dueDate.toISOString().split('T')[0];
                    }

                    const payload = {
                        description: numInst > 1 ? `${desc} (${i+1}/${numInst})` : desc,
                        amount: p(val) / numInst, type, status: cardInfo ? 'pendente' : status,
                        date: d.toISOString().split('T')[0], clearanceDate: finalClearance, billingMonth: billingM,
                        account, destinationAccount: destAcc, category: cat || 'Geral', supplier: sup, timestamp: new Date().toISOString()
                    };

                    if (editingId && i === 0) batch.update(db.doc(`${path}/${editingId}`), payload);
                    else batch.set(db.collection(path).doc(), payload);
                }
                await batch.commit(); 
                setEditingId(null); setDesc(''); setVal(''); setType('saida'); setAccount(''); setCat(''); setSup(''); setInst(1);
            };

            const startEdit = (t) => {
                setEditingId(t.id);
                setDesc(t.description || '');
                setVal(t.amount ? t.amount.toString() : '');
                setType(t.type || 'saida');
                setAccount(t.account || '');
                setCat(t.category || '');
                setSup(t.supplier || '');
                setDate(t.date || new Date().toISOString().split('T')[0]);
                setClearance(t.clearanceDate || new Date().toISOString().split('T')[0]);
                setStatus(t.status || 'pago');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleOpenNewDay = async () => {
                if (!user || !newDayDate) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDayDate}`).set({ initialized: true }, { merge: true });
            };

            const markPaid = async (t, payDate) => {
                if (t.isInvoice) { setActiveTab('cartoes'); return; }
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).update({ status: 'pago', clearanceDate: payDate });
            };

            const saveMeta = async (v) => {
                const path = `artifacts/${appId}/users/${user.uid}/settings/config`;
                await db.doc(path).set({ meta: p(v) }, { merge: true });
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C] text-[#F8CC82] font-black uppercase">Tribo a Carregar...</div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <h2 className="text-3xl font-black text-[#1A202C] uppercase text-center mb-10">Tribo Burger</h2>
                        <form onSubmit={e => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).catch(a => alert(a.message)); }} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" value={email} onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" value={password} onChange={e=>setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Entrar no Sistema</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-1 rounded-full"><img src="logo.png" className="h-8 w-8 object-contain" /></div>
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Gestão Tribo v16.9.4</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'vendas', 'a_pagar', 'a_receber', 'cartoes', 'resultados', 'dre', 'fornecedores', 'ajustes'].map(t => (
                                    <button key={t} onClick={()=>setActiveTab(t)} className={`px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all ${activeTab === t ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {t.replace('_', ' ')}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-4 max-w-7xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 border shadow-sm"><span className="text-[9px] font-black uppercase text-slate-400">Mês Base:</span><input type="month" value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <form onSubmit={handleSaveTx} className="lg:col-span-1 glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-black h-fit relative">
                                    {editingId && <div className="absolute -top-4 right-8 bg-blue-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">Editando Lançamento</div>}
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">{['entrada','saida','transferencia'].map(t=>(<button key={t} type="button" onClick={()=>setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type===t?'bg-white shadow-sm text-black':'text-slate-400'}`}>{t}</button>))}</div>
                                    <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm" value={desc} onChange={e=>setDesc(e.target.value)} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black" value={val} onChange={e=>setVal(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px]" value={account} onChange={e=>setAccount(e.target.value)}><option value="">Conta...</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                    </div>
                                    {accounts.find(a=>a.name===account)?.type === 'cartao' && <input type="number" placeholder="Parcelas" className="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm" value={inst} onChange={e=>setInst(parseInt(e.target.value)||1)} />}
                                    {type === 'transferencia' && <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px]" value={destAcc} onChange={e=>setDestAcc(e.target.value)}><option value="">Para...</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select>}
                                    <div className="grid grid-cols-2 gap-3">
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px]" value={cat} onChange={e=>setCat(e.target.value)}><option value="">Categoria...</option>{categories.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px]" value={sup} onChange={e=>setSup(e.target.value)}><option value="">Fornecedor...</option>{suppliers.map(s=><option key={s.id} value={s.name}>{s.name}</option>)}</select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Data Lanç.</label><input type="date" className="w-full p-3 border rounded-xl text-[10px] font-bold" value={date} onChange={e=>setDate(e.target.value)} /></div>
                                        <div className="space-y-1"><label className="text-[8px] font-black uppercase text-slate-400 ml-2">Venc./Comp.</label><input type="date" className="w-full p-3 border rounded-xl text-[10px] font-bold" value={clearance} onChange={e=>setClearance(e.target.value)} /></div>
                                    </div>
                                    <div className="flex gap-2"><button type="button" onClick={()=>setStatus('pago')} className={`flex-1 p-3 rounded-xl border font-black text-[10px] ${status==='pago'?'bg-green-500 text-white':'bg-white text-slate-400'}`}>PAGO</button><button type="button" onClick={()=>setStatus('pendente')} className={`flex-1 p-3 rounded-xl border font-black text-[10px] ${status==='pendente'?'bg-orange-500 text-white':'bg-white text-slate-400'}`}>PENDENTE</button></div>
                                    <div className="flex gap-3">
                                        <button className="flex-1 bg-black text-[#F8CC82] p-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">{editingId ? 'Atualizar Lançamento' : 'Gravar Movimento'}</button>
                                        {editingId && <button type="button" onClick={()=>{setEditingId(null); setDesc(''); setVal('');}} className="bg-slate-200 text-slate-600 px-6 rounded-2xl font-black uppercase text-[10px]">Cancelar</button>}
                                    </div>
                                </form>

                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[700px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b space-y-4">
                                        <div className="relative"><Icon name="search" size={16} className="absolute left-4 top-3.5 text-slate-300" /><input type="text" placeholder="Pesquisar por nome, categoria ou conta..." className="w-full pl-12 pr-4 py-3 bg-white border rounded-2xl text-xs font-bold outline-none focus:border-black shadow-inner" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} /></div>
                                        <div className="flex flex-wrap gap-2 items-center">
                                            <select className="p-2 border rounded-xl text-[9px] font-black uppercase" value={typeFilter} onChange={e=>setTypeFilter(e.target.value)}><option value="todos">Todos Tipos</option><option value="entrada">Entradas</option><option value="saida">Saídas</option><option value="transferencia">Transf.</option></select>
                                            <select className="p-2 border rounded-xl text-[9px] font-black uppercase" value={accFilter} onChange={e=>setAccFilter(e.target.value)}><option value="">Contas...</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                            <select className="p-2 border rounded-xl text-[9px] font-black uppercase" value={catFilter} onChange={e=>setCatFilter(e.target.value)}><option value="">Categorias...</option>{categories.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                            <div className="flex gap-2 ml-auto">
                                                <button onClick={()=>setHideCards(!hideCards)} className={`p-2 rounded-xl text-[9px] font-black uppercase border transition-all ${hideCards?'bg-black text-[#F8CC82]':'bg-white text-slate-400'}`}>{hideCards?'Cartão Oculto':'Mostrar Cartão'}</button>
                                                <button onClick={()=>setHideForecasts(!hideForecasts)} className={`p-2 rounded-xl text-[9px] font-black uppercase border transition-all ${hideForecasts?'bg-black text-[#F8CC82]':'bg-white text-slate-400'}`}>{hideForecasts?'Apenas Pagos':'Mostrar Tudo'}</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">

                                     <h2 className="text-sm font-black uppercase border-b pb-4">Categorias</h2>
                                     <div className="flex gap-2"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl font-bold text-xs" id="new-cat" placeholder="Nova Categoria..." /><button onClick={async()=>{const v=document.getElementById('new-cat').value; if(!v) return; await db.collection(`artifacts/${appId}/users/${user.uid}/categories`).add({name:v}); document.getElementById('new-cat').value='';}} className="bg-black text-white p-4 rounded-2xl"><Icon name="plus" size={18}/></button></div>
                                     <div className="grid grid-cols-2 gap-2 max-h-96 overflow-y-auto no-scrollbar">
                                        {categories.sort((a,b)=>a.name.localeCompare(b.name)).map(c => (
                                            <div key={c.id} className="p-3 bg-white border rounded-xl flex justify-between items-center group hover:border-black"><span className="text-[10px] font-black uppercase text-slate-500">{c.name}</span><button onClick={async()=>await db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-100 group-hover:text-red-500"><Icon name="trash-2" size={12}/></button></div>
                                        ))}
                                     </div>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'dre' && (
                            <div className="max-w-3xl mx-auto glass-card rounded-[3rem] p-10 shadow-2xl border-t-8 border-[#D97757] animate-in fade-in">
                                <h2 className="text-xl font-black uppercase mb-8 border-b pb-4 text-center">DRE Operacional - {filterMonth}</h2>
                                <div className="space-y-4">
                                    <div className="flex justify-between p-4 bg-green-50 rounded-2xl font-black text-[10px] uppercase"><span>(+) Receita Operacional (Bruta)</span><span>{formatMoney(stats.rb)}</span></div>
                                    <div className="py-4 border-b">
                                        <h3 className="text-[10px] font-black uppercase text-slate-400 mb-2 px-4">Despesas por Categoria</h3>
                                        {Object.entries(stats.catCosts).sort(([a],[b])=>a.localeCompare(b)).map(([c, v]) => (
                                            <div key={c} className="flex justify-between px-4 py-2 text-[10px] font-bold text-slate-600 uppercase"><span>(-) {c}</span><span className="text-red-400 font-black">{formatMoney(v)}</span></div>
                                        ))}
                                        <div className="flex justify-between px-4 py-2 text-[10px] font-bold text-slate-600 uppercase border-t mt-2 pt-2"><span>(-) Custos de Entrega (Vendas)</span><span className="text-red-400 font-black">{formatMoney(dailyRecords?.[filterMonth]?.motoboy ? p(dailyRecords[filterMonth].motoboy) + p(dailyRecords[filterMonth].taxaEntrega) : 0)}</span></div>
                                    </div>
                                    <div className={`flex justify-between p-8 rounded-[2.5rem] mt-6 shadow-xl ${stats.lucro>=0?'bg-[#1A202C] text-[#F8CC82]':'bg-red-600 text-white'}`}><h3 className="text-xl font-black uppercase">Resultado Líquido</h3><span className="text-4xl font-black">{formatMoney(stats.lucro)}</span></div>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'cartoes' && (
                            <div className="space-y-12 animate-in zoom-in duration-300">
                                {accounts.filter(a => a.type === 'cartao').map(card => {
                                    const txs = transactions.filter(t => t.account === card.name && (t.billingMonth === filterMonth || (!t.billingMonth && t.date?.startsWith(filterMonth)))).sort((a,b)=>a.date.localeCompare(b.date));
                                    const total = txs.reduce((acc, t)=>t.type==='saida'?acc+p(t.amount):acc-p(t.amount), 0);
                                    return (
                                        <div key={card.id} className="glass-card p-10 rounded-[3rem] shadow-xl border-t-8 border-black space-y-8">
                                            <div className="flex flex-col md:flex-row justify-between items-center gap-6 border-b pb-8">
                                                <div><h3 className="text-2xl font-black uppercase">{card.name}</h3><p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Fecho: {card.closingDay} • Vencimento: {card.dueDay}</p></div>
                                                <div className="bg-slate-50 px-10 py-6 rounded-[2.5rem] border text-center shadow-inner">
                                                    <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Total na Fatura</p>
                                                    <h3 className={`text-4xl font-black ${total>=0?'text-orange-500':'text-green-600'}`}>{formatMoney(total)}</h3>
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <h4 className="text-[10px] font-black uppercase text-slate-400 ml-4 tracking-widest">Lançamentos da Fatura</h4>
                                                <div className="bg-white/50 rounded-[2rem] border overflow-hidden divide-y">
                                                    {txs.length === 0 ? <p className="p-8 text-center text-[10px] text-slate-300 font-black uppercase">Sem dados</p> : txs.map(t => (
                                                        <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50 group">
                                                            <div className="flex items-center gap-4">
                                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${t.type==='entrada'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}`}><Icon name={t.type==='entrada'?'check-circle':'shopping-cart'} size={14}/></div>
                                                                <div><p className="font-black text-xs uppercase leading-none">{t.description}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.date?.split('-').reverse().join('/')}</p></div>
                                                            </div>
                                                            <div className="flex items-center gap-4"><p className={`font-black text-sm ${t.type==='entrada'?'text-green-600':'text-red-600'}`}>{formatMoney(t.amount)}</p><button onClick={async()=>await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`).delete()} className="text-red-100 group-hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="trash-2" size={14}/></button></div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Burger Financeiro • v16.9.4 Baseline</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
