<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IcaroInvest - Gestão Patrimonial</title>
    
    <!-- Favicon Inicial -->
    <link rel="icon" type="image/png" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #133054; /* Azul do Logo */
            --accent: #bfa260;  /* Dourado do Logo */
            --bg: #f9f9f7;      /* Fundo do Logo */
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b; 
            margin: 0; 
            padding: 0; 
        }
        .rounded-premium { border-radius: 2rem; }
        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(19, 48, 84, 0.05); 
        }
        .tabular { font-variant-numeric: tabular-nums; }
        .no-break { white-space: nowrap; }
        /* Ajuste de fonte para evitar quebra de layout em valores grandes */
        .text-huge { 
            font-size: clamp(0.9rem, 1.8vw, 1.2rem); 
            line-height: 1.2; 
            word-break: break-word;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #0d223d; }
        .text-brand { color: var(--primary); }
        .text-gold { color: var(--accent); }
        .cursor-pointer { cursor: pointer; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-[#133054] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="font-bold text-slate-400 animate-pulse uppercase tracking-widest text-xs">Sincronizando IcaroInvest Elite v11.5...</p>
            </div>
        </div>
    </div>

    <!-- Bibliotecas -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBy8hqZtXZO6CsK45INpunruxbZtdbxJx4",
            authDomain: "icaro-investimentos.firebaseapp.com",
            projectId: "icaro-investimentos",
            storageBucket: "icaro-investimentos.firebasestorage.app",
            appId: "1:45341061429:web:85b89c414110de4c4e9c7c"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            window.firebaseAPI = { db, doc, setDoc, onSnapshot, auth, signInAnonymously, onAuthStateChanged };
        } catch (e) { console.error("Firebase Fail:", e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { PieChart, Pie, Cell, ResponsiveContainer, Tooltip, Legend } = window.Recharts;

        const BRAPI_TOKEN = "pZapqBJxy1rE4pq3g4vy69";
        const COLORS = ['#133054', '#bfa260', '#10b981', '#64748b', '#f43f5e', '#f59e0b'];
        
        // Ativos ignorados globalmente
        const EXCLUDED_TICKERS = ['CHAINLINK', 'PENDLE', 'ETH', 'BTC'];

        const parseValue = (val) => {
            if (val === null || val === undefined || val === '') return 0;
            if (typeof val === 'number') return val;
            let clean = val.toString().trim();
            clean = clean.replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            const [ready, setReady] = useState(false);
            useEffect(() => { if (window.lucide) { setReady(true); window.lucide.createIcons(); } }, [name]);
            return ready ? <i data-lucide={name} style={{ width: size, height: size }} className={className}></i> : <div style={{ width: size, height: size }}></div>;
        };

        const StatCard = ({ title, value, icon, colorClass, isMobile, subValue = null }) => (
            <div className={`glass p-4 rounded-premium flex ${isMobile ? 'flex-col items-start gap-2' : 'items-center gap-3'} min-w-0 shadow-sm hover:shadow-md transition-all flex-1`}>
                <div className={`${colorClass} p-3 rounded-2xl text-white shadow-lg flex-shrink-0`}>
                    <LucideIcon name={icon} size={20} />
                </div>
                <div className="min-w-0 flex-1 w-full overflow-hidden">
                    <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 truncate">{title}</p>
                    <h3 className={`text-huge font-black tabular ${title.includes('Var.') || title.includes('Lucro') ? (parseValue(value.toString().replace(/[^0-9,-]/g, '').replace(',', '.')) >= 0 ? 'text-emerald-600' : 'text-rose-600') : 'text-slate-900'}`}>{value}</h3>
                    {subValue && <p className={`text-[8px] font-black mt-0.5 uppercase truncate ${subValue.toString().startsWith('-') ? 'text-rose-500' : 'text-emerald-500'}`}>{subValue}</p>}
                </div>
            </div>
        );

        // Componente Executivo de Resumo para cada aba
        const TabSummaryHeader = ({ stats, label }) => {
            return (
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 animate-in">
                    <div className="glass p-5 rounded-premium shadow-sm border border-slate-100">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Património {label}</p>
                        <h3 className="text-xl font-black text-[#133054] value-text tabular">{formatBRL(stats.atual)}</h3>
                    </div>
                    <div className="glass p-5 rounded-premium shadow-sm border border-slate-100">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Investido / Custo</p>
                        <h3 className="text-xl font-black text-slate-500 value-text tabular">{formatBRL(stats.investido)}</h3>
                    </div>
                    <div className="glass p-5 rounded-premium shadow-sm border border-slate-100">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Lucro / Prejuízo</p>
                        <h3 className={`text-xl font-black value-text tabular ${stats.lucro >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                            {formatBRL(stats.lucro)}
                            <span className="text-xs font-bold ml-1">({stats.lucroPct.toFixed(2)}%)</span>
                        </h3>
                    </div>
                    <div className="glass p-5 rounded-premium shadow-sm border border-slate-100">
                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Variação Diária</p>
                        <h3 className={`text-xl font-black value-text tabular ${stats.variacaoDiaR$ >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                            {stats.variacaoDiaR$ >= 0 ? '+' : ''}{formatBRL(stats.variacaoDiaR$)}
                            <span className="text-xs font-bold ml-1">({stats.varDiaPct.toFixed(2)}%)</span>
                        </h3>
                    </div>
                </div>
            );
        };

        // Cartão Analítico detalhado por aba para exibição consolidada no Dashboard
        const CategoryPerformanceCard = ({ title, stats, icon, colorClass, borderClass }) => (
            <div className={`bg-white p-6 rounded-[2rem] border ${borderClass} shadow-sm hover:shadow-md transition-all flex flex-col justify-between`}>
                <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-3">
                        <div className={`${colorClass} p-2.5 rounded-xl text-white shadow-md`}>
                            <LucideIcon name={icon} size={18} />
                        </div>
                        <span className="font-black text-xs uppercase text-slate-700 tracking-wider">{title}</span>
                    </div>
                </div>
                
                <div className="space-y-4">
                    <div>
                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Património Atual</span>
                        <span className="text-2xl font-black text-slate-950 tabular">{formatBRL(stats.atual)}</span>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-2 pt-4 border-t border-slate-100">
                        <div>
                            <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Custo / Aplicado</span>
                            <span className="text-xs font-black text-slate-600 tabular">{formatBRL(stats.investido)}</span>
                        </div>
                        <div>
                            <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Lucro Total</span>
                            <span className={`text-xs font-black tabular ${stats.lucro >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                {formatBRL(stats.lucro)} ({stats.lucroPct.toFixed(1)}%)
                            </span>
                        </div>
                    </div>

                    <div className="pt-3 border-t border-slate-100 flex justify-between items-center">
                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Variação Diária</span>
                        <span className={`text-xs font-black tabular px-2.5 py-1 rounded-lg ${stats.variacaoDiaR$ >= 0 ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                            {stats.variacaoDiaR$ >= 0 ? '+' : ''}{formatBRL(stats.variacaoDiaR$)} ({stats.varDiaPct.toFixed(2)}%)
                        </span>
                    </div>
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [investments, setInvestments] = useState({ 
                acoes: [], realEstate: [], caixa: [], alternativos: [],
                caixaTicker: [], altFunds: [], altStocks: [], altCrypto: [], dividendos: [],
                historico: [], movimentacoes: [],
                saldoDisponivel: 0
            });
            const [syncStatus, setSyncStatus] = useState("");
            const [globalSyncing, setGlobalSyncing] = useState(false);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            const [marketTopGainers, setMarketTopGainers] = useState([]);
            const [marketTopLosers, setMarketTopLosers] = useState([]);
            const [marketSort, setMarketSort] = useState({ key: 'patrimonio', dir: 'desc' });
            
            // Estado de ordenação para as seções individuais
            const [sectionSort, setSectionSort] = useState({ key: 'patrimonio', dir: 'desc' });

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!window.firebaseAPI) return;
                const { auth, signInAnonymously, onAuthStateChanged, db, doc, onSnapshot } = window.firebaseAPI;
                signInAnonymously(auth).catch(console.error);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(doc(db, 'investments', 'portfolio_principal'), (snap) => {
                            if (snap.exists()) setInvestments(prevState => ({...prevState, ...snap.data()}));
                        });
                    }
                });
            }, []);

            useEffect(() => {
                if (activeTab === 'mercado') fetchMarketMovers();
            }, [activeTab]);

            const fetchMarketMovers = async () => {
                try {
                    setSyncStatus("Atualizando mercado...");
                    const filterMainStocks = (stocks) => stocks.filter(s => s.volume > 50000 && !EXCLUDED_TICKERS.some(ex => s.stock.toUpperCase().includes(ex)));
                    const res = await fetch(`https://brapi.dev/api/quote/list?sortBy=change&sortOrder=desc&limit=50&token=${BRAPI_TOKEN}`);
                    const data = await res.json();
                    if (data.stocks) setMarketTopGainers(filterMainStocks(data.stocks).slice(0, 10));
                    const resL = await fetch(`https://brapi.dev/api/quote/list?sortBy=change&sortOrder=asc&limit=50&token=${BRAPI_TOKEN}`);
                    const dataL = await resL.json();
                    if (dataL.stocks) setMarketTopLosers(filterMainStocks(dataL.stocks).slice(0, 10));
                    setSyncStatus("");
                } catch (e) { console.error(e); setSyncStatus("Erro de conexão B3."); }
            };

            const save = async (newData) => {
                if (!window.firebaseAPI) return;
                const { db, doc, setDoc } = window.firebaseAPI;
                await setDoc(doc(db, 'investments', 'portfolio_principal'), newData);
            };

            const registrarMovimentacao = (data, ativo, tipo, qtd, valorUnit) => ({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                data: data || new Date().toLocaleDateString('pt-BR'),
                ativo: ativo.toUpperCase(), tipo,
                quantidade: parseValue(qtd), valorUnitario: parseValue(valorUnit),
                valorTotal: parseValue(qtd) * parseValue(valorUnit)
            });

            const getSectionStats = (list, type = 'ticker') => {
                let investido = 0; let atual = 0; let variacaoDiaR$ = 0;
                const filteredList = (list || []).filter(item => !EXCLUDED_TICKERS.includes((item.ticker || "").toUpperCase()));
                if (type === 'ticker') {
                    investido = filteredList.reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoMedio)), 0);
                    atual = filteredList.reduce((acc, i) => acc + (parseValue(i.quantidade) * parseValue(i.precoAtual)), 0);
                    filteredList.forEach(i => {
                        const qty = parseValue(i.quantidade); const cur = parseValue(i.precoAtual); const varPct = parseValue(i.variacaoDia);
                        if (varPct !== 0) {
                            const prevPrice = cur / (1 + (varPct / 100));
                            variacaoDiaR$ += (cur - prevPrice) * qty;
                        }
                    });
                } else {
                    investido = filteredList.reduce((acc, i) => acc + parseValue(i.valorAplicado), 0);
                    atual = filteredList.reduce((acc, i) => acc + parseValue(i.valorAtual), 0);
                }
                const lucro = atual - investido;
                const lucroPct = investido > 0 ? (lucro / investido) * 100 : 0;
                const varDiaPct = atual > 0 ? (variacaoDiaR$ / (atual - variacaoDiaR$)) * 100 : 0;
                return { investido, atual, lucro, lucroPct, variacaoDiaR$, varDiaPct };
            };

            const totals = useMemo(() => {
                const sAcoes = getSectionStats(investments.acoes, 'ticker');
                const sRE = getSectionStats(investments.realEstate, 'ticker');
                const sCaixaM = getSectionStats(investments.caixa, 'manual');
                const sCaixaT = getSectionStats(investments.caixaTicker, 'ticker');
                const sAltF = getSectionStats(investments.altFunds, 'manual');
                const sAltS = getSectionStats(investments.altStocks, 'ticker');
                const sAltC = getSectionStats(investments.altCrypto, 'ticker');
                const divsPagos = (investments.dividendos || []).filter(d => (d.status === 'pago' || !d.status) && !EXCLUDED_TICKERS.includes(d.ativo.toUpperCase())).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);
                const divsPendentes = (investments.dividendos || []).filter(d => d.status === 'pendente' && !EXCLUDED_TICKERS.includes(d.ativo.toUpperCase())).reduce((acc, b) => acc + parseValue(b.valor || 0), 0);
                const saldo = parseValue(investments.saldoDisponivel);
                
                const acoes = sAcoes; 
                const re = sRE;
                
                const caixa = { 
                    investido: sCaixaM.investido + sCaixaT.investido, 
                    atual: sCaixaM.atual + sCaixaT.atual + saldo, 
                    lucro: sCaixaM.lucro + sCaixaT.lucro, 
                    variacaoDiaR$: sCaixaT.variacaoDiaR$ 
                };
                caixa.lucroPct = caixa.investido > 0 ? (caixa.lucro / caixa.investido) * 100 : 0;
                const prevCaixaActual = (caixa.atual - saldo) - caixa.variacaoDiaR$;
                caixa.varDiaPct = prevCaixaActual !== 0 ? (caixa.variacaoDiaR$ / prevCaixaActual) * 100 : 0;
                
                const alt = { 
                    investido: sAltF.investido + sAltS.investido + sAltC.investido, 
                    atual: sAltF.atual + sAltS.atual + sAltC.atual, 
                    lucro: sAltF.lucro + sAltS.lucro + sAltC.lucro, 
                    variacaoDiaR$: sAltS.variacaoDiaR$ + sAltC.variacaoDiaR$ 
                };
                alt.lucroPct = alt.investido > 0 ? (alt.lucro / alt.investido) * 100 : 0;
                const prevAltActual = alt.atual - alt.variacaoDiaR$;
                alt.varDiaPct = prevAltActual !== 0 ? (alt.variacaoDiaR$ / prevAltActual) * 100 : 0;
                
                const totalAtu = acoes.atual + re.atual + caixa.atual + alt.atual;
                const varDiaTotal = acoes.variacaoDiaR$ + re.variacaoDiaR$ + caixa.variacaoDiaR$ + alt.variacaoDiaR$ ;
                const prevTotal = totalAtu - varDiaTotal;
                const varDiaTotalPct = prevTotal !== 0 ? (varDiaTotal / prevTotal) * 100 : 0;
                
                return { acoes, re, caixa, alt, divsPagos, divsPendentes, total: totalAtu, varDiaTotal, varDiaTotalPct, saldo };
            }, [investments]);

            const marketPortfolioList = useMemo(() => {
                const combined = [
                    ...(investments.acoes || []),
                    ...(investments.realEstate || []),
                    ...(investments.caixaTicker || []),
                    ...(investments.altStocks || []),
                    ...(investments.altCrypto || [])
                ].filter(item => !EXCLUDED_TICKERS.includes((item.ticker || "").toUpperCase()));
                const list = combined.map(item => {
                    const q = parseValue(item.quantidade);
                    const cur = parseValue(item.precoAtual);
                    const varPct = parseValue(item.variacaoDia);
                    const pat = q * cur;
                    const custo = q * parseValue(item.precoMedio);
                    
                    let varR = 0;
                    if (varPct !== 0) {
                        const prevP = cur / (1 + (varPct / 100));
                        varR = (cur - prevP) * q;
                    }

                    return { 
                        ativo: item.ticker, 
                        qtd: q, 
                        custo: custo, 
                        atual: cur, 
                        varDia: varPct,
                        varDiaR$: varR,
                        patrimonio: pat, 
                        lucro: pat - custo 
                    };
                });
                return list.sort((a, b) => {
                    const valA = a[marketSort.key]; const valB = b[marketSort.key];
                    return marketSort.dir === 'desc' ? valB - valA : valA - valB;
                });
            }, [investments, marketSort]);

            const handleMarketSort = (key) => setMarketSort(prev => ({ key, dir: prev.key === key && prev.dir === 'desc' ? 'asc' : 'desc' }));
            const handleSectionSort = (key) => setSectionSort(prev => ({ key, dir: prev.key === key && prev.dir === 'desc' ? 'asc' : 'desc' }));

            const syncGlobalPortfolio = async () => {
                const categories = ['acoes', 'realEstate', 'caixaTicker', 'altStocks', 'altCrypto'];
                setGlobalSyncing(true); setSyncStatus("Sincronização Total B3...");
                let updatedInvestments = { ...investments };
                for (const cat of categories) {
                    const list = [...(updatedInvestments[cat] || [])];
                    if (list.length === 0) continue;
                    for (let i = 0; i < list.length; i++) {
                        const t = list[i].ticker;
                        setSyncStatus(`A atualizar ${t}...`);
                        try {
                            const url = `https://brapi.dev/api/quote/${t}?token=${BRAPI_TOKEN}`;
                            const res = await fetch(url); const d = await res.json();
                            if (d.results?.[0]) { list[i].precoAtual = d.results[0].regularMarketPrice; list[i].variacaoDia = d.results[0].regularMarketChangePercent; }
                            await new Promise(r => setTimeout(r, 400));
                        } catch (e) { console.error(e); }
                    }
                    updatedInvestments[cat] = list;
                }
                setInvestments(updatedInvestments); await save(updatedInvestments);
                setGlobalSyncing(false); setSyncStatus("Carteira Sincronizada!"); setTimeout(() => setSyncStatus(""), 3000);
            };

            const handleTrade = (cat, item, type, operation) => {
                const isBuy = operation === 'BUY';
                const label = isBuy ? 'Compra' : 'Venda';
                if (type === 'ticker') {
                    const qInput = prompt(`Quantidade de ${label} para ${item.ticker}:`, "1");
                    const pInput = prompt(`Preço Unitário da ${label} de ${item.ticker}:`, item.precoAtual || item.precoMedio);
                    if (qInput && pInput) {
                        const qty = parseValue(qInput); const price = parseValue(pInput); const totalOp = qty * price;
                        if (!isBuy && qty > item.quantidade) { alert("Quantidade insuficiente."); return; }
                        let next = { ...investments }; const list = [...(next[cat] || [])]; const idx = list.findIndex(i => i.id === item.id);
                        if (idx !== -1) {
                            if (isBuy) {
                                const currentTotal = list[idx].quantidade * list[idx].precoMedio;
                                const newQty = list[idx].quantidade + qty;
                                list[idx].precoMedio = (currentTotal + totalOp) / newQty;
                                list[idx].quantidade = newQty;
                                next.saldoDisponivel -= totalOp;
                            } else {
                                list[idx].quantidade -= qty; next.saldoDisponivel += totalOp;
                                if (list[idx].quantidade <= 0) list.splice(idx, 1);
                            }
                            next[cat] = list; next.movimentacoes = [registrarMovimentacao(null, item.ticker, label, qty, price), ...(next.movimentacoes || [])];
                            setInvestments(next); save(next);
                        }
                    }
                } else {
                    const vInput = prompt(`Valor do ${isBuy ? 'Aporte' : 'Resgate'} em ${item.nome}:`);
                    if (vInput) {
                        const val = parseValue(vInput); if (!isBuy && val > item.valorAtual) { alert("Saldo insuficiente."); return; }
                        let next = { ...investments }; const list = [...(next[cat] || [])]; const idx = list.findIndex(i => i.id === item.id);
                        if (idx !== -1) {
                            if (isBuy) { list[idx].valorAtual += val; list[idx].valorAplicado += val; next.saldoDisponivel -= val; }
                            else { list[idx].valorAtual -= val; next.saldoDisponivel += val; if (list[idx].valorAtual <= 0) list.splice(idx, 1); }
                            next[cat] = list; next.movimentacoes = [registrarMovimentacao(null, item.nome, isBuy ? 'Aporte' : 'Resgate', 1, val), ...(next.movimentacoes || [])];
                            setInvestments(next); save(next);
                        }
                    }
                }
            };

            const handleUpdateManualValue = (cat, item) => {
                const vInput = prompt(`Novo saldo atual para ${item.nome || item.ticker}:`, item.valorAtual || item.precoAtual);
                if (vInput !== null) {
                    const val = parseValue(vInput);
                    let next = { ...investments };
                    const list = [...(next[cat] || [])];
                    const idx = list.findIndex(i => i.id === item.id);
                    if (idx !== -1) {
                        if (cat === 'caixa' || cat === 'altFunds') {
                            list[idx].valorAtual = val;
                        } else {
                            list[idx].precoAtual = val;
                        }
                        next[cat] = list;
                        setInvestments(next); save(next);
                        setSyncStatus("Saldo atualizado!");
                        setTimeout(() => setSyncStatus(""), 2000);
                    }
                }
            };

            const lancarProvento = (ativo) => {
                const valor = parseValue(prompt(`Valor do provento de ${ativo}:`));
                if (isNaN(valor) || valor <= 0) return;
                const isPaid = prompt("Já pago? (S/N)", "S")?.toUpperCase() === 'S';
                const data = prompt("Data (DD/MM/AAAA):", new Date().toLocaleDateString('pt-BR'));
                setInvestments(prev => {
                    const status = isPaid ? 'pago' : 'pendente';
                    const newDiv = { id: Date.now().toString(), data, ativo: ativo.toUpperCase(), tipo: "Dividendo", valor, status };
                    let next = { ...prev, dividendos: [...(prev.dividendos||[]), newDiv] };
                    if (isPaid) {
                        next.movimentacoes = [registrarMovimentacao(data, ativo, "Provento", 1, valor), ...(prev.movimentacoes || [])];
                        next.saldoDisponivel = (parseValue(prev.saldoDisponivel) || 0) + valor;
                    }
                    save(next); return next;
                });
            };

            const confirmarRecebimento = (divId) => {
                setInvestments(prev => {
                    const target = (prev.dividendos || []).find(d => d.id === divId);
                    if (!target) return prev;
                    const updatedDivs = prev.dividendos.map(d => d.id === divId ? { ...d, status: 'pago' } : d);
                    const next = { ...prev, dividendos: updatedDivs, movimentacoes: [registrarMovimentacao(null, target.ativo, "Provento", 1, target.valor), ...(prev.movimentacoes || [])], saldoDisponivel: (parseValue(prev.saldoDisponivel) || 0) + parseValue(target.valor) };
                    save(next); return next;
                });
            };

            const renderTableSection = (cat, title, type = 'ticker') => {
                const rawData = (investments[cat] || []);
                
                // Preparar dados para ordenação
                const processedData = rawData.map(item => {
                    const q = type === 'ticker' ? parseValue(item.quantidade) : 1;
                    const pA = type === 'ticker' ? parseValue(item.precoAtual) : parseValue(item.valorAtual);
                    const pC = type === 'ticker' ? parseValue(item.precoMedio) : parseValue(item.valorAplicado);
                    const varPct = type === 'ticker' ? parseValue(item.variacaoDia) : 0;
                    const pat = q * pA;
                    let varR = 0;
                    if (type === 'ticker' && varPct !== 0) {
                        const prevP = pA / (1 + (varPct / 100));
                        varR = (pA - prevP) * q;
                    }
                    return { 
                        ...item, 
                        _ativo: type === 'ticker' ? item.ticker : item.nome,
                        _qtd: q,
                        _custo: pC,
                        _atual: pA,
                        _varPct: varPct,
                        _varR: varR,
                        _patrimonio: pat
                    };
                });

                // Aplicar ordenação
                const sortedData = [...processedData].sort((a, b) => {
                    const valA = a[sectionSort.key] ?? 0;
                    const valB = b[sectionSort.key] ?? 0;
                    if (typeof valA === 'string') {
                        return sectionSort.dir === 'desc' ? valB.localeCompare(valA) : valA.localeCompare(valB);
                    }
                    return sectionSort.dir === 'desc' ? valB - valA : valA - valB;
                });

                return (
                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 animate-in mb-10">
                        <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center flex-wrap gap-4">
                            <h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">{title}</h2>
                            <button onClick={() => {
                                if(type === 'ticker') {
                                    const t = prompt("Ticker:"); const q = prompt("Qtd:"); const p = prompt("P. Médio:");
                                    if(t && q) { 
                                        const tickerUpper = t.toUpperCase();
                                        if (EXCLUDED_TICKERS.includes(tickerUpper)) { alert("Ativo excluído."); return; }
                                        const next = { ...investments, [cat]: [...(investments[cat]||[]), {id: Date.now().toString(), ticker: tickerUpper, quantity: parseValue(q), quantidade: parseValue(q), precoMedio: parseValue(p), precoAtual: parseValue(p)}], movimentacoes: [registrarMovimentacao(null, tickerUpper, 'Compra', q, p), ...(investments.movimentacoes || [])], saldoDisponivel: parseValue(investments.saldoDisponivel) - (parseValue(q) * parseValue(p)) };
                                        setInvestments(next); save(next);
                                    }
                                } else {
                                    const n = prompt("Nome:"); const va = prompt("Vlr Aplicado:"); const vt = prompt("Vlr Atual:");
                                    if(n && va) { 
                                        const next = { ...investments, [cat]: [...(investments[cat]||[]), {id: Date.now().toString(), nome: n, valorAplicado: parseValue(va), valorAtual: parseValue(vt || va)}], movimentacoes: [registrarMovimentacao(null, n, 'Compra', 1, va), ...(investments.movimentacoes || [])], saldoDisponivel: parseValue(investments.saldoDisponivel) - parseValue(va) };
                                        setInvestments(next); save(next);
                                    }
                                }
                            }} className="bg-[#133054] text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-black shadow-lg">+ Novo Ativo</button>
                        </div>
                        <div className="overflow-x-auto custom-scroll">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer select-none">
                                    <tr>
                                        <th className="px-10 py-6" onClick={() => handleSectionSort('_ativo')}>Ativo <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        {type === 'ticker' && <th className="px-10 py-6 text-center" onClick={() => handleSectionSort('_qtd')}>Qtd <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>}
                                        <th className="px-10 py-6 text-right" onClick={() => handleSectionSort('_custo')}>Custo <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-10 py-6 text-right" onClick={() => handleSectionSort('_atual')}>Atual <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        {type === 'ticker' && <th className="px-10 py-6 text-right" onClick={() => handleSectionSort('_varPct')}>Var. Dia % <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>}
                                        <th className="px-10 py-6 text-right" onClick={() => handleSectionSort('_varR')}>Var. Dia R$ <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-10 py-6 text-right" onClick={() => handleSectionSort('_patrimonio')}>Património <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                        <th className="px-10 py-6 text-right min-w-[320px]">Gestão</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 tabular text-sm">
                                    {sortedData.map(item => (
                                        <tr key={item.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="px-10 py-6 font-black text-slate-900 uppercase">{item._ativo}</td>
                                            {type === 'ticker' && <td className="px-10 py-6 text-center font-bold">{item._qtd.toLocaleString()}</td>}
                                            <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(item._custo)}</td>
                                            <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(item._atual)}</td>
                                            {type === 'ticker' && <td className={`px-10 py-6 text-right font-bold ${item._varPct >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{item._varPct.toFixed(2)}%</td>}
                                            <td className={`px-10 py-6 text-right font-bold ${item._varR >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>
                                                {type === 'ticker' ? formatBRL(item._varR) : '-'}
                                            </td>
                                            <td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(item._patrimonio)}</td>
                                            <td className="px-10 py-6 text-right">
                                                <div className="flex justify-end items-center gap-2">
                                                    {type === 'manual' && (
                                                        <button onClick={() => handleUpdateManualValue(cat, item)} className="bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-blue-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                                            <LucideIcon name="Edit3" size={12}/> Atualizar
                                                        </button>
                                                    )}
                                                    {(cat === 'acoes' || cat === 'realEstate' || cat === 'caixaTicker') && (
                                                        <button onClick={() => lancarProvento(item.ticker)} className="bg-emerald-50 text-emerald-600 px-3 py-2 rounded-xl border border-emerald-100 hover:bg-emerald-600 hover:text-white transition-all flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                                            <LucideIcon name="Coins" size={12}/> Provento
                                                        </button>
                                                    )}
                                                    <button onClick={() => handleTrade(cat, item, type, 'BUY')} className="bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-emerald-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                                        <LucideIcon name="PlusCircle" size={12}/> Compra
                                                    </button>
                                                    <button onClick={() => handleTrade(cat, item, type, 'SELL')} className="bg-orange-50 text-orange-600 hover:bg-orange-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-orange-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                                        <LucideIcon name="MinusCircle" size={12}/> Venda
                                                    </button>
                                                    <button onClick={() => { if(confirm(`Eliminar definitivamente?`)) { const next = {...investments, [cat]: investments[cat].filter(i => i.id !== item.id)}; setInvestments(next); save(next); } }} className="bg-rose-50 text-rose-500 hover:bg-rose-600 hover:text-white px-3 py-2 rounded-xl transition-all shadow-sm border border-rose-100 flex items-center gap-2 text-[9px] font-black uppercase tracking-widest">
                                                        <LucideIcon name="Trash2" size={12}/> Eliminar
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-32">
                    <header className="py-10 flex flex-col md:flex-row justify-between items-center gap-8">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setActiveTab('dashboard')}>
                            <img src="logo.png" alt="Logo" className="h-20 w-auto" />
                        </div>
                        <nav className="flex bg-white p-2 rounded-[1.5rem] shadow-sm border border-slate-100 overflow-x-auto no-scrollbar max-w-full">
                            {[
                                { id: 'dashboard', icon: 'LayoutDashboard', label: 'Resumo' },
                                { id: 'mercado', icon: 'Globe', label: 'Resumo Mercado' },
                                { id: 'acoes', icon: 'TrendingUp', label: 'Ações / ETF' },
                                { id: 'realEstate', icon: 'Home', label: 'RE' },
                                { id: 'caixa', icon: 'Landmark', label: 'Caixa' },
                                { id: 'alternativos', icon: 'Layers', label: 'Alt' },
                                { id: 'movimentacoes', icon: 'ArrowLeftRight', label: 'Mov' },
                                { id: 'dividendos', icon: 'Coins', label: 'Proventos' },
                                { id: 'historico', icon: 'History', label: 'Histórico' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl text-xs font-black transition-all whitespace-nowrap ${activeTab === t.id ? 'bg-[#133054] text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`}>
                                    <LucideIcon name={t.icon} size={14} /> {t.label}
                                </button>
                            ))}
                        </nav>
                    </header>

                    {syncStatus && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-50 bg-[#133054] text-white px-8 py-3 rounded-full shadow-2xl text-[10px] font-black uppercase tracking-widest animate-in">{syncStatus}</div>}

                    <main className="space-y-10 animate-in">
                        {activeTab === 'dashboard' && (
                            <div className="space-y-10">
                                {/* Linha de Ativos Clássica */}
                                <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3">
                                    <StatCard isMobile={isMobile} title="Saldo Livre" value={formatBRL(totals.saldo)} icon="Wallet" colorClass="bg-emerald-600" />
                                    <StatCard isMobile={isMobile} title="Património" value={formatBRL(totals.total)} icon="PieChart" colorClass="bg-[#133054]" />
                                    <StatCard isMobile={isMobile} title="Ações" value={formatBRL(totals.acoes.atual)} icon="BarChart3" colorClass="bg-[#bfa260]" />
                                    <StatCard isMobile={isMobile} title="RE" value={formatBRL(totals.re.atual)} icon="Building2" colorClass="bg-emerald-500" />
                                    <StatCard isMobile={isMobile} title="Caixa" value={formatBRL(totals.caixa.atual - totals.saldo)} icon="PiggyBank" colorClass="bg-slate-500" />
                                    <StatCard isMobile={isMobile} title="Alt" value={formatBRL(totals.alt.atual)} icon="Layers" colorClass="bg-rose-500" />
                                </div>

                                {/* NOVO: Seção Detalhada por Aba (Consolidado de Performance de Categorias) */}
                                <div className="space-y-4">
                                    <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">Desempenho por Categoria (Abas)</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <CategoryPerformanceCard title="Ações / ETF" stats={totals.acoes} icon="BarChart3" colorClass="bg-[#bfa260]" borderClass="border-amber-100" />
                                        <CategoryPerformanceCard title="Real Estate" stats={totals.re} icon="Building2" colorClass="bg-emerald-500" borderClass="border-emerald-100" />
                                        <CategoryPerformanceCard title="Reserva e Caixa" stats={totals.caixa} icon="PiggyBank" colorClass="bg-slate-500" borderClass="border-slate-200" />
                                        <CategoryPerformanceCard title="Alternativos" stats={totals.alt} icon="Layers" colorClass="bg-rose-500" borderClass="border-rose-100" />
                                    </div>
                                </div>

                                {/* Gráfico de Alocação e Composição */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-2 bg-white rounded-[2.5rem] p-10 min-h-[500px] flex flex-col shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10 text-center">Alocação Total</h2>
                                        <div className="flex-1 w-full h-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie data={[{ name: 'Ações', value: totals.acoes.atual }, { name: 'RE', value: totals.re.atual }, { name: 'Caixa', value: totals.caixa.atual }, { name: 'Alt', value: totals.alt.atual }].filter(d => d.value > 0)} innerRadius={80} outerRadius={140} paddingAngle={8} dataKey="value" stroke="none" cornerRadius={12}>
                                                        {COLORS.map((c, i) => <Cell key={i} fill={c} />)}
                                                    </Pie>
                                                    <Tooltip contentStyle={{ borderRadius: '1.5rem', border: 'none', boxShadow: '0 10px 20px rgba(0,0,0,0.05)', fontBold: '900' }} formatter={(v) => formatBRL(v)} />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Composição</h2>
                                        <div className="space-y-4">
                                            {[ { label: 'Ações', v: totals.acoes, color: COLORS[0] }, { label: 'RE', v: totals.re, color: COLORS[1] }, { label: 'Caixa', v: totals.caixa, color: COLORS[2] }, { label: 'Alt', v: totals.alt, color: COLORS[4] } ].map(item => (
                                                <div key={item.label} className="p-5 bg-slate-50/50 rounded-3xl border border-slate-100 flex justify-between items-center">
                                                    <div className="flex items-center gap-3"><div className="w-3 h-3 rounded-full" style={{ background: item.color }}></div><span className="font-bold text-slate-700 text-xs uppercase">{item.label}</span></div>
                                                    <span className="font-black text-slate-900 tabular">{formatBRL(item.v.atual)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'mercado' && (
                            <div className="space-y-10 animate-in">
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                    <div className="p-8 bg-slate-50/30 border-b flex justify-between items-center flex-wrap gap-4">
                                        <div><h2 className="font-black text-[#133054] uppercase tracking-tighter text-2xl">Carteira Consolidada</h2><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Visão geral dos ativos cotados</p></div>
                                        <button onClick={syncGlobalPortfolio} disabled={globalSyncing} className={`bg-emerald-600 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 shadow-lg flex items-center gap-2 transition-all ${globalSyncing ? 'opacity-50' : ''}`}>
                                            <LucideIcon name="RefreshCw" size={14} className={globalSyncing ? 'spin' : ''} /> {globalSyncing ? 'Sincronizando...' : 'Sincronizar B3'}
                                        </button>
                                    </div>
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer select-none">
                                                <tr>
                                                    <th className="px-10 py-6" onClick={() => handleMarketSort('ativo')}>Ativos <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                    <th className="px-10 py-6 text-center" onClick={() => handleMarketSort('qtd')}>QTY <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('custo')}>CUSTO <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('atual')}>ATUAL <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('varDia')}>VAR DIA % <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('varDiaR$')}>VAR DIA R$ <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                    <th className="px-10 py-6 text-right" onClick={() => handleMarketSort('patrimonio')}>PATRIMONIO <LucideIcon name="ChevronDown" size={10} className="inline ml-1"/></th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 tabular text-sm">
                                                {marketPortfolioList.map(item => (
                                                    <tr key={item.ativo + Math.random()} className="hover:bg-slate-50/50 transition-colors">
                                                        <td className="px-10 py-6 font-black text-[#133054] uppercase">{item.ativo}</td>
                                                        <td className="px-10 py-6 text-center font-bold">{item.qtd.toLocaleString()}</td>
                                                        <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(item.custo)}</td>
                                                        <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(item.atual)}</td>
                                                        <td className={`px-10 py-6 text-right font-bold ${item.varDia >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{item.varDia.toFixed(2)}%</td>
                                                        <td className={`px-10 py-6 text-right font-bold ${item.varDiaR$ >= 0 ? 'text-emerald-600' : 'text-rose-500'}`}>{formatBRL(item.varDiaR$)}</td>
                                                        <td className="px-10 py-6 text-right font-black text-slate-900">{formatBRL(item.patrimonio)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                        <div className="p-8 bg-emerald-50/50 border-b flex items-center gap-3"><div className="p-2 bg-emerald-600 rounded-lg text-white"><LucideIcon name="TrendingUp" size={20}/></div><h2 className="font-black text-emerald-800 uppercase tracking-tighter text-xl">Maiores Altas</h2></div>
                                        <div className="p-4 space-y-2">
                                            {marketTopGainers.map((s) => (
                                                <div key={s.stock} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl"><span className="font-black text-[#133054] uppercase">{s.stock}</span><div className="text-right"><p className="font-black text-slate-900 text-xs">{formatBRL(s.close)}</p><p className="font-black text-emerald-600 text-[10px]">+{s.change.toFixed(2)}%</p></div></div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                        <div className="p-8 bg-rose-50/50 border-b flex items-center gap-3"><div className="p-2 bg-rose-600 rounded-lg text-white"><LucideIcon name="TrendingDown" size={20}/></div><h2 className="font-black text-rose-800 uppercase tracking-tighter text-xl">Maiores Baixas</h2></div>
                                        <div className="p-4 space-y-2">
                                            {marketTopLosers.map((s) => (
                                                <div key={s.stock} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl"><span className="font-black text-[#133054] uppercase">{s.stock}</span><div className="text-right"><p className="font-black text-slate-900 text-xs">{formatBRL(s.close)}</p><p className="font-black text-rose-600 text-[10px]">{s.change.toFixed(2)}%</p></div></div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'movimentacoes' && (
                            <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 animate-in">
                                <div className="p-8 border-b"><h2 className="text-2xl font-black uppercase text-[#133054]">Histórico de Movimentações</h2></div>
                                <div className="overflow-x-auto custom-scroll">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest"><tr><th className="px-10 py-6">Data</th><th className="px-10 py-6">Ativo</th><th className="px-10 py-6">Tipo</th><th className="px-10 py-6 text-center">Quantidade</th><th className="px-10 py-6 text-right">Vlr Unitário</th><th className="px-10 py-6 text-right">Total</th><th className="px-10 py-6"></th></tr></thead>
                                        <tbody className="divide-y divide-slate-100 tabular text-sm">
                                            {(investments.movimentacoes || []).map(m => (
                                                <tr key={m.id} className="hover:bg-slate-50/50">
                                                    <td className="px-10 py-6 text-slate-500 font-bold">{m.data}</td>
                                                    <td className="px-10 py-6 font-black uppercase text-[#133054]">{m.ativo}</td>
                                                    <td className="px-10 py-6"><span className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${m.tipo.includes('Compra') || m.tipo.includes('Aporte') || m.tipo.includes('Provento') ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>{m.tipo}</span></td>
                                                    <td className="px-10 py-6 text-center font-bold">{m.quantidade.toLocaleString()}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-slate-400">{formatBRL(m.valorUnitario)}</td>
                                                    <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(m.valorTotal)}</td>
                                                    <td className="px-10 py-6 text-right"><button onClick={() => { if(confirm("Remover?")) { const next = {...investments, movimentacoes: investments.movimentacoes.filter(x => x.id !== m.id)}; setInvestments(next); save(next); } }} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dividendos' && (
                            <div className="space-y-10 animate-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <StatCard isMobile={isMobile} title="Total Recebido" value={formatBRL(totals.divsPagos)} icon="Coins" colorClass="bg-emerald-600" />
                                    <StatCard isMobile={isMobile} title="A Receber (Previsão)" value={formatBRL(totals.divsPendentes)} icon="Calendar" colorClass="bg-[#133054]" />
                                </div>
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100">
                                    <div className="p-8 border-b flex justify-between items-center"><h2 className="text-2xl font-black uppercase text-[#133054]">Listagem de Proventos</h2><button onClick={() => lancarProvento(prompt("Ticker:"))} className="bg-emerald-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">+ Novo Provento</button></div>
                                    <div className="overflow-x-auto custom-scroll">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] uppercase tracking-widest text-slate-400 font-black"><tr><th className="px-10 py-6">Data</th><th className="px-10 py-6">Ativo</th><th className="px-10 py-6 text-right">Valor</th><th className="px-10 py-6 text-center">Status</th><th className="px-10 py-6 text-right">Acções</th></tr></thead>
                                            <tbody className="divide-y divide-slate-100 tabular text-sm">
                                                {(investments.dividendos || []).map(d => (
                                                    <tr key={d.id} className="hover:bg-slate-50/50 transition-all">
                                                        <td className="px-10 py-6 text-slate-500 font-bold">{d.data}</td>
                                                        <td className="px-10 py-6 font-black text-slate-900 uppercase">{d.ativo}</td>
                                                        <td className="px-10 py-6 text-right font-black text-blue-600">{formatBRL(d.valor)}</td>
                                                        <td className="px-10 py-6 text-center"><span className={`px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${d.status === 'pago' ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}`}>{d.status || 'pago'}</span></td>
                                                        <td className="px-10 py-6 text-right">
                                                            <div className="flex justify-end gap-3">
                                                                {d.status === 'pendente' && <button onClick={() => confirmarRecebimento(d.id)} className="bg-emerald-600 text-white px-3 py-1 rounded-lg text-[9px] font-black uppercase">Receber</button>}
                                                                <button onClick={() => { if(confirm("Apagar?")) { const next = {...investments, dividendos: investments.dividendos.filter(x => x.id !== d.id)}; setInvestments(next); save(next); } }} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'historico' && (
                            <div className="space-y-10 animate-in">
                                <div className="flex justify-between items-center"><h2 className="text-2xl font-black uppercase text-[#133054]">Evolução Patrimonial</h2><button onClick={() => { const h = { id: Date.now().toString(), data: new Date().toLocaleDateString('pt-BR'), total: totals.total, acoes: totals.acoes.atual, re: totals.re.atual, caixa: totals.caixa.atual, alt: totals.alt.atual }; setInvestments(prev => { const next = { ...prev, historico: [h, ...(prev.historico || [])] }; save(next); return next; }); setSyncStatus("Snapshot guardado!"); setTimeout(() => setSyncStatus(""), 2000); }} className="bg-[#133054] text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase shadow-lg flex items-center gap-2"><LucideIcon name="Camera" size={14} /> Snapshot</button></div>
                                <div className="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 overflow-x-auto custom-scroll">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                            <tr><th className="px-10 py-6">Data Snapshot</th><th className="px-10 py-6 text-right">Total</th><th className="px-10 py-6 text-right">Ações</th><th className="px-10 py-6 text-right">RE</th><th className="px-10 py-6 text-right">Caixa</th><th className="px-10 py-6 text-right">Alt</th><th className="px-10 py-6 text-right">Acção</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 tabular text-sm">
                                            {(investments.historico || []).map(h => (
                                                <tr key={h.id} className="hover:bg-slate-50/50">
                                                    <td className="px-10 py-6 font-bold text-slate-500">{h.data}</td>
                                                    <td className="px-10 py-6 text-right font-black text-[#133054]">{formatBRL(h.total)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-[#bfa260]">{formatBRL(h.acoes)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-emerald-600">{formatBRL(h.re)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-slate-500">{formatBRL(h.caixa)}</td>
                                                    <td className="px-10 py-6 text-right font-bold text-rose-500">{formatBRL(h.alt)}</td>
                                                    <td className="px-10 py-6 text-right"><button onClick={() => { if(confirm("Apagar?")) { setInvestments(prev => { const next = {...prev, historico: prev.historico.filter(x => x.id !== h.id)}; save(next); return next; }); } }} className="text-slate-200 hover:text-rose-500"><LucideIcon name="Trash2" size={16}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'acoes' && (
                            <>
                                <TabSummaryHeader stats={totals.acoes} label="Ações / ETF" />
                                {renderTableSection('acoes', 'Ações / ETF')}
                            </>
                        )}
                        {activeTab === 'realEstate' && (
                            <>
                                <TabSummaryHeader stats={totals.re} label="Real Estate (FIIs)" />
                                {renderTableSection('realEstate', 'Real Estate (FIIs)')}
                            </>
                        )}
                        {activeTab === 'caixa' && (
                            <>
                                <TabSummaryHeader stats={totals.caixa} label="Caixa" />
                                {renderTableSection('caixa', 'Reserva Manual', 'manual')}
                                {renderTableSection('caixaTicker', 'Reserva Cotada', 'ticker')}
                            </>
                        )}
                        {activeTab === 'alternativos' && (
                            <>
                                <TabSummaryHeader stats={totals.alt} label="Alternativos" />
                                {renderTableSection('altFunds', 'Fundos Alternativos', 'manual')}
                                {renderTableSection('altStocks', 'Stocks Alternativos', 'ticker')}
                                {renderTableSection('altCrypto', 'Crypto Assets', 'ticker')}
                            </>
                        )}
                    </main>
                    <footer className="mt-20 py-10 text-center border-t border-slate-100 text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">IcaroInvest Elite Management v11.5</footer>
                </div>
            );
        };
        const start = () => { if (window.ReactDOM && window.React && window.Recharts) { ReactDOM.createRoot(document.getElementById('root')).render(<App />); } else { setTimeout(start, 50); } };
        start();
    </script>
</body>
</html>
