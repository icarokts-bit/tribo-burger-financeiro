<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Financeira v3.0</title>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chosen Palette: Midnight & Gold (Creme #FDFCF9, Escuro #1A202C, Laranja #D97757, Ouro #F8CC82) -->
    <!-- Application Structure Plan: 
         O sistema foi consolidado numa Single Page Application (SPA) robusta para garantir que, ao ser carregado pelo GitHub/Vercel, não existam erros de caminhos de ficheiros (404). 
         A arquitetura divide-se em: 1. Dashboard de Performance (KPIs em tempo real), 2. Folha Diária (Tabela de fecho de caixa sincronizada), 3. BI Analytics (Gráficos de tendências) e 4. Agenda de Parceiros.
         Esta estrutura permite ao utilizador transitar entre a operação (registo) e a estratégia (análise de lucro) sem latência, utilizando o Firebase para persistência total dos dados na nuvem.
    -->
    <!-- Visualization & Content Choices: 
         - KPIs -> Cards com ícones Lucide para Saldo, Gastos e Lucro Bruto.
         - Performance -> Gráfico de Linhas (Chart.js) para tendência de vendas.
         - Mix de Receita -> Gráfico de Rosca para canais de pagamento (Pix, Dinheiro, iFood).
         - Transações -> Lista com scroll interno e ações de eliminação.
         CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. Visuals provided by Tailwind & Chart.js Canvas.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; height: 320px; max-height: 400px; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-[#D97757] selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Configuração Firebase (Suas Chaves Ativas)
        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        // Importação dinâmica via ESM
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, setDoc, doc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'tribo-burger-financeiro';

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [suppliers, setSuppliers] = useState([]);
            
            // Estados dos Formulários
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);

            const mixChartRef = useRef(null);
            const trendChartRef = useRef(null);

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const root = ['artifacts', appId, 'users', user.uid];

                const unsubTx = onSnapshot(collection(db, ...root, 'transactions'), (snap) => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date)));
                });

                const unsubDaily = onSnapshot(collection(db, ...root, 'dailyRecords'), (snap) => {
                    const recs = {};
                    snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });

                const unsubSup = onSnapshot(collection(db, ...root, 'suppliers'), (snap) => {
                    setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                return () => { unsubTx(); unsubDaily(); unsubSup(); };
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
                if (activeTab === 'analise') renderCharts();
            }, [activeTab, transactions, dailyRecords]);

            const renderCharts = () => {
                const ctxMix = document.getElementById('mixChart')?.getContext('2d');
                const ctxTrend = document.getElementById('trendChart')?.getContext('2d');

                if (ctxMix) {
                    if (mixChartRef.current) mixChartRef.current.destroy();
                    mixChartRef.current = new Chart(ctxMix, {
                        type: 'doughnut',
                        data: {
                            labels: ['Pix/Online', 'iFood', 'Dinheiro/Cartão'],
                            datasets: [{
                                data: [50, 25, 25], // Valores base
                                backgroundColor: ['#1A202C', '#D97757', '#F8CC82'],
                                borderWidth: 0
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom' } } }
                    });
                }

                if (ctxTrend) {
                    if (trendChartRef.current) trendChartRef.current.destroy();
                    trendChartRef.current = new Chart(ctxTrend, {
                        type: 'line',
                        data: {
                            labels: transactions.slice(0, 7).reverse().map(t => t.date.split('-')[2]),
                            datasets: [{
                                label: 'Receita',
                                data: transactions.slice(0, 7).reverse().map(t => t.type === 'entrada' ? t.amount : 0),
                                borderColor: '#1A202C',
                                tension: 0.4,
                                fill: true,
                                backgroundColor: 'rgba(26, 32, 44, 0.05)'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { display: false } } } }
                    });
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!user || !desc || !val) return;
                const id = Date.now().toString();
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id), {
                    description: desc, amount: parseFloat(val), type, date
                });
                setDesc(''); setVal('');
            };

            const saveDailyValue = async (date, field, v) => {
                const clean = v.replace(/[^0-9.]/g, '');
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'dailyRecords', date), { [field]: clean }, { merge: true });
            };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const totals = useMemo(() => {
                return transactions.reduce((acc, t) => {
                    if (t.type === 'entrada') acc.in += t.amount;
                    else acc.out += t.amount;
                    return acc;
                }, { in: 0, out: 0 });
            }, [transactions]);

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#FDFCF9]">
                    <div className="text-center">
                        <i data-lucide="loader-2" class="w-12 h-12 mx-auto animate-spin text-[#31392A] mb-4"></i>
                        <p className="font-bold text-slate-400 uppercase text-xs tracking-widest">A ligar à Tribo Burger...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header Premium */}
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-2xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-1 rounded-xl w-14 h-14 flex items-center justify-center overflow-hidden border-2 border-[#D97757] shadow-inner">
                                    <img src="logo.png" alt="TB" className="h-full w-auto object-contain" onerror="this.src='https://via.placeholder.com/100?text=TRIBO'" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black uppercase text-[#F8CC82] tracking-tighter">Tribo Burger</h1>
                                    <p className="text-[10px] font-extrabold opacity-50 uppercase tracking-[0.2em]">Financeiro & BI</p>
                                </div>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl border border-white/10 overflow-x-auto no-scrollbar w-full md:w-auto">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-2.5 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'dashboard' ? 'tab-active' : ''}`}>Painel</button>
                                <button onClick={() => setActiveTab('planilha')} className={`px-6 py-2.5 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'planilha' ? 'tab-active' : ''}`}>Folha</button>
                                <button onClick={() => setActiveTab('analise')} className={`px-6 py-2.5 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'analise' ? 'tab-active' : ''}`}>Análise</button>
                                <button onClick={() => setActiveTab('parceiros')} className={`px-6 py-2.5 text-[10px] font-black uppercase tracking-widest transition-all ${activeTab === 'parceiros' ? 'tab-active' : ''}`}>Parceiros</button>
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-8 w-full flex-1">
                        
                        {activeTab === 'dashboard' && (
                            <div className="space-y-10 animate-in fade-in duration-500">
                                <section className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="glass-card p-8 rounded-[2.5rem] shadow-sm flex flex-col justify-between h-48 relative overflow-hidden">
                                        <div className="absolute -right-6 -top-6 w-24 h-24 bg-green-100 rounded-full opacity-20"></div>
                                        <span className="text-[10px] font-black uppercase text-slate-400 tracking-[0.15em]">Saldo em Conta</span>
                                        <h3 className="text-4xl font-black text-[#1A202C]">{formatMoney(totals.in - totals.out)}</h3>
                                        <div className="text-[10px] font-bold text-green-700 bg-green-100/50 px-3 py-1 rounded-full w-fit flex items-center gap-1"><i data-lucide="check-circle" size="12"></i> Sincronizado</div>
                                    </div>
                                    <div className="glass-card p-8 rounded-[2.5rem] shadow-sm border-l-8 border-l-red-500 h-48 flex flex-col justify-between">
                                        <span className="text-[10px] font-black uppercase text-slate-400 tracking-[0.15em]">Despesas Registadas</span>
                                        <h3 className="text-4xl font-black text-red-600">{formatMoney(totals.out)}</h3>
                                        <p className="text-[10px] text-slate-400 font-medium italic">Soma de todos os custos</p>
                                    </div>
                                    <div className="bg-[#1A202C] p-8 rounded-[2.5rem] shadow-2xl flex flex-col justify-between h-48 text-white">
                                        <span className="text-[10px] font-black uppercase text-[#F8CC82] tracking-[0.15em]">Lucro Operacional</span>
                                        <h3 className="text-4xl font-black">{formatMoney(totals.in - totals.out)}</h3>
                                        <p className="text-[10px] text-white/40">Faturação Bruta - Despesas</p>
                                    </div>
                                </section>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-10">
                                    <div className="lg:col-span-1">
                                        <div className="glass-card p-8 rounded-[3rem] shadow-sm border-2 border-slate-50">
                                            <h4 className="text-xs font-black uppercase tracking-widest mb-8 border-b pb-4 flex items-center gap-2 text-[#1A202C]">
                                                <i data-lucide="edit-3" size="16" class="text-[#D97757]"></i> Novo Lançamento
                                            </h4>
                                            <form onSubmit={handleSave} className="space-y-5">
                                                <input type="text" placeholder="O que comprou?" required className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-[#D97757] transition-all text-sm font-semibold" value={desc} onChange={e => setDesc(e.target.value)} />
                                                <div className="grid grid-cols-2 gap-4">
                                                    <input type="number" step="0.01" placeholder="Valor" required className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold text-sm" value={val} onChange={e => setVal(e.target.value)} />
                                                    <input type="date" className="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none text-[10px] font-bold" value={date} onChange={e => setDate(e.target.value)} />
                                                </div>
                                                <select className="w-full px-5 py-4 bg-white border-2 border-slate-100 rounded-2xl outline-none text-xs font-bold appearance-none" value={type} onChange={e => setType(e.target.value)}>
                                                    <option value="saida">Saída (-)</option>
                                                    <option value="entrada">Entrada (+)</option>
                                                </select>
                                                <button className="w-full bg-[#1A202C] text-[#F8CC82] font-black py-5 rounded-2xl shadow-xl hover:shadow-[#D97757]/20 active:scale-95 transition-all text-xs uppercase tracking-[0.2em] mt-4">Guardar Lançamento</button>
                                            </form>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-2">
                                        <div className="glass-card rounded-[3rem] shadow-sm overflow-hidden flex flex-col h-[600px]">
                                            <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center font-black text-[10px] uppercase text-slate-400 tracking-widest">
                                                <span>Histórico de Movimentos</span>
                                                <span className="bg-white px-3 py-1 rounded-full border shadow-sm">{transactions.length} itens</span>
                                            </div>
                                            <div className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
                                                {transactions.length === 0 ? (
                                                    <div className="p-20 text-center text-slate-300 font-bold uppercase tracking-[0.2em] text-xs">Sem registos na nuvem</div>
                                                ) : (
                                                    transactions.map(t => (
                                                        <div key={t.id} className="flex items-center justify-between p-5 bg-white border-2 border-slate-50 rounded-[1.8rem] hover:border-[#D97757]/30 hover:shadow-lg transition-all group">
                                                            <div className="flex items-center gap-5">
                                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xs font-black ${t.type === 'entrada' ? 'bg-[#D3E298]/40 text-[#4c5836]' : 'bg-red-50 text-red-600'}`}>
                                                                    <i data-lucide={t.type === 'entrada' ? 'arrow-up-right' : 'arrow-down-left'}></i>
                                                                </div>
                                                                <div>
                                                                    <p className="font-bold text-[#1A202C] text-sm tracking-tight uppercase">{t.description}</p>
                                                                    <p className="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">{t.date}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-6">
                                                                <span className={`text-sm font-black ${t.type === 'entrada' ? 'text-green-600' : 'text-slate-800'}`}>{formatMoney(t.amount)}</span>
                                                                <button onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', t.id))} className="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" size="18"></i></button>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                            <div className="glass-card rounded-[3rem] shadow-sm overflow-hidden animate-in slide-in-from-bottom duration-500">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h2 className="font-black text-[#1A202C] uppercase tracking-widest text-xs">Folha Diária de Vendas</h2>
                                    <span className="text-[10px] font-bold text-slate-400">Maio 2026</span>
                                </div>
                                <div className="overflow-x-auto no-scrollbar">
                                    <table className="w-full text-center text-[10px] border-collapse min-w-[900px]">
                                        <thead className="bg-[#1A202C] text-white uppercase tracking-widest">
                                            <tr>
                                                <th className="p-5 text-left border-r border-slate-700 sticky left-0 bg-[#1A202C] z-20">Data</th>
                                                <th className="p-5 bg-[#D97757] text-[#1A202C] font-black italic">Receita Dia</th>
                                                <th className="p-5 opacity-60">Pix</th>
                                                <th className="p-5 opacity-60">Dinheiro</th>
                                                <th className="p-5 opacity-60">iFood</th>
                                                <th className="p-5 bg-red-600/30 text-red-200">Motoboy</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100 font-bold">
                                            {Array.from({length: 5}, (_, i) => {
                                                const d = `2026-05-0${i+1}`;
                                                const r = dailyRecords[d] || {};
                                                return (
                                                    <tr key={d} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-5 text-left border-r border-slate-50 sticky left-0 bg-white font-black text-slate-400">{d.split('-').reverse().slice(0,2).join('/')}</td>
                                                        <td className="p-5 bg-green-50/50 text-green-700 font-black">---</td>
                                                        {['pix','dinheiro','ifood'].map(f => (
                                                            <td key={f} className="p-0 border-r border-slate-50">
                                                                <input type="text" value={r[f]||''} onChange={e => saveDailyValue(d, f, e.target.value)} className="w-full h-14 text-center bg-transparent border-0 outline-none focus:bg-[#D3E298]/30 font-bold" placeholder="0" />
                                                            </td>
                                                        ))}
                                                        <td className="p-0 bg-red-50/20">
                                                            <input type="text" value={r.motoboy||''} onChange={e => saveDailyValue(d, 'motoboy', e.target.value)} className="w-full h-14 text-center bg-transparent border-0 outline-none text-red-600" placeholder="0" />
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'analise' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-in zoom-in duration-500">
                                <div className="glass-card p-10 rounded-[3.5rem] shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-10 text-center">Distribuição de Receitas (Mix)</h4>
                                    <div className="chart-container"><canvas id="mixChart"></canvas></div>
                                </div>
                                <div className="glass-card p-10 rounded-[3.5rem] shadow-sm">
                                    <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em] mb-10 text-center">Tendência de Receita Diária</h4>
                                    <div className="chart-container"><canvas id="trendChart"></canvas></div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'parceiros' && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 animate-in fade-in duration-500">
                                {suppliers.map(s => (
                                    <div key={s.id} className="glass-card p-8 rounded-[2.5rem] text-center relative group border-2 border-slate-50 hover:border-[#D97757]/40 h-56 flex flex-col justify-center">
                                        <button onClick={async () => await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'suppliers', s.id))} className="absolute top-6 right-6 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" size="18"></i></button>
                                        <div className="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mb-5 mx-auto text-[#1A202C] shadow-inner"><i data-lucide="truck"></i></div>
                                        <p className="font-black text-sm text-[#1A202C] uppercase tracking-tight truncate px-2">{s.name}</p>
                                        <p className="text-[10px] font-black text-[#D97757] mt-1 tracking-widest">{s.phone || 'S/ CONTACTO'}</p>
                                    </div>
                                ))}
                                <button onClick={async () => {
                                    const n = prompt("Nome do Parceiro:");
                                    if(n) await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'suppliers', Date.now().toString()), { name: n, phone: prompt("Contacto:") });
                                }} className="border-4 border-dashed border-slate-200 rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-slate-300 hover:border-[#D97757] transition-all bg-white/50 h-56 group">
                                    <i data-lucide="plus-square" size="40" class="group-hover:scale-110 transition-transform"></i>
                                    <span className="text-[10px] font-black uppercase mt-4 tracking-widest">Novo Parceiro</span>
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="py-16 text-center">
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.5em]">Tribo Burger • Business Intelligence v3.0</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
