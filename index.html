<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v13.2.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'tribo-burger-financeiro';

        // Componente de Ícone Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return React.createElement('span', { ref: containerRef, className: "inline-flex items-center justify-center" });
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [settings, setSettings] = useState({ salesTarget: 0 });
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [dashboardFilterType, setDashboardFilterType] = useState('todos');

            // Form states
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida');
            const [account, setAccount] = useState('');
            const [cat, setCat] = useState('');

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = onSnapshot(collection(db, path, 'transactions'), (snap) => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubDaily = onSnapshot(collection(db, path, 'dailyRecords'), (snap) => {
                    const recs = {}; 
                    snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                
                const unsubAcc = onSnapshot(collection(db, path, 'accounts'), (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAccounts(list);
                    if (list.length > 0 && !account) setAccount(list[0].name);
                });

                const unsubCat = onSnapshot(collection(db, path, 'categories'), (snap) => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.name.localeCompare(b.name)));
                });

                const unsubSettings = onSnapshot(doc(db, path, 'settings'), (docSnap) => {
                    if (docSnap.exists()) setSettings(docSnap.data());
                });

                return () => { unsubTx(); unsubDaily(); unsubAcc(); unsubCat(); unsubSettings(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
                let rb = 0; 
                let logistica = 0; 
                let activeDays = 0;

                // Processar vendas diárias
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const dayTotal = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + p(r[f]), 0);
                        if (dayTotal > 0) activeDays++;
                        rb += dayTotal;
                        logistica += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });

                let totalOut = logistica;
                transactions.forEach(t => {
                    if ((t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth)) && t.status === 'pago') {
                        if (t.type === 'saida') totalOut += p(t.amount);
                    }
                });

                return { 
                    rb, 
                    logistica, 
                    totalOut, 
                    lucro: rb - totalOut, 
                    activeDays, 
                    average: activeDays > 0 ? rb / activeDays : 0 
                };
            }, [transactions, dailyRecords, filterMonth]);

            const totalSaldos = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                const balances = {};
                accounts.forEach(a => balances[a.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + p(t.amount);
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - p(t.amount);
                    }
                });
                return Object.values(balances).reduce((a, b) => a + b, 0);
            }, [transactions, accounts]);

            const handleSaveTx = async (e) => {
                e.preventDefault();
                const v = parseFloat(val.replace(',', '.'));
                if (!v || !user) return;
                await addDoc(collection(db, `artifacts/${appId}/users/${user.uid}/transactions`), {
                    description: desc, amount: v, type, account, category: cat, status: 'pago',
                    date: new Date().toISOString().split('T')[0],
                    timestamp: new Date().toISOString()
                });
                setDesc(''); setVal('');
            };

            const saveMeta = async (newMeta) => {
                if (!user) return;
                await setDoc(doc(db, `artifacts/${appId}/users/${user.uid}/settings`), { salesTarget: parseFloat(newMeta) || 0 }, { merge: true });
            };

            if (loading) return React.createElement('div', { className: "min-h-screen flex items-center justify-center bg-[#1A202C]" }, React.createElement(Icon, { name: "loader", className: "animate-spin text-[#F8CC82]", size: 48 }));

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] p-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Finanças</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase mt-2">v13.2.2 Stable</p>
                        </div>
                        <form onSubmit={e => { e.preventDefault(); signInWithEmailAndPassword(auth, email, password).catch(err => alert(err.message)); }} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border rounded-2xl outline-none" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-20 fade-in">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-1 rounded-full"><h1 className="text-lg font-black text-[#1A202C] px-2">T</h1></div>
                                <h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management</h1>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'saldos', 'planilha', 'resultados'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase whitespace-nowrap transition-all ${activeTab === tab ? 'tab-active' : 'text-slate-400'}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab}
                                    </button>
                                ))}
                                <button onClick={() => signOut(auth)} className="px-4 py-2 text-[10px] font-black text-red-400 uppercase">Sair</button>
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full space-y-6">
                        <div className="flex justify-center">
                            <div className="glass-card px-6 py-2 rounded-full border shadow-sm">
                                <input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm" />
                            </div>
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <form onSubmit={handleSaveTx} className="glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-[#1A202C] h-fit">
                                    <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">Novo Lançamento</h2>
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                                        {['entrada', 'saida'].map(t => (
                                            <button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t}</button>
                                        ))}
                                    </div>
                                    <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold" value={desc} onChange={e => setDesc(e.target.value)} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black" value={val} onChange={e => setVal(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase" value={account} onChange={e => setAccount(e.target.value)}>
                                            {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
                                        </select>
                                    </div>
                                    <button className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Gravar</button>
                                </form>

                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[600px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center">
                                        <span className="font-black text-[10px] uppercase text-slate-400">Histórico de Lançamentos</span>
                                        <select className="text-[10px] font-black uppercase bg-white border p-2 rounded-xl" value={dashboardFilterType} onChange={e => setDashboardFilterType(e.target.value)}>
                                            <option value="todos">Todos</option>
                                            <option value="entrada">Entradas</option>
                                            <option value="saida">Saídas</option>
                                        </select>
                                    </div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {transactions.filter(t => t.date?.startsWith(filterMonth) && (dashboardFilterType === 'todos' || t.type === dashboardFilterType)).map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-[10px] font-black text-slate-400">{t.date?.split('-').reverse().slice(0,2).join('/')}</span>
                                                    <div>
                                                        <p className="font-black text-sm uppercase leading-none">{t.description}</p>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.account}</p>
                                                    </div>
                                                </div>
                                                <p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(t.amount)}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'saldos' && (
                            <div className="space-y-8">
                                <div className="stat-banner !bg-[#D97757] !border-[#1A202C]">
                                    <p className="text-[10px] font-black uppercase tracking-[0.4em] opacity-80">Saldo Geral de Todas as Contas</p>
                                    <h3 className="text-5xl font-black">{formatMoney(totalSaldos)}</h3>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {accounts.map(acc => (
                                        <div key={acc.id} className="glass-card p-8 rounded-[3rem] border-t-8 border-[#1A202C] text-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-2">{acc.name}</p>
                                            <h4 className="text-2xl font-black text-slate-800">{formatMoney(transactions.filter(t => t.account === acc.name && t.status === 'pago').reduce((a, t) => t.type === 'entrada' ? a + (parseFloat(t.amount) || 0) : a - (parseFloat(t.amount) || 0), 0))}</h4>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8 fade-in">
                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                    <div className="lg:col-span-2 glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-[#D97757] flex flex-col justify-between">
                                        <div className="flex justify-between items-center mb-6">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Definir Meta do Mês</p>
                                            <div className="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-xl border">
                                                <span className="text-[10px] font-black text-slate-400">R$</span>
                                                <input type="number" className="bg-transparent border-0 outline-none font-black text-sm w-24" placeholder="0" value={settings.salesTarget || ''} onChange={e => saveMeta(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex justify-between items-end">
                                                <h3 className="text-4xl font-black text-[#1A202C] leading-none">{formatMoney(stats.rb)}</h3>
                                                <p className="text-[10px] font-black text-slate-400 uppercase">Faturado Atual</p>
                                            </div>
                                            <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden border">
                                                <div className="h-full bg-[#D97757] transition-all" style={{ width: `${Math.min(100, (stats.rb / (settings.salesTarget || 1)) * 100)}%` }}></div>
                                            </div>
                                            <p className="text-[9px] font-black uppercase text-center text-[#D97757] tracking-widest">
                                                {((stats.rb / (settings.salesTarget || 1)) * 100).toFixed(1)}% da Meta Concluída
                                            </p>
                                        </div>
                                    </div>

                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-blue-500 text-center flex flex-col justify-center items-center gap-2">
                                        <div className="bg-blue-50 p-3 rounded-full text-blue-500 mb-2"><Icon name="calendar" size={24} /></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase">Dias Ativos</p>
                                        <h3 className="text-3xl font-black text-blue-600">{stats.activeDays}</h3>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase">(Dias com Vendas)</p>
                                    </div>

                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-green-500 text-center flex flex-col justify-center items-center gap-2">
                                        <div className="bg-green-50 p-3 rounded-full text-green-500 mb-2"><Icon name="calculator" size={24} /></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase">Ticket Médio Dia</p>
                                        <h3 className="text-2xl font-black text-green-600 leading-none">{formatMoney(stats.average)}</h3>
                                        <p className="text-[8px] font-bold text-slate-400 uppercase">Faturado / Dias Ativos</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center bg-white p-4 rounded-3xl border shadow-sm">
                                    <div className="flex items-center gap-2 font-black uppercase text-[10px]"><Icon name="table" /><span>Planilha Diária</span></div>
                                    <button onClick={() => {
                                        const d = new Date().toISOString().split('T')[0];
                                        setDoc(doc(db, `artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`), { initialized: true }, { merge: true });
                                    }} className="bg-black text-[#F8CC82] px-6 py-2 rounded-xl text-[9px] font-black uppercase">Abrir Hoje</button>
                                </div>
                                <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                                    <table className="w-full text-center text-[11px] min-w-[1000px]">
                                        <thead>
                                            <tr className="bg-black text-white uppercase font-black text-[9px]">
                                                <th className="p-4">Data</th>
                                                <th className="p-4 bg-yellow-500 text-black">Total Dia</th>
                                                {['Pix', 'Dinheiro', 'Ifood', 'Débito', 'Crédito'].map(h => <th key={h} className="p-4">{h}</th>)}
                                                <th className="p-4 text-red-400">Motoboy</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y font-bold">
                                            {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b)-new Date(a)).map(d => {
                                                const r = dailyRecords[d];
                                                const dayTotal = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc, f) => acc + (parseFloat(r[f]) || 0), 0);
                                                return (
                                                    <tr key={d} className="hover:bg-slate-50 h-12">
                                                        <td className="p-4 font-black">{d.split('-').reverse().join('/')}</td>
                                                        <td className="p-4 bg-yellow-50">{formatMoney(dayTotal)}</td>
                                                        {['pix', 'dinheiro', 'ifood', 'debito', 'credito', 'motoboy'].map(f => (
                                                            <td key={f} className="p-0 border-r">
                                                                <input className="table-input" value={r[f] || ''} onChange={async(e) => {
                                                                    await setDoc(doc(db, `artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`), { [f]: e.target.value.replace(',', '.') }, { merge: true });
                                                                }} placeholder="0,00" />
                                                            </td>
                                                        ))}
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v13.2.2</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
