<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v10.4.0 (CORRIGIDA)</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const apiKey = ""; 
        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            
            // FORMULÁRIO DASHBOARD
            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [destAccount, setDestAccount] = useState(''); 
            const [cat, setCat] = useState('');
            const [supplier, setSupplier] = useState(''); 
            const [status, setStatus] = useState('pago'); 
            const [installments, setInstallments] = useState(1);
            const [date, setDate] = useState(new Date().toLocaleDateString('en-CA'));
            const [clearance, setClearance] = useState(new Date().toLocaleDateString('en-CA'));
            const [editingId, setEditingId] = useState(null);

            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [newDay, setNewDay] = useState(new Date().toLocaleDateString('en-CA'));
            
            const [newItemName, setNewItemName] = useState('');
            const [newItemType, setNewItemType] = useState('corrente');
            const [newItemClosingDay, setNewItemClosingDay] = useState('25');
            const [newItemDueDay, setNewItemDueDay] = useState('10');
            const [editingAccountId, setEditingAccountId] = useState(null);

            const [aiReport, setAiReport] = useState('');
            const [aiLoading, setAiLoading] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;

                const unsubTx = db.collection(`${path}/transactions`)
                    .onSnapshot(snap => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                const unsubDaily = db.collection(`${path}/dailyRecords`)
                    .onSnapshot(snap => {
                        const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                        setDailyRecords(recs);
                    });

                const unsubAccounts = db.collection(`${path}/accounts`)
                    .onSnapshot(snap => {
                        const accList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setAccounts(accList);
                        if (accList.length > 0 && !account) setAccount(accList[0].name);
                    });

                const unsubCategories = db.collection(`${path}/categories`)
                    .onSnapshot(snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                const unsubSuppliers = db.collection(`${path}/suppliers`)
                    .onSnapshot(snap => setSuppliers(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSuppliers(); };
            }, [user]);

            const handleAuth = async (e) => {
                e.preventDefault();
                setAuthError('');
                setLoading(true);
                try {
                    if (isRegistering) {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                    }
                } catch (err) { setAuthError(err.message || "Erro ao autenticar."); } finally { setLoading(false); }
            };

            const handleLogout = () => { if (confirm('Sair do sistema?')) auth.signOut(); };

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const calculateCardClearance = (purchaseDateStr, closingDay, dueDay) => {
                const purchaseDate = new Date(purchaseDateStr + 'T12:00:00');
                const pDay = purchaseDate.getDate();
                const pMonth = purchaseDate.getMonth();
                const pYear = purchaseDate.getFullYear();
                let dueMonth = pMonth;
                let dueYear = pYear;
                if (pDay > parseInt(closingDay)) dueMonth += 1;
                dueMonth += 1; 
                const dueDate = new Date(dueYear, dueMonth, parseInt(dueDay), 12, 0, 0);
                return dueDate.toISOString().split('T')[0];
            };

            const saveTx = async (e) => {
                e.preventDefault();
                if (!user || !val || (type !== 'transferencia' && !desc)) return;
                const totalAmount = parseFloat(val.replace(',', '.')) || 0;
                const cardInfo = accounts.find(acc => acc.name === account && acc.type === 'cartao');
                const numInstallments = cardInfo && type === 'saida' ? (parseInt(installments) || 1) : 1;
                const batch = db.batch();
                
                for(let i = 0; i < numInstallments; i++) {
                    const currentId = i === 0 && editingId ? editingId : Date.now().toString() + i;
                    const baseDate = new Date(date + 'T12:00:00');
                    baseDate.setMonth(baseDate.getMonth() + i);
                    const finalDateStr = baseDate.toISOString().split('T')[0];
                    let finalClearance = clearance;
                    if (cardInfo) {
                        finalClearance = calculateCardClearance(finalDateStr, cardInfo.closingDay, cardInfo.dueDay);
                    } else if (i > 0) {
                        const bc = new Date(clearance + 'T12:00:00');
                        bc.setMonth(bc.getMonth() + i);
                        finalClearance = bc.toISOString().split('T')[0];
                    }
                    const payload = {
                        description: type === 'transferencia' ? `Transf: ${account} → ${destAccount}` : (numInstallments > 1 ? `${desc} (${i+1}/${numInstallments})` : desc),
                        amount: totalAmount / numInstallments,
                        type, status: type === 'transferencia' ? 'pago' : status,
                        date: finalDateStr, clearanceDate: finalClearance, account, destinationAccount: type === 'transferencia' ? destAccount : '',
                        category: type === 'transferencia' ? 'Transferência Interna' : (cat || 'Outros'),
                        supplier: type === 'saida' ? supplier : '', timestamp: new Date().toISOString(),
                        installmentIndex: i, totalInstallments: numInstallments
                    };
                    batch.set(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${currentId}`), payload, { merge: true });
                }
                await batch.commit();
                resetForm();
            };

            const resetForm = () => { setEditingId(null); setDesc(''); setVal(''); setType('saida'); setDestAccount(''); setCat(''); setSupplier(''); setStatus('pago'); setInstallments(1); };

            const stats = useMemo(() => {
                const p = (v) => parseFloat(v) || 0;
                let rb = 0; let custosVariaveis = 0; let costsByCategory = {}; let pendingTotal = 0;
                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        rb += p(r.pix) + p(r.pixOnline) + p(r.fiado) + p(r.dinheiro) + p(r.ifood) + p(r.debito) + p(r.credito) + p(r.vr) + p(r.ticket) + p(r.alelo);
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });
                transactions.forEach(t => {
                    if (t.date.startsWith(filterMonth)) {
                        const amount = p(t.amount);
                        if (t.type === 'saida') {
                            if (t.status === 'pendente') pendingTotal += amount;
                            else costsByCategory[t.category] = (costsByCategory[t.category] || 0) + amount;
                        }
                    }
                });
                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const cmv = (costsByCategory['CMV Insumos'] || 0) + (costsByCategory['CMV Bebidas'] || 0);
                return { rb, custosVariaveis, costsByCategory, totalOperating, pendingTotal, lucro: rb - (custosVariaveis + totalOperating), cmv };
            }, [transactions, dailyRecords, filterMonth]);

            const pendingPaymentsConsolidated = useMemo(() => {
                const items = transactions.filter(t => t.type === 'saida' && t.status === 'pendente' && t.clearanceDate.startsWith(filterMonth));
                const nonCard = items.filter(t => accounts.find(a => a.name === t.account)?.type !== 'cartao');
                const cardInvoices = accounts.filter(a => a.type === 'cartao').map(card => {
                    const total = items.filter(t => t.account === card.name).reduce((acc, t) => acc + (t.amount || 0), 0);
                    if (total === 0) return null;
                    return { id: `invoice-${card.name}-${filterMonth}`, description: `Fatura: ${card.name}`, amount: total, type: 'saida', status: 'pendente', clearanceDate: `${filterMonth}-${String(card.dueDay || 10).padStart(2, '0')}`, account: card.name, category: 'Cartão de Crédito', isInvoice: true };
                }).filter(Boolean);
                return [...nonCard, ...cardInvoices].sort((a,b) => new Date(a.clearanceDate) - new Date(b.clearanceDate));
            }, [transactions, filterMonth, accounts]);

            // CARTÕES: Filtrar por data da compra (t.date) para não sumirem no mês da compra
            const cardTransactionsForMonth = useMemo(() => {
                return transactions.filter(t => {
                    const acc = accounts.find(a => a.name === t.account);
                    return acc?.type === 'cartao' && t.date.startsWith(filterMonth);
                }).sort((a,b) => new Date(b.date) - new Date(a.date));
            }, [transactions, filterMonth, accounts]);

            const futureIncomes = useMemo(() => {
                return transactions.filter(t => t.type === 'entrada' && t.status === 'pendente' && t.date.startsWith(filterMonth))
                                  .sort((a,b) => new Date(a.date) - new Date(b.date));
            }, [transactions, filterMonth]);

            const callAiConsultant = async () => {
                setAiLoading(true);
                const systemPrompt = "És um consultor financeiro especialista em Hamburguerias. Analisa os números fornecidos e dá 3 sugestões práticas para aumentar o lucro ou reduzir o CMV.";
                const userQuery = `Mês: ${filterMonth}. Faturamento: ${formatMoney(stats.rb)}. CMV: ${formatMoney(stats.cmv)}. Gastos Operacionais: ${formatMoney(stats.totalOperating)}. Lucro: ${formatMoney(stats.lucro)}. Sugestões?`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                    });
                    const result = await response.json();
                    setAiReport(result.candidates?.[0]?.content?.parts?.[0]?.text || "Análise concluída.");
                } catch (e) { setAiReport("Erro na IA. Tente novamente mais tarde."); } finally { setAiLoading(false); }
            };

            const markAsPaid = async (tId) => {
                if (!user) return;
                if (tId.startsWith('invoice-')) {
                    const [, cardName, month] = tId.split('-');
                    const batch = db.batch();
                    transactions.filter(t => t.account === cardName && t.clearanceDate.startsWith(month) && t.status === 'pendente')
                        .forEach(t => batch.update(db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${t.id}`), { status: 'pago' }));
                    await batch.commit();
                    return;
                }
                await db.doc(`artifacts/${appId}/users/${user.uid}/transactions/${tId}`).update({ status: 'pago' });
            };

            const startEdit = (t) => {
                if (t.isInvoice) return; 
                setEditingId(t.id); setDesc(t.description || ''); setVal(t.amount ? t.amount.toString().replace('.', ',') : '');
                setType(t.type || 'saida'); setAccount(t.account || ''); setDestAccount(t.destinationAccount || '');
                setCat(t.category || ''); setSupplier(t.supplier || ''); setStatus(t.status || 'pago');
                setDate(t.date || new Date().toLocaleDateString('en-CA')); setClearance(t.clearanceDate || new Date().toLocaleDateString('en-CA'));
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const accountBalances = useMemo(() => {
                const balances = {}; accounts.forEach(acc => balances[acc.name] = 0);
                transactions.forEach(t => {
                    if (t.status === 'pago') {
                        if (t.type === 'entrada') balances[t.account] = (balances[t.account] || 0) + t.amount;
                        else if (t.type === 'saida') balances[t.account] = (balances[t.account] || 0) - t.amount;
                        else if (t.type === 'transferencia') { balances[t.account] = (balances[t.account] || 0) - t.amount; balances[t.destinationAccount] = (balances[t.destinationAccount] || 0) + t.amount; }
                    }
                });
                return balances;
            }, [transactions, accounts]);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C]">
                    <div className="text-center">
                        <Icon name="loader" className="animate-spin text-[#F8CC82] mb-4" size={48} />
                        <p className="text-[#F8CC82] font-black uppercase tracking-[0.3em] text-[10px]">Autenticando...</p>
                    </div>
                </div>
            );

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full bg-white p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757] animate-in fade-in duration-500">
                        <div className="text-center mb-10"><img src="logo.png" className="w-24 mx-auto mb-4" alt="Logo" /><h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter">Tribo Finanças</h2><p className="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest">Painel Administrativo v10.4</p></div>
                        <form onSubmit={handleAuth} className="space-y-4">
                            <input type="email" required placeholder="Email" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Senha" className="w-full p-4 bg-slate-50 border-2 rounded-2xl text-sm font-semibold outline-none focus:border-[#D97757]" value={password} onChange={e => setPassword(e.target.value)} />
                            {authError && <p className="text-red-500 text-[10px] font-bold text-center bg-red-50 p-3 rounded-xl border border-red-100">{authError}</p>}
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all">{isRegistering ? 'Criar Conta' : 'Entrar no Sistema'}</button>
                        </form>
                        <button onClick={() => setIsRegistering(!isRegistering)} className="w-full mt-8 text-[10px] font-black text-[#D97757] uppercase tracking-widest hover:underline">{isRegistering ? 'Já tem conta? Login' : 'Novo? Registe-se'}</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in relative">
                    <img src="logo.png" className="bg-watermark w-96" alt="" />
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3"><img src="logo.png" className="h-10 w-10 bg-white p-1 rounded-full shadow-lg" alt="" /><div><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter">Tribo Management v10.4</h1><div className="flex items-center gap-2"><span className="text-[8px] text-green-400 font-bold uppercase">{user.email}</span><button onClick={handleLogout} className="text-[8px] text-red-400 font-black uppercase hover:underline">Sair</button></div></div></div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar w-full md:w-auto">
                                {['dashboard', 'saldos', 'planilha', 'a_pagar', 'a_receber', 'cartoes', 'resultados', 'dre', 'fornecedores', 'ajustes'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>{tab === 'planilha' ? 'Vendas' : tab.replace('_', ' ')}</button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 shadow-sm border-2 border-slate-100"><span className="text-[9px] font-black uppercase text-slate-400">Período:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-[#1A202C] p-6 rounded-[2rem] shadow-xl border-b-4 border-yellow-500 text-center"><p className="text-[8px] font-black text-[#F8CC82] uppercase mb-1 tracking-widest">Lucro Operacional</p><h3 className={`text-xl font-black ${stats.lucro >= 0 ? 'text-green-400' : 'text-red-400'}`}>{formatMoney(stats.lucro)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">Faturamento</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.rb)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">A Pagar (Pendente)</p><h3 className="text-xl font-black text-orange-500">{formatMoney(stats.pendingTotal)}</h3></div>
                                    <div className="bg-white p-6 rounded-[2rem] border-b-4 border-slate-200 shadow-sm text-center"><p className="text-[8px] font-black text-slate-400 uppercase mb-1 tracking-widest">CMV Acumulado</p><h3 className="text-xl font-black text-slate-800">{formatMoney(stats.cmv)}</h3></div>
                                </div>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-1 space-y-6">
                                        <div className="glass-card p-8 rounded-[3rem] shadow-xl flex flex-col items-center justify-center text-center"><Icon name="brain-circuit" size={40} className="text-[#D97757] mb-4" /><h3 className="text-xs font-black uppercase text-[#1A202C]">IA Consultor Tribo</h3>{aiReport ? (<div className="bg-slate-50 p-4 rounded-3xl text-left text-[10px] font-semibold leading-relaxed border mt-4 animate-in zoom-in">{aiReport.split('\n').map((line, i) => <p key={i} className="mb-1">{line}</p>)}<button onClick={() => setAiReport('')} className="mt-3 text-[8px] font-black text-red-400 uppercase tracking-widest">Limpar</button></div>) : (<button onClick={callAiConsultant} disabled={aiLoading} className="bg-[#1A202C] text-[#F8CC82] px-6 py-3 rounded-2xl font-black uppercase text-[10px] flex items-center gap-2 mt-4 hover:scale-105 transition-all">{aiLoading ? <Icon name="loader" className="animate-spin" /> : <Icon name="sparkles" />}Analisar Negócio</button>)}</div>
                                        
                                        {/* FORMULÁRIO DE LANÇAMENTO COMPLETO */}
                                        <form onSubmit={saveTx} className="glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-[#1A202C] h-fit">
                                            <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">{editingId ? 'Editar Lançamento' : 'Novo Lançamento'}</h2>
                                            <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">{['entrada', 'saida', 'transferencia'].map(t => (<button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t.slice(0, 5)}</button>))}</div>

                                <div className="glass-card p-8 rounded-[3rem] shadow-lg">
                                    <h2 className="text-sm font-black uppercase mb-6 flex items-center gap-2"><Icon name="list" className="text-[#D97757]"/> Categorias</h2>
                                    <div className="flex gap-2 mb-6"><input type="text" className="flex-1 p-4 bg-slate-50 border rounded-2xl text-xs font-bold outline-none" placeholder="Ex: Insumos" value={newItemName} onChange={e => setNewItemName(e.target.value)} /><button onClick={async() => { if(!newItemName) return; await db.collection(`artifacts/${appId}/users/${user.uid}/categories`).add({ name: newItemName }); setNewItemName(''); }} className="bg-[#1A202C] text-[#F8CC82] p-4 rounded-2xl hover:bg-black transition-colors"><Icon name="plus" /></button></div>
                                    <div className="space-y-2 max-h-60 overflow-y-auto no-scrollbar">{categories.map(c => (<div key={c.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl shadow-sm"><span className="text-xs font-bold uppercase text-slate-600">{c.name}</span><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/categories/${c.id}`).delete()} className="text-red-200 hover:text-red-500 transition-colors"><Icon name="trash-2" size={12}/></button></div>))}</div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v10.4.0 (Versão Estável)</footer>
                </div>
            );

            async function handleSaveAccount() {
                if (!newItemName) return;
                const path = `artifacts/${appId}/users/${user.uid}/accounts`;
                const data = { name: newItemName, type: newItemType, closingDay: newItemClosingDay || '1', dueDay: newItemDueDay || '10' };
                if (editingAccountId) await db.doc(`${path}/${editingAccountId}`).set(data, { merge: true });
                else await db.collection(path).add(data);
                setNewItemName(''); setNewItemType('corrente'); setEditingAccountId(null);
            }

            async function handleUpdateSalesDate(oldDate, newDate) {
                if (!user || oldDate === newDate || !newDate) return;
                const pathBase = `artifacts/${appId}/users/${user.uid}/dailyRecords`;
                const data = dailyRecords[oldDate];
                try {
                    await db.doc(`${pathBase}/${newDate}`).set(data);
                    await db.doc(`${pathBase}/${oldDate}`).delete();
                } catch (e) { console.error("Erro ao mover data:", e); }
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
