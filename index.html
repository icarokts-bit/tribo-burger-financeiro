<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.I Investimentos - Sistema Tribo</title>
    
    <!-- Frameworks e Estilos -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        window.FirebaseSDK = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot, 
            collection, deleteDoc, updateDoc 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #f4f4f5;
            margin: 0;
            overflow-x: hidden;
        }

        .premium-shadow {
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .donut-animation {
            transition: stroke-dashoffset 1s ease-in-out;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-cyan {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-cyan {
            animation: pulse-cyan 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .suggestion-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .suggestion-list::-webkit-scrollbar {
            width: 4px;
        }
        .suggestion-list::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;
        
        const Icons = {
            TrendingUp: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={props.className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
            ),
            Building2: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"></path><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"></path></svg>
            ),
            Globe: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            ),
            Coins: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path></svg>
            ),
            Trash2: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            ),
            RefreshCw: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
            ),
            Loader2: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${props.className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
            ),
            Edit3: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
            ),
            Check: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={props.className}><polyline points="20 6 9 17 4 12"></polyline></svg>
            ),
            LayoutGrid: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            ),
            ArrowUpRight: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={props.className}><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
            ),
            ArrowDownRight: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={props.className}><line x1="7" y1="7" x2="17" y2="17"></line><polyline points="17 7 17 17 7 17"></polyline></svg>
            ),
            Cloud: (props) => (
                <svg width={props.size || 24} height={props.size || 24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.4-1.8-4.3-4.2-4.5C17.4 6.7 14.6 4 11 4 8.2 4 5.9 5.8 5.1 8.3 2.7 8.9 1 11.1 1 13.5 1 16.5 3.5 19 6.5 19Z"></path></svg>
            ),
            Search: (props) => (
                <svg width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            ),
            AlertCircle: (props) => (
                <svg width={props.size || 20} height={props.size || 20} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={props.className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            )
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBPLsJazn6fJuXKi3dRamG7xGDyYDyu744",
            authDomain: "ri-investimentos.firebaseapp.com",
            projectId: "ri-investimentos",
            storageBucket: "ri-investimentos.firebasestorage.app",
            messagingSenderId: "948689870153",
            appId: "1:948689870153:web:1e457b82d2857b60308e98",
            measurementId: "G-DW2E81Q623"
        };

        const appId = "ri-investimentos-final-tribo";
        
        // --- CONFIGURAÇÃO DADOS DE MERCADO ---
        const DM_API_BASE = "https://api.dadosdemercado.com.br/v1";
        const DM_TOKEN = "kV6yXxdJXBydFXERkYgfSf"; 

        const STRATEGY = [
            { id: 'acoes', label: 'A - AÇÕES', color: '#00D4C5', icon: Icons.TrendingUp, desc: 'Bolsa Brasileira' },
            { id: 'realestate', label: 'R - REAL ESTATE', color: '#0088FE', icon: Icons.Building2, desc: 'FIIs e Imóveis' },
            { id: 'caixa', label: 'C - CAIXA', color: '#4ADE80', icon: Icons.Coins, desc: 'Liquidez/Renda Fixa' },
            { id: 'internacional', label: 'A - ALTERNATIVOS', color: '#EF4444', icon: Icons.Globe, desc: 'Mercado Global' }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [assets, setAssets] = useState([]);
            const [totalGoal, setTotalGoal] = useState(0);
            const [tempGoal, setTempGoal] = useState("");
            const [isEditGoal, setIsEditGoal] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncError, setSyncError] = useState(null);
            const [newAsset, setNewAsset] = useState({ name: '', qty: '', avgPrice: '', currentPrice: '' });
            
            const [apiTickers, setApiTickers] = useState([]);
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const suggestionRef = useRef(null);

            const FSDK = window.FirebaseSDK;
            const db = useMemo(() => FSDK.getFirestore(FSDK.initializeApp(firebaseConfig)), [FSDK]);
            const auth = useMemo(() => FSDK.getAuth(FSDK.initializeApp(firebaseConfig)), [FSDK]);

            // --- CARREGAR TICKERS DA DADOS DE MERCADO ---
            useEffect(() => {
                const fetchMarketData = async () => {
                    try {
                        const headers = { "Authorization": `Bearer ${DM_TOKEN}` };
                        
                        // Busca tickers, empresas e FIIs
                        const [resTickers, resCompanies, resReits] = await Promise.all([
                            fetch(`${DM_API_BASE}/tickers`, { headers }),
                            fetch(`${DM_API_BASE}/companies`, { headers }),
                            fetch(`${DM_API_BASE}/reits`, { headers })
                        ]);

                        if (resTickers.ok) {
                            const tickers = await resTickers.json();
                            const companies = resCompanies.ok ? await resCompanies.json() : [];
                            const reits = resReits.ok ? await resReits.json() : [];

                            const masterList = tickers.map(t => {
                                const info = companies.find(c => c.ticker === t.ticker) || 
                                             reits.find(r => r.ticker === t.ticker) || 
                                             { name: t.name || 'Ativo B3' };
                                return { ticker: t.ticker, name: info.name };
                            });

                            setApiTickers(masterList);
                        }
                    } catch (e) { console.error("Erro no carregamento de dados:", e); }
                };
                fetchMarketData();
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                        try { await FSDK.signInWithCustomToken(auth, window.__initial_auth_token); } 
                        catch (e) { await FSDK.signInAnonymously(auth); }
                    } else { await FSDK.signInAnonymously(auth); }
                };
                initAuth();
                return FSDK.onAuthStateChanged(auth, setUser);
            }, [auth, FSDK]);

            useEffect(() => {
                if (!user) return;
                const unsubGoal = FSDK.onSnapshot(FSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'goal'), (d) => {
                    if (d.exists()) { setTotalGoal(d.data().value); setTempGoal(d.data().value.toString()); }
                });
                const unsubAssets = FSDK.onSnapshot(FSDK.collection(db, 'artifacts', appId, 'users', user.uid, 'assets'), (s) => {
                    setAssets(s.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => setSyncError("Erro de ligação ao Firebase. Verifique a consola."));
                return () => { unsubGoal(); unsubAssets(); };
            }, [user, db, FSDK]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (suggestionRef.current && !suggestionRef.current.contains(event.target)) {
                        setShowSuggestions(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            // --- SINCRONIZAÇÃO ROBUSTA COM DADOS DE MERCADO ---
            const syncPrices = useCallback(async (forcedTab = null) => {
                const tabToSync = forcedTab || activeTab;
                if (!user || isSyncing || tabToSync === 'home' || tabToSync === 'caixa') return;
                
                const tabAssets = assets.filter(a => a.category === tabToSync);
                if (tabAssets.length === 0) return;
                
                setIsSyncing(true);
                setSyncError(null);
                
                try {
                    const headers = { 
                        "Authorization": `Bearer ${DM_TOKEN}`,
                        "Accept": "application/json"
                    };
                    
                    const updatePromises = tabAssets.map(async (asset) => {
                        try {
                            const ticker = asset.name.trim().toUpperCase();
                            // Corrigindo URL: Conforme Curl exemplo, o endpoint de cotações é /tickers/{ticker}/quotes
                            const res = await fetch(`${DM_API_BASE}/tickers/${ticker}/quotes`, { headers });
                            
                            if (res.status === 401) throw new Error("Token Inválido ou Expirado.");
                            
                            if (res.ok) {
                                const quotes = await res.json();
                                if (quotes && quotes.length > 0) {
                                    const latest = quotes[quotes.length - 1];
                                    await FSDK.updateDoc(FSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'assets', asset.id), { 
                                        currentPrice: latest.close, 
                                        updatedAt: Date.now() 
                                    });
                                }
                            }
                        } catch (e) { 
                            console.error(`Erro no ticker ${asset.name}:`, e); 
                            if (e.message.includes("Token")) throw e;
                        }
                    });

                    await Promise.all(updatePromises);
                } catch (e) { 
                    setSyncError(e.message || "Falha na sincronização com a Bolsa.");
                } finally { 
                    setIsSyncing(false); 
                }
            }, [user, activeTab, assets, db, FSDK, isSyncing]);

            useEffect(() => {
                if (activeTab !== 'home' && user && assets.length > 0) {
                    const timer = setTimeout(() => syncPrices(activeTab), 1000);
                    return () => clearTimeout(timer);
                }
            }, [activeTab, user]);

            const saveGoal = async () => {
                if (!user) return;
                await FSDK.setDoc(FSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'goal'), { value: parseFloat(tempGoal) || 0 });
                setIsEditGoal(false);
            };

            const addAsset = async (e) => {
                if (e) e.preventDefault();
                if (!user || !newAsset.name || !newAsset.qty) return;
                const id = Date.now().toString();
                await FSDK.setDoc(FSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'assets', id), {
                    ...newAsset,
                    name: newAsset.name.toUpperCase().trim(),
                    category: activeTab,
                    qty: parseFloat(newAsset.qty),
                    avgPrice: parseFloat(newAsset.avgPrice || 0),
                    currentPrice: parseFloat(newAsset.currentPrice || 0),
                    updatedAt: Date.now()
                });
                setNewAsset({ name: '', qty: '', avgPrice: '', currentPrice: '' });
                setShowSuggestions(false);
            };

            const removeAsset = async (id) => {
                if (user) await FSDK.deleteDoc(FSDK.doc(db, 'artifacts', appId, 'users', user.uid, 'assets', id));
            };

            const handleTickerChange = (val) => {
                const term = val.toUpperCase();
                setNewAsset({...newAsset, name: term});
                
                if (term.length > 0) {
                    const filtered = apiTickers
                        .filter(item => 
                            item.ticker.includes(term) || 
                            item.name.toUpperCase().includes(term)
                        )
                        .sort((a, b) => {
                            if (a.ticker.startsWith(term) && !b.ticker.startsWith(term)) return -1;
                            if (!a.ticker.startsWith(term) && b.ticker.startsWith(term)) return 1;
                            return a.ticker.localeCompare(b.ticker);
                        })
                        .slice(0, 15);
                    
                    setSuggestions(filtered);
                    setShowSuggestions(filtered.length > 0);
                } else {
                    setShowSuggestions(false);
                }
            };

            const selectSuggestion = (ticker) => {
                setNewAsset({...newAsset, name: ticker});
                setShowSuggestions(false);
            };

            const processedAssets = useMemo(() => assets.map(a => {
                const qty = parseFloat(a.qty) || 0;
                const avgPrice = parseFloat(a.avgPrice) || 0;
                const currentPrice = parseFloat(a.currentPrice) || 0;
                const totalInvested = qty * avgPrice;
                const priceForCurrent = (currentPrice > 0) ? currentPrice : avgPrice;
                const totalCurrent = qty * priceForCurrent;
                const profitVal = (currentPrice > 0) ? (totalCurrent - totalInvested) : 0;
                const profitPerc = (totalInvested > 0 && currentPrice > 0) ? (profitVal / totalInvested) * 100 : 0;
                return { ...a, qty, avgPrice, currentPrice, totalInvested, totalCurrent, profitVal, profitPerc };
            }), [assets]);

            const totals = useMemo(() => {
                const res = { acoes: { invested: 0, current: 0 }, realestate: { invested: 0, current: 0 }, caixa: { invested: 0, current: 0 }, internacional: { invested: 0, current: 0 } };
                processedAssets.forEach(a => { if(res[a.category]) { res[a.category].invested += a.totalInvested; res[a.category].current += a.totalCurrent; } });
                return res;
            }, [processedAssets]);

            const grandTotalCurrent = useMemo(() => Object.values(totals).reduce((a, b) => a + b.current, 0), [totals]);
            const grandTotalInvested = useMemo(() => Object.values(totals).reduce((a, b) => a + b.invested, 0), [totals]);
            
            const shareGoal = totalGoal / 4;
            const formatBRL = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

            if (!user) return <div className="h-screen bg-black flex flex-col items-center justify-center gap-4 text-white"><Icons.Loader2 size={40} className="text-cyan-500" /><p className="text-[10px] font-black tracking-widest uppercase">A ligar ao sistema Tribo...</p></div>;

            return (
                <div className="min-h-screen bg-[#050505] text-zinc-100 pb-32 selection:bg-cyan-500/20">
                    <header className="p-6 sticky top-0 bg-[#050505]/95 backdrop-blur-xl border-b border-zinc-900 z-50">
                        <div className="flex justify-between items-center max-w-4xl mx-auto">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-cyan-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(0,212,197,0.3)]"><Icons.TrendingUp size={20} color="#000" /></div>
                                <h1 className="font-black tracking-tighter text-xl uppercase text-white">R.I <span className="text-cyan-500 text-white">SISTEMA</span></h1>
                            </div>
                            <div className="flex items-center gap-3">
                                {isSyncing && <div className="text-[10px] font-bold text-cyan-400 animate-pulse-cyan uppercase tracking-widest">Sincronização B3 ativa...</div>}
                                <Icons.Cloud size={20} className={isSyncing ? "text-cyan-500 animate-pulse" : "text-emerald-500/50"} />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-6 pt-10">
                        {syncError && (
                            <div className="bg-rose-500/10 border border-rose-500/30 p-4 rounded-2xl mb-8 flex items-center gap-3 text-rose-400">
                                <Icons.AlertCircle size={20} />
                                <span className="text-xs font-bold uppercase tracking-tight">{syncError}</span>
                            </div>
                        )}

                        {activeTab === 'home' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <div className="relative flex items-center justify-center w-72 h-72 mx-auto my-12 text-white">
                                    <svg viewBox="0 0 200 200" className="transform -rotate-90 w-full h-full drop-shadow-[0_0_25px_rgba(0,0,0,0.8)]">
                                        {STRATEGY.map((cat, i, arr) => {
                                            const r = 82; const circ = 2 * Math.PI * r;
                                            const off = arr.slice(0, i).reduce((acc, c) => acc + (grandTotalCurrent > 0 ? (totals[c.id].current/grandTotalCurrent)*circ : 0.25*circ), 0);
                                            const stroke = grandTotalCurrent > 0 ? (totals[cat.id].current/grandTotalCurrent)*circ : 0.25*circ;
                                            return <circle key={cat.id} cx="100" cy="100" r={r} fill="none" stroke={cat.color} strokeWidth="26" strokeDasharray={`${stroke} ${circ}`} strokeDashoffset={-off} className="donut-animation" />;
                                        })}
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center">
                                        <span className="text-[9px] font-black tracking-[0.4em] text-zinc-600 uppercase">DIVERSIFICAÇÃO</span>
                                        <span className="text-3xl font-black tracking-tighter text-white">R.I <span className="font-light opacity-30">INVEST</span></span>
                                    </div>
                                </div>

                                <div className="bg-zinc-900/30 border border-zinc-900 p-8 rounded-[2.5rem] mb-10 grid grid-cols-1 md:grid-cols-2 gap-6 premium-shadow">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="text-[10px] font-black text-zinc-500 tracking-[0.2em] mb-2 uppercase text-white">Património Atualizado</p>
                                            <h3 className="text-4xl font-black tracking-tighter text-white">{formatBRL(grandTotalCurrent)}</h3>
                                        </div>
                                        <button onClick={() => setIsEditGoal(!isEditGoal)} className="p-4 bg-white/5 rounded-2xl text-cyan-400 hover:scale-105 active:scale-95 transition-all text-white"><Icons.Edit3 size={20} /></button>
                                    </div>
                                    <div className="border-l border-zinc-800 md:pl-6 flex flex-col justify-end">
                                        <p className="text-[10px] font-black text-zinc-500 tracking-[0.2em] mb-1 uppercase text-white">Total Investido (Aplicações)</p>
                                        <p className="text-xl font-bold text-zinc-400">{formatBRL(grandTotalInvested)}</p>
                                    </div>
                                </div>

                                {isEditGoal && (
                                    <div className="bg-zinc-900 p-8 rounded-[2.5rem] border border-cyan-500/30 mb-10 animate-in zoom-in-95">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase block mb-4 text-white">Meta Total de Alocação (ARCA)</label>
                                        <div className="flex gap-4">
                                            <input type="number" value={tempGoal} onChange={e => setTempGoal(e.target.value)} className="flex-1 bg-black border border-zinc-800 rounded-2xl px-6 py-4 text-xl font-bold focus:border-cyan-500 outline-none text-white" />
                                            <button onClick={saveGoal} className="bg-cyan-500 text-black px-8 rounded-2xl font-black flex items-center justify-center hover:bg-cyan-400 active:scale-95 transition-all text-white"><Icons.Check size={20} strokeWidth={3} /></button>
                                        </div>
                                    </div>
                                )}

                                <div className="space-y-4">
                                    {STRATEGY.map(cat => {
                                        const total = totals[cat.id].current; const diff = shareGoal - total;
                                        return (
                                            <button key={cat.id} onClick={() => setActiveTab(cat.id)} className="w-full bg-zinc-900/20 border border-zinc-900 p-6 rounded-[2rem] flex items-center justify-between group hover:bg-zinc-900/40 transition-all border-l-4" style={{ borderLeftColor: cat.color }}>
                                                <div className="flex items-center gap-5">
                                                    <div className="p-3.5 rounded-xl bg-white/5 text-white/90 group-hover:scale-110 transition-transform"><cat.icon size={18} /></div>
                                                    <div className="text-left"><h4 className="text-[10px] font-black text-zinc-600 mb-1 uppercase text-white">{cat.label}</h4><p className="text-xl font-black text-white">{formatBRL(total)}</p></div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-[10px] font-black text-zinc-500 mb-1.5 text-white">{grandTotalCurrent > 0 ? ((total/grandTotalCurrent)*100).toFixed(1) : 0}%</div>
                                                    <div className={`text-[9px] font-black px-3 py-1 rounded-full uppercase ${diff > 0 ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}`}>
                                                        {diff > 0 ? `INVESTIR ${formatBRL(diff)}` : `EXCEDENTE ${formatBRL(Math.abs(diff))}`}
                                                    </div>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            <div className="animate-in slide-in-from-right-4 duration-500">
                                <div className="flex justify-between items-end mb-10 pb-8 border-b border-zinc-900 text-white">
                                    <div><h2 className="text-3xl font-black uppercase text-white tracking-tighter" style={{ color: STRATEGY.find(t => t.id === activeTab).color }}>{STRATEGY.find(t => t.id === activeTab).label}</h2></div>
                                    <div className="flex items-center gap-4 text-right">
                                        <button onClick={() => syncPrices()} disabled={isSyncing} className="p-3.5 bg-zinc-900 border border-zinc-800 rounded-xl text-cyan-400 hover:bg-zinc-800 active:scale-90 transition-all text-white">
                                            {isSyncing ? <Icons.Loader2 size={20} /> : <Icons.RefreshCw size={20} />}
                                        </button>
                                        <div className="text-white"><p className="text-[9px] font-black text-zinc-700 uppercase text-white">Investido nesta Classe</p><p className="text-2xl font-black text-white tracking-tighter">{formatBRL(totals[activeTab].invested)}</p></div>
                                    </div>
                                </div>

                                <form onSubmit={addAsset} className="bg-zinc-900/20 border border-zinc-900 p-8 rounded-[2.5rem] mb-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-end premium-shadow relative">
                                    <div className="space-y-2 relative" ref={suggestionRef}>
                                        <label className="text-[9px] font-black text-zinc-600 uppercase ml-3 tracking-widest text-white">Ticker ou Empresa</label>
                                        <div className="relative">
                                            <input required type="text" placeholder="EX: PETR4 ou PETROBRAS" autoComplete="off" value={newAsset.name} onChange={e => handleTickerChange(e.target.value)} onFocus={() => handleTickerChange(newAsset.name)} className="w-full bg-black border border-zinc-800 rounded-2xl p-4 pl-12 text-sm font-bold focus:border-cyan-500 outline-none text-white uppercase transition-all text-white" />
                                            <div className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-600"><Icons.Search size={18} /></div>
                                        </div>
                                        {showSuggestions && (
                                            <div className="absolute top-full left-0 right-0 mt-2 bg-[#0A0A0A] border border-zinc-800 rounded-2xl overflow-hidden z-[100] shadow-2xl animate-in fade-in zoom-in-95 duration-200">
                                                <ul className="suggestion-list">
                                                    {suggestions.map((item, idx) => (
                                                        <li key={idx} onClick={() => selectSuggestion(item.ticker)} className="px-6 py-4 hover:bg-cyan-500/10 cursor-pointer border-b border-zinc-900 last:border-none flex flex-col transition-colors group">
                                                            <div className="flex justify-between items-center mb-1">
                                                                <span className="font-black text-sm text-cyan-400 group-hover:text-white transition-colors">{item.ticker}</span>
                                                                <span className="text-[8px] text-zinc-700 uppercase tracking-widest bg-zinc-900/50 px-2 py-0.5 rounded text-white">B3 OFICIAL</span>
                                                            </div>
                                                            <span className="text-[10px] text-zinc-500 group-hover:text-zinc-300 transition-colors truncate text-white">{item.name}</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                    <div className="space-y-2"><label className="text-[9px] font-black text-zinc-600 uppercase ml-3 tracking-widest text-white">Quantidade</label><input required type="number" step="any" value={newAsset.qty} onChange={e => setNewAsset({...newAsset, qty: e.target.value})} className="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm font-bold outline-none text-white" /></div>
                                    <div className="space-y-2"><label className="text-[9px] font-black text-zinc-600 uppercase ml-3 tracking-widest text-white">Preço Médio</label><input required type="number" step="0.01" value={newAsset.avgPrice} onChange={e => setNewAsset({...newAsset, avgPrice: e.target.value})} className="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-sm font-bold outline-none text-white" /></div>
                                    <button type="submit" className="bg-white text-black font-black text-[10px] h-[58px] rounded-2xl tracking-[0.2em] uppercase hover:bg-cyan-500 transition-all active:scale-95 shadow-lg text-white">ADICIONAR</button>
                                </form>

                                <div className="space-y-6">
                                    {processedAssets.filter(a => a.category === activeTab).map(asset => (
                                        <div key={asset.id} className="bg-zinc-900/15 border border-zinc-900 p-6 rounded-[2rem] flex flex-col gap-6 hover:bg-zinc-900/25 transition-all group border-l-4" style={{ borderLeftColor: STRATEGY.find(t => t.id === activeTab).color }}>
                                            <div className="flex justify-between items-start">
                                                <div className="flex items-center gap-5">
                                                    <div className="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center font-black text-[11px] text-zinc-400 uppercase tracking-tighter border border-white/5">{asset.name.substring(0, 4)}</div>
                                                    <div><h4 className="font-black text-lg text-white uppercase tracking-tight flex items-center gap-2 text-white">{asset.name}<span className="text-[9px] bg-white/10 px-2 py-0.5 rounded text-zinc-500 uppercase tracking-widest text-white">Ativo</span></h4><p className="text-[10px] font-bold text-zinc-600 uppercase mt-0.5 tracking-widest text-white">Posição Detalhada</p></div>
                                                </div>
                                                <button onClick={() => removeAsset(asset.id)} className="p-3 text-zinc-800 hover:text-rose-500 hover:bg-rose-500/10 rounded-xl transition-all text-white"><Icons.Trash2 size={18} /></button>
                                            </div>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-zinc-900/50">
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Quantidade</span><span className="text-sm font-bold text-white">{asset.qty} UN</span></div>
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Preço Médio</span><span className="text-sm font-bold text-zinc-300">{formatBRL(asset.avgPrice)}</span></div>
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Cotação Atual</span><span className="text-sm font-bold text-cyan-400">{(asset.currentPrice > 0) ? formatBRL(asset.currentPrice) : 'Aguardando Sinc...'}</span></div>
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Total Investido</span><span className="text-sm font-bold text-zinc-400">{formatBRL(asset.totalInvested)}</span></div>
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Total Atual</span><span className="text-sm font-bold text-white">{formatBRL(asset.totalCurrent)}</span></div>
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Lucro R$</span><span className={`text-sm font-black flex items-center gap-1 ${asset.profitVal >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{asset.profitVal >= 0 ? <Icons.ArrowUpRight size={14} /> : <Icons.ArrowDownRight size={14} />}{formatBRL(asset.profitVal)}</span></div>
                                                <div className="flex flex-col"><span className="text-[9px] font-black text-zinc-600 uppercase tracking-widest mb-1 text-white">Lucro %</span><span className={`text-sm font-black ${asset.profitPerc >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>{asset.profitPerc >= 0 ? '+' : ''}{asset.profitPerc.toFixed(2)}%</span></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#0A0A0A]/90 backdrop-blur-md border border-zinc-800/50 p-2.5 rounded-[2.5rem] flex items-center gap-2 z-50 shadow-[0_30px_60px_rgba(0,0,0,0.7)] text-white">
                        <button onClick={() => setActiveTab('home')} className={`p-4 rounded-[1.8rem] transition-all flex items-center gap-3 ${activeTab === 'home' ? 'bg-cyan-500 text-black shadow-[0_0_25px_rgba(0,212,197,0.4)]' : 'text-zinc-600 hover:bg-zinc-900'}`}><Icons.LayoutGrid size={20} strokeWidth={2.5} /><span className={activeTab === 'home' ? 'text-[10px] font-black tracking-widest uppercase pr-2' : 'hidden'}>Dashboard</span></button>
                        <div className="w-px h-6 bg-zinc-800/50 mx-1.5"></div>
                        {STRATEGY.map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`p-4 rounded-[1.8rem] transition-all flex items-center gap-3 ${activeTab === tab.id ? 'bg-white text-black shadow-lg' : 'text-zinc-600 hover:bg-zinc-900'}`}><tab.icon size={20} strokeWidth={2.5} /><span className={activeTab === tab.id ? 'text-[10px] font-black tracking-widest uppercase pr-2' : 'hidden'}>{tab.id.substring(0, 3)}</span></button>
                        ))}
                    </nav>

                    <div className="fixed bottom-0 left-0 right-0 h-1 bg-gradient-to-r from-cyan-500/30 via-blue-600/30 to-rose-600/30 opacity-20 blur-[1px]"></div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
