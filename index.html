<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribo Burger | Gestão Total v13.2.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFCF9; color: #1A202C; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); }
        .tab-active { background-color: #1A202C; color: #F8CC82; border-radius: 14px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .table-input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; font-weight: 800; font-size: 11px; outline: none; padding: 4px; }
        .table-input:focus { background-color: rgba(211, 226, 152, 0.2); }
        .header-black { background-color: #000; color: #FFF; font-weight: 800; text-transform: uppercase; font-size: 10px; border: 1px solid #333; }
        .bg-watermark { position: fixed; bottom: -50px; right: -50px; opacity: 0.03; z-index: -1; transform: rotate(-15deg); pointer-events: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-banner { background: #1A202C; border-bottom: 6px solid #D97757; color: white; padding: 2rem; border-radius: 2.5rem; text-align: center; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .status-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased">

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCL0o0TQYbPXoo7Yo_qJpc1oa7jib8KBcc",
            authDomain: "tribo-burger-app.firebaseapp.com",
            projectId: "tribo-burger-app",
            storageBucket: "tribo-burger-app.firebasestorage.app",
            messagingSenderId: "490245681469",
            appId: "1:490245681469:web:189b1d2e35bd142cc31554"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'tribo-burger-financeiro';

        const Icon = ({ name, size = 20, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        node: containerRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const [transactions, setTransactions] = useState([]);
            const [dailyRecords, setDailyRecords] = useState({});
            const [accounts, setAccounts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [settings, setSettings] = useState({ salesTarget: 0 });
            
            const [filterMonth, setFilterMonth] = useState(new Date().toISOString().slice(0, 7));
            const [dashboardFilterAccount, setDashboardFilterAccount] = useState('');
            const [dashboardFilterCategory, setDashboardFilterCategory] = useState('');
            const [dashboardFilterType, setDashboardFilterType] = useState('');
            const [localPayments, setLocalPayments] = useState({});

            const [desc, setDesc] = useState('');
            const [val, setVal] = useState('');
            const [type, setType] = useState('saida'); 
            const [account, setAccount] = useState('');
            const [cat, setCat] = useState('');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [clearance, setClearance] = useState(new Date().toISOString().split('T')[0]);
            const [status, setStatus] = useState('pago');

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubTx = db.collection(`${path}/transactions`).onSnapshot(snap => {
                    setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                
                const unsubDaily = db.collection(`${path}/dailyRecords`).onSnapshot(snap => {
                    const recs = {}; snap.docs.forEach(d => recs[d.id] = d.data());
                    setDailyRecords(recs);
                });
                
                const unsubAccounts = db.collection(`${path}/accounts`).onSnapshot(snap => {
                    const accList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAccounts(accList);
                    if (accList.length > 0 && !account) setAccount(accList[0].name);
                });
                
                const unsubCategories = db.collection(`${path}/categories`).onSnapshot(snap => {
                    setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.name.localeCompare(b.name)));
                });

                const unsubSettings = db.collection(path).doc('settings').onSnapshot(doc => {
                    if (doc.exists) setSettings(doc.data());
                });

                return () => { unsubTx(); unsubDaily(); unsubAccounts(); unsubCategories(); unsubSettings(); };
            }, [user]);

            const formatMoney = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

            const stats = useMemo(() => {
                const p = (v) => parseFloat(String(v || 0).replace(',', '.')) || 0;
                let rb = 0; 
                let custosVariaveis = 0; 
                let costsByCategory = {}; 
                let daysWithSales = 0;

                Object.keys(dailyRecords).forEach(day => {
                    if (day.startsWith(filterMonth)) {
                        const r = dailyRecords[day];
                        const totalDay = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((t,f)=>t+p(r[f]), 0);
                        if (totalDay > 0) daysWithSales++;
                        rb += totalDay;
                        custosVariaveis += p(r.motoboy) + p(r.taxaEntrega);
                    }
                });

                transactions.forEach(t => {
                    if ((t.date?.startsWith(filterMonth) || t.clearanceDate?.startsWith(filterMonth)) && t.status === 'pago') {
                        if (t.type === 'saida') costsByCategory[t.category] = (costsByCategory[t.category] || 0) + p(t.amount);
                    }
                });

                const totalOperating = Object.values(costsByCategory).reduce((a, b) => a + b, 0);
                const averageDaily = daysWithSales > 0 ? rb / daysWithSales : 0;

                return { rb, custosVariaveis, totalOperating, lucro: rb - (custosVariaveis + totalOperating), costsByCategory, daysWithSales, averageDaily };
            }, [transactions, dailyRecords, filterMonth]);

            const saveMeta = async (val) => {
                if (!user) return;
                const meta = parseFloat(val) || 0;
                await db.doc(`artifacts/${appId}/users/${user.uid}/settings`).set({ salesTarget: meta }, { merge: true });
            };

            const handleSaveTx = async (e) => {
                e.preventDefault();
                const valNum = parseFloat(val.replace(',','.'));
                if(!valNum) return;
                await db.collection(`artifacts/${appId}/users/${user.uid}/transactions`).add({ 
                    description: desc, 
                    amount: valNum, 
                    type, status, account, category: cat, 
                    date, clearanceDate: clearance, 
                    timestamp: new Date().toISOString() 
                });
                setDesc(''); setVal('');
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-[#1A202C]"><Icon name="loader" className="animate-spin text-[#F8CC82]" size={48} /></div>;

            if (!user) return (
                <div className="min-h-screen flex items-center justify-center bg-[#1A202C] px-4">
                    <div className="max-w-md w-full glass-card p-10 rounded-[3rem] shadow-2xl border-t-8 border-[#D97757]">
                        <div className="text-center mb-10"><img src="logo.png" className="w-24 mx-auto mb-4" /><h2 className="text-3xl font-black text-[#1A202C] uppercase tracking-tighter text-center">Tribo Finanças</h2></div>
                        <form onSubmit={e => { e.preventDefault(); auth.signInWithEmailAndPassword(email, password).catch(err=>alert(err.message)); }} className="space-y-4">
                            <input type="email" placeholder="Email" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-semibold outline-none focus:border-orange-500" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" placeholder="Senha" className="w-full p-4 bg-slate-50 border-2 rounded-2xl font-semibold outline-none focus:border-orange-500" value={password} onChange={e => setPassword(e.target.value)} />
                            <button className="w-full bg-[#1A202C] text-[#F8CC82] py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Entrar</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col fade-in relative pb-20">
                    <header className="bg-[#1A202C] text-white p-4 sticky top-0 z-50 border-b-4 border-[#D97757] shadow-xl">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <img src="logo.png" className="h-10 w-10 bg-white p-1 rounded-full shadow-lg" alt="logo" />
                                <div><h1 className="text-lg font-black text-[#F8CC82] uppercase tracking-tighter leading-none">Tribo Management</h1></div>
                            </div>
                            <nav className="flex bg-white/5 p-1 rounded-2xl overflow-x-auto no-scrollbar">
                                {['dashboard', 'planilha', 'resultados', 'a_pagar', 'a_receber'].map(tab => (
                                    <button key={tab} onClick={() => setActiveTab(tab)} className={`px-4 py-2 text-[10px] font-black uppercase transition-all whitespace-nowrap ${activeTab === tab ? 'tab-active' : 'text-slate-400 hover:text-white'}`}>
                                        {tab === 'planilha' ? 'Vendas' : tab === 'dashboard' ? 'Lançamentos' : tab.replace('_', ' ')}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="p-6 max-w-6xl mx-auto w-full flex-1 space-y-6">
                        <div className="flex justify-center"><div className="glass-card px-6 py-2 rounded-full flex items-center gap-4 border-2 border-slate-100 shadow-sm"><span className="text-[9px] font-black uppercase text-slate-400">Período:</span><input type="month" value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="bg-transparent border-0 outline-none font-black text-[#D97757] text-sm cursor-pointer" /></div></div>

                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <form onSubmit={handleSaveTx} className="glass-card p-8 rounded-[3rem] shadow-sm space-y-4 border-t-4 border-[#1A202C] h-fit">
                                    <h2 className="text-xs font-black uppercase tracking-widest border-b pb-3">Novo Lançamento</h2>
                                    <div className="flex gap-1 bg-slate-100 p-1 rounded-2xl">{['entrada', 'saida'].map(t => (<button key={t} type="button" onClick={() => setType(t)} className={`flex-1 py-3 rounded-xl font-black text-[9px] uppercase transition-all ${type === t ? 'bg-white shadow-sm text-black' : 'text-slate-400'}`}>{t}</button>))}</div>
                                    <input type="text" placeholder="Descrição" required className="w-full p-4 bg-slate-50 border rounded-2xl text-sm font-bold outline-none" value={desc} onChange={e => setDesc(e.target.value)} />
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="text" placeholder="Valor" required className="w-full p-4 bg-slate-50 border rounded-2xl font-black outline-none" value={val} onChange={e => setVal(e.target.value)} />
                                        <select className="w-full p-4 bg-white border rounded-2xl font-black text-[10px] uppercase outline-none" value={account} onChange={e => setAccount(e.target.value)}>{accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}</select>
                                    </div>
                                    <button className="w-full bg-black text-[#F8CC82] p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Gravar</button>
                                </form>
                                <div className="lg:col-span-2 glass-card rounded-[2.5rem] shadow-sm h-[600px] flex flex-col border overflow-hidden">
                                    <div className="p-4 bg-slate-50 border-b font-black text-[10px] uppercase text-slate-400">Histórico de Lançamentos</div>
                                    <div className="flex-1 overflow-y-auto no-scrollbar divide-y">
                                        {transactions.filter(t => t.date?.startsWith(filterMonth)).map(t => (
                                            <div key={t.id} className="p-4 flex justify-between items-center hover:bg-slate-50">
                                                <div className="flex items-center gap-4">
                                                    <span className="text-[10px] font-black text-slate-400">{t.date?.split('-').reverse().slice(0, 2).join('/')}</span>
                                                    <div><p className="font-black text-sm uppercase leading-none">{t.description}</p><p className="text-[9px] font-bold text-slate-400 uppercase mt-1">{t.category}</p></div>
                                                </div>
                                                <p className={`font-black text-sm ${t.type === 'entrada' ? 'text-green-600' : 'text-red-600'}`}>{formatMoney(t.amount)}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'planilha' && <PlanilhaTab dailyRecords={dailyRecords} user={user} filterMonth={filterMonth} formatMoney={formatMoney} Icon={Icon} appId={appId} db={db} />}

                        {activeTab === 'resultados' && (
                            <div className="space-y-8 fade-in">
                                <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                    <div className="lg:col-span-2 glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-[#D97757] flex flex-col justify-between">
                                        <div className="flex justify-between items-center mb-4">
                                            <p className="text-[10px] font-black text-slate-400 uppercase">Definir Meta Mensal</p>
                                            <div className="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-xl">
                                                <span className="text-[10px] font-black">R$</span>
                                                <input type="number" className="bg-transparent border-0 outline-none font-black text-sm w-24" placeholder="0" value={settings.salesTarget || ''} onChange={e => saveMeta(e.target.value)} />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between items-end"><h3 className="text-3xl font-black">{formatMoney(stats.rb)}</h3><p className="text-[10px] font-black text-slate-400 uppercase">Faturado</p></div>
                                            <div className="w-full bg-slate-100 h-4 rounded-full overflow-hidden border">
                                                <div className="h-full bg-[#D97757] transition-all" style={{ width: `${Math.min(100, (stats.rb / (settings.salesTarget || 1)) * 100)}%` }}></div>
                                            </div>
                                            <p className="text-[9px] font-black uppercase text-center mt-2 tracking-widest">{((stats.rb / (settings.salesTarget || 1)) * 100).toFixed(1)}% da Meta Alcançada</p>
                                        </div>
                                    </div>
                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-blue-500 text-center flex flex-col justify-center items-center">
                                        <div className="bg-blue-50 p-3 rounded-full mb-3 text-blue-500"><Icon name="calendar-days" size={24} /></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase">Dias Ativos</p>
                                        <h3 className="text-3xl font-black text-blue-600">{stats.daysWithSales}</h3>
                                    </div>
                                    <div className="glass-card p-8 rounded-[3rem] shadow-xl border-t-8 border-green-500 text-center flex flex-col justify-center items-center">
                                        <div className="bg-green-50 p-3 rounded-full mb-3 text-green-500"><Icon name="calculator" size={24} /></div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase">Média Diária</p>
                                        <h3 className="text-2xl font-black text-green-600">{formatMoney(stats.averageDaily)}</h3>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="py-8 text-center opacity-30 font-black text-[9px] uppercase tracking-[0.5em]">Tribo Management • v13.2.1</footer>
                </div>
            );
        }

        const PlanilhaTab = ({ dailyRecords, user, filterMonth, formatMoney, Icon, appId, db }) => {
            const [newDay, setNewDay] = useState(new Date().toISOString().split('T')[0]);
            return (
                <div className="space-y-6 fade-in">
                    <div className="flex justify-between items-center bg-white p-4 rounded-3xl border shadow-sm">
                        <div className="flex items-center gap-2 font-black uppercase text-[10px]"><Icon name="table" /><span>Vendas Diárias</span></div>
                        <div className="flex gap-2">
                            <input type="date" className="p-2 border rounded-xl text-xs" value={newDay} onChange={e => setNewDay(e.target.value)} />
                            <button onClick={async() => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${newDay}`).set({ initialized: true }, { merge: true }); }} className="bg-black text-[#F8CC82] px-4 py-2 rounded-xl text-[9px] font-black uppercase">Abrir Dia</button>
                        </div>
                    </div>
                    <div className="glass-card rounded-[2.5rem] overflow-hidden border shadow-sm overflow-x-auto no-scrollbar">
                        <table className="w-full text-center text-[11px] min-w-[1200px]">
                            <thead><tr className="header-black text-white"><th className="p-4">Data</th><th className="p-4 bg-yellow-500 text-black">Total Dia</th>{['Pix','Dinheiro','Ifood','Débito','Crédito'].map(h => <th key={h} className="p-4">{h}</th>)}<th className="p-4 text-red-400">Motoboy</th><th className="p-4">Ações</th></tr></thead>
                            <tbody className="divide-y font-bold">
                                {Object.keys(dailyRecords).filter(d => d.startsWith(filterMonth)).sort((a,b) => new Date(b)-new Date(a)).map(d => { 
                                    const r = dailyRecords[d];
                                    const totalDay = ['pix','pixOnline','fiado','dinheiro','ifood','debito','credito','vr','ticket','alelo'].reduce((acc,f)=>acc+(parseFloat(r[f]) || 0), 0);
                                    return (
                                        <tr key={d} className="hover:bg-slate-50 h-12">
                                            <td className="p-4 font-black">{d.split('-').reverse().join('/')}</td>
                                            <td className="p-4 bg-yellow-50">{formatMoney(totalDay)}</td>
                                            {['pix','dinheiro','ifood','debito','credito','motoboy'].map(f => (
                                                <td key={f} className="p-0 border-r">
                                                    <input className="table-input" value={r[f] || ''} onChange={async(e) => { await db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).set({ [f]: e.target.value.replace(',', '.') }, { merge: true }); }} placeholder="0,00" />
                                                </td>
                                            ))}
                                            <td className="p-4"><button onClick={() => db.doc(`artifacts/${appId}/users/${user.uid}/dailyRecords/${d}`).delete()} className="text-red-200"><Icon name="trash-2" size={14}/></button></td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
